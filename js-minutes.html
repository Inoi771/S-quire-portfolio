<script>
// ========================================
// 議事録ロジック
// ========================================

var minutesData_ = null;
var minutesFY_ = null;
var minutesLoaded_ = false;

function loadMinutes() {
  var root = document.getElementById('minutes-root');
  if (!root) return;

  if (!minutesFY_) {
    var now = new Date();
    minutesFY_ = (now.getMonth() >= 3) ? now.getFullYear() : now.getFullYear() - 1;
  }

  // キャッシュ確認
  if (!minutesLoaded_) {
    try {
      var cached = localStorage.getItem('s-quire-minutes-' + minutesFY_);
      if (cached) {
        minutesData_ = JSON.parse(cached);
        renderMinutesList_(minutesData_);
      }
    } catch (e) {}
  }

  root.innerHTML = minutesData_ ? root.innerHTML : '<p style="text-align:center;color:#999;padding:40px;">読み込み中...</p>';

  google.script.run
    .withSuccessHandler(function(result) {
      minutesData_ = result || [];
      minutesLoaded_ = true;
      try { localStorage.setItem('s-quire-minutes-' + minutesFY_, JSON.stringify(minutesData_)); } catch(e) {}
      renderMinutesList_(minutesData_);
    })
    .withFailureHandler(function(err) {
      console.error('議事録読込エラー:', err);
      if (!minutesData_) {
        document.getElementById('minutes-root').innerHTML =
          '<p style="text-align:center;color:#e74c3c;padding:40px;">読み込みに失敗しました</p>';
      }
    })
    .getMinutesList(minutesFY_);
}

function renderMinutesList_(data) {
  var root = document.getElementById('minutes-root');
  if (!root) return;

  var html = '';

  // ヘッダー行
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';
  html += '<select id="minutes-fy-select" onchange="changeMinutesFiscalYear(this.value)" style="font-size:15px;padding:6px 10px;border:1px solid #ccc;border-radius:8px;">';
  var now = new Date();
  var currentFy = (now.getMonth() >= 3) ? now.getFullYear() : now.getFullYear() - 1;
  for (var y = currentFy; y >= currentFy - 3; y--) {
    html += '<option value="' + y + '"' + (y === minutesFY_ ? ' selected' : '') + '>' + y + '年度</option>';
  }
  html += '</select>';
  html += '<button onclick="openMinutesUploadModal_()" style="background:var(--theme-color,#667eea);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;">+ 新規作成</button>';
  html += '</div>';

  // カード一覧
  if (!data || data.length === 0) {
    html += '<div style="text-align:center;color:#999;padding:40px;">';
    html += '<div style="font-size:40px;margin-bottom:12px;">📝</div>';
    html += '<p>この年度の議事録はまだありません</p>';
    html += '</div>';
  } else {
    for (var i = 0; i < data.length; i++) {
      var m = data[i];
      var preview = (m.summary || '').substring(0, 60);
      if ((m.summary || '').length > 60) preview += '...';
      var dateStr = m.created_at ? m.created_at.substring(0, 10) : '';
      html += '<div onclick="openMinutesModal_(\'' + escHtml(m.id) + '\')" style="background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;border:1px solid #f0f0f0;">';
      html += '<div style="font-size:15px;font-weight:700;color:#333;margin-bottom:4px;">📝 ' + escHtml(m.title) + '</div>';
      if (preview) html += '<div style="font-size:13px;color:#666;margin-bottom:4px;line-height:1.4;white-space:pre-line;">' + escHtml(preview) + '</div>';
      if (dateStr) html += '<div style="font-size:12px;color:#aaa;">' + escHtml(dateStr) + '</div>';
      html += '</div>';
    }
  }

  root.innerHTML = html;
}

function changeMinutesFiscalYear(year) {
  minutesFY_ = parseInt(year, 10);
  minutesLoaded_ = false;
  minutesData_ = null;
  loadMinutes();
}

// ========================================
// 閲覧モーダル
// ========================================

function openMinutesModal_(id) {
  var item = null;
  if (minutesData_) {
    for (var i = 0; i < minutesData_.length; i++) {
      if (minutesData_[i].id === id) { item = minutesData_[i]; break; }
    }
  }
  if (!item) return;

  var isAdmin = (typeof isAdminUser !== 'undefined') ? isAdminUser : false;

  var html = '';
  html += '<div id="minutes-modal" style="display:block;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);" onclick="if(event.target===this)closeMinutesModal_()">';
  html += '<div style="position:absolute;inset:8px;background:#fff;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;">';

  // ヘッダー
  html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e0e0e0;flex-shrink:0;">';
  html += '<span style="font-size:16px;font-weight:700;color:#333;">📝 ' + escHtml(item.title) + '</span>';
  html += '<div style="display:flex;gap:8px;">';
  html += '<button onclick="openMinutesEditModal_(\'' + escHtml(item.id) + '\')" style="background:none;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;">✏️ 編集</button>';
  html += '<button onclick="closeMinutesModal_()" style="background:none;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;">✕ 閉じる</button>';
  html += '</div></div>';

  // ボディ
  html += '<div style="flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;">';
  if (item.summary) {
    html += '<div style="font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap;">' + escHtml(item.summary) + '</div>';
  } else {
    html += '<p style="color:#999;text-align:center;">要約はまだありません</p>';
  }
  html += '</div>';

  // フッター（Admin時のみ削除ボタン）
  if (isAdmin) {
    html += '<div style="padding:12px 16px;border-top:1px solid #e0e0e0;text-align:center;flex-shrink:0;">';
    html += '<button onclick="deleteMinutesConfirm_(\'' + escHtml(item.id) + '\')" style="background:none;border:1px solid #e74c3c;color:#e74c3c;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;">🗑 削除</button>';
    html += '</div>';
  }

  html += '</div></div>';

  var container = document.createElement('div');
  container.id = 'minutes-modal-wrap';
  container.innerHTML = html;
  document.body.appendChild(container);
  document.body.style.overflow = 'hidden';
}

function closeMinutesModal_() {
  var wrap = document.getElementById('minutes-modal-wrap');
  if (wrap) wrap.parentNode.removeChild(wrap);
  document.body.style.overflow = '';
}

// ========================================
// 編集モーダル
// ========================================

function openMinutesEditModal_(id) {
  var item = null;
  if (minutesData_) {
    for (var i = 0; i < minutesData_.length; i++) {
      if (minutesData_[i].id === id) { item = minutesData_[i]; break; }
    }
  }
  if (!item) return;

  closeMinutesModal_();

  var html = '';
  html += '<div id="minutes-edit-modal" style="display:block;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);" onclick="if(event.target===this)closeMinutesEditModal_()">';
  html += '<div style="position:absolute;inset:8px;background:#fff;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;">';

  // ヘッダー
  html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e0e0e0;flex-shrink:0;">';
  html += '<span style="font-size:16px;font-weight:700;color:#333;">✏️ 議事録を編集</span>';
  html += '<button onclick="closeMinutesEditModal_()" style="background:none;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;">✕ 閉じる</button>';
  html += '</div>';

  // ボディ
  html += '<div style="flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;">';
  html += '<input type="hidden" id="minutes-edit-id" value="' + escHtml(item.id) + '">';
  html += '<label style="font-size:13px;font-weight:600;color:#555;">タイトル</label>';
  html += '<input type="text" id="minutes-edit-title" value="' + escHtml(item.title) + '" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;margin:6px 0 16px;box-sizing:border-box;">';
  html += '<label style="font-size:13px;font-weight:600;color:#555;">要約</label>';
  html += '<textarea id="minutes-edit-summary" style="width:100%;min-height:300px;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;line-height:1.6;margin:6px 0;box-sizing:border-box;resize:vertical;">' + escHtml(item.summary || '') + '</textarea>';
  html += '</div>';

  // フッター
  html += '<div style="padding:12px 16px;border-top:1px solid #e0e0e0;flex-shrink:0;">';
  html += '<button onclick="saveMinutesEdit_()" style="width:100%;background:var(--theme-color,#667eea);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;">💾 保存</button>';
  html += '</div>';

  html += '</div></div>';

  var container = document.createElement('div');
  container.id = 'minutes-edit-wrap';
  container.innerHTML = html;
  document.body.appendChild(container);
  document.body.style.overflow = 'hidden';
}

function closeMinutesEditModal_() {
  var wrap = document.getElementById('minutes-edit-wrap');
  if (wrap) wrap.parentNode.removeChild(wrap);
  document.body.style.overflow = '';
}

function saveMinutesEdit_() {
  var id = document.getElementById('minutes-edit-id').value;
  var title = document.getElementById('minutes-edit-title').value.trim();
  var summary = document.getElementById('minutes-edit-summary').value.trim();

  if (!title) { showToast('タイトルを入力してください', 'error'); return; }

  // 既存データからfiscal_yearとmonthを取得
  var item = null;
  if (minutesData_) {
    for (var i = 0; i < minutesData_.length; i++) {
      if (minutesData_[i].id === id) { item = minutesData_[i]; break; }
    }
  }
  if (!item) return;

  var data = {
    id: id,
    fiscal_year: item.fiscal_year,
    month: item.month,
    title: title,
    summary: summary,
    created_by: item.created_by,
    created_at: item.created_at
  };

  showToast('保存中...', 'success');

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        showToast('議事録を保存しました', 'success');
        closeMinutesEditModal_();
        minutesLoaded_ = false;
        loadMinutes();
      } else {
        showToast((result && result.error) || '保存に失敗しました', 'error');
      }
    })
    .withFailureHandler(function(err) {
      showToast('保存に失敗しました', 'error');
      console.error('保存エラー:', err);
    })
    .saveMinutes(JSON.stringify(data));
}

// ========================================
// 削除
// ========================================

function deleteMinutesConfirm_(id) {
  appConfirm('この議事録を削除しますか？\nこの操作は元に戻せません。').then(function(ok) {
    if (!ok) return;
    showToast('削除中...', 'success');
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          showToast('議事録を削除しました', 'success');
          closeMinutesModal_();
          minutesLoaded_ = false;
          loadMinutes();
        } else {
          showToast((result && result.error) || '削除に失敗しました', 'error');
        }
      })
      .withFailureHandler(function(err) {
        showToast('削除に失敗しました', 'error');
        console.error('削除エラー:', err);
      })
      .deleteMinutes(id);
  });
}

// ========================================
// 新規作成（アップロード）モーダル
// ========================================

function openMinutesUploadModal_() {
  var now = new Date();
  var currentMonth = now.getMonth() + 1; // 1-12

  var html = '';
  html += '<div id="minutes-upload-modal" style="display:block;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);" onclick="if(event.target===this)closeMinutesUploadModal_()">';
  html += '<div style="position:absolute;inset:8px;background:#fff;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;">';

  // ヘッダー
  html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e0e0e0;flex-shrink:0;">';
  html += '<span style="font-size:16px;font-weight:700;color:#333;">🎙️ 議事録作成</span>';
  html += '<button onclick="closeMinutesUploadModal_()" style="background:none;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer;">✕ 閉じる</button>';
  html += '</div>';

  // ボディ
  html += '<div style="flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;">';

  // 年度
  html += '<label style="font-size:13px;font-weight:600;color:#555;">年度</label>';
  html += '<select id="minutes-new-fy" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;margin:6px 0 12px;box-sizing:border-box;">';
  var fy = minutesFY_ || ((now.getMonth() >= 3) ? now.getFullYear() : now.getFullYear() - 1);
  for (var y = fy + 1; y >= fy - 2; y--) {
    html += '<option value="' + y + '"' + (y === fy ? ' selected' : '') + '>' + y + '年度</option>';
  }
  html += '</select>';

  // 月
  html += '<label style="font-size:13px;font-weight:600;color:#555;">月</label>';
  html += '<select id="minutes-new-month" onchange="updateMinutesDefaultTitle_()" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;margin:6px 0 12px;box-sizing:border-box;">';
  for (var m = 1; m <= 12; m++) {
    html += '<option value="' + m + '"' + (m === currentMonth ? ' selected' : '') + '>' + m + '月</option>';
  }
  html += '</select>';

  // タイトル
  html += '<label style="font-size:13px;font-weight:600;color:#555;">タイトル</label>';
  html += '<input type="text" id="minutes-new-title" value="' + currentMonth + '月分" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;margin:6px 0 12px;box-sizing:border-box;">';

  // 音声ファイル
  html += '<div style="background:#f8f9fa;border-radius:10px;padding:16px;margin-bottom:16px;">';
  html += '<label style="font-size:13px;font-weight:600;color:#555;">🎵 音声ファイル（任意）</label>';
  html += '<input type="file" id="minutes-audio-file" accept="audio/mp4,audio/mpeg,.m4a,.mp3" style="width:100%;margin:8px 0;font-size:14px;box-sizing:border-box;">';
  html += '<div id="minutes-audio-info" style="font-size:12px;color:#888;margin-top:4px;"></div>';
  html += '<button id="minutes-transcribe-btn" onclick="runMinutesTranscription_()" style="width:100%;background:#4CAF50;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;">🤖 AIで文字起こし＋要約</button>';
  html += '<div id="minutes-progress" style="display:none;text-align:center;padding:12px;color:#666;font-size:13px;"></div>';
  html += '</div>';

  // 区切り線
  html += '<div style="text-align:center;color:#aaa;font-size:13px;margin:8px 0 16px;position:relative;">';
  html += '<span style="background:#fff;padding:0 12px;position:relative;z-index:1;">または 要約を直接入力</span>';
  html += '<div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#e0e0e0;"></div>';
  html += '</div>';

  // 要約テキスト直接入力
  html += '<label style="font-size:13px;font-weight:600;color:#555;">要約</label>';
  html += '<textarea id="minutes-new-summary" placeholder="要約を入力..." style="width:100%;min-height:150px;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;line-height:1.6;margin:6px 0;box-sizing:border-box;resize:vertical;"></textarea>';

  html += '</div>';

  // フッター
  html += '<div style="padding:12px 16px;border-top:1px solid #e0e0e0;flex-shrink:0;">';
  html += '<button id="minutes-save-new-btn" onclick="saveNewMinutes_()" style="width:100%;background:var(--theme-color,#667eea);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;">💾 保存</button>';
  html += '</div>';

  html += '</div></div>';

  var container = document.createElement('div');
  container.id = 'minutes-upload-wrap';
  container.innerHTML = html;
  document.body.appendChild(container);
  document.body.style.overflow = 'hidden';
}

function closeMinutesUploadModal_() {
  var wrap = document.getElementById('minutes-upload-wrap');
  if (wrap) wrap.parentNode.removeChild(wrap);
  document.body.style.overflow = '';
}

function updateMinutesDefaultTitle_() {
  var month = document.getElementById('minutes-new-month').value;
  var titleEl = document.getElementById('minutes-new-title');
  if (titleEl && !titleEl.dataset.userEdited) {
    titleEl.value = month + '月分';
  }
}

function saveNewMinutes_() {
  var fy = parseInt(document.getElementById('minutes-new-fy').value, 10);
  var month = parseInt(document.getElementById('minutes-new-month').value, 10);
  var title = document.getElementById('minutes-new-title').value.trim();
  var summary = document.getElementById('minutes-new-summary').value.trim();

  if (!title) { showToast('タイトルを入力してください', 'error'); return; }
  if (!summary) { showToast('要約を入力するか、音声ファイルからAI要約を生成してください', 'error'); return; }

  var data = { fiscal_year: fy, month: month, title: title, summary: summary };
  var btn = document.getElementById('minutes-save-new-btn');
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        showToast('議事録を保存しました', 'success');
        closeMinutesUploadModal_();
        minutesLoaded_ = false;
        minutesFY_ = fy;
        loadMinutes();
      } else {
        showToast((result && result.error) || '保存に失敗しました', 'error');
        if (btn) { btn.disabled = false; btn.textContent = '💾 保存'; }
      }
    })
    .withFailureHandler(function(err) {
      showToast('保存に失敗しました', 'error');
      if (btn) { btn.disabled = false; btn.textContent = '💾 保存'; }
    })
    .saveMinutes(JSON.stringify(data));
}

// ========================================
// AI文字起こし＋要約
// ========================================

var MINUTES_MAX_CHUNK_BYTES_ = 9 * 1024 * 1024; // 9MB

function runMinutesTranscription_() {
  var fileInput = document.getElementById('minutes-audio-file');
  if (!fileInput || !fileInput.files || !fileInput.files.length) {
    showToast('音声ファイルを選択してください', 'error');
    return;
  }

  var file = fileInput.files[0];
  var mimeType = file.type || 'audio/mpeg';
  var progress = document.getElementById('minutes-progress');
  var btn = document.getElementById('minutes-transcribe-btn');

  btn.disabled = true;
  btn.textContent = '処理中...';
  progress.style.display = 'block';
  progress.textContent = '音声ファイルを読み込んでいます...';

  var reader = new FileReader();
  reader.onload = function(ev) {
    var base64 = ev.target.result.split(',')[1];
    var byteSize = Math.floor(base64.length * 3 / 4);

    if (byteSize <= MINUTES_MAX_CHUNK_BYTES_) {
      // 小ファイル: 直接処理
      progress.textContent = '🤖 AIが文字起こし＋要約中...（1〜2分かかります）';
      google.script.run
        .withSuccessHandler(function(result) {
          onTranscriptionComplete_(result, btn, progress);
        })
        .withFailureHandler(function(err) {
          onTranscriptionError_(err, btn, progress);
        })
        .transcribeAndSummarizeAudio(base64, mimeType);
    } else {
      // 大ファイル: チャンク分割
      processAudioChunks_(base64, mimeType, btn, progress);
    }
  };
  reader.onerror = function() {
    showToast('ファイルの読み込みに失敗しました', 'error');
    btn.disabled = false;
    btn.textContent = '🤖 AIで文字起こし＋要約';
    progress.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function processAudioChunks_(base64, mimeType, btn, progress) {
  // base64文字列をチャンクに分割（各チャンクが9MBバイト相当）
  var chunkCharSize = Math.floor(MINUTES_MAX_CHUNK_BYTES_ * 4 / 3);
  var chunks = [];
  for (var i = 0; i < base64.length; i += chunkCharSize) {
    chunks.push(base64.substring(i, i + chunkCharSize));
  }

  var transcripts = [];
  var currentChunk = 0;

  function processNext() {
    if (currentChunk >= chunks.length) {
      // 全チャンク完了 → 統合要約
      progress.textContent = '🤖 要約を生成中...';
      google.script.run
        .withSuccessHandler(function(result) {
          onTranscriptionComplete_(result, btn, progress);
        })
        .withFailureHandler(function(err) {
          onTranscriptionError_(err, btn, progress);
        })
        .mergeTranscriptsAndSummarize(JSON.stringify(transcripts));
      return;
    }

    progress.textContent = '🤖 文字起こし中... (' + (currentChunk + 1) + '/' + chunks.length + ')';

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          transcripts.push(result.transcript || result.summary || '');
          currentChunk++;
          processNext();
        } else {
          onTranscriptionError_((result && result.error) || '文字起こしに失敗しました', btn, progress);
        }
      })
      .withFailureHandler(function(err) {
        onTranscriptionError_(err, btn, progress);
      })
      .transcribeAndSummarizeAudio(chunks[currentChunk], mimeType);
  }

  processNext();
}

function onTranscriptionComplete_(result, btn, progress) {
  btn.disabled = false;
  btn.textContent = '🤖 AIで文字起こし＋要約';
  progress.style.display = 'none';

  if (result && result.success && result.summary) {
    document.getElementById('minutes-new-summary').value = result.summary;
    showToast('要約を生成しました', 'success');
  } else {
    showToast((result && result.error) || '要約の生成に失敗しました', 'error');
  }
}

function onTranscriptionError_(err, btn, progress) {
  btn.disabled = false;
  btn.textContent = '🤖 AIで文字起こし＋要約';
  progress.style.display = 'none';
  showToast('処理に失敗しました', 'error');
  console.error('文字起こしエラー:', err);
}
</script>
