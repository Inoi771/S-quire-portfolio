// Phase 5-E-11 deploy trigger (2026-04-22)

// GAS 環境（doGet() で配信）では何もしない。

(function() {
  // GAS 環境ではネイティブ実装がすでに存在するためスキップ

  // GAS APIデプロイのURL（ワークフローで管理・常に最新コードを維持）

    'AKfycbzrzZkyS42v_-kNNrmR4NumrVxfjdwNeJ0uCk3k5mha88Dm7ZarVzjVAkDY8WIqpKybWw/exec';

  // Cloudflare Workers URL（段階的移行用）
  var WORKERS_URL = 'https://s-quire-api.square1995square.workers.dev';
  // Workers に移行済みの関数名をここに追加していく（それ以外は GAS_EXEC_URL へ）

  /**
   * Firebase ID トークンを取得する（firebase-auth.html の fbGetIdToken を使用）
   * @return {Promise<string>}
   */
  function getToken_() {
    if (typeof window.fbGetIdToken === 'function') {
      return window.fbGetIdToken(false).catch(function() { return ''; });
    }
    return Promise.resolve('');
  }

  /**
   * GAS 関数を fetch で呼び出す（自動リトライ付き）
   * text/plain を使い CORS プリフライトを回避（GAS exec URL の制約）
   * ネットワークエラー・サーバーエラー時は1回だけ自動リトライする
   * @param {string} funcName  呼び出す GAS 関数名
   * @param {Array}  args      引数の配列
   * @param {Function|null} successFn
   * @param {Function|null} failureFn
   */
  function callGas_(funcName, args, successFn, failureFn) {
    var MAX_RETRIES = 1;
    var RETRY_DELAY = 2000;
    var targetUrl = WORKERS_FUNCTIONS.has(funcName) ? WORKERS_URL : GAS_EXEC_URL;

    function attempt(retryCount) {
      var controller = new AbortController();
      var timeoutId = setTimeout(function() { controller.abort(); }, 90000);

      getToken_().then(function(idToken) {
        return fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            type: 'gasApi',
            function: funcName,
            args: args,
            idToken: idToken || ''
          }),
          redirect: 'follow',
          signal: controller.signal
        });
      })
      .then(function(res) {
        if (!res.ok) {
          var err = new Error('HTTP_' + res.status);
          err.httpStatus = res.status;
          throw err;
        }
        return res.text();
      })
      .then(function(text) {
        try {
          return JSON.parse(text);
        } catch (e) {
          var err = new Error('PARSE_ERROR');
          throw err;
        }
      })
      .then(function(result) {
        // 通信成功 — コールバックのエラーが .catch() に伝播しないよう try-catch で隔離
        if (result && result.__gasError) {
          try { if (failureFn) failureFn(new Error(result.__gasError)); }
          catch (cbErr) { console.error('[gas-bridge] failureHandler エラー:', funcName, cbErr); }
        } else {
          try { if (successFn) successFn(result); }
          catch (cbErr) { console.error('[gas-bridge] successHandler エラー:', funcName, cbErr); }
        }
      })
      .catch(function(err) {
        // ここに来るのは通信自体の失敗のみ（コールバックのエラーは上で隔離済み）
        var isRetryable = err.name !== 'AbortError' && (
          err.name === 'TypeError' ||
          err.message === 'PARSE_ERROR' ||
          (err.httpStatus && err.httpStatus >= 500)
        );

        if (isRetryable && retryCount < MAX_RETRIES) {
          console.warn('[gas-bridge] リトライ (' + (retryCount + 1) + '/' + MAX_RETRIES + '):', funcName, err.message);
          setTimeout(function() { attempt(retryCount + 1); }, RETRY_DELAY);
          return;
        }

        console.error('[gas-bridge] fetch エラー:', funcName, err);
        var msg;
        if (err.name === 'AbortError') {
          msg = '通信がタイムアウトしました。再度お試しください。';
        } else if (typeof navigator !== 'undefined' && !navigator.onLine) {
          msg = 'インターネットに接続されていません。接続を確認してください。';
        } else if (err.httpStatus && err.httpStatus >= 500) {
          msg = 'サーバーが一時的にエラーを返しました。しばらく待ってから再度お試しください。';
        } else if (err.message === 'PARSE_ERROR') {
          msg = 'サーバーからの応答が不正です。しばらく待ってから再度お試しください。';
        } else {
          msg = '通信エラーが発生しました。再度お試しください。';
        }
        if (typeof showToast === 'function') showToast(msg, 'error');
        if (failureFn) failureFn(err);
      })
      .finally(function() { clearTimeout(timeoutId); });
    }

    attempt(0);
  }

  /**
   * ランナーオブジェクトを生成する。
   * withSuccessHandler() / withFailureHandler() で新しいランナーを返し、
   * それ以外のプロパティアクセスを GAS 関数呼び出しとして扱う（Proxy）。
   * @param {Function|null} sFn  成功ハンドラ
   * @param {Function|null} fFn  失敗ハンドラ
   */
  function makeRunner_(sFn, fFn) {
    return new Proxy({}, {
      get: function(_, prop) {
        if (prop === 'withSuccessHandler') {
          return function(fn) { return makeRunner_(fn, fFn); };
        }
        if (prop === 'withFailureHandler') {
          return function(fn) { return makeRunner_(sFn, fn); };
        }
        // それ以外は GAS 関数名として扱う
        return function() {
          var args = Array.prototype.slice.call(arguments);
          callGas_(prop, args, sFn, fFn);
        };
      }
    });
  }

  // google.script.run をインストール
  window.google = window.google || {};
  window.google.script = window.google.script || {};
  window.google.script.run = makeRunner_(null, null);

  // google.script.host スタブ（アプリの一部が close() などを呼ぶ場合に備えて）
  window.google.script.host = {
    close:     function() {},
    setHeight: function() {},
    setWidth:  function() {}
  };

  console.log('[gas-bridge] google.script.run シムをインストールしました');
})();
