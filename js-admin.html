<script>
  // ===== 【8】Admin管理 =====

    /** HTML特殊文字をエスケープ（XSS対策） */
    function escapeHtml_(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function loadUsersList() {
      loadAllowedUsers();
      loadCampusNotificationRouting();
      loadFormEmailTriggerStatus();
      loadFormEmailFilterSettings();
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            displayAdminsList(result.emails);
          }
        })
        .getAdminEmails();
    }

    function loadAllowedUsers() {
      document.getElementById('allowedUsersList').innerHTML = '<p style="text-align:center;color:#999;font-size:13px;">読み込み中...</p>';
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result.success) {
            document.getElementById('allowedUsersList').innerHTML = '<p style="color:red;font-size:13px;">❌ ' + result.error + '</p>';
            return;
          }
          if (result.users.length === 0) {
            document.getElementById('allowedUsersList').innerHTML = '<p style="text-align:center;color:#999;font-size:13px;">' + (result.note || 'ユーザーがいません') + '</p>';
            return;
          }
          var html = '';
          result.users.forEach(function(user) {
            var isOwner = user.role === 'オーナー';
            var roleColor = isOwner ? '#e65100' : (user.role.indexOf('Admin') !== -1 ? '#6a1b9a' : '#2e7d32');
            var roleBg = isOwner ? '#fff3e0' : (user.role.indexOf('Admin') !== -1 ? '#f3e5f5' : '#e8f5e9');
            var eName = escapeHtml_(user.name || '（名前未登録）');
            var eRole = escapeHtml_(user.role);
            var eEmailAttr = escapeHtml_(user.email);
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 6px;border-bottom:1px solid #f0f0f0;">' +
              '<div style="overflow:hidden;">' +
              '<div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + eName + '</div>' +
              '</div>' +
              '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px;">' +
              '<span style="font-size:10px;background:' + roleBg + ';color:' + roleColor + ';padding:2px 7px;border-radius:10px;white-space:nowrap;">' + eRole + '</span>' +
              (!isOwner ? '<button onclick="removeAllowedUser(\'' + eEmailAttr + '\')" style="padding:4px 8px;background:#dc3545;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;min-height:32px;">削除</button>' : '') +
              '</div>' +
              '</div>';
          });
          document.getElementById('allowedUsersList').innerHTML = html;
        })
        .withFailureHandler(function(err) {
          document.getElementById('allowedUsersList').innerHTML = '<p style="color:red;font-size:13px;">❌ エラー: ' + err + '</p>';
        })
        .getAllowedUsers();
    }

    function resetAllAccessPermissions() {
      appConfirm('⚠️ アクセス許可を全リセットしますか？\n\n管理者を含む全員がアプリにアクセスできなくなります。\nリセット後は初回ウィザードから管理者を再登録してください。\n\n（生徒・成績・スケジュールなどのデータは削除されません）').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              location.reload();
            } else {
              showMessage('allowedUsersMessage', '❌ ' + result.error, 'error');
            }
          })
          .withFailureHandler(function(err) {
            showMessage('allowedUsersMessage', '❌ エラー: ' + err, 'error');
          })
          .resetAllAccessPermissions();
      });
    }

    function removeAllowedUser(email) {
      appConfirm(email + ' のアクセスを削除しますか？\n\n※ GoogleDriveフォルダの共有も解除されます').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              showMessage('allowedUsersMessage', '✅ ' + result.message, 'success');
              loadAllowedUsers();
              loadCampusNotificationRouting();
            } else {
              showMessage('allowedUsersMessage', '❌ ' + result.error, 'error');
            }
          })
          .withFailureHandler(function(err) {
            showMessage('allowedUsersMessage', '❌ エラー: ' + err, 'error');
          })
          .removeUserAccess(email);
      });
    }
    
    function displayAdminsList(emails) {
      var container = document.getElementById('adminsList');
      var html = '';
      
      emails.forEach(function(email) {
        html += '<div class="user-item">' +
                '<div>🔐 ' + escapeHtml_(email) + '</div>' +
                '</div>';
      });
      
      container.innerHTML = html || '<p style="text-align: center; color: #999;">Admin がいません</p>';
    }
    
    function addAdmin() {
      var email = document.getElementById('newAdminEmail').value.trim();
      
      if (!email) {
        showMessage('adminMessage', '❌ メールアドレスを入力してください', 'error');
        return;
      }
      
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showMessage('adminMessage', '✓ Admin を追加しました', 'success');
            document.getElementById('newAdminEmail').value = '';
            loadUsersList();
          } else {
            showMessage('adminMessage', '❌ ' + result.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          showMessage('adminMessage', '❌ エラーが発生しました: ' + err, 'error');
        })
        .addAdminEmail(email);
    }
    
    function removeAdmin(email) {
      appConfirm('この Admin を削除しますか？\n' + email).then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              showMessage('adminMessage', '✓ Admin を削除しました', 'success');
              loadUsersList();
            } else {
              showMessage('adminMessage', '❌ ' + result.error, 'error');
            }
          })
          .withFailureHandler(function(err) {
            showMessage('adminMessage', '❌ エラーが発生しました: ' + err, 'error');
          })
          .removeAdminEmail(email);
      });
    }

    // ===== 📬 通知設定（ユーザー設定画面用） =====

    function loadNotificationSettings() {
      // 事前取得済みのキャッシュがあれば即時表示（通信なし）
      if (preloadedNotificationSettings !== null) {
        applyNotificationSettingsUI(preloadedNotificationSettings);
        return;
      }
      // キャッシュ未取得の場合はバックエンドから取得
      google.script.run
        .withSuccessHandler(function(result) {
          preloadedNotificationSettings = result;
          applyNotificationSettingsUI(result);
        })
        .withFailureHandler(function(err) {
          console.error('通知設定読み込みエラー:', err);
        })
        .getNotificationSettings();
    }

    function applyNotificationSettingsUI(result) {
      if (!result || !result.success) return;
      var section = document.getElementById('notificationSettingsSection');
      if (!section) return;

      // セクションを常に表示する
      section.style.display = '';

      // LINE登録状態を表示
      var statusBox = document.getElementById('lineRegistrationStatus');
      if (statusBox) {
        if (result.lineRegistered) {
          statusBox.style.background = '#e8f5e9';
          statusBox.innerHTML = '<p style="margin:0;font-size:13px;color:#2e7d32;"><strong>✅ LINE登録済み</strong>（ID: ' + result.lineUserIdMasked + '）<br><small style="opacity:0.8;">LINEでの通知を受け取る準備ができています</small></p>';
        } else {
          statusBox.style.background = '#fff3e0';
          statusBox.innerHTML = '<p style="margin:0;font-size:13px;color:#e65100;"><strong>⏳ LINE未登録</strong><br><small style="opacity:0.8;">LINEで通知を受け取るには、下の手順でID登録が必要です</small></p>';
        }
      }

      // お問い合わせ転送通知行：isEligible の人のみ表示
      var inquiryRow = document.getElementById('inquiryNotifRow');
      if (inquiryRow) {
        inquiryRow.style.display = result.isEligible ? '' : 'none';
        if (result.isEligible) {
          // 通知方法ラジオボタンを設定
          var method = result.method || 'line';
          var radio = document.querySelector('input[name="notificationMethod"][value="' + method + '"]');
          if (radio) radio.checked = true;
          // Gmail通知先メールチェックボックスを設定
          updateNotifEmailSelect_(result.emails || [], result.notificationEmails || [], method);
        }
      }

      // LINE未登録かつLINE選択時はガイドを表示
      updateLineGuideVisibility(result.lineRegistered);

      // メールアドレスのヒントを設定
      var emailHint = document.getElementById('notifEmailHint');
      if (emailHint) emailHint.textContent = result.registeredEmail || 'your@email.com';
    }

    // Gmail通知先メールチェックボックスを更新する
    function updateNotifEmailSelect_(emails, selectedEmails, method) {
      var row = document.getElementById('notifEmailSelectRow');
      if (!row) return;
      // メールが2件以上 かつ Gmail含む方法の場合のみ表示
      var showCheckboxes = (method === 'gmail' || method === 'both') && emails.length > 1;
      row.style.display = showCheckboxes ? '' : 'none';
      if (!showCheckboxes) return;
      var container = document.getElementById('notifEmailCheckboxes');
      if (!container) return;
      // selectedEmails を配列に正規化（未選択なら全メール選択）
      if (!Array.isArray(selectedEmails)) selectedEmails = selectedEmails ? [selectedEmails] : [];
      if (selectedEmails.length === 0) selectedEmails = emails.slice();
      container.innerHTML = '';
      emails.forEach(function(e) {
        var label = document.createElement('label');
        label.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;';
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = e;
        cb.className = 'notif-email-cb';
        cb.checked = selectedEmails.indexOf(e) !== -1;
        cb.onchange = function() { saveNotificationSettings(); };
        label.appendChild(cb);
        label.appendChild(document.createTextNode(e));
        container.appendChild(label);
      });
    }

    function updateLineGuideVisibility(lineRegistered) {
      // 通知方法の選択に応じてLINE登録ガイドを表示/非表示
      var selected = document.querySelector('input[name="notificationMethod"]:checked');
      var method = selected ? selected.value : 'line';
      var guide = document.getElementById('lineRegistrationGuide');
      if (!guide) return;
      var needsLine = (method === 'line' || method === 'both');
      guide.style.display = (!lineRegistered && needsLine) ? '' : 'none';
    }

    // 通知方法のラジオボタン変更時にガイド・メール選択欄を更新
    document.addEventListener('change', function(e) {
      if (e.target && e.target.name === 'notificationMethod') {
        var lineStatusBox = document.getElementById('lineRegistrationStatus');
        var isRegistered = lineStatusBox && lineStatusBox.style.background === 'rgb(232, 245, 233)';
        updateLineGuideVisibility(isRegistered);
        // メール選択欄の表示切り替え
        if (preloadedNotificationSettings && preloadedNotificationSettings.emails) {
          // 現在チェック済みのメール一覧を取得
          var checkedEmails = [];
          document.querySelectorAll('.notif-email-cb:checked').forEach(function(cb) { checkedEmails.push(cb.value); });
          if (checkedEmails.length === 0) checkedEmails = preloadedNotificationSettings.notificationEmails || [];
          updateNotifEmailSelect_(preloadedNotificationSettings.emails, checkedEmails, e.target.value);
        }
      }
    });

    function saveNotificationSettings() {
      var selected = document.querySelector('input[name="notificationMethod"]:checked');
      if (!selected) return;
      var method = selected.value;
      var msgSpan = document.getElementById('notificationMessage');
      if (msgSpan) { msgSpan.style.color = '#888'; msgSpan.textContent = '保存中...'; }
      // Gmail通知先メールアドレス（チェックボックスで選択）
      var checkedEmails = [];
      document.querySelectorAll('.notif-email-cb:checked').forEach(function(cb) { checkedEmails.push(cb.value); });
      var notifEmail = checkedEmails.length > 0 ? checkedEmails.join(',') : '';

      google.script.run
        .withSuccessHandler(function(result) {
          if (msgSpan) {
            if (result.success) {
              preloadedNotificationSettings = null; // キャッシュクリア
              msgSpan.style.color = '#2e7d32';
              msgSpan.textContent = '✓ 保存しました';
              setTimeout(function() { msgSpan.style.color = '#888'; msgSpan.textContent = '変更は自動で保存されます'; }, 1800);
            } else {
              msgSpan.style.color = '#c62828';
              msgSpan.textContent = '❌ ' + result.error;
            }
          }
        })
        .withFailureHandler(function(err) {
          if (msgSpan) { msgSpan.style.color = '#c62828'; msgSpan.textContent = '❌ 保存失敗'; }
        })
        .updateNotificationSettings(method, notifEmail);
    }

    // ===== 📩 LINEスケジューラー通知設定 =====

    var preloadedLineSchedulerNotifPrefs = null;

    function loadLineSchedulerNotifPrefs() {
      if (preloadedLineSchedulerNotifPrefs !== null) {
        applyLineSchedulerNotifUI(preloadedLineSchedulerNotifPrefs);
        return;
      }
      google.script.run
        .withSuccessHandler(function(result) {
          preloadedLineSchedulerNotifPrefs = result;
          applyLineSchedulerNotifUI(result);
        })
        .withFailureHandler(function(err) { console.error('LINE通知設定読み込みエラー:', err); })
        .getLineSchedulerNotifPrefs();
    }

    function applyLineSchedulerNotifUI(result) {
      if (!result || !result.success) return;
      var eligible = result.eligible || {};
      var prefs = result.prefs || {};
      var emails = result.emails || [];
      var schedulerNotifEmails = result.schedulerNotifEmails || {};
      var anyEligible = eligible.meeting || eligible.report || eligible.shitsucho;

      // LINEスケジューラーブロックの表示
      var block = document.getElementById('lineNotifSchedulerBlock');
      if (block) block.style.display = anyEligible ? '' : 'none';

      // 各種別行の表示とラジオ設定 + メールチェックボックス
      var rowIds = { meeting: 'lineNotifMeetingRow', report: 'lineNotifReportRow', shitsucho: 'lineNotifShitsuchoRow' };
      ['meeting', 'report', 'shitsucho'].forEach(function(type) {
        var rowEl = document.getElementById(rowIds[type]);
        if (!rowEl) return;
        rowEl.style.display = eligible[type] ? '' : 'none';
        if (eligible[type]) {
          var val = prefs[type] || 'line';
          var radio = document.querySelector('input[name="notifPref_' + type + '"][value="' + val + '"]');
          if (radio) radio.checked = true;
          // メールチェックボックスを描画
          var selectedForType = schedulerNotifEmails[type] || [];
          updateSchedulerEmailCheckboxes_(type, emails, selectedForType, val);
        }
      });
    }

    // スケジューラー種別ごとのメールチェックボックスを描画
    function updateSchedulerEmailCheckboxes_(type, emails, selectedEmails, method) {
      var row = document.getElementById('schedulerEmailRow_' + type);
      if (!row) return;
      var showCheckboxes = (method === 'gmail' || method === 'both') && emails.length > 1;
      row.style.display = showCheckboxes ? '' : 'none';
      if (!showCheckboxes) return;
      var container = document.getElementById('schedulerEmailCheckboxes_' + type);
      if (!container) return;
      if (!Array.isArray(selectedEmails)) selectedEmails = selectedEmails ? [selectedEmails] : [];
      // 未選択の場合、全メール選択状態にする
      if (selectedEmails.length === 0) selectedEmails = emails.slice();
      container.innerHTML = '';
      emails.forEach(function(e) {
        var label = document.createElement('label');
        label.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;';
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = e;
        cb.className = 'scheduler-email-cb-' + type;
        cb.checked = selectedEmails.indexOf(e) !== -1;
        cb.onchange = function() { saveLineSchedulerNotifPref(type); };
        label.appendChild(cb);
        label.appendChild(document.createTextNode(e));
        container.appendChild(label);
      });
    }

    function saveLineSchedulerNotifPref(type) {
      var selected = document.querySelector('input[name="notifPref_' + type + '"]:checked');
      if (!selected) return;
      var method = selected.value;
      var msgSpan = document.getElementById('lineNotifMsg_' + type);
      if (msgSpan) { msgSpan.style.color = '#888'; msgSpan.textContent = '保存中...'; }
      // メールチェックボックスの表示切り替え
      if (preloadedLineSchedulerNotifPrefs && preloadedLineSchedulerNotifPrefs.emails) {
        var checkedEmails = [];
        document.querySelectorAll('.scheduler-email-cb-' + type + ':checked').forEach(function(cb) { checkedEmails.push(cb.value); });
        if (checkedEmails.length === 0) {
          var se = (preloadedLineSchedulerNotifPrefs.schedulerNotifEmails || {})[type] || [];
          checkedEmails = se.length > 0 ? se : preloadedLineSchedulerNotifPrefs.emails.slice();
        }
        updateSchedulerEmailCheckboxes_(type, preloadedLineSchedulerNotifPrefs.emails, checkedEmails, method);
      }
      // チェック済みメール収集
      var notifEmails = [];
      document.querySelectorAll('.scheduler-email-cb-' + type + ':checked').forEach(function(cb) { notifEmails.push(cb.value); });
      var notifEmailsStr = notifEmails.join(',');
      google.script.run
        .withSuccessHandler(function(result) {
          if (msgSpan) {
            if (result.success) {
              msgSpan.style.color = '#2e7d32';
              msgSpan.textContent = '✓ 保存しました';
              preloadedLineSchedulerNotifPrefs = null;
              setTimeout(function() { msgSpan.style.color = '#888'; msgSpan.textContent = '変更は自動で保存されます'; }, 1800);
            } else {
              msgSpan.style.color = '#c62828';
              msgSpan.textContent = '❌ ' + result.error;
            }
          }
        })
        .withFailureHandler(function(err) {
          if (msgSpan) { msgSpan.style.color = '#c62828'; msgSpan.textContent = '❌ 保存失敗'; }
        })
        .updateLineSchedulerNotifPref(type, method, notifEmailsStr);
    }

    // 校舎ごとの通知振り分け設定を読み込んで表示する
    function loadCampusNotificationRouting() {
      var container = document.getElementById('campusRoutingList');
      if (!container) return;
      container.innerHTML = '<p style="text-align:center;color:#999;font-size:13px;padding:20px;">読み込み中...</p>';

      // 振り分け設定と LINE 登録済みユーザーを並行取得
      var routingData = null;
      var registeredData = null;

      function tryRender() {
        if (routingData === null || registeredData === null) return;

        // LINE 登録済みユーザーの一覧（teacherId → 表示情報 のマップを作成）
        var registeredIds = registeredData.success ? registeredData.users.map(function(u) { return u.teacherId; }) : [];
        var registeredInfoMap = {};
        if (registeredData.success) {
          registeredData.users.forEach(function(u) {
            registeredInfoMap[u.teacherId] = { name: u.name || '', email: u.email || '' };
          });
        }

        if (!routingData.success || !routingData.routing || routingData.routing.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#999;font-size:13px;padding:20px;">校舎が登録されていません</p>';
          return;
        }

        var html = '';
        routingData.routing.forEach(function(campus) {
          var eCampusName = escapeHtml_(campus.name);
          var eCampusCode = escapeHtml_(campus.code);
          html += '<div style="border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:12px;">' +
            '<div style="font-weight:600;font-size:14px;margin-bottom:10px;">🏫 ' + eCampusName + ' <span style="color:#999;font-size:11px;">（コード: ' + eCampusCode + '）</span></div>';

          // 現在の担当者一覧（teacherIds）
          var ids = campus.teacherIds || [];
          if (ids.length === 0) {
            html += '<p style="font-size:12px;color:#bbb;margin:0 0 10px 0;">担当者未設定</p>';
          } else {
            ids.forEach(function(tid) {
              var info = registeredInfoMap[tid] || {};
              var userLabel = info.name ? escapeHtml_(info.name) : '（名前未登録）';
              html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 8px;background:#f5f5f5;border-radius:6px;">' +
                '<span style="flex:1;font-size:13px;">👤 ' + userLabel + '</span>' +
                '<button onclick="removeCampusRoutingMember(\'' + eCampusCode + '\',\'' + escapeHtml_(tid) + '\')" ' +
                'style="padding:3px 8px;background:#dc3545;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;min-height:28px;">削除</button>' +
                '</div>';
            });
          }

          // 追加フォーム（LINE登録済みのうち未追加の人のみ表示）
          var candidates = registeredIds.filter(function(tid) {
            return ids.indexOf(tid) === -1;
          });

          if (candidates.length > 0) {
            html += '<div style="display:flex;gap:8px;margin-top:8px;align-items:center;">' +
              '<select id="addMember_' + eCampusCode + '" style="flex:1;padding:7px;border:1px solid #ccc;border-radius:6px;font-size:13px;">';
            candidates.forEach(function(tid) {
              var info = registeredInfoMap[tid] || {};
              var optLabel = info.name ? escapeHtml_(info.name) : '（名前未登録）';
              html += '<option value="' + escapeHtml_(tid) + '">' + optLabel + '</option>';
            });
            html += '</select>' +
              '<button onclick="addCampusRoutingMember(\'' + eCampusCode + '\', this)" ' +
              'style="padding:7px 12px;background:var(--theme-color);color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap;">➕ 追加</button>' +
              '</div>';
          } else {
            html += '<p style="font-size:11px;color:#aaa;margin:8px 0 0 0;">追加できる担当者がいません（すべてのスタッフが追加済みです）</p>';
          }

          html += '</div>';
        });

        container.innerHTML = html;
      }

      google.script.run
        .withSuccessHandler(function(result) { routingData = result; tryRender(); })
        .withFailureHandler(function(err) { routingData = { success: false, error: err }; tryRender(); })
        .getCampusNotificationRouting();

      google.script.run
        .withSuccessHandler(function(result) { registeredData = result; tryRender(); })
        .withFailureHandler(function(err) { registeredData = { success: false, users: [] }; tryRender(); })
        .getLineRegisteredUsers();
    }

    // 指定校舎に担当者を追加する
    function addCampusRoutingMember(campusCode, btn) {
      var select = document.getElementById('addMember_' + campusCode);
      if (!select || !select.value) return;
      if (btn) { btn.disabled = true; btn.textContent = '追加中...'; }
      var teacherId = select.value;

      // 現在の設定を読み込んでから追加する
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result.success) {
            if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
            appAlert('❌ 読み込みに失敗しました: ' + result.error); return;
          }
          var campus = result.routing.find(function(c) { return c.code === campusCode; });
          if (!campus) {
            if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
            appAlert('❌ 校舎が見つかりませんでした'); return;
          }

    // LINEスケジューラータブの初期化（初回のみ実行）
    function initLineScheduler() {
      var now = new Date();
      var cy = now.getFullYear();
      var cm = now.getMonth() + 1;
      // スケジュール一覧の年月ドロップダウン初期化
      var yearSel = document.getElementById('schedulerYear');
      var monthSel = document.getElementById('schedulerMonth');
      if (yearSel && yearSel.options.length === 0) {
        for (var y = cy - 1; y <= cy + 1; y++) {
          var opt = document.createElement('option');
          opt.value = y; opt.textContent = y + '年';
          if (y === cy) opt.selected = true;
          yearSel.appendChild(opt);
        }
        for (var m = 1; m <= 12; m++) {
          var opt2 = document.createElement('option');
          opt2.value = m; opt2.textContent = m + '月';
          if (m === cm) opt2.selected = true;
          monthSel.appendChild(opt2);
        }
      }
      // デフォルト設定の年月ドロップダウン初期化
      var defYearSel = document.getElementById('defaultYear');
      var defMonthSel = document.getElementById('defaultMonth');
      if (defYearSel && defYearSel.options.length === 0) {
        for (var dy = cy - 1; dy <= cy + 1; dy++) {
          var dopt = document.createElement('option');
          dopt.value = dy; dopt.textContent = dy + '年';
          if (dy === cy) dopt.selected = true;
          defYearSel.appendChild(dopt);
        }
        for (var dm = 1; dm <= 12; dm++) {
          var dopt2 = document.createElement('option');
          dopt2.value = dm; dopt2.textContent = dm + '月';
          if (dm === cm) dopt2.selected = true;
          defMonthSel.appendChild(dopt2);
        }
      }
      loadSchedulerTriggerStatus();
      loadSchedulerDefaultSettings();
      loadScheduledMessages();
    }

    // デフォルト設定UIを種別ごとに描画する（選択月の実際のスケジュールデータを表示）

      var typeLabels = { shitsucho: '👔 室長用連絡', meeting: '📢 全体ミーティング連絡', report: '📝 回数報告書提出日連絡' };

      var byType = {};
      (messages || []).forEach(function(m) { byType[m.type] = m; });
      var html = '';
      ['shitsucho', 'meeting', 'report'].forEach(function(type) {
        var m = byType[type];
        var recipientsArr = m ? (m.recipients || []) : [];
        var msgText = m ? (m.message || '') : '';
        var existingId = m ? (m.id || '') : '';
        var isSent = m && m.sent;
        var sentBadge = isSent ? '<span style="font-size:11px;background:#e0e0e0;color:#757575;padding:2px 8px;border-radius:10px;margin-left:8px;">送信済み</span>' : '';
        // 宛先チェックボックス
        var chkHtml = '';
        if (type === 'meeting' || type === 'report') {
          chkHtml = '<p style="font-size:12px;color:#43a047;margin:0;">🌐 LINE登録済みユーザー全員に送信されます（個別選択不可）</p>';

          chkHtml = '<p style="font-size:12px;color:#bbb;margin:0;">LINE登録済みユーザーがいません</p>';

          users.forEach(function(u) {

            var label = u.name ? escapeHtml_(u.name) + '（' + escapeHtml_(u.email) + '）' : escapeHtml_(u.email);

          });
        }
        html += '<div style="border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:12px;">' +
          '<div style="font-weight:600;font-size:14px;margin-bottom:10px;">' + typeLabels[type] + sentBadge + '</div>' +
          (m ? '' : '<p style="font-size:12px;color:#f57c00;margin:0 0 10px 0;">⚠ このメッセージは8月にはありません</p>') +

    // デフォルト設定カードを保存する（指定月のスケジュールを更新）
    function saveDefaultCard(type, existingId) {
      var msgTextarea = document.getElementById('defaultMsg_' + type);
      var recipients;
      if (type === 'meeting' || type === 'report') {
        recipients = ['__ALL__'];
      } else {
        var checkboxes = document.querySelectorAll('input[data-dtype="' + type + '"][data-teacherid]');
        recipients = [];
        checkboxes.forEach(function(cb) { if (cb.checked) recipients.push(cb.getAttribute('data-teacherid')); });
      }
      var message = msgTextarea ? msgTextarea.value : '';
      var defYearSel = document.getElementById('defaultYear');
      var defMonthSel = document.getElementById('defaultMonth');
      var year = defYearSel ? parseInt(defYearSel.value) : new Date().getFullYear();
      var month = defMonthSel ? parseInt(defMonthSel.value) : new Date().getMonth() + 1;
      var mm = month < 10 ? '0' + month : '' + month;
      var data = {
        id: existingId || ('sch_' + year + mm + '_' + type),
        type: type,
        yearMonth: '' + year + mm,
        recipients: recipients,
        scheduledAt: '',  // 送信日時はバックエンドで管理（空の場合は上書きしない）
        message: message
      };
      var msgSpan = document.getElementById('schedulerDefaultMsg_' + type);
      if (msgSpan) msgSpan.textContent = '保存中...';
      google.script.run
        .withSuccessHandler(function(result) {
          if (msgSpan) msgSpan.innerHTML = result.success
            ? '<span style="color:#2e7d32">✅ 保存しました</span>'
            : '<span style="color:#c62828">❌ ' + result.error + '</span>';
        })
        .withFailureHandler(function(err) {
          if (msgSpan) msgSpan.innerHTML = '<span style="color:#c62828">❌ ' + err + '</span>';
        })
        .saveScheduledLineMessage(data);
    }

        '<tr style="background:#f5f5f5;font-weight:600;">' +
        '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #ddd;">種別</th>' +
        '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #ddd;">送信予定日時</th>' +
        '<th style="padding:8px 10px;text-align:center;border-bottom:2px solid #ddd;">宛先</th>' +
        '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #ddd;">メッセージ</th>' +
        '<th style="padding:8px 10px;text-align:center;border-bottom:2px solid #ddd;">状態</th>' +
        '<th style="padding:8px 10px;text-align:center;border-bottom:2px solid #ddd;">操作</th>' +
        '</tr>';
      messages.forEach(function(m) {
        var typeLabel = typeLabels[m.type] || m.type;
        var dtStr = '未設定';
        if (m.scheduledAt) {
          var s = m.scheduledAt.replace('T', ' ');
          var dp = (s.split(' ')[0] || '').split('-');
          var tp = (s.split(' ')[1] || '').split(':');
          if (dp.length >= 3) {
            var y = parseInt(dp[0]), mo = parseInt(dp[1]), d = parseInt(dp[2]);
            var h = parseInt(tp[0] || '0'), mi = parseInt(tp[1] || '0');
            var dow = ['日','月','火','水','木','金','土'][new Date(y, mo - 1, d).getDay()];
            dtStr = y + '年' + mo + '月' + d + '日(' + dow + ') ' + h + ':' + (mi < 10 ? '0' + mi : mi);
          }
        }
        var recipCount = (m.recipients || []).length;
        var msgPreview = m.message ? escapeHtml_(m.message.slice(0, 30) + (m.message.length > 30 ? '…' : '')) : '（未設定）';
        var sentBadge = m.sent
          ? '<span style="padding:3px 8px;background:#e0e0e0;color:#666;border-radius:12px;font-size:11px;">✅ 送信済</span>'
          : '<span style="padding:3px 8px;background:#e8f5e9;color:#2e7d32;border-radius:12px;font-size:11px;">⏳ 未送信</span>';
        var ops = m.sent
          ? '<span style="font-size:11px;color:#aaa;">—</span>'
          : '<button onclick="openSchedulerEditModal(\'' + m.id + '\')" style="padding:4px 8px;background:#e8f0fe;color:#3c4f8a;border:1px solid #c5d0e6;border-radius:4px;cursor:pointer;font-size:11px;margin-right:4px;">編集</button>' +
            '<button onclick="sendScheduledMsgNow(\'' + m.id + '\')" style="padding:4px 8px;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:4px;cursor:pointer;font-size:11px;margin-right:4px;">今すぐ送信</button>' +
            '<button onclick="deleteScheduledMsg(\'' + m.id + '\')" style="padding:4px 8px;background:#fce4ec;color:#c62828;border:1px solid #ffab91;border-radius:4px;cursor:pointer;font-size:11px;">削除</button>';
        html += '<tr style="border-bottom:1px solid #eee;">' +
          '<td style="padding:10px;">' + typeLabel + '</td>' +
          '<td style="padding:10px;white-space:nowrap;">' + dtStr + '</td>' +
          '<td style="padding:10px;text-align:center;">' + recipCount + '人</td>' +
          '<td style="padding:10px;max-width:200px;">' + msgPreview.replace(/\n/g, '↵') + '</td>' +
          '<td style="padding:10px;text-align:center;">' + sentBadge + '</td>' +
          '<td style="padding:10px;text-align:center;white-space:nowrap;">' + ops + '</td>' +
          '</tr>';
      });
      html += '</table></div>';
      container.innerHTML = html;
    }

    // 編集モーダルを開く
    var schedulerEditMessages = []; // 現在表示中のスケジュールリスト
    function openSchedulerEditModal(id) {
      // 現在のスケジュールをリロードしてモーダルに反映
      var year = parseInt(document.getElementById('schedulerYear').value);
      var month = parseInt(document.getElementById('schedulerMonth').value);
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result.success) return;
          var m = result.messages.find(function(x) { return x.id === id; });
          if (!m) return;
          document.getElementById('schedulerEditId').value = m.id;
          var typeLabels = { shitsucho: '👔 室長用連絡', meeting: '📢 全体ミーティング連絡', report: '📝 回数報告書提出日連絡' };
          var msgType = m.type;
          document.getElementById('schedulerEditTypeLabel').textContent = typeLabels[msgType] || msgType;
          document.getElementById('schedulerEditTypeLabel').setAttribute('data-type', msgType);
          // 日時セット（datetime-local形式: YYYY-MM-DDTHH:mm）
          var dt = m.scheduledAt ? String(m.scheduledAt).slice(0, 16) : '';
          document.getElementById('schedulerEditDatetime').value = dt;
          // メッセージセット
          document.getElementById('schedulerEditMessage').value = m.message || '';
          // 宛先チェックボックス
          var recipDiv = document.getElementById('schedulerEditRecipients');
          if (msgType === 'meeting' || msgType === 'report') {
            recipDiv.innerHTML = '<p style="font-size:12px;color:#43a047;margin:0;padding:4px 0;">🌐 LINE登録済みユーザー全員に送信されます（変更不可）</p>';
          } else if (schedulerLineUsers.length === 0) {
            recipDiv.innerHTML = '<p style="font-size:12px;color:#bbb;margin:0;">LINE登録済みユーザーがいません</p>';
          } else {
            var chkHtml = '';
            schedulerLineUsers.forEach(function(u) {
              var checked = (m.recipients || []).indexOf(u.teacherId) >= 0 ? 'checked' : '';
              var label = u.name ? escapeHtml_(u.name) + '（' + escapeHtml_(u.email) + '）' : escapeHtml_(u.email);
              chkHtml += '<label style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;cursor:pointer;"><input type="checkbox" class="scheduler-edit-recip" data-teacherid="' + escapeHtml_(u.teacherId) + '" ' + checked + ' style="width:16px;height:16px;"> ' + label + '</label>';
            });
            recipDiv.innerHTML = chkHtml;
          }
          document.getElementById('schedulerEditMessage2').textContent = '';
          document.getElementById('schedulerEditOverlay').style.display = 'block';
          document.getElementById('schedulerEditModal').style.display = 'block';
        })
        .withFailureHandler(function(err) { appAlert('読み込みエラー: ' + err); })
        .getScheduledLineMessages(year, month);
    }

    // 編集モーダルを閉じる
    function closeSchedulerEditModal() {
      document.getElementById('schedulerEditOverlay').style.display = 'none';
      document.getElementById('schedulerEditModal').style.display = 'none';
    }

    // 編集モーダルから保存する
    function saveSchedulerEditModal() {
      var id = document.getElementById('schedulerEditId').value;
      var dt = document.getElementById('schedulerEditDatetime').value;
      var msg = document.getElementById('schedulerEditMessage').value;
      if (!dt) { document.getElementById('schedulerEditMessage2').innerHTML = '<span style="color:#c62828">送信日時を設定してください</span>'; return; }
      var msgDiv = document.getElementById('schedulerEditMessage2');
      msgDiv.textContent = '保存中...';
      // 年月・種別を id から取得
      var yearMonth = id.replace('sch_','').slice(0,6);
      var typeMatch = id.match(/_([a-z]+)$/);
      var type = typeMatch ? typeMatch[1] : '';
      var savedType = document.getElementById('schedulerEditTypeLabel').getAttribute('data-type') || type;
      var recipients;
      if (savedType === 'meeting' || savedType === 'report') {
        recipients = ['__ALL__'];
      } else {
        var checkboxes = document.querySelectorAll('.scheduler-edit-recip');
        recipients = [];
        checkboxes.forEach(function(cb) { if (cb.checked) recipients.push(cb.getAttribute('data-teacherid')); });
      }
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            msgDiv.innerHTML = '<span style="color:#2e7d32">✅ 保存しました</span>';
            setTimeout(function() { closeSchedulerEditModal(); loadScheduledMessages(); }, 800);
          } else {
            msgDiv.innerHTML = '<span style="color:#c62828">❌ ' + result.error + '</span>';
          }
        })
        .withFailureHandler(function(err) {
          msgDiv.innerHTML = '<span style="color:#c62828">❌ ' + err + '</span>';
        })
        .saveScheduledLineMessage({ id: id, type: type, yearMonth: yearMonth, recipients: recipients, scheduledAt: dt, message: msg });
    }

    // スケジュールを削除する
    function deleteScheduledMsg(id) {
      appConfirm('このスケジュールを削除しますか？').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) { loadScheduledMessages(); }
            else { appAlert('❌ ' + result.error); }
          })
          .withFailureHandler(function(err) { appAlert('❌ ' + err); })
          .deleteScheduledLineMessage(id);
      });
    }

    // スケジュールを今すぐ送信する
    function sendScheduledMsgNow(id) {
      appConfirm('このメッセージを今すぐ送信しますか？送信済みとして記録されます。').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              appAlert('✅ ' + result.sentCount + '人に送信しました' + (result.failedRecipients && result.failedRecipients.length > 0 ? '\n⚠ 未送信: ' + result.failedRecipients.join(', ') : ''));
              loadScheduledMessages();
            } else {
              appAlert('❌ ' + result.error);
            }
          })
          .withFailureHandler(function(err) { appAlert('❌ ' + err); })
          .sendScheduledLineMessageNow(id);
      });
    }

    // ===== 【LINE通知スケジューラーここまで】 =====
  // ===== 【11】ユーティリティ関数 =====
/**
 * メッセージ表示（統合版）
 * @param {string} elementId - メッセージを表示するElement ID
 * @param {string} message - メッセージテキスト
 * @param {string} type - メッセージタイプ: 'success', 'error', 'info'
 */
function showMessage(elementId, message, type) {
  var element = document.getElementById(elementId);
  if (!element) return;
  
  var msgEl = document.createElement('div');
  
  // CSSクラスを使う場合（推奨）
  msgEl.className = 'message ' + type;
  msgEl.textContent = message;
  
  element.innerHTML = '';
  element.appendChild(msgEl);
  
  // 5秒後に自動削除
  setTimeout(function() {
    if (msgEl.parentNode) {
      msgEl.remove();
    }
  }, 5000);
}

    function formatDateForGoogle(date) {
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return year + month + day;
    }

    function formatDateForICS(date) {
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return year + month + day;
    }

    function parseDateString(dateStr) {
      var match = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
      if (match) {
        return new Date(parseInt(match[1]), parseInt(match[2]) - 1, parseInt(match[3]));
      }
      return null;
    }

    function formatDateTime(date) {
      return date.getFullYear() + '年' + 
             (date.getMonth() + 1) + '月' + 
             date.getDate() + '日 ' +
             date.getHours() + ':' + 
             String(date.getMinutes()).padStart(2, '0');
    }

    function onError(error) {
      console.error('エラー:', error);
      showMessage('scheduleLoading', '❌ エラーが発生しました: ' + error, 'error');
      // エラー時もスプラッシュを非表示にする
      hideSplashScreen();
    }
</script>
