      }
      return { campusScope: scope, campusCodes: codes };
    }

    /**
     * 統合パネルのフォームデータを収集し、全講習タイプ別 rows を構築する
     * @return {Object} { allTypes: { spring:{rows,sectionScopes}, ... } }
     */
    function collectUnifiedPricingData_() {
      var ALL_TYPES  = ['spring', 'summer', 'kiso1', 'kiso2', 'winter', 'nyushi'];
      var KO_TYPES   = ['spring', 'summer', 'winter'];
      var CHU3_ONLY  = ['kiso1', 'kiso2', 'nyushi'];
      var STD_GRADES = ['sho', 'chu1', 'chu2', 'chu3'];

      var allTypeRows = {};
      ALL_TYPES.forEach(function(tid) { allTypeRows[tid] = []; });

      function getInputVal(tr, field) {
        var el = tr.querySelector('[data-input-field="' + field + '"]');
        return parseInt(el ? el.value : '0') || 0;
      }

      function collectCustomTbody(tbodyId) {
        var rows = [];
        var tbody = document.getElementById(tbodyId);
        if (!tbody) return rows;
        tbody.querySelectorAll('tr[data-row-type="custom"]').forEach(function(tr) {
          var label    = (tr.querySelector('[data-field="label"]').value || '').trim();
          var durMin   = parseInt(tr.querySelector('[data-field="duration-min"]').value) || 80;
          var cnt      = parseInt(tr.querySelector('[data-field="count"]').value) || 0;
          var internal = parseInt(tr.querySelector('[data-field="internal"]').value) || 0;
          var external = parseInt(tr.querySelector('[data-field="external"]').value) || 0;
          var extNaCb  = tr.querySelector('[data-field="external-na"]');
          var extNa    = extNaCb ? extNaCb.checked : false;
          if (!label && !internal && !external && !extNa) return;
          rows.push({ type: 'custom', label: label, duration: Math.round(durMin / 10), count: cnt, internal: internal, external: external, externalNa: extNa });
        });
        return rows;
      }

      // 小学生〜中3 の収集
      STD_GRADES.forEach(function(gk) {
        var allCb = document.querySelector('[data-grade-all="' + gk + '"]');
        var useForAll = allCb ? allCb.checked : true;

        ALL_TYPES.forEach(function(tid) {
          if (CHU3_ONLY.indexOf(tid) !== -1 && gk !== 'chu3') return;
          var durMin, cnt, internal, external;
          if (useForAll) {
            var commonTr = document.querySelector('#grade-common-' + gk + ' tr[data-grade-key="' + gk + '"]');
            if (!commonTr) return;
            durMin   = getInputVal(commonTr, 'duration');
            cnt      = getInputVal(commonTr, 'count');
            internal = getInputVal(commonTr, 'internal');
            external = getInputVal(commonTr, 'external');
          } else {
            var perTr = document.querySelector('#grade-pertype-' + gk + ' tr[data-grade-key="' + gk + '"][data-type-id="' + tid + '"]');
            if (!perTr) return;
            durMin   = getInputVal(perTr, 'duration');
            cnt      = getInputVal(perTr, 'count');
            internal = getInputVal(perTr, 'internal');
            external = getInputVal(perTr, 'external');
          }
          allTypeRows[tid].push({ type: 'standard', gradeKey: gk, duration: Math.round(durMin / 10), count: cnt, internal: internal, external: external });
        });
      });

      // 勝瑞校 高校生（shozui rows: KO_TYPES に適用）
      var shozuiTbody = document.querySelector('#unified-shozui-table tbody');
      if (shozuiTbody) {
        shozuiTbody.querySelectorAll('tr[data-row-type="shozui"]').forEach(function(tr) {
          var gk = tr.dataset.gradeKey;
          var row = {
            type: 'shozui', gradeKey: gk,
            duration: Math.round(getInputVal(tr, 'duration') / 10),
            count: getInputVal(tr, 'count'),
            internal: getInputVal(tr, 'internal'),
            external: getInputVal(tr, 'external')
          };
          KO_TYPES.forEach(function(tid) { allTypeRows[tid].push(row); });
        });
      }

      // 中3 追加行（チェック済み講習タイプに適用）
      var chu3Rows = collectCustomTbody('unified-chu3-tbody');
      var chu3Types = [];
      document.querySelectorAll('.chu3-apply-cb:checked').forEach(function(cb) { chu3Types.push(cb.value); });
      chu3Rows.forEach(function(row) {
        chu3Types.forEach(function(tid) { allTypeRows[tid].push(row); });
      });

      // 高校生 回数別（チェック済み講習タイプに適用、高1は春期除外）
      var koRows = collectCustomTbody('unified-custom-tbody');
      var koTypes = [];
      document.querySelectorAll('.ko-apply-cb:checked').forEach(function(cb) { koTypes.push(cb.value); });
      koRows.forEach(function(row) {
        var isKo1 = (row.label || '').indexOf('高1') !== -1;
        koTypes.forEach(function(tid) {
          if (isKo1 && tid === 'spring') return;  // 高1 は春期に含めない
          allTypeRows[tid].push(row);
        });
      });

      // スコープ収集
      var stdScope  = { campusScope: 'all', campusCodes: [] };
      var shzScope  = getScopeForKey_('shozui');
      var koScope   = getScopeForKey_('custom');
      var chu3Scope = getScopeForKey_('custom_chu3');

      var allTypes = {};
      ALL_TYPES.forEach(function(tid) {
        // 各タイプの sectionScopes: chu3の追加行は chu3Scope, 高校生は koScope
        var isChu3Only = CHU3_ONLY.indexOf(tid) !== -1;
        allTypes[tid] = {
          rows: allTypeRows[tid],
          sectionScopes: {
            standard: stdScope,
            shozui:   shzScope,
            custom:   isChu3Only ? chu3Scope : koScope
          }
        };
      });
      return allTypes;
    }

    /**
     * 統合料金設定パネルのデータを一括保存する
     */
    function saveUnifiedPricingAdmin_() {
      var statusEl = document.getElementById('unified-pricing-status');
      if (statusEl) { statusEl.textContent = '保存中...'; statusEl.style.color = '#555'; }

      var allTypes = collectUnifiedPricingData_();
      var payload = JSON.stringify({ allTypes: allTypes });

      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.success) {
            if (statusEl) { statusEl.textContent = '❌ ' + (result ? result.error : '保存失敗'); statusEl.style.color = '#e57373'; }
            return;
          }
          if (statusEl) { statusEl.textContent = '✓ 保存しました（料金表・配布物PDFに自動反映されます）'; statusEl.style.color = '#22c55e'; }
          // キャッシュリセット
          lecPricingCache_ = null;
          unifiedPricingCache_ = null;
          lectureTabInitialized = false;
          if (typeof matLecPricingData !== 'undefined') matLecPricingData = null;
          if (typeof pricingData !== 'undefined') pricingData = null;
        })
        .withFailureHandler(function(err) {
          if (statusEl) { statusEl.textContent = '❌ ' + err; statusEl.style.color = '#e57373'; }
        })
        .saveUnifiedLecturePricing(payload);
    }

</script>
