<script>
    // ===== 管理タブ：通常設定 =====

    var normalClassConfigCache_ = null; // 通常授業設定キャッシュ {version, sections}
    var ncCampusMap_ = null; // 校舎コード→名前マップ

    /**
     * 管理タブ：通常設定パネル 初期化（switchAdminTab から呼ばれる）
     */
    function initNormalConfigAdmin() {
      var body = document.getElementById('admin-normal-config-body');
      if (!body) return;
      if (normalClassConfigCache_) {
        renderNormalConfigSections_(normalClassConfigCache_);
        return;
      }
      body.innerHTML = '<div style="color:#999;font-size:14px;padding:10px;">読み込み中...</div>';
      // 校舎マスタと設定を並列取得
      var loaded = { config: null, campuses: null };
      function tryRender() {
        if (loaded.config === null || loaded.campuses === null) return;
        ncCampusMap_ = loaded.campuses || {};
        if (loaded.config && loaded.config.success && loaded.config.data) {
          normalClassConfigCache_ = loaded.config.data;
          renderNormalConfigSections_(loaded.config.data);
        } else {
          body.innerHTML = '<div style="color:#e57373;font-size:14px;padding:10px;">取得失敗: ' + (loaded.config ? loaded.config.error : '') + '</div>';
        }
      }
      google.script.run
        .withSuccessHandler(function(result) { loaded.config = result; tryRender(); })
        .withFailureHandler(function(err) { loaded.config = { success: false, error: err }; tryRender(); })
        .getNormalClassConfig();
      google.script.run
        .withSuccessHandler(function(result) { loaded.campuses = (result && result.success) ? result.data : {}; tryRender(); })
        .withFailureHandler(function() { loaded.campuses = {}; tryRender(); })
        .getCampusConfigForWeb();
    }

    /**
     * 通常設定のセクション一覧を描画する
     * @param {Object} configData {version, sections:[...]}
     */
    function renderNormalConfigSections_(configData) {
      var body = document.getElementById('admin-normal-config-body');
      if (!body) return;
      var sections = (configData && configData.sections) ? configData.sections : [];

      var html = '<div style="margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'
               + '<button onclick="addNcSection_()" style="padding:7px 16px;background:#f0f4ff;color:#3b5bdb;border:1px solid #c5d0f5;border-radius:6px;font-size:13px;cursor:pointer;">＋ セクション追加</button>'
               + '<button onclick="saveNormalClassConfigAdmin()" style="padding:7px 20px;background:var(--theme-color);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">保存</button>'
               + '<span id="admin-normal-config-status" style="font-size:13px;color:#555;"></span>'
               + '</div>'
               + '<div id="nc-sections-list">';

      sections.forEach(function(sec, idx) {
        html += buildNcSectionCard_(sec, idx, sections.length);
      });
      html += '</div>';

      body.innerHTML = html;
    }

    /**
     * 1セクションのカードHTMLを生成する
     */
    function buildNcSectionCard_(sec, idx, total) {
      var scopeLabel = (sec.campusScope === 'specific') ? '特定校舎' : '全校舎';
      var scopeColor = (sec.campusScope === 'specific') ? '#ff8c00' : '#2d6a4f';
      var scopeBg    = (sec.campusScope === 'specific') ? '#fff3e0' : '#d8f3dc';

      // 校舎チェックボックス（特定校舎のみ表示）
      var campusHtml = '';
      if (ncCampusMap_) {
        var campusIds = Object.keys(ncCampusMap_);
        if (campusIds.length > 0) {
          campusHtml = '<div class="nc-campus-selector" style="display:' + (sec.campusScope === 'specific' ? 'flex' : 'none') + ';flex-wrap:wrap;gap:6px;margin-top:8px;">';
          campusIds.forEach(function(code) {
            var checked = (sec.campusCodes || []).indexOf(code) !== -1 ? ' checked' : '';
            campusHtml += '<label style="font-size:12px;display:flex;align-items:center;gap:3px;cursor:pointer;">'
                        + '<input type="checkbox" class="nc-campus-chk" value="' + escapeHtml(code) + '"' + checked + '>'
                        + escapeHtml(ncCampusMap_[code] || code) + '</label>';
          });
          campusHtml += '</div>';
        }
      }

      // テーブルHTML
      var headers = sec.headers || [];
      var rows = sec.rows || [];
      var colCount = headers.length;

      var tableHtml = '<div style="overflow-x:auto;">'
                    + '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:6px;">'
                    + '<thead><tr style="background:#f5f5f5;">';
      headers.forEach(function(h, ci) {
        tableHtml += '<th style="border:1px solid #ddd;padding:5px 8px;min-width:60px;">'
                   + '<input type="text" class="nc-header" data-col="' + ci + '" value="' + escapeHtml(h) + '" '
                   + 'style="width:100%;min-width:50px;border:none;background:transparent;font-weight:600;font-size:12px;text-align:center;padding:0;" placeholder="列名">'
                   + '</th>';
      });
      tableHtml += '<th style="border:1px solid #ddd;padding:5px 4px;width:36px;text-align:center;">'
                 + '<button onclick="addNcColumn_(this)" title="列を追加" style="font-size:16px;line-height:1;background:none;border:none;cursor:pointer;color:#3b5bdb;">＋</button>'
                 + '</th>'
                 + '<th style="border:1px solid #ddd;padding:5px 4px;width:28px;"></th>'
                 + '</tr></thead><tbody>';

      rows.forEach(function(row, ri) {
        var isFirst = (ri === 0);
        var isLast  = (ri === rows.length - 1);
        var upBtn   = isFirst
          ? '<button disabled style="background:none;border:none;color:#ccc;font-size:11px;cursor:default;padding:1px 3px;">↑</button>'
          : '<button onclick="moveNcRow_(this,-1)" title="上へ" style="background:none;border:none;cursor:pointer;color:#555;font-size:11px;padding:1px 3px;">↑</button>';
        var downBtn = isLast
          ? '<button disabled style="background:none;border:none;color:#ccc;font-size:11px;cursor:default;padding:1px 3px;">↓</button>'
          : '<button onclick="moveNcRow_(this,1)" title="下へ" style="background:none;border:none;cursor:pointer;color:#555;font-size:11px;padding:1px 3px;">↓</button>';
        tableHtml += '<tr>';
        for (var ci = 0; ci < colCount; ci++) {
          var cellVal = (row[ci] !== undefined && row[ci] !== null) ? row[ci] : '';
          tableHtml += '<td style="border:1px solid #ddd;padding:3px 4px;">'
                     + '<input type="text" class="nc-cell" data-row="' + ri + '" data-col="' + ci + '" value="' + escapeHtml(String(cellVal)) + '" '
                     + 'style="width:100%;min-width:40px;border:none;font-size:12px;padding:2px 4px;" placeholder="—">'
                     + '</td>';
        }
        tableHtml += '<td style="border:1px solid #ddd;padding:2px 2px;text-align:center;white-space:nowrap;">' + upBtn + downBtn + '</td>'
                   + '<td style="border:1px solid #ddd;padding:3px 4px;text-align:center;">'
                   + '<button onclick="deleteNcRow_(this)" title="行を削除" style="background:none;border:none;cursor:pointer;color:#e57373;font-size:14px;line-height:1;">✕</button>'
                   + '</td></tr>';
      });

      tableHtml += '</tbody></table></div>'
               + '<button onclick="addNcRow_(this)" style="font-size:12px;color:#3b5bdb;background:none;border:1px solid #c5d0f5;border-radius:4px;padding:3px 10px;cursor:pointer;margin-bottom:10px;">＋ 行追加</button>';

      // 備考
      var notesVal = (sec.notes || []).join('\n');
      var notesHtml = '<div style="margin-top:4px;">'
                    + '<label style="font-size:12px;color:#666;">備考（1行ずつ入力）</label><br>'
                    + '<textarea class="nc-notes" rows="3" style="width:100%;font-size:12px;border:1px solid #ddd;border-radius:4px;padding:5px;box-sizing:border-box;resize:vertical;" placeholder="備考を入力...">' + escapeHtml(notesVal) + '</textarea>'
                    + '</div>';

      var upBtn   = idx > 0 ? '<button onclick="moveNcSection_(this,-1)" title="上へ" style="background:none;border:1px solid #ccc;border-radius:4px;padding:3px 7px;cursor:pointer;font-size:12px;">↑</button>' : '<button disabled style="background:none;border:1px solid #eee;border-radius:4px;padding:3px 7px;color:#ccc;font-size:12px;">↑</button>';
      var downBtn = idx < total - 1 ? '<button onclick="moveNcSection_(this,1)" title="下へ" style="background:none;border:1px solid #ccc;border-radius:4px;padding:3px 7px;cursor:pointer;font-size:12px;">↓</button>' : '<button disabled style="background:none;border:1px solid #eee;border-radius:4px;padding:3px 7px;color:#ccc;font-size:12px;">↓</button>';

      return '<div class="nc-section-card" data-id="' + escapeHtml(sec.id) + '" style="border:1px solid #ddd;border-radius:8px;margin-bottom:12px;overflow:hidden;">'
           + '<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fafafa;border-bottom:1px solid #eee;flex-wrap:wrap;">'
           + '<input type="text" class="nc-section-name" value="' + escapeHtml(sec.name) + '" placeholder="セクション名" '
           + 'style="flex:1;min-width:120px;border:1px solid #ddd;border-radius:4px;padding:4px 8px;font-size:14px;font-weight:600;">'
           + '<button onclick="toggleNcScope_(this)" class="nc-scope-btn" data-scope="' + (sec.campusScope || 'all') + '" '
           + 'style="padding:4px 10px;background:' + scopeBg + ';color:' + scopeColor + ';border:1px solid ' + scopeColor + ';border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">'
           + scopeLabel + '</button>'
           + upBtn + downBtn
           + '<button onclick="deleteNcSection_(this)" style="background:none;border:1px solid #ffcccc;border-radius:4px;padding:3px 8px;cursor:pointer;color:#e57373;font-size:12px;">削除</button>'
           + '</div>'
           + '<div style="padding:12px 14px;">'
           + campusHtml
           + tableHtml
           + notesHtml
           + '</div>'
           + '</div>';
    }

    /**
     * セクションのキャンパス スコープを切り替える
     */
    function toggleNcScope_(btn) {
      var current = btn.dataset.scope;
      var isSpecific = current === 'specific';
      var newScope = isSpecific ? 'all' : 'specific';
      btn.dataset.scope = newScope;
      if (newScope === 'all') {
        btn.textContent = '全校舎';
        btn.style.background = '#d8f3dc'; btn.style.color = '#2d6a4f'; btn.style.borderColor = '#2d6a4f';
      } else {
        btn.textContent = '特定校舎';
        btn.style.background = '#fff3e0'; btn.style.color = '#ff8c00'; btn.style.borderColor = '#ff8c00';
      }
      // 校舎チェックボックスの表示切替
      var card = btn.closest('.nc-section-card');
      if (card) {
        var selector = card.querySelector('.nc-campus-selector');
        if (selector) selector.style.display = newScope === 'specific' ? 'flex' : 'none';
      }
    }

    /**
     * セクションに列を追加する
     */
    function addNcColumn_(addBtn) {
      var card = addBtn.closest('.nc-section-card');
      if (!card) return;
      var thead = card.querySelector('thead tr');
      var tbody = card.querySelector('tbody');
      // 現在の列数を取得（+ボタン2つ分の th を除く）
      var newColIdx = thead.querySelectorAll('th').length - 2;
      // ヘッダーに新列を追加
      var newTh = document.createElement('th');
      newTh.style.cssText = 'border:1px solid #ddd;padding:5px 8px;min-width:60px;';
      newTh.innerHTML = '<input type="text" class="nc-header" data-col="' + newColIdx + '" value="" style="width:100%;min-width:50px;border:none;background:transparent;font-weight:600;font-size:12px;text-align:center;padding:0;" placeholder="列名">';
      thead.insertBefore(newTh, thead.querySelectorAll('th')[thead.querySelectorAll('th').length - 2]);
      // 各行に空セルを追加
      tbody.querySelectorAll('tr').forEach(function(tr) {
        var tds = tr.querySelectorAll('td');
        var insertBefore = tds[tds.length - 2]; // ✕ボタンのtdの前
        var rowIdx = tr.rowIndex - 1; // tbody内インデックス
        var newTd = document.createElement('td');
        newTd.style.cssText = 'border:1px solid #ddd;padding:3px 4px;';
        newTd.innerHTML = '<input type="text" class="nc-cell" data-row="' + rowIdx + '" data-col="' + newColIdx + '" value="" style="width:100%;min-width:40px;border:none;font-size:12px;padding:2px 4px;" placeholder="—">';
        tr.insertBefore(newTd, insertBefore);
      });
    }

    /**
     * セクションに行を追加する
     */
    function addNcRow_(addBtn) {
      var card = addBtn.closest('.nc-section-card');
      if (!card) return;
      var tbody = card.querySelector('tbody');
      var thead = card.querySelector('thead tr');
      var colCount = thead.querySelectorAll('th').length - 2;
      var newRowIdx = tbody.querySelectorAll('tr').length;
      var newTr = document.createElement('tr');
      var cellsHtml = '';
      for (var ci = 0; ci < colCount; ci++) {
        cellsHtml += '<td style="border:1px solid #ddd;padding:3px 4px;">'
                   + '<input type="text" class="nc-cell" data-row="' + newRowIdx + '" data-col="' + ci + '" value="" '
                   + 'style="width:100%;min-width:40px;border:none;font-size:12px;padding:2px 4px;" placeholder="—">'
                   + '</td>';
      }
      // 追加行は常に末尾なので ↑は有効・↓は当面disabled（DOMに追加後に前行の↓を更新不要）
      cellsHtml += '<td style="border:1px solid #ddd;padding:2px 2px;text-align:center;white-space:nowrap;">'
               + '<button onclick="moveNcRow_(this,-1)" title="上へ" style="background:none;border:none;cursor:pointer;color:#555;font-size:11px;padding:1px 3px;">↑</button>'
               + '<button disabled style="background:none;border:none;color:#ccc;font-size:11px;cursor:default;padding:1px 3px;">↓</button>'
               + '</td>'
               + '<td style="border:1px solid #ddd;padding:3px 4px;text-align:center;">'
               + '<button onclick="deleteNcRow_(this)" title="行を削除" style="background:none;border:none;cursor:pointer;color:#e57373;font-size:14px;line-height:1;">✕</button>'
               + '</td>';
      newTr.innerHTML = cellsHtml;
      tbody.appendChild(newTr);
    }

    /**
     * 行を削除する
     */
    function deleteNcRow_(btn) {
      var tr = btn.closest('tr');
      if (tr) tr.remove();
    }

    /**
     * セクション内の行を上下に移動する
     * @param {HTMLElement} btn ボタン要素
     * @param {number} dir -1=上、1=下
     */
    function moveNcRow_(btn, dir) {
      var tr = btn.closest('tr');
      var tbody = tr ? tr.closest('tbody') : null;
      if (!tr || !tbody) return;
      var rows = tbody.querySelectorAll('tr');
      var idx = Array.prototype.indexOf.call(rows, tr);
      var targetIdx = idx + dir;
      if (targetIdx < 0 || targetIdx >= rows.length) return;
      var target = rows[targetIdx];
      if (dir === -1) {
        tbody.insertBefore(tr, target);
      } else {
        tbody.insertBefore(tr, target.nextSibling);
      }
    }

    /**
     * セクションを追加する
     */
    function addNcSection_() {
      var list = document.getElementById('nc-sections-list');
      if (!list) return;
      var newSec = {
        id: 'sec_' + Date.now(),
        name: '新しいセクション',
        campusScope: 'all',
        campusCodes: [],
        headers: ['列1', '列2'],
        rows: [['', '']],
        notes: []
      };
      var total = list.querySelectorAll('.nc-section-card').length;
      var div = document.createElement('div');
      div.innerHTML = buildNcSectionCard_(newSec, total, total + 1);
      list.appendChild(div.firstChild);
    }

    /**
     * セクションを削除する
     */
    function deleteNcSection_(btn) {
      var card = btn.closest('.nc-section-card');
      if (!card) return;
      var name = (card.querySelector('.nc-section-name') || {}).value || 'このセクション';
      if (!confirm('「' + name + '」を削除してよいですか？')) return;
      card.remove();
    }

    /**
     * セクションを上下に移動する
     * @param {HTMLElement} btn ボタン要素
     * @param {number} dir -1=上、1=下
     */
    function moveNcSection_(btn, dir) {
      var card = btn.closest('.nc-section-card');
      var list = document.getElementById('nc-sections-list');
      if (!card || !list) return;
      var cards = list.querySelectorAll('.nc-section-card');
      var idx = Array.prototype.indexOf.call(cards, card);
      var targetIdx = idx + dir;
      if (targetIdx < 0 || targetIdx >= cards.length) return;
      var target = cards[targetIdx];
      if (dir === -1) {
        list.insertBefore(card, target);
      } else {
        list.insertBefore(card, target.nextSibling);
      }
    }

    /**
     * DOMからセクションデータを収集する
     * @return {Array} sections[]
     */
    function collectNcSections_() {
      var list = document.getElementById('nc-sections-list');
      if (!list) return [];
      var sections = [];
      list.querySelectorAll('.nc-section-card').forEach(function(card) {
        var id = card.dataset.id || ('sec_' + Date.now() + '_' + Math.random());
        var name = (card.querySelector('.nc-section-name') || {}).value || '';
        var scopeBtn = card.querySelector('.nc-scope-btn');
        var campusScope = scopeBtn ? scopeBtn.dataset.scope : 'all';
        // 選択校舎コード
        var campusCodes = [];
        card.querySelectorAll('.nc-campus-chk:checked').forEach(function(chk) {
          campusCodes.push(chk.value);
        });
        // ヘッダー
        var headers = [];
        card.querySelectorAll('thead .nc-header').forEach(function(inp) {
          headers.push(inp.value);
        });
        // 行
        var rows = [];
        card.querySelectorAll('tbody tr').forEach(function(tr) {
          var cells = [];
          tr.querySelectorAll('.nc-cell').forEach(function(inp) {
            cells.push(inp.value);
          });
          if (cells.length > 0) rows.push(cells);
        });
        // 備考
        var notesEl = card.querySelector('.nc-notes');
        var notes = notesEl ? notesEl.value.split('\n').filter(function(l) { return l.trim() !== ''; }) : [];

        sections.push({ id: id, name: name, campusScope: campusScope, campusCodes: campusCodes, headers: headers, rows: rows, notes: notes });
      });
      return sections;
    }

    /**
     * 通常授業設定をバックエンドに保存する
     */
    function saveNormalClassConfigAdmin() {
      var statusEl = document.getElementById('admin-normal-config-status');
      if (!statusEl) return;
      statusEl.textContent = '保存中...';
      statusEl.style.color = '#555';

      var sections = collectNcSections_();
      var data = { version: 2, sections: sections };
      normalClassConfigCache_ = data;

      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success) {
            statusEl.textContent = '✓ 保存しました（料金表にも反映）';
            statusEl.style.color = '#22c55e';
          } else {
            statusEl.textContent = '❌ ' + (result ? result.error : '保存失敗');
            statusEl.style.color = '#e57373';
          }
        })
        .withFailureHandler(function(err) {
          statusEl.textContent = '❌ ' + err;
          statusEl.style.color = '#e57373';
        })
        .saveNormalClassConfig(JSON.stringify(data));
    }

    // ===== 管理タブ：講習設定 =====

    /**
     * 管理タブ：講習設定パネル 初期化（switchAdminTab から呼ばれる）
     */
    function initLecturesAdmin() {
      buildAdminLecYearSelect();
      loadLecturePeriodsAdmin();
    }

    /**
     * 管理タブ：年度セレクトを構築する（現在FYと翌FY）
     */
    function buildAdminLecYearSelect() {
      var sel = document.getElementById('admin-lec-year-sel');
      if (!sel) return;
      var now = new Date();
      var month = now.getMonth() + 1;
      var baseFy = (month >= 4) ? now.getFullYear() : now.getFullYear() - 1;
      // 春期講習は「fy年の3月〜4月」= fy年度の講習。
      // 3月〜4月中旬（概ね春期期間中）は翌年度をデフォルト選択にする
      var defaultFy = (month <= 3) ? baseFy + 1 : baseFy;
      sel.innerHTML = '';
      [baseFy, baseFy + 1].forEach(function(y) {
        var opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '年度';
        if (y === defaultFy) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    /**
     * 管理タブ：選択年度の講習期間一覧を描画する
     */
    function loadLecturePeriodsAdmin() {
      var listEl = document.getElementById('admin-lec-list');
      if (!listEl) return;
      listEl.innerHTML = '<div style="color:#999;font-size:14px;padding:10px;">読み込み中...</div>';

      var sel = document.getElementById('admin-lec-year-sel');
      var selectedFy = sel ? parseInt(sel.value) : null;

      google.script.run
        .withSuccessHandler(function(result) {
          var allPeriods = Array.isArray(result) ? result : [];

          // 選択年度でフィルタ（旧フォーマットIDは year- で始まらないためそのまま表示）
          var periods = allPeriods.filter(function(lp) {
            if (!/^\d{4}-/.test(lp.id)) return true; // 旧フォーマットは常に表示
            if (!selectedFy) return true;
            return lp.id.startsWith(selectedFy + '-');
          });

          // 最新の periods を lecturePeriods に反映
          lecturePeriods = allPeriods;

          if (periods.length === 0) {
            listEl.innerHTML = '<div style="color:#999;font-size:14px;padding:10px;text-align:center;">表示できる講習がありません</div>'
              + '<div id="admin-lec-grade-panel" style="display:none;margin-top:20px;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:16px;"></div>'
              + '<div id="admin-lec-pricing-panel" style="display:none;margin-top:20px;background:#fffbf0;border:1px solid #e6d5a0;border-radius:8px;padding:16px;"></div>';
            return;
          }

          var html = '<table style="width:100%;border-collapse:collapse;font-size:14px;">'
                   + '<thead><tr style="background:#f5f5f5;">'
                   + '<th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e0e0e0;font-weight:600;color:#444;">講習名</th>'
                   + '<th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e0e0e0;font-weight:600;color:#444;">開始日</th>'
                   + '<th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e0e0e0;font-weight:600;color:#444;">終了日</th>'
                   + '<th style="padding:10px 12px;text-align:center;border-bottom:2px solid #e0e0e0;font-weight:600;color:#444;"></th>'
                   + '</tr></thead><tbody>';

          periods.forEach(function(lp) {
            var isNew = /^\d{4}-/.test(lp.id);
            var startLabel = lp.startDate + (lp._isOverridden ? '' : ' <span style="font-size:10px;color:#888;background:#f0f0f0;border-radius:3px;padding:1px 4px;">自動</span>');
            var endLabel   = lp.endDate   + (lp._isOverridden ? '' : ' <span style="font-size:10px;color:#888;background:#f0f0f0;border-radius:3px;padding:1px 4px;">自動</span>');
            // ID から fiscalYear と typeId を抽出
            var idParts = lp.id.split('-');
            var typeId = isNew ? idParts[1] : lp.id;
            var editBtn = '';
            if (isNew) {
              var parts = idParts;
              var fy = parts[0];
              editBtn = '<button onclick="editLectureDatesAdmin(\'' + escapeHtml(lp.id) + '\',\'' + lp.startDate + '\',\'' + lp.endDate + '\')" '
                      + 'style="background:none;border:1px solid #999;color:#555;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600;margin-right:6px;">📅 日程を編集</button>';
            }
            html += '<tr style="border-bottom:1px solid #eee;" id="admin-lec-row-' + escapeHtml(lp.id) + '">'
                  + '<td style="padding:10px 12px;font-weight:500;">' + escapeHtml(lp.name) + '</td>'
                  + '<td style="padding:10px 12px;color:#555;">' + startLabel + '</td>'
                  + '<td style="padding:10px 12px;color:#555;">' + endLabel + '</td>'
                  + '<td style="padding:10px 12px;text-align:right;white-space:nowrap;">'
                  + editBtn
                  + '<button onclick="showLecGradeSettingsPanel(\'' + escapeHtml(lp.id) + '\')" style="background:none;border:1px solid #667eea;color:#667eea;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600;">⚙️ 料金・設定</button>'
                  + '</td></tr>'
                  + '<tr id="admin-lec-edit-row-' + escapeHtml(lp.id) + '" style="display:none;"><td colspan="4" style="padding:0;"></td></tr>';
          });

          html += '</tbody></table>';
          html += '<div id="admin-lec-grade-panel" style="display:none;margin-top:20px;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:16px;"></div>';
          html += '<div id="admin-lec-pricing-panel" style="display:none;margin-top:20px;background:#fffbf0;border:1px solid #e6d5a0;border-radius:8px;padding:16px;"></div>';
          listEl.innerHTML = html;

          // 講習管理タブの再ロードフラグをリセット
          lectureTabInitialized = false;
        })
        .withFailureHandler(function(err) {
          listEl.innerHTML = '<div style="color:#e57373;font-size:14px;padding:10px;">取得失敗: ' + err + '</div>';
        })
        .getLecturePeriods();
    }

    /**
     * 管理タブ：日程編集インラインUIを表示する
     * @param {string} lectureId 講習ID（{fy}-{typeId}形式）
     * @param {string} currentStart 現在の開始日（YYYY-MM-DD）
     * @param {string} currentEnd 現在の終了日（YYYY-MM-DD）
     */
    function editLectureDatesAdmin(lectureId, currentStart, currentEnd) {
      var editRow = document.getElementById('admin-lec-edit-row-' + lectureId);
      if (!editRow) return;

      // 既に開いている場合は閉じる
      if (editRow.style.display !== 'none') {
        editRow.style.display = 'none';
        return;
      }

      // 他の編集行を閉じる
      document.querySelectorAll('[id^="admin-lec-edit-row-"]').forEach(function(el) {
        el.style.display = 'none';
      });

      var parts = lectureId.split('-');
      var fy = parts[0], typeId = parts[1];

      editRow.querySelector('td').innerHTML =
        '<div style="padding:12px 16px;background:#fffbf0;border-top:1px solid #ffe082;">'
        + '<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">'
        + '<div><label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;">開始日</label>'
        + '<input type="date" id="admin-lec-edit-start-' + escapeHtml(lectureId) + '" value="' + escapeHtml(currentStart) + '" '
        + 'style="padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;"></div>'
        + '<div><label style="display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px;">終了日</label>'
        + '<input type="date" id="admin-lec-edit-end-' + escapeHtml(lectureId) + '" value="' + escapeHtml(currentEnd) + '" '
        + 'style="padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;"></div>'
        + '<button onclick="saveLectureDatesAdmin(' + fy + ',\'' + typeId + '\')" '
        + 'style="padding:8px 18px;background:var(--theme-color);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">保存</button>'
        + '<button onclick="resetLectureDatesAdmin(' + fy + ',\'' + typeId + '\')" '
        + 'style="padding:8px 14px;background:none;border:1px solid #999;color:#555;border-radius:6px;font-size:14px;cursor:pointer;">デフォルトに戻す</button>'
        + '<button onclick="document.getElementById(\'admin-lec-edit-row-' + escapeHtml(lectureId) + '\').style.display=\'none\'" '
        + 'style="padding:8px 14px;background:none;border:1px solid #ccc;color:#888;border-radius:6px;font-size:14px;cursor:pointer;">キャンセル</button>'
        + '</div>'
        + '<div id="admin-lec-date-status-' + escapeHtml(lectureId) + '" style="margin-top:6px;font-size:13px;color:#555;"></div>'
        + '</div>';
      editRow.style.display = '';
    }

    /**
     * 管理タブ：日程を保存する
     * @param {number} fiscalYear 学年年度
     * @param {string} typeId タイプキー
     */
    function saveLectureDatesAdmin(fiscalYear, typeId) {
      var lectureId = fiscalYear + '-' + typeId;
      var startEl = document.getElementById('admin-lec-edit-start-' + lectureId);
      var endEl   = document.getElementById('admin-lec-edit-end-' + lectureId);
      var statusEl = document.getElementById('admin-lec-date-status-' + lectureId);
      if (!startEl || !endEl || !statusEl) return;

      var start = startEl.value.trim();
      var end   = endEl.value.trim();
      if (!start || !end) {
        statusEl.textContent = '❌ 開始日・終了日をどちらも入力してください';
        statusEl.style.color = '#e57373';
        return;
      }
      if (start > end) {
        statusEl.textContent = '❌ 終了日は開始日以降を指定してください';
        statusEl.style.color = '#e57373';
        return;
      }

      statusEl.textContent = '保存中...';
      statusEl.style.color = '#555';

      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success) {
            statusEl.textContent = '✓ 保存しました';
            statusEl.style.color = '#22c55e';
            setTimeout(function() { loadLecturePeriodsAdmin(); }, 600);
          } else {
            statusEl.textContent = '❌ ' + (result ? result.error : '保存失敗');
            statusEl.style.color = '#e57373';
          }
        })
        .withFailureHandler(function(err) {
          statusEl.textContent = '❌ ' + err;
          statusEl.style.color = '#e57373';
        })
        .saveLectureDates(fiscalYear, typeId, start, end);
    }

    /**
     * 管理タブ：日程をデフォルト（自動計算）に戻す
     * @param {number} fiscalYear 学年年度
     * @param {string} typeId タイプキー
     */
    function resetLectureDatesAdmin(fiscalYear, typeId) {
      appConfirm('日程をデフォルト（自動計算）に戻しますか？').then(function(ok) {
        if (!ok) return;
        var lectureId = fiscalYear + '-' + typeId;
        var statusEl = document.getElementById('admin-lec-date-status-' + lectureId);
        if (statusEl) { statusEl.textContent = 'リセット中...'; statusEl.style.color = '#555'; }

        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success) {
              loadLecturePeriodsAdmin();
            } else {
              if (statusEl) { statusEl.textContent = '❌ ' + (result ? result.error : 'リセット失敗'); statusEl.style.color = '#e57373'; }
            }
          })
          .withFailureHandler(function(err) {
            if (statusEl) { statusEl.textContent = '❌ ' + err; statusEl.style.color = '#e57373'; }
          })
          .resetLectureDates(fiscalYear, typeId);
      });
    }

    // --- 講習設定 統合UI（学年別設定 + 料金設定） ---

    var lecPricingCache_ = null;  // バックエンドから取得した料金データのキャッシュ
    var lecCampusMap_   = null;  // 校舎コード→名前マップ（通常設定と共用）

    // 学年キー定義（フロントエンド用）
    var LEC_GRADE_KEYS_ALL_ = ['sho', 'chu1', 'chu2', 'chu3', 'ko1', 'ko2', 'ko3'];
    var LEC_GRADE_LABELS_ = { sho: '小学生', chu1: '中1', chu2: '中2', chu3: '中3', ko1: '高1', ko2: '高2', ko3: '高3' };
    var LEC_CHU3_ONLY_TYPES_ = ['kiso1', 'kiso2', 'nyushi'];

    /**
     * 講習設定の校舎スコープ切り替えボタンHTMLを生成する
     * @param {string} sectionKey "standard" | "shozui" | "custom"
     * @param {Object} scopeData {campusScope, campusCodes}
     * @return {string} HTML文字列
     */
    function buildLecScopeUi_(sectionKey, scopeData) {
      var scope      = (scopeData && scopeData.campusScope) || 'all';
      var scopeLabel = scope === 'specific' ? '特定校舎' : '全校舎';
      var scopeColor = scope === 'specific' ? '#ff8c00' : '#2d6a4f';
      var scopeBg    = scope === 'specific' ? '#fff3e0' : '#d8f3dc';
      return '<button class="lec-scope-toggle" data-section-key="' + sectionKey + '" data-scope="' + scope + '" '
           + 'onclick="toggleLecScope_(this)" '
           + 'style="border:none;border-radius:10px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;'
           + 'color:' + scopeColor + ';background:' + scopeBg + ';">' + scopeLabel + '</button>';
    }

    /**
     * 講習設定の校舎チェックボックス一覧HTMLを生成する
     * @param {string} sectionKey "standard" | "shozui" | "custom"
     * @param {Object} scopeData {campusScope, campusCodes}
     * @return {string} HTML文字列
     */
    function buildLecScopeCampusCheckboxes_(sectionKey, scopeData) {
      var campusMap = lecCampusMap_ || {};
      var campusIds = Object.keys(campusMap);
      if (campusIds.length === 0) return '';
      var scope  = (scopeData && scopeData.campusScope) || 'all';
      var codes  = (scopeData && scopeData.campusCodes) || [];
      var display = scope === 'specific' ? 'flex' : 'none';
      var html = '<div class="lec-campus-selector" data-section-key="' + sectionKey + '" '
               + 'style="display:' + display + ';flex-wrap:wrap;gap:6px;margin-bottom:8px;padding:4px 0;">';
      campusIds.forEach(function(code) {
        var checked = codes.indexOf(code) !== -1 ? ' checked' : '';
        html += '<label style="font-size:12px;display:flex;align-items:center;gap:3px;cursor:pointer;">'
              + '<input type="checkbox" class="lec-campus-chk" data-section-key="' + sectionKey + '" value="' + escapeHtml(code) + '"' + checked + '>'
              + escapeHtml(campusMap[code] || code) + '</label>';
      });
      return html + '</div>';
    }

    /**
     * 講習設定の校舎スコープを切り替える
     * @param {HTMLElement} btn スコープトグルボタン
     */
    function toggleLecScope_(btn) {
      var sectionKey = btn.dataset.sectionKey;
      var newScope = btn.dataset.scope === 'all' ? 'specific' : 'all';
      btn.dataset.scope = newScope;
      btn.textContent   = newScope === 'specific' ? '特定校舎' : '全校舎';
      btn.style.color   = newScope === 'specific' ? '#ff8c00' : '#2d6a4f';
      btn.style.background = newScope === 'specific' ? '#fff3e0' : '#d8f3dc';
      var sel = document.querySelector('.lec-campus-selector[data-section-key="' + sectionKey + '"]');
      if (sel) sel.style.display = newScope === 'specific' ? 'flex' : 'none';
    }

    /**
     * 講習設定パネルの校舎スコープ設定をDOMから収集する
     * @return {Object} { standard: {campusScope, campusCodes}, shozui: {...}, custom: {...} }
     */
    function collectLecSectionScopes_() {
      var scopes = {};
      ['standard', 'shozui', 'custom'].forEach(function(key) {
        var btn = document.querySelector('.lec-scope-toggle[data-section-key="' + key + '"]');
        var scope = btn ? btn.dataset.scope : 'all';
        var campusCodes = [];
        if (scope === 'specific') {
          document.querySelectorAll('.lec-campus-chk[data-section-key="' + key + '"]:checked').forEach(function(chk) {
            campusCodes.push(chk.value);
          });
        }
        scopes[key] = { campusScope: scope, campusCodes: campusCodes };
      });
      return scopes;
    }

    /**
     * 統合設定パネルを表示する（学年別設定 + 料金設定を1テーブルで）
     * @param {string} lectureId 対象の講習期間ID
     */
    function showLecGradeSettingsPanel(lectureId) {
      var panel = document.getElementById('admin-lec-grade-panel');
      if (!panel) return;

      var lp = lecturePeriods.find(function(p) { return p.id === lectureId; });
      if (!lp) return;

      var typeId = lectureId.replace(/^\d{4}-/, '');

      panel.innerHTML = '<div style="color:#999;font-size:14px;padding:10px;">料金データを読み込み中...</div>';
      panel.dataset.currentLectureId = lectureId;
      panel.dataset.currentTypeId = typeId;
      panel.style.display = 'block';
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      var loaded = { pricing: null, campuses: ncCampusMap_ }; // ncCampusMap_が既ロードなら再利用
      function tryRenderLecPanel_() {
        if (loaded.pricing === null || loaded.campuses === null) return;
        lecCampusMap_ = loaded.campuses;
        if (loaded.pricing.success && loaded.pricing.data) {
          lecPricingCache_ = loaded.pricing.data;
          var typeData = loaded.pricing.data[typeId] || { rows: [] };
          renderLecUnifiedPanel_(lectureId, typeId, lp, typeData);
        } else {
          panel.innerHTML = '<div style="color:#e57373;font-size:14px;padding:10px;">料金データの取得に失敗しました</div>';
        }
      }

      google.script.run
        .withSuccessHandler(function(result) {
          loaded.pricing = result || { success: false };
          tryRenderLecPanel_();
        })
        .withFailureHandler(function(err) {
          loaded.pricing = { success: false, error: err };
          tryRenderLecPanel_();
        })
        .getLecturePricingConfig();

      if (!ncCampusMap_) {
        // 通常設定タブがまだ開かれていない場合は別途取得
        google.script.run
          .withSuccessHandler(function(result) {
            loaded.campuses = (result && result.success) ? result.data : {};
            tryRenderLecPanel_();
          })
          .withFailureHandler(function() { loaded.campuses = {}; tryRenderLecPanel_(); })
          .getCampusConfigForWeb();
      }
    }

    /**
     * 統合設定パネルの中身を描画する（標準料金・勝瑞校料金・追加行の3セクション）
     * @param {string} lectureId 講習期間ID
     * @param {string} typeId 講習タイプ
     * @param {Object} lp 講習期間オブジェクト
     * @param {Object} typeData {rows:[...]} 形式の料金データ
     */
    function renderLecUnifiedPanel_(lectureId, typeId, lp, typeData) {
      var panel = document.getElementById('admin-lec-grade-panel');
      if (!panel) return;

      var rows = (typeData && typeData.rows) ? typeData.rows : [];
      // 校舎スコープ設定（デフォルト: standard=全校舎, shozui=勝瑞校のみ, custom=全校舎）
      var sectionScopes = typeData.sectionScopes || {};
      var defaultScopes = {
        standard: { campusScope: 'all',      campusCodes: [] },
        shozui:   { campusScope: 'specific', campusCodes: ['08'] },
        custom:   { campusScope: 'all',      campusCodes: [] }
      };
      ['standard','shozui','custom'].forEach(function(k) {
        sectionScopes[k] = sectionScopes[k] || defaultScopes[k];
      });
      var isChuu3Only = LEC_CHU3_ONLY_TYPES_.indexOf(typeId) !== -1;
      var isSpring = lp.name.indexOf('春期') !== -1;
      var standardGrades = isChuu3Only ? ['chu3'] : LEC_GRADE_KEYS_ALL_;
      var thStyle = 'padding:7px 8px;text-align:center;font-weight:600;color:#444;border-bottom:1px solid #ddd;font-size:12px;';

      var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:6px;">'
               + '<strong style="font-size:14px;color:#333;">「' + escapeHtml(lp.name) + '」の設定（年度共通）</strong>'
               + '<button onclick="document.getElementById(\'admin-lec-grade-panel\').style.display=\'none\'" '
               + 'style="background:none;border:1px solid #ccc;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px;color:#666;">閉じる</button>'
               + '</div>'
               + '<div style="font-size:12px;color:#888;margin-bottom:10px;">※ 税抜き金額を入力すると税込み（×1.1）が自動計算されます。設定は年度をまたいで共通で使用されます。</div>';

      // ===== 標準料金セクション =====
      html += '<div style="margin-bottom:18px;">'
            + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:6px;">'
            + '<div style="font-weight:600;font-size:13px;color:#555;padding:4px 8px;background:#f0f0f0;border-radius:4px;">【標準料金】</div>'
            + buildLecScopeUi_("standard", sectionScopes.standard)
            + '</div>'
            + buildLecScopeCampusCheckboxes_("standard", sectionScopes.standard)
            + '<table id="admin-lec-standard-table" style="width:100%;border-collapse:collapse;font-size:13px;">'
            + '<thead><tr style="background:#f5f5f5;">'
            + '<th style="' + thStyle + 'text-align:left;width:70px;">学年</th>'
            + '<th style="' + thStyle + 'width:80px;">1コマ（分）</th>'
            + '<th style="' + thStyle + 'width:60px;">回数</th>'
            + '<th style="' + thStyle + '">内部生（税抜き）</th>'
            + '<th style="' + thStyle + 'width:70px;">税込み</th>'
            + '<th style="' + thStyle + '">外部生（税抜き）</th>'
            + '<th style="' + thStyle + 'width:70px;">税込み</th>'
            + '</tr></thead><tbody>';

      standardGrades.forEach(function(gk) {
        var existing = rows.find(function(r) { return r.type === 'standard' && r.gradeKey === gk; });
        var dur = existing ? existing.duration : (gk === 'sho' ? 5 : (['ko1','ko2','ko3'].indexOf(gk) !== -1 ? 9 : 8));
        var cnt = existing ? existing.count : 2;
        var internalVal = existing ? (existing.internal || 0) : 0;
        var externalVal = existing ? (existing.external || 0) : 0;
        var intTax = Math.floor(internalVal * 1.1);
        var extTax = Math.floor(externalVal * 1.1);
        var gradeLabel = (isSpring && gk !== 'sho' ? '新' : '') + (LEC_GRADE_LABELS_[gk] || gk);
        html += '<tr style="border-bottom:1px solid #eee;" data-row-type="standard" data-grade-key="' + gk + '">'
              + '<td style="padding:6px 8px;font-weight:500;">' + escapeHtml(gradeLabel) + '</td>'
              + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="duration-min" value="' + (dur * 10) + '" min="10" max="300" step="10" '
              + 'style="width:65px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:center;font-size:12px;"></td>'
              + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="count" value="' + cnt + '" min="0" max="20" '
              + 'style="width:52px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:center;font-size:12px;"></td>'
              + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="internal" value="' + internalVal + '" min="0" step="100" '
              + 'oninput="updateLecUnifiedTax_(this)" style="width:85px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:right;font-size:12px;"></td>'
              + '<td style="padding:6px 4px;text-align:center;color:#888;font-size:12px;" data-tax="internal">' + intTax.toLocaleString() + '</td>'
              + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="external" value="' + externalVal + '" min="0" step="100" '
              + 'oninput="updateLecUnifiedTax_(this)" style="width:85px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:right;font-size:12px;"></td>'
              + '<td style="padding:6px 4px;text-align:center;color:#888;font-size:12px;" data-tax="external">' + extTax.toLocaleString() + '</td>'
              + '</tr>';
      });
      html += '</tbody></table></div>';

      // ===== 勝瑞校料金セクション（中3のみ対象の講習は表示しない）=====
      if (!isChuu3Only) {
        html += '<div style="margin-bottom:18px;">'
              + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:6px;">'
              + '<div style="font-weight:600;font-size:13px;color:#555;padding:4px 8px;background:#e8f4fd;border-radius:4px;">【勝瑞校料金（高校生のみ）】</div>'
              + buildLecScopeUi_("shozui", sectionScopes.shozui)
              + '</div>'
              + buildLecScopeCampusCheckboxes_("shozui", sectionScopes.shozui)
              + '<table id="admin-lec-shozui-table" style="width:100%;border-collapse:collapse;font-size:13px;">'
              + '<thead><tr style="background:#f0f7fd;">'
              + '<th style="' + thStyle + 'text-align:left;width:70px;">学年</th>'
              + '<th style="' + thStyle + 'width:80px;">1コマ（分）</th>'
              + '<th style="' + thStyle + 'width:60px;">回数</th>'
              + '<th style="' + thStyle + '">内部生（税抜き）</th>'
              + '<th style="' + thStyle + 'width:70px;">税込み</th>'
              + '<th style="' + thStyle + '">外部生（税抜き）</th>'
              + '<th style="' + thStyle + 'width:70px;">税込み</th>'
              + '</tr></thead><tbody>';

        ['ko1', 'ko2', 'ko3'].forEach(function(gk) {
          var existing = rows.find(function(r) { return r.type === 'shozui' && r.gradeKey === gk; });
          var dur = existing ? existing.duration : 9;
          var cnt = existing ? existing.count : 2;
          var internalVal = existing ? (existing.internal || 0) : 0;
          var externalVal = existing ? (existing.external || 0) : 0;
          var intTax = Math.floor(internalVal * 1.1);
          var extTax = Math.floor(externalVal * 1.1);
          var shozuiLabel = (isSpring ? '新' : '') + (LEC_GRADE_LABELS_[gk] || gk);
          html += '<tr style="border-bottom:1px solid #eee;" data-row-type="shozui" data-grade-key="' + gk + '">'
                + '<td style="padding:6px 8px;font-weight:500;">' + escapeHtml(shozuiLabel) + '</td>'
                + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="duration-min" value="' + (dur * 10) + '" min="10" max="300" step="10" '
                + 'style="width:65px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:center;font-size:12px;"></td>'
                + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="count" value="' + cnt + '" min="0" max="20" '
                + 'style="width:52px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:center;font-size:12px;"></td>'
                + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="internal" value="' + internalVal + '" min="0" step="100" '
                + 'oninput="updateLecUnifiedTax_(this)" style="width:85px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:right;font-size:12px;"></td>'
                + '<td style="padding:6px 4px;text-align:center;color:#888;font-size:12px;" data-tax="internal">' + intTax.toLocaleString() + '</td>'
                + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="external" value="' + externalVal + '" min="0" step="100" '
                + 'oninput="updateLecUnifiedTax_(this)" style="width:85px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:right;font-size:12px;"></td>'
                + '<td style="padding:6px 4px;text-align:center;color:#888;font-size:12px;" data-tax="external">' + extTax.toLocaleString() + '</td>'
                + '</tr>';
        });
        html += '</tbody></table></div>';
      }

      // ===== 追加行セクション =====
      html += '<div style="margin-bottom:18px;">'
            + '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:6px;">'
            + '<div style="font-weight:600;font-size:13px;color:#555;padding:4px 8px;background:#f5f0e0;border-radius:4px;">【追加行】</div>'
            + '<div style="display:flex;align-items:center;gap:6px;">'
            + buildLecScopeUi_("custom", sectionScopes.custom)
            + '<button onclick="addLecCustomRow_()" '
            + 'style="background:none;border:1px solid #22c55e;color:#22c55e;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px;font-weight:600;">＋ 行を追加</button>'
            + '</div>'
            + '</div>'
            + buildLecScopeCampusCheckboxes_("custom", sectionScopes.custom)
            + '<table id="admin-lec-custom-table" style="width:100%;border-collapse:collapse;font-size:13px;">'
            + '<thead><tr style="background:#fdf8ee;">'
            + '<th style="' + thStyle + 'text-align:left;">ラベル</th>'
            + '<th style="' + thStyle + 'width:80px;">1コマ（分）</th>'
            + '<th style="' + thStyle + 'width:60px;">回数</th>'
            + '<th style="' + thStyle + '">内部生（税抜き）</th>'
            + '<th style="' + thStyle + 'width:70px;">税込み</th>'
            + '<th style="' + thStyle + '">外部生（税抜き）</th>'
            + '<th style="' + thStyle + 'width:70px;">税込み</th>'
            + '<th style="' + thStyle + 'width:36px;"></th>'
            + '</tr></thead><tbody id="admin-lec-custom-tbody">';

      var customRows = rows.filter(function(r) { return r.type === 'custom'; });
      customRows.forEach(function(row, idx) {
        html += buildLecCustomRowHtml_(idx, row);
      });
      html += '</tbody></table></div>';

      // ===== 保存ボタン =====
      html += '<div style="display:flex;align-items:center;gap:10px;">'
            + '<button onclick="saveLecGradeSettingsAdmin(\'' + escapeHtml(lectureId) + '\')" '
            + 'style="padding:8px 22px;background:var(--theme-color);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">保存</button>'
            + '<span id="admin-lec-grade-status" style="font-size:13px;color:#555;"></span>'
            + '</div>';

      panel.innerHTML = html;
    }

    /**
     * 追加行の1行分HTMLを生成する
     * @param {number} idx 行インデックス
     * @param {Object} row {type:'custom', label, duration, count, internal, external}
     * @return {string} HTML文字列
     */
    function buildLecCustomRowHtml_(idx, row) {
      var dur = row.duration || 8;
      var cnt = row.count || 2;
      var internalVal = row.internal || 0;
      var externalVal = row.external || 0;
      var isExtNa = !!row.externalNa;
      var intTax = Math.floor(internalVal * 1.1);
      var extTax = Math.floor(externalVal * 1.1);
      var extInputStyle = 'width:85px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:right;font-size:12px;'
        + (isExtNa ? 'opacity:0.35;' : '');
      return '<tr style="border-bottom:1px solid #eee;" data-row-type="custom" data-custom-idx="' + idx + '">'
        + '<td style="padding:6px 4px;"><input type="text" data-field="label" value="' + escapeHtml(row.label || '') + '" '
        + 'placeholder="例: 特別コース" style="width:100%;min-width:70px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;font-size:12px;box-sizing:border-box;"></td>'
        + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="duration-min" value="' + (dur * 10) + '" min="10" max="300" step="10" '
        + 'style="width:65px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:center;font-size:12px;"></td>'
        + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="count" value="' + cnt + '" min="0" max="20" '
        + 'style="width:52px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:center;font-size:12px;"></td>'
        + '<td style="padding:6px 4px;text-align:center;"><input type="number" data-field="internal" value="' + internalVal + '" min="0" step="100" '
        + 'oninput="updateLecUnifiedTax_(this)" style="width:85px;padding:4px 5px;border:1px solid #ccc;border-radius:4px;text-align:right;font-size:12px;"></td>'
        + '<td style="padding:6px 4px;text-align:center;color:#888;font-size:12px;" data-tax="internal">' + intTax.toLocaleString() + '</td>'
        + '<td style="padding:6px 4px;text-align:center;">'
        + '<label style="display:block;font-size:10px;color:#888;white-space:nowrap;">'
        + '<input type="checkbox" data-field="external-na" onchange="onLecExternalNaChange_(this)"'
        + (isExtNa ? ' checked' : '') + '> 対象外</label>'
        + '<input type="number" data-field="external" value="' + externalVal + '" min="0" step="100" '
        + 'oninput="updateLecUnifiedTax_(this)"'
        + (isExtNa ? ' disabled' : '')
        + ' style="' + extInputStyle + '"></td>'
        + '<td style="padding:6px 4px;text-align:center;color:#888;font-size:12px;" data-tax="external">' + (isExtNa ? '−' : extTax.toLocaleString()) + '</td>'
        + '<td style="padding:6px 2px;text-align:center;"><button onclick="removeLecCustomRow_(this)" '
        + 'style="background:none;border:none;color:#e57373;cursor:pointer;font-size:15px;padding:2px 4px;" title="この行を削除">✕</button></td>'
        + '</tr>';
    }

    /**
     * 外部生「対象外」チェックボックス変更時に入力欄の有効/無効を切り替える
     * @param {HTMLInputElement} cb チェックボックス要素
     */
    function onLecExternalNaChange_(cb) {
      var tr = cb.closest('tr');
      if (!tr) return;
      var extInput = tr.querySelector('[data-field="external"]');
      var taxCell = tr.querySelector('[data-tax="external"]');
      if (extInput) extInput.disabled = cb.checked;
      if (extInput) extInput.style.opacity = cb.checked ? '0.35' : '1';
      if (taxCell) taxCell.textContent = cb.checked ? '−' : Math.floor((parseInt(extInput.value) || 0) * 1.1).toLocaleString();
    }

    /**
     * 税抜き入力時に税込み表示を更新する（統合パネル用）
     * @param {HTMLInputElement} input 変更された入力要素
     */
    function updateLecUnifiedTax_(input) {
      var val = parseInt(input.value) || 0;
      var tax = Math.floor(val * 1.1);
      var field = input.dataset.field;
      var tr = input.closest('tr');
      if (tr) {
        var taxCell = tr.querySelector('[data-tax="' + field + '"]');
        if (taxCell) taxCell.textContent = tax.toLocaleString();
      }
    }

    /**
     * 追加行テーブルに空の行を追加する
     */
    function addLecCustomRow_() {
      var tbody = document.getElementById('admin-lec-custom-tbody');
      if (!tbody) return;
      var idx = tbody.querySelectorAll('tr[data-row-type="custom"]').length;
      var tmp = document.createElement('tbody');
      tmp.innerHTML = buildLecCustomRowHtml_(idx, { type: 'custom', label: '', duration: 8, count: 2, internal: 0, external: 0 });
      var newTr = tmp.querySelector('tr');
      tbody.appendChild(newTr);
    }

    /**
     * 追加行を削除する
     * @param {HTMLElement} btn 削除ボタン
     */
    function removeLecCustomRow_(btn) {
      var tr = btn.closest('tr');
      if (tr) tr.remove();
    }

    /**
     * 統合設定パネルの入力値をバックエンドに保存する
     * @param {string} lectureId 対象の講習期間ID
     */
    function saveLecGradeSettingsAdmin(lectureId) {
      var panel = document.getElementById('admin-lec-grade-panel');
      var statusEl = document.getElementById('admin-lec-grade-status');
      if (!panel || !statusEl) return;

      var typeId = panel.dataset.currentTypeId || lectureId.replace(/^\d{4}-/, '');
      var rows = [];

      // 標準料金行を収集
      var standardTbody = document.querySelector('#admin-lec-standard-table tbody');
      if (standardTbody) {
        standardTbody.querySelectorAll('tr[data-row-type="standard"]').forEach(function(tr) {
          var gk = tr.dataset.gradeKey;
          var durMinRaw = parseInt(tr.querySelector('[data-field="duration-min"]').value);
          var durMin = isNaN(durMinRaw) ? 50 : durMinRaw;
          var cntRaw = parseInt(tr.querySelector('[data-field="count"]').value);
          var cnt = isNaN(cntRaw) ? 0 : cntRaw;
          var internalRaw = parseInt(tr.querySelector('[data-field="internal"]').value);
          var internalVal = isNaN(internalRaw) ? 0 : internalRaw;
          var externalRaw = parseInt(tr.querySelector('[data-field="external"]').value);
          var externalVal = isNaN(externalRaw) ? 0 : externalRaw;
          rows.push({ type: 'standard', gradeKey: gk, duration: Math.round(durMin / 10), count: cnt, internal: internalVal, external: externalVal });
        });
      }

      // 勝瑞校料金行を収集
      var shozuiTbody = document.querySelector('#admin-lec-shozui-table tbody');
      if (shozuiTbody) {
        shozuiTbody.querySelectorAll('tr[data-row-type="shozui"]').forEach(function(tr) {
          var gk = tr.dataset.gradeKey;
          var durMin = parseInt(tr.querySelector('[data-field="duration-min"]').value) || 90;
          var cnt = parseInt(tr.querySelector('[data-field="count"]').value) || 0;
          var internalVal = parseInt(tr.querySelector('[data-field="internal"]').value) || 0;
          var externalVal = parseInt(tr.querySelector('[data-field="external"]').value) || 0;
          rows.push({ type: 'shozui', gradeKey: gk, duration: Math.round(durMin / 10), count: cnt, internal: internalVal, external: externalVal });
        });
      }

      // 追加行を収集
      var customTbody = document.getElementById('admin-lec-custom-tbody');
      if (customTbody) {
        customTbody.querySelectorAll('tr[data-row-type="custom"]').forEach(function(tr) {
          var label = (tr.querySelector('[data-field="label"]').value || '').trim();
          var durMin = parseInt(tr.querySelector('[data-field="duration-min"]').value) || 80;
          var cnt = parseInt(tr.querySelector('[data-field="count"]').value) || 0;
          var internalVal = parseInt(tr.querySelector('[data-field="internal"]').value) || 0;
          var externalVal = parseInt(tr.querySelector('[data-field="external"]').value) || 0;
          var extNaCb = tr.querySelector('[data-field="external-na"]');
          var extNa = extNaCb ? extNaCb.checked : false;
          if (label || internalVal || externalVal || extNa) {
            rows.push({ type: 'custom', label: label, duration: Math.round(durMin / 10), count: cnt, internal: internalVal, external: externalVal, externalNa: extNa });
          }
        });
      }

      statusEl.textContent = '保存中...';
      statusEl.style.color = '#555';

      // 学年別設定（gradeSettings）も同時に更新（講習管理タブのグリッド用）
      var newSettings = {};
      rows.filter(function(r) { return r.type === 'standard'; }).forEach(function(r) {
        var GRADE_CODE_MAP = { sho: ['07','08','09','10','11','12'], chu1: ['13'], chu2: ['14'], chu3: ['15'], ko1: ['16'], ko2: ['17'], ko3: ['18'] };
        var codes = GRADE_CODE_MAP[r.gradeKey] || [];
        // 春期は「新〇〇」表示名で保存されているため、表示名ベースのキーも設定
        var lp = lecturePeriods.find(function(p) { return p.id === lectureId; });
        var isSpring = lp && lp.name.indexOf('春期') !== -1;
        var labelKey = isSpring ? ('新' + (LEC_GRADE_LABELS_[r.gradeKey] || r.gradeKey)) : (LEC_GRADE_LABELS_[r.gradeKey] || r.gradeKey);
        newSettings[labelKey] = { duration: r.duration, count: r.count };
      });

      var sectionScopes = collectLecSectionScopes_();
      var lecturePricingPayload = JSON.stringify({ rows: rows, sectionScopes: sectionScopes });

      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.success) {
            statusEl.textContent = '❌ ' + (result ? result.error : '料金設定の保存失敗');
            statusEl.style.color = '#e57373';
            return;
          }
          // lecturePeriods キャッシュを更新
          var lp = lecturePeriods.find(function(p) { return p.id === lectureId; });
          if (lp) lp.gradeSettings = newSettings;
          lectureTabInitialized = false;
          // 料金キャッシュを更新
          if (lecPricingCache_) lecPricingCache_[typeId] = { rows: rows, sectionScopes: sectionScopes };
          // 配布物タブのキャッシュをリセット
          if (typeof matLecPricingData !== 'undefined') matLecPricingData = null;
          // 料金表キャッシュもリセット
          if (typeof pricingData !== 'undefined') pricingData = null;
          statusEl.textContent = '✓ 保存しました（料金表に自動反映されます）';
          statusEl.style.color = '#22c55e';
        })
        .withFailureHandler(function(err) {
          statusEl.textContent = '❌ ' + err;
          statusEl.style.color = '#e57373';
        })
        .saveLecturePricing(typeId, lecturePricingPayload);
    }

    /**
     * 税抜き金額入力時に税込み表示を自動更新する（旧パネル互換・使用されていない場合に備え残す）
     * @param {HTMLInputElement} input 変更された入力要素
     */
    function updateLecPricingTax_(input) {
      updateLecUnifiedTax_(input);
    }
</script>
