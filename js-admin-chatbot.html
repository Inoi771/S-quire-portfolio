<script>
// ===== 【チャットボット管理】ナレッジベース管理 =====

var kbEntries_ = [];
var kbAutoEntries_ = [];
var kbCurrentTab_ = 'manual';

/**
 * チャットボット管理サブタブの初期化
 */
function initChatbotAdmin() {
  var list = document.getElementById('kbEntriesList');
  if (list) list.innerHTML = '<p style="color:#888; text-align:center;">読み込み中...</p>';
  hideKbForm();

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        kbEntries_ = result.entries || [];
        renderKbEntries(kbEntries_);
      } else {
        list.innerHTML = '<p style="color:red;">読み込みに失敗しました: ' + (result ? result.error : '不明') + '</p>';
      }
    })
    .withFailureHandler(function(err) {
      console.error('getAiKnowledgeBase error:', err);
      list.innerHTML = '<p style="color:red;">エラー: ' + err + '</p>';
    })
    .getAiKnowledgeBase();
}

/**
 * ナレッジベースエントリをカテゴリ別に描画
 * @param {Array} entries エントリ配列
 */
function renderKbEntries(entries) {
  var list = document.getElementById('kbEntriesList');
  var stats = document.getElementById('kbStats');

  if (!entries || entries.length === 0) {
    list.innerHTML = '<p style="color:#888; text-align:center; padding: 20px 0;">まだ登録がありません。「＋ 追加」ボタンから情報を登録してください。</p>';
    if (stats) stats.textContent = '0件';
    return;
  }

  // 文字数カウント
  var totalChars = 0;
  entries.forEach(function(e) { totalChars += (e.content || '').length; });
  if (stats) {
    stats.textContent = entries.length + '件 / 約' + totalChars.toLocaleString() + '文字';
    if (totalChars > 5000) {
      stats.style.color = '#e74c3c';
      stats.textContent += '（多め — 回答精度に影響する可能性があります）';
    } else {
      stats.style.color = '#888';
    }
  }

  // カテゴリ別にグループ化
  var groups = {};
  entries.forEach(function(e) {
    var cat = e.category || 'その他';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(e);
  });

  var html = '';
  Object.keys(groups).forEach(function(cat) {
    html += '<div style="margin-bottom: 16px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">';
    html += '<div style="background: #f0f0f0; padding: 10px 14px; font-weight: bold; font-size: 14px;">■ ' + escapeHtmlKb_(cat) + ' （' + groups[cat].length + '件）</div>';
    groups[cat].forEach(function(entry) {
      html += '<div style="padding: 10px 14px; border-top: 1px solid #eee; display: flex; align-items: flex-start; gap: 10px;">';
      html += '<div style="flex: 1; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;">' + escapeHtmlKb_(entry.content) + '</div>';
      html += '<div style="display: flex; gap: 4px; flex-shrink: 0;">';
      html += '<button onclick="editKbEntry(\'' + entry.id + '\')" style="padding: 4px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">編集</button>';
      html += '<button onclick="deleteKbEntry(\'' + entry.id + '\')" style="padding: 4px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">削除</button>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  list.innerHTML = html;
}

/**
 * 追加フォームを表示（新規）
 */
function showKbEntryForm() {
  document.getElementById('kbEntryId').value = '';
  document.getElementById('kbCategorySelect').value = '';
  document.getElementById('kbCategoryCustom').style.display = 'none';
  document.getElementById('kbCategoryCustom').value = '';
  document.getElementById('kbContent').value = '';
  document.getElementById('kbFormArea').style.display = 'block';
  document.getElementById('kbContent').focus();
}

/**
 * 編集フォームを表示（既存エントリ）
 * @param {string} entryId エントリID
 */
function editKbEntry(entryId) {
  var entry = null;
  for (var i = 0; i < kbEntries_.length; i++) {
    if (kbEntries_[i].id === entryId) { entry = kbEntries_[i]; break; }
  }
  if (!entry) return;

  document.getElementById('kbEntryId').value = entry.id;
  document.getElementById('kbContent').value = entry.content;

  // カテゴリをセレクトから選択。選択肢にない場合はカスタム入力
  var sel = document.getElementById('kbCategorySelect');
  var found = false;
  for (var j = 0; j < sel.options.length; j++) {
    if (sel.options[j].value === entry.category) { sel.value = entry.category; found = true; break; }
  }
  if (!found) {
    sel.value = '__custom__';
    document.getElementById('kbCategoryCustom').style.display = '';
    document.getElementById('kbCategoryCustom').value = entry.category;
  } else {
    document.getElementById('kbCategoryCustom').style.display = 'none';
    document.getElementById('kbCategoryCustom').value = '';
  }

  document.getElementById('kbFormArea').style.display = 'block';
  document.getElementById('kbContent').focus();
}

/**
 * フォームを閉じる
 */
function hideKbForm() {
  document.getElementById('kbFormArea').style.display = 'none';
}

/**
 * カテゴリセレクト変更時ハンドラー
 */
function onKbCategorySelectChange() {
  var sel = document.getElementById('kbCategorySelect');
  var custom = document.getElementById('kbCategoryCustom');
  if (sel.value === '__custom__') {
    custom.style.display = '';
    custom.focus();
  } else {
    custom.style.display = 'none';
    custom.value = '';
  }
}

/**
 * エントリを保存（追加/更新）
 */
function saveKbEntry() {
  var sel = document.getElementById('kbCategorySelect');
  var category = sel.value === '__custom__'
    ? document.getElementById('kbCategoryCustom').value.trim()
    : sel.value;
  var content = document.getElementById('kbContent').value.trim();
  var entryId = document.getElementById('kbEntryId').value;

  if (!category) { appAlert('カテゴリを選択してください。'); return; }
  if (!content) { appAlert('内容を入力してください。'); return; }

  var entry = { category: category, content: content };
  if (entryId) entry.id = entryId;

  var saveBtn = document.querySelector('#kbFormArea button');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中...'; }

  google.script.run
    .withSuccessHandler(function(result) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
      if (result && result.success) {
        hideKbForm();
        showToast(result.message, 'success');
        initChatbotAdmin();
      } else {
        appAlert('保存に失敗しました: ' + (result ? result.error : '不明'));
      }
    })
    .withFailureHandler(function(err) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
      console.error('saveAiKnowledgeEntry error:', err);
      appAlert('エラーが発生しました: ' + err);
    })
    .saveAiKnowledgeEntry(JSON.stringify(entry));
}

/**
 * エントリを削除（確認ダイアログ付き）
 * @param {string} entryId エントリID
 */
function deleteKbEntry(entryId) {
  appConfirm('この項目を削除しますか？').then(function(ok) {
    if (!ok) return;

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          showToast(result.message, 'success');
          initChatbotAdmin();
        } else {
          appAlert('削除に失敗しました: ' + (result ? result.error : '不明'));
        }
      })
      .withFailureHandler(function(err) {
        console.error('deleteAiKnowledgeEntry error:', err);
        appAlert('エラーが発生しました: ' + err);
      })
      .deleteAiKnowledgeEntry(entryId);
  });
}

/**
 * HTML特殊文字をエスケープする
 * @param {string} str 文字列
 * @return {string} エスケープ済み文字列
 */
function escapeHtmlKb_(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== 【自動学習管理】 =====

/**
 * 手動登録 / 自動学習 タブ切り替え
 * @param {string} tab 'manual' or 'auto'
 */
function switchKbTab(tab) {
  kbCurrentTab_ = tab;
  var manualSection = document.getElementById('kbSectionManual');
  var autoSection = document.getElementById('kbSectionAuto');
  var feedbackSection = document.getElementById('kbSectionFeedback');
  var manualBtn = document.getElementById('kbTabManual');
  var autoBtn = document.getElementById('kbTabAuto');
  var feedbackBtn = document.getElementById('kbTabFeedback');

  // 全セクション非表示・全ボタン非アクティブ
  manualSection.style.display = 'none';
  autoSection.style.display = 'none';
  feedbackSection.style.display = 'none';
  [manualBtn, autoBtn, feedbackBtn].forEach(function(btn) {
    if (btn) { btn.style.borderBottomColor = 'transparent'; btn.style.color = '#888'; }
  });

  if (tab === 'manual') {
    manualSection.style.display = '';
    manualBtn.style.borderBottomColor = 'var(--theme-color, #43e97b)';
    manualBtn.style.color = 'var(--theme-color, #43e97b)';
  } else if (tab === 'auto') {
    autoSection.style.display = '';
    autoBtn.style.borderBottomColor = 'var(--theme-color, #43e97b)';
    autoBtn.style.color = 'var(--theme-color, #43e97b)';
    initAutoLearnedAdmin();
  } else if (tab === 'feedback') {
    feedbackSection.style.display = '';
    feedbackBtn.style.borderBottomColor = 'var(--theme-color, #43e97b)';
    feedbackBtn.style.color = 'var(--theme-color, #43e97b)';
    initFeedbackAdmin();
  }
}

/**
 * 自動学習エントリの読み込み
 */
function initAutoLearnedAdmin() {
  var list = document.getElementById('kbAutoEntriesList');
  if (list) list.innerHTML = '<p style="color:#888; text-align:center;">読み込み中...</p>';
  hideAutoLearnedForm();

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        kbAutoEntries_ = result.entries || [];
        renderAutoLearnedEntries(kbAutoEntries_);
      } else {
        list.innerHTML = '<p style="color:red;">読み込みに失敗しました: ' + (result ? result.error : '不明') + '</p>';
      }
    })
    .withFailureHandler(function(err) {
      console.error('getAutoLearnedKnowledge error:', err);
      list.innerHTML = '<p style="color:red;">エラー: ' + err + '</p>';
    })
    .getAutoLearnedKnowledge();
}

/**
 * 自動学習エントリをカテゴリ別に描画
 * @param {Array} entries エントリ配列
 */
function renderAutoLearnedEntries(entries) {
  var list = document.getElementById('kbAutoEntriesList');
  var stats = document.getElementById('kbAutoStats');
  var warning = document.getElementById('kbAutoLimitWarning');
  var countBadge = document.getElementById('kbAutoCount');

  // バッジ更新
  if (countBadge) {
    if (entries.length > 0) {
      countBadge.textContent = entries.length + '件';
      countBadge.style.display = '';
    } else {
      countBadge.style.display = 'none';
    }
  }

  // 上限警告
  if (warning) {
    warning.style.display = entries.length >= 30 ? '' : 'none';
  }

  if (!entries || entries.length === 0) {
    list.innerHTML = '<p style="color:#888; text-align:center; padding: 20px 0;">AIはまだ何も学習していません。会話で塾のルールや情報を教えると、自動的に蓄積されます。</p>';
    if (stats) stats.textContent = '0件';
    return;
  }

  // 文字数カウント
  var totalChars = 0;
  entries.forEach(function(e) { totalChars += (e.content || '').length; });
  if (stats) {
    stats.textContent = entries.length + '件 / 約' + totalChars.toLocaleString() + '文字';
    if (entries.length >= 25) {
      stats.style.color = '#e74c3c';
      stats.textContent += '（上限に近づいています）';
    } else {
      stats.style.color = '#888';
    }
  }

  // カテゴリ別にグループ化
  var groups = {};
  entries.forEach(function(e) {
    var cat = e.category || 'その他';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(e);
  });

  var html = '';
  Object.keys(groups).forEach(function(cat) {
    html += '<div style="margin-bottom: 16px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">';
    html += '<div style="background: #e8f4fd; padding: 10px 14px; font-weight: bold; font-size: 14px;">🧠 ' + escapeHtmlKb_(cat) + ' （' + groups[cat].length + '件）</div>';
    groups[cat].forEach(function(entry) {
      var docId = entry._id || entry.id || '';
      var learnedDate = entry.learnedAt ? new Date(entry.learnedAt).toLocaleDateString('ja-JP') : '';
      html += '<div style="padding: 10px 14px; border-top: 1px solid #eee;">';
      html += '<div style="display: flex; align-items: flex-start; gap: 10px;">';
      html += '<div style="flex: 1;">';
      html += '<div style="font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;">' + escapeHtmlKb_(entry.content) + '</div>';
      // 学習理由と日時
      var meta = [];
      if (entry.reason) meta.push('理由: ' + escapeHtmlKb_(entry.reason));
      if (learnedDate) meta.push(learnedDate);
      if (meta.length > 0) {
        html += '<div style="font-size: 11px; color: #999; margin-top: 4px;">' + meta.join(' | ') + '</div>';
      }
      html += '</div>';
      html += '<div style="display: flex; gap: 4px; flex-shrink: 0;">';
      html += '<button onclick="editAutoLearned(\'' + docId + '\')" style="padding: 4px 10px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">編集</button>';
      html += '<button onclick="deleteAutoLearned(\'' + docId + '\')" style="padding: 4px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">削除</button>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  list.innerHTML = html;
}

/**
 * 自動学習エントリの編集フォームを表示
 * @param {string} docId ドキュメントID
 */
function editAutoLearned(docId) {
  var entry = null;
  for (var i = 0; i < kbAutoEntries_.length; i++) {
    var eid = kbAutoEntries_[i]._id || kbAutoEntries_[i].id || '';
    if (eid === docId) { entry = kbAutoEntries_[i]; break; }
  }
  if (!entry) return;

  document.getElementById('kbAutoEntryId').value = docId;
  document.getElementById('kbAutoContent').value = entry.content || '';

  // カテゴリをセレクトから選択
  var sel = document.getElementById('kbAutoCategorySelect');
  var found = false;
  for (var j = 0; j < sel.options.length; j++) {
    if (sel.options[j].value === entry.category) { sel.value = entry.category; found = true; break; }
  }
  if (!found) {
    sel.value = '__custom__';
    document.getElementById('kbAutoCategoryCustom').style.display = '';
    document.getElementById('kbAutoCategoryCustom').value = entry.category || '';
  } else {
    document.getElementById('kbAutoCategoryCustom').style.display = 'none';
    document.getElementById('kbAutoCategoryCustom').value = '';
  }

  document.getElementById('kbAutoFormArea').style.display = 'block';
  document.getElementById('kbAutoContent').focus();
}

/**
 * 自動学習の編集フォームを閉じる
 */
function hideAutoLearnedForm() {
  var form = document.getElementById('kbAutoFormArea');
  if (form) form.style.display = 'none';
}

/**
 * 自動学習カテゴリ選択変更ハンドラー
 */
function onKbAutoCategoryChange() {
  var sel = document.getElementById('kbAutoCategorySelect');
  var custom = document.getElementById('kbAutoCategoryCustom');
  if (sel.value === '__custom__') {
    custom.style.display = '';
    custom.focus();
  } else {
    custom.style.display = 'none';
    custom.value = '';
  }
}

/**
 * 自動学習エントリの編集を保存
 */
function saveAutoLearned() {
  var sel = document.getElementById('kbAutoCategorySelect');
  var category = sel.value === '__custom__'
    ? document.getElementById('kbAutoCategoryCustom').value.trim()
    : sel.value;
  var content = document.getElementById('kbAutoContent').value.trim();
  var docId = document.getElementById('kbAutoEntryId').value;

  if (!category) { appAlert('カテゴリを選択してください。'); return; }
  if (!content) { appAlert('内容を入力してください。'); return; }
  if (!docId) { appAlert('エントリIDが見つかりません。'); return; }

  var entry = { category: category, content: content };

  var saveBtn = document.querySelector('#kbAutoFormArea button');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中...'; }

  google.script.run
    .withSuccessHandler(function(result) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
      if (result && result.success) {
        hideAutoLearnedForm();
        showToast(result.message, 'success');
        initAutoLearnedAdmin();
      } else {
        appAlert('保存に失敗しました: ' + (result ? result.error : '不明'));
      }
    })
    .withFailureHandler(function(err) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存'; }
      console.error('editAutoLearnedKnowledge error:', err);
      appAlert('エラーが発生しました: ' + err);
    })
    .editAutoLearnedKnowledge(docId, JSON.stringify(entry));
}

/**
 * 自動学習エントリを削除（確認ダイアログ付き）
 * @param {string} docId ドキュメントID
 */
function deleteAutoLearned(docId) {
  appConfirm('この学習データを削除しますか？\n削除するとAIの回答に反映されなくなります。').then(function(ok) {
    if (!ok) return;

    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          showToast(result.message, 'success');
          initAutoLearnedAdmin();
        } else {
          appAlert('削除に失敗しました: ' + (result ? result.error : '不明'));
        }
      })
      .withFailureHandler(function(err) {
        console.error('deleteAutoLearnedKnowledge error:', err);
        appAlert('エラーが発生しました: ' + err);
      })
      .deleteAutoLearnedKnowledge(docId);
  });
}

// ===== 【フィードバック管理】 =====

var kbFeedbackEntries_ = [];

/**
 * フィードバック一覧の読み込み
 */
function initFeedbackAdmin() {
  var list = document.getElementById('kbFeedbackEntriesList');
  if (list) list.innerHTML = '<p style="color:#888; text-align:center;">読み込み中...</p>';

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        kbFeedbackEntries_ = result.entries || [];
        renderFeedbackEntries(kbFeedbackEntries_);
      } else {
        list.innerHTML = '<p style="color:red;">読み込みに失敗しました: ' + (result ? result.error : '不明') + '</p>';
      }
    })
    .withFailureHandler(function(err) {
      console.error('getAiFeedback error:', err);
      list.innerHTML = '<p style="color:red;">エラー: ' + err + '</p>';
    })
    .getAiFeedback();
}

/**
 * フィードバック一覧を描画
 * @param {Array} entries エントリ配列
 */
function renderFeedbackEntries(entries) {
  var list = document.getElementById('kbFeedbackEntriesList');
  var stats = document.getElementById('kbFeedbackStats');
  var countBadge = document.getElementById('kbFeedbackCount');

  var unresolved = entries.filter(function(e) { return !e.resolved; });

  if (countBadge) {
    if (unresolved.length > 0) {
      countBadge.textContent = unresolved.length + '件';
      countBadge.style.display = '';
    } else {
      countBadge.style.display = 'none';
    }
  }

  if (!entries || entries.length === 0) {
    list.innerHTML = '<p style="color:#888; text-align:center; padding: 20px 0;">まだフィードバックはありません。</p>';
    if (stats) stats.textContent = '0件';
    return;
  }

  if (stats) {
    stats.textContent = '全' + entries.length + '件（未対応: ' + unresolved.length + '件）';
    stats.style.color = unresolved.length > 0 ? '#e74c3c' : '#888';
  }

  var typeLabels = { missing_info: '情報不足', missing_feature: '機能リクエスト' };
  var typeColors = { missing_info: '#f39c12', missing_feature: '#667eea' };

  var html = '';
  entries.forEach(function(entry) {
    var docId = entry._id || entry.id || '';
    var date = entry.createdAt ? new Date(entry.createdAt).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    var typeLabel = typeLabels[entry.type] || entry.type;
    var typeColor = typeColors[entry.type] || '#888';
    var resolvedStyle = entry.resolved ? 'opacity: 0.5;' : '';

    html += '<div style="padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; ' + resolvedStyle + '">';
    html += '<div style="display: flex; align-items: flex-start; gap: 10px;">';
    html += '<div style="flex: 1;">';
    html += '<div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;">';
    html += '<span style="font-size: 11px; font-weight: bold; background: ' + typeColor + '; color: white; padding: 2px 8px; border-radius: 10px;">' + escapeHtmlKb_(typeLabel) + '</span>';
    if (entry.resolved) html += '<span style="font-size: 11px; color: #27ae60; font-weight: bold;">✓ 解決済み</span>';
    if (date) html += '<span style="font-size: 11px; color: #aaa;">' + date + '</span>';
    html += '</div>';
    html += '<div style="font-size: 14px; font-weight: bold; margin-bottom: 4px;">' + escapeHtmlKb_(entry.summary) + '</div>';
    if (entry.userQuery) {
      html += '<div style="font-size: 12px; color: #666; background: #f8f8f8; padding: 4px 8px; border-radius: 4px; margin-top: 4px;">💬 ' + escapeHtmlKb_(entry.userQuery) + '</div>';
    }
    html += '</div>';
    html += '<div style="display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;">';
    if (!entry.resolved) {
      html += '<button onclick="resolveFeedback(\'' + docId + '\')" style="padding: 4px 10px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">解決済み</button>';
    }
    html += '<button onclick="deleteFeedback(\'' + docId + '\')" style="padding: 4px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">削除</button>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
  });

  list.innerHTML = html;
}

/**
 * フィードバックを解決済みにする
 * @param {string} docId ドキュメントID
 */
function resolveFeedback(docId) {
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        showToast(result.message, 'success');
        initFeedbackAdmin();
      } else {
        appAlert('更新に失敗しました: ' + (result ? result.error : '不明'));
      }
    })
    .withFailureHandler(function(err) {
      console.error('resolveAiFeedback error:', err);
      appAlert('エラーが発生しました: ' + err);
    })
    .resolveAiFeedback(docId);
}

/**
 * フィードバックを削除する（確認ダイアログ付き）
 * @param {string} docId ドキュメントID
 */
function deleteFeedback(docId) {
  appConfirm('このフィードバックを削除しますか？').then(function(ok) {
    if (!ok) return;
    google.script.run
      .withSuccessHandler(function(result) {
        if (result && result.success) {
          showToast(result.message, 'success');
          initFeedbackAdmin();
        } else {
          appAlert('削除に失敗しました: ' + (result ? result.error : '不明'));
        }
      })
      .withFailureHandler(function(err) {
        console.error('deleteAiFeedback error:', err);
        appAlert('エラーが発生しました: ' + err);
      })
      .deleteAiFeedback(docId);
  });
}
</script>
