name: GASへ自動デプロイ

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '*.js'
      - '*.html'
      - 'appsscript.json'
      - '.claspignore'
      - '.github/workflows/deploy-to-gas.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    # [skip gas-deploy] コミットはGASデプロイをスキップ（Firebase Hostingのみ更新）
    if: ${{ !contains(github.event.head_commit.message, '[skip gas-deploy]') }}
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: テストを実行
        run: |
          npm install
          npm test

      - name: .claspignore 漏れチェック（GAS 非互換ファイル検出）
        run: |
          if [ ! -f .claspignore ]; then
            echo "::error::.claspignore が存在しません。リポジトリ直下に .claspignore を作成してください"
            exit 1
          fi
          FAIL=0
          MISSING=""
          for f in *.js; do
            [ -e "$f" ] || continue
            ignored=0
            while IFS= read -r pat; do
              [ -z "$pat" ] && continue
              case "$pat" in \#*) continue;; esac
              case "$f" in $pat) ignored=1; break;; esac
            done < .claspignore
            [ "$ignored" = "1" ] && continue
            if grep -qE '^(module\.exports|(const|let|var)[[:space:]]+[^=]*=[[:space:]]*require\()' "$f"; then
              echo "::error file=$f::トップレベルの module.exports / require() を含みますが .claspignore に登録されていません（GAS で ReferenceError: module is not defined になり、全機能が停止します）"
              MISSING="$MISSING $f"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo ""
            echo "対応手順: 以下のファイル名を .claspignore に追加してください"
            for f in $MISSING; do
              echo "  echo '$f' >> .claspignore"
            done
            exit 1
          fi
          echo "✓ .claspignore チェック OK（GAS 非互換ファイルはすべて除外されています）"

  deploy:
    needs: test
    if: ${{ !contains(github.event.head_commit.message, '[skip gas-deploy]') }}
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clasp をインストール
        run: npm install -g @google/clasp

      - name: 認証情報を作成
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: GASへプッシュ（通常設定）
        run: clasp push --force

      - name: ANYONE_ANONYMOUSデプロイを更新（Firebase API・LINE Webhook用）
        run: |
          ANON_ID="AKfycbzrzZkyS42v_-kNNrmR4NumrVxfjdwNeJ0uCk3k5mha88Dm7ZarVzjVAkDY8WIqpKybWw"
          echo "=== ANYONE_ANONYMOUSデプロイを更新: $ANON_ID ==="
          # appsscript.json を一時的に ANYONE_ANONYMOUS に変更してpush & deploy
          jq '.webapp.access = "ANYONE_ANONYMOUS" | .webapp.executeAs = "USER_DEPLOYING"' appsscript.json > appsscript.json.tmp
          mv appsscript.json.tmp appsscript.json
          clasp push --force
          clasp deploy --deploymentId "$ANON_ID" -d "Auto deploy ANON $(date '+%Y-%m-%d %H:%M')"
          echo "✓ ANYONE_ANONYMOUSデプロイ更新完了"
          # appsscript.json を元に戻す
          git checkout appsscript.json
          clasp push --force
          echo "ANON_DEPLOY_ID=$ANON_ID" >> $GITHUB_ENV

      - name: APIエンドポイント疎通確認
        run: |
          DEPLOY_URL="https://script.google.com/macros/s/${{ env.ANON_DEPLOY_ID }}/exec"
          echo "=== サーバーサイドから疎通確認 ==="
          RESPONSE=$(curl -s -m 15 -L \
            -X POST \
            -H "Content-Type: text/plain;charset=utf-8" \
            -d '{"type":"gasApi","function":"testApiEndpoint","args":[],"idToken":""}' \
            "$DEPLOY_URL" 2>&1 || echo "CURL_ERROR")
          echo "レスポンス (先頭300文字): ${RESPONSE:0:300}"
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✓ APIエンドポイントは正常（ANYONE_ANONYMOUS確認済み）"
          else
            echo "⚠ 疎通確認失敗（デプロイ反映に数分かかる場合があります）"
          fi

      - name: 古いデプロイを自動削除（上限対策）
        run: |
          KEEP_ID_1="AKfycbzrzZkyS42v_-kNNrmR4NumrVxfjdwNeJ0uCk3k5mha88Dm7ZarVzjVAkDY8WIqpKybWw"
          echo "保持するID: $KEEP_ID_1"
          echo "=== 削除前のデプロイ一覧 ==="
          clasp deployments
          echo "=== 固定ID以外のデプロイを削除 ==="
          clasp deployments 2>&1 | grep -oE 'AKfyc[A-Za-z0-9_-]+' | while IFS= read -r id; do
            if [ "$id" = "$KEEP_ID_1" ]; then
              echo "保持（固定デプロイ）: $id"
            else
              echo "削除対象: $id"
              clasp undeploy "$id" && echo "✓ 削除完了: $id" || echo "⚠ 削除スキップ: $id"
            fi
          done
          echo "=== 削除後のデプロイ一覧 ==="
          clasp deployments
