name: GASへ自動デプロイ

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '*.js'
      - '*.html'
      - 'appsscript.json'
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: テストを実行
        run: |
          npm install
          npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clasp をインストール
        run: npm install -g @google/clasp

      - name: 認証情報を作成
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: GASへプッシュ
        run: clasp push --force

      - name: デプロイバージョンを更新（/exec URLに反映）
        run: |
          DEPLOY_ID="AKfycbwGW781DHxX_AR5CBBVF8S4o14KScDsIi9FBQoGHdodRxcGStDrC6ddVK3-UdYs5HxGQQ"
          echo "デプロイ($DEPLOY_ID)を更新します"
          clasp deploy --deploymentId "$DEPLOY_ID" -d "Auto deploy $(date '+%Y-%m-%d %H:%M')"
          # AKfycbwGW781... が Firebase Hosting API + LINE Webhook 兼用デプロイ（上記で更新済み）

      - name: 古いデプロイを自動削除（上限対策）
        run: |
          # 保持するデプロイID（2つ）
          # AKfycbwGW781... = アプリ + Firebase Hosting API + LINE Webhook 兼用
          # AKfycbyqwdCC... = 旧メインアプリURL（GAS版アクセス用）
          KEEP_ID_1="AKfycbwGW781DHxX_AR5CBBVF8S4o14KScDsIi9FBQoGHdodRxcGStDrC6ddVK3-UdYs5HxGQQ"
          KEEP_ID_2="AKfycbyqwdCCeypXH5A-JjK6zphkAYRs4m5CIUySzKcn7dlKqZXF-1jKKT7U4YXmJl1xgquCqQ"
          echo "=== 削除前のデプロイ一覧 ==="
          clasp deployments
          echo "=== 固定ID以外のデプロイを削除 ==="
          clasp deployments 2>&1 | grep -oE 'AKfyc[A-Za-z0-9_-]+' | while IFS= read -r id; do
            if [ "$id" = "$KEEP_ID_1" ] || [ "$id" = "$KEEP_ID_2" ]; then
              echo "保持（固定デプロイ）: $id"
            else
              echo "削除対象: $id"
              clasp undeploy "$id" && echo "✓ 削除完了: $id" || echo "⚠ 削除スキップ: $id"
            fi
          done
          echo "=== 削除後のデプロイ一覧 ==="
          clasp deployments

