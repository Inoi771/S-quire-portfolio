name: GASへデプロイ（テスト環境）

# ======================================================================
# テスト環境専用ワークフロー
# - scriptId は .clasp.test.json（テスト GAS プロジェクト）を使用
# - 認証は CLASPRC_JSON_TEST シークレットを使用
# - ANYONE_ANONYMOUS デプロイ更新は行わない（テスト環境不要）
# - 古いデプロイの自動削除は行わない
# - 手動実行（workflow_dispatch）のみ起動
# ======================================================================

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '実行理由（ログ用）'
        required: false
        default: '手動デプロイ'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: テストを実行
        run: |
          npm install
          npm test

      - name: .claspignore 漏れチェック（GAS 非互換ファイル検出）
        run: |
          if [ ! -f .claspignore ]; then
            echo "::error::.claspignore が存在しません"
            exit 1
          fi
          FAIL=0
          for f in *.js; do
            [ -e "$f" ] || continue
            ignored=0
            while IFS= read -r pat; do
              [ -z "$pat" ] && continue
              case "$pat" in \#*) continue;; esac
              case "$f" in $pat) ignored=1; break;; esac
            done < .claspignore
            [ "$ignored" = "1" ] && continue
            if grep -qE '^(module\.exports|(const|let|var)[[:space:]]+[^=]*=[[:space:]]*require\()' "$f"; then
              echo "::error file=$f::GAS 非互換ファイルが .claspignore 未登録"
              FAIL=1
            fi
          done
          [ "$FAIL" = "1" ] && exit 1
          echo "✓ .claspignore チェック OK"

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: "clasp をインストール（バージョン固定: 2.4.2）"
        run: npm install -g @google/clasp@2.4.2

      - name: 認証情報を作成（テスト環境用シークレット）
        env:
          CLASPRC_JSON_TEST: ${{ secrets.CLASPRC_JSON_TEST }}
        run: |
          if [ -z "$CLASPRC_JSON_TEST" ]; then
            echo "::error::CLASPRC_JSON_TEST シークレットが未設定です。GitHubリポジトリの Settings > Secrets and variables > Actions で登録してください"
            exit 1
          fi
          # シェル展開を避けるため printf + env 変数経由で書き込む
          printf '%s' "$CLASPRC_JSON_TEST" > ~/.clasprc.json
          BYTES=$(wc -c < ~/.clasprc.json)
          echo "✓ ~/.clasprc.json を書き込みました（$BYTES バイト）"
          if [ "$BYTES" -lt 100 ]; then
            echo "::error::認証情報のサイズが小さすぎます。シークレットの内容を確認してください"
            exit 1
          fi
          # JSON 妥当性チェック
          if ! node -e "JSON.parse(require('fs').readFileSync(require('os').homedir()+'/.clasprc.json','utf8'))" 2>/dev/null; then
            echo "::error::~/.clasprc.json が不正な JSON です。clasp login で生成した ~/.clasprc.json の中身そのものを CLASPRC_JSON_TEST に貼り付けてください"
            exit 1
          fi
          echo "✓ JSON 妥当性チェック OK"

      - name: テスト用 .clasp.json をセット
        run: |
          echo "=== テスト環境の scriptId を使用 ==="
          cp .clasp.test.json .clasp.json
          cat .clasp.json

      - name: GASへプッシュ（テスト環境）
        run: |
          echo "=== 実行理由: ${{ github.event.inputs.reason }} ==="
          clasp push --force
          echo "✓ テスト GAS へのプッシュ完了"

      - name: デプロイ一覧を表示
        run: |
          echo "=== 現在のデプロイ一覧 ==="
          clasp deployments
