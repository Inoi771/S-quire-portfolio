name: Workers シンタックスチェック

# workers/src/ 配下の .js ファイルが変更された push / pull_request のみで起動する。
# deploy-workers.yml（デプロイ）・merge-to-main.yml（自動マージ）とは独立した軽量 CI。
on:
  push:
    paths:
      - 'workers/src/**/*.js'
  pull_request:
    paths:
      - 'workers/src/**/*.js'

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: workers/src 配下の .js を node --check で構文確認
        shell: bash
        run: |
          set -o pipefail
          failed=0
          count=0
          # Node.js の `node --check file.js` は .js 拡張子を CJS 扱いするため、
          # ESM の import 文を含む workers/src/**/*.js では構文エラーを
          # 素通ししてしまう。対策として stdin + --input-type=module で
          # 明示的に ESM として構文チェックする（エラー出力では [stdin] を
          # 実ファイル名に差し替える）。
          while IFS= read -r -d '' f; do
            count=$((count + 1))
            echo "::group::node --check $f"
            if output=$(node --input-type=module --check < "$f" 2>&1); then
              echo "$output"
            else
              # [stdin] を実ファイル名に置換して行番号と一緒にログ表示
              echo "$output" | sed "s|\[stdin\]|$f|g"
              # GitHub Actions のサマリに該当ファイル+行番号を表示
              line=$(echo "$output" | grep -oE '^\[stdin\]:[0-9]+' | head -n1 | cut -d: -f2)
              if [ -n "$line" ]; then
                echo "::error file=${f},line=${line}::構文エラー: $f:$line"
              else
                echo "::error file=${f}::構文エラー: $f"
              fi
              failed=1
            fi
            echo "::endgroup::"
          done < <(find workers/src -type f -name '*.js' -print0)

          echo "---"
          echo "チェック対象: ${count} ファイル"
          if [ "$failed" -ne 0 ]; then
            echo "::error::workers/src 配下に構文エラーがあります"
            exit 1
          fi
          echo "全ファイル OK"
