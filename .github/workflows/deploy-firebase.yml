# S-quire Firebase Hosting 自動デプロイ
name: Firebaseへ自動デプロイ

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '*.html'
      - 'firestore.rules'
      - 'firebase.json'
      - 'scripts/build.js'
      - 'package.json'
      - '.github/workflows/deploy-firebase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install

      - name: Firebase CLI をインストール
        run: npm install -g firebase-tools

      - name: サービスアカウント認証情報を作成
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json

      - name: ビルド（HTMLファイルを public/ にインライン展開）
        run: npm run build

      - name: firestore.rules の変更を確認
        id: check-rules
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q 'firestore.rules'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Firebase Hosting にデプロイ
        run: firebase deploy --only hosting --project fir-quire
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json

      - name: Firestore Rules にデプロイ（firestore.rules 変更時のみ）
        if: steps.check-rules.outputs.changed == 'true'
        run: firebase deploy --only firestore:rules --project fir-quire
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json

      - name: 認証情報を削除
        if: always()
        run: rm -f /tmp/firebase-sa.json
