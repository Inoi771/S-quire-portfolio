name: Deploy to Google Apps Script

on:
  push:
    branches:
      - master
      - claude/*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to GAS
        run: clasp push --force

      - name: Deploy
        run: clasp deploy --deploymentId ${{ secrets.GAS_DEPLOYMENT_ID }} -d "Auto deploy from GitHub Actions"

      - name: Merge claude branch into master
        if: startsWith(github.ref, 'refs/heads/claude/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -B master origin/master
          git merge -X theirs --no-ff --allow-unrelated-histories origin/${{ github.ref_name }} -m "自動マージ: ${{ github.ref_name }} → master"
          git push --force-with-lease origin master
