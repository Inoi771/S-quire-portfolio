name: Deploy to Google Apps Script

on:
  push:
    branches:
      - master
      - claude/*
    paths:
      - '*.js'
      - '*.html'
      - 'appsscript.json'
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Build editor.html from source files
        run: cat editor-header.html editor-js1.html editor-js2.html editor-js3.html editor-js4.html editor-js5.html editor-js6.html editor-footer.html > editor.html

      - name: Push to GAS
        run: clasp push --force

      - name: Deploy
        run: clasp deploy --deploymentId ${{ secrets.GAS_DEPLOYMENT_ID }} -d "Auto deploy from GitHub Actions"

