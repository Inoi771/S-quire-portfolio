<script>
// ===== Firebase 初期化 =====
(function() {
  var firebaseConfig = {
    apiKey: "AIzaSyDGxhgsCbpgJuXm6PzY1WcR8a4QOtfJBiU",
    authDomain: "fir-quire.firebaseapp.com",
    projectId: "fir-quire",
    storageBucket: "fir-quire.firebasestorage.app",
    messagingSenderId: "132033293964",
    appId: "1:132033293964:web:13ec63fbda39e82e5995a9"
  };

  firebase.initializeApp(firebaseConfig);

  // グローバルに公開（他のスクリプトから使用）
  window.fbAuth = firebase.auth();
  window.fbDb  = firebase.firestore();

  // オフラインキャッシュを有効化（2回目以降の読み込みを高速化）
  window.fbDb.enablePersistence({ synchronizeTabs: true })
    .catch(function() {
      // 複数タブ同時起動時など有効化できない場合があるが問題なし
    });

  // Firestore 権限エラー（permission-denied）時にIDトークンを強制リフレッシュして
  // 1回だけ自動再試行する。Query.get() と DocumentReference.get() の両方をラップ。
  function wrapGetWithRetry_(proto) {
    var originalGet = proto.get;
    proto.get = function() {
      var self = this;
      var args = arguments;
      return originalGet.apply(self, args).catch(function(err) {
        if (err.code === 'permission-denied' && window.fbCurrentUser) {
          return window.fbCurrentUser.getIdToken(true).then(function() {
            return originalGet.apply(self, args);
          });
        }
        throw err;
      });
    };
  }
  // Firebase v8 SDK の内部プロトタイプを取得してラップ
  try {
    var tempQuery = window.fbDb.collection('_').where('_x', '==', 1);
    wrapGetWithRetry_(Object.getPrototypeOf(tempQuery));
    wrapGetWithRetry_(Object.getPrototypeOf(window.fbDb.collection('_').doc('_')));
  } catch (e) {
    // ラップに失敗しても通常動作には影響なし
  }
})();
</script>
