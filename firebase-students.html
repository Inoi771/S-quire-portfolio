<script>
// ===== Firebase 生徒データ クライアントサイド関数 =====
// firebase-init.html で初期化された fbDb を使用

// クライアントサイドキャッシュ（ページ読み込みごとにリセット）
var _fbMasterDataCache = {}; // { year: Promise<Array> } — 同一年度の重複読み取りを防ぐ

/**
 * localStorage キャッシュ付きデータ取得ヘルパー
 * キャッシュがあれば即座に返し、裏でAPIから最新データを取得してキャッシュを更新する
 * @param {string} cacheKey localStorage のキー
 * @param {Function} fetchFn データを取得する関数（Promiseを返す）
 * @param {Function} [onRefresh] バックグラウンド取得完了時に呼ぶUI更新コールバック（省略可）
 * @return {Promise<Object>} 結果オブジェクト
 */
function fbCachedFetch_(cacheKey, fetchFn, onRefresh) {
  var cached = null;
  try {
    var raw = localStorage.getItem(cacheKey);
    if (raw) cached = JSON.parse(raw);
  } catch (e) { /* 破損時は無視 */ }

  var fetchPromise = fetchFn().then(function(result) {
    if (result && result.success) {
      try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch (e) {
        // 容量超過時は古いキャッシュを整理
        fbCleanOldCache_();
        try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch (e2) {}
      }
    }
    return result;
  });

  if (cached && cached.success) {
    // キャッシュを即座に返し、裏で更新
    if (onRefresh) {
      fetchPromise.then(function(result) {
        if (result && result.success) onRefresh(result);
      }).catch(function() {});
    } else {
      fetchPromise.catch(function() {});
    }
    return Promise.resolve(cached);
  }
  return fetchPromise;
}

/**
 * localStorage の成績キャッシュが容量超過時に古いものを削除
 */
function fbCleanOldCache_() {
  var keys = [];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k && k.indexOf('s-quire-g-') === 0) keys.push(k);
  }
  // 半分を削除（古い順＝先に登録された順）
  var removeCount = Math.ceil(keys.length / 2);
  for (var j = 0; j < removeCount; j++) {
    localStorage.removeItem(keys[j]);
  }
}

/**
 * 内部ヘルパー: Firestoreドキュメントから年度に合わせた生徒データを計算して返す
 * @param {Object} doc Firestoreドキュメントデータ
 * @param {string} docId ドキュメントID（studentId）
 * @param {number} year 対象年度
 * @return {Object|null} 生徒データ or null（年度範囲外）
 */
function fbComputeStudentForYear_(doc, docId, year) {
  var studentId = String(doc.studentId || docId || '').trim();
  if (!studentId || studentId.length < 10) return null;

  var registrationYear  = parseInt(studentId.substring(2, 6), 10);
  var registrationGrade = parseInt(studentId.substring(6, 8), 10);
  if (isNaN(registrationYear) || isNaN(registrationGrade)) return null;

  var currentGrade = registrationGrade + (parseInt(year, 10) - registrationYear);
  if (currentGrade < 7 || currentGrade > 18) return null;

  var sei         = String(doc.sei         || '');
  var mei         = String(doc.mei         || '');
  var seiFurigana = String(doc.seiFurigana || '');
  var meiFurigana = String(doc.meiFurigana || '');
  var campus      = String(doc.campus      || '').padStart(2, '0');

  return {
    studentId:        studentId,
    campus:           campus,
    grade:            String(currentGrade).padStart(2, '0'),
    sei:              sei,
    mei:              mei,
    name:             sei + mei,
    seiFurigana:      seiFurigana,
    meiFurigana:      meiFurigana,
    furigana:         seiFurigana + meiFurigana,
    schoolName:       String(doc.schoolName  || ''),
    registrationYear: registrationYear
  };
}

/**
 * アクティブ生徒一覧を取得（GAS API経由・Supabaseから取得）
 * @param {number} year 対象年度
 * @return {Promise<Array>} 生徒データ配列
 */
function fbGetMasterData(year) {
  var cacheKey = String(year);
  if (_fbMasterDataCache[cacheKey]) return _fbMasterDataCache[cacheKey];
  // Promise をキャッシュすることで、並列呼び出し時も1回だけAPIコールが発生する
  _fbMasterDataCache[cacheKey] = gasApiPromise_('getMasterData', [parseInt(year, 10)])
    .catch(function(err) {
      console.error('fbGetMasterDataエラー:', err);
      return [];
    });
  return _fbMasterDataCache[cacheKey];
}

/**
 * ドロップダウン用の生徒一覧を取得（Firebase SDK）
 * google.script.run.getStudentsForDropdown の代替
 * @param {string} campusCode 校舎コード
 * @param {string|null} gradeCode 学年コード（null/空の場合は全学年）
 * @param {number} selectedYear 選択年度
 * @return {Promise<Object>} { success, students, error }
 */
function fbGetStudentsForDropdown(campusCode, gradeCode, selectedYear) {
  return fbGetMasterData(selectedYear)
    .then(function(masterData) {
      var targetCampus = String(campusCode).padStart(2, '0');
      var targetGrade  = gradeCode ? String(gradeCode).padStart(2, '0') : null;

      var students = masterData.filter(function(student) {
        var campusMatch = student.campus === targetCampus;
        var gradeMatch  = !targetGrade || student.grade === targetGrade;
        return campusMatch && gradeMatch;
      }).map(function(student) {
        return {
          studentId:   student.studentId,
          sei:         student.sei,
          mei:         student.mei,
          name:        student.name,
          seiFurigana: student.seiFurigana,
          meiFurigana: student.meiFurigana,
          furigana:    student.furigana,
          schoolName:  student.schoolName
        };
      });

      students.sort(function(a, b) {
        return (a.furigana || '').localeCompare(b.furigana || '', 'ja');
      });

      return { success: true, students: students };
    })
    .catch(function(err) {
      console.error('fbGetStudentsForDropdownエラー:', err);
      return { success: false, error: err.message || String(err), students: [] };
    });
}

/**
 * GAS API関数をPromiseでラップするヘルパー
 * google.script.run（gas-bridge経由）を Promise に変換
 * @param {string} funcName GAS関数名
 * @param {Array} args 引数配列
 * @return {Promise<*>} GAS関数の戻り値
 */
function gasApiPromise_(funcName, args) {
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(function(result) { resolve(result); })
      .withFailureHandler(function(err) { reject(err); });
    runner[funcName].apply(runner, args || []);
  });
}

/**
 * 一覧表用：生徒マスタと成績データを結合して返す
 * GAS API経由でSupabaseから取得
 * @param {number} year 年度
 * @param {string} testName テスト名
 * @return {Promise<Object>} { success, students, error }
 */
function fbGetStudentListWithGrades(year, testName, onRefresh) {
  var key = 's-quire-g-list-' + year + '-' + testName;
  return fbCachedFetch_(key, function() {
    return gasApiPromise_('getStudentListWithGrades', [parseInt(year, 10), String(testName || '').trim()])
      .catch(function(err) {
        console.error('fbGetStudentListWithGradesエラー:', err);
        return { success: false, error: err.message || String(err), students: [] };
      });
  }, onRefresh);
}

/**
 * 内部ヘルパー: テスト名からFirestore docID用のsafe文字列を生成
 * @param {string} testName テスト名
 * @return {string} safe文字列
 */
function fbSafeTestName_(testName) {
  return String(testName).replace(/[^a-zA-Z0-9\u3040-\u9fff\u30A0-\u30FF]/g, '_');
}

/**
 * 偏差値計算（クライアントサイド）
 * @param {number|string} score 得点
 * @param {number|string} average 平均点
 * @param {number} sigma 標準偏差
 * @return {number|null} 偏差値
 */
function fbCalcDeviation_(score, average, sigma) {
  if (!sigma || sigma <= 0) return null;
  if (average === '' || average == null || isNaN(Number(average))) return null;
  if (score  === '' || score  == null || isNaN(Number(score)))   return null;
  return Math.round((50 + 10 * (Number(score) - Number(average)) / sigma) * 10) / 10;
}

  return fbCachedFetch_(key, function() {
    return gasApiPromise_('getStudentsWithGradesByTest', [parseInt(year, 10), campusCode, testName])

/**
 * 成績データを保存（Firebase SDK）
 * google.script.run.submitGradeData の代替
 * @param {number} year 学年年度
 * @param {string} studentId 生徒ID
 * @param {string} testName テスト名
 * @param {Object} scores スコアオブジェクト { kokugo, shakai, sugaku, rika, eigo, gokei, shogaku1, ... }
 * @param {string} studentName 生徒氏名（表示用・省略可）
 * @return {Promise<Object>} { success, message, error }
 */
function fbSubmitGradeData(year, studentId, testName, scores, studentName) {
  // スコアにstudentNameを追加してGAS側で処理
  var scoresWithName = {};
  var keys = Object.keys(scores);
  for (var i = 0; i < keys.length; i++) scoresWithName[keys[i]] = scores[keys[i]];
  scoresWithName.studentName = studentName || '';
  return gasApiPromise_('submitGradeData', [parseInt(year, 10), studentId, testName, scoresWithName])
    .then(function(result) {
      if (result && result.success) {
        // 成績保存成功時: 関連キャッシュを無効化（次回読み込みで最新データを取得）
        fbInvalidateGradeCache_(year, testName, studentId);
      }
      return result;
    })
    .catch(function(err) {
      console.error('fbSubmitGradeDataエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}

/**
 * 成績データ変更時に関連するキャッシュを無効化する
 * @param {number} year 年度
 * @param {string} testName テスト名
 * @param {string} studentId 生徒ID
 */
function fbInvalidateGradeCache_(year, testName, studentId) {
  var prefixes = [
    's-quire-g-list-' + year + '-' + testName,
    's-quire-g-sbt-' + year + '-',
    's-quire-g-cavg-' + year + '-' + testName,
    's-quire-g-savg-' + year + '-' + testName,
    's-quire-g-rpt-' + year + '-' + studentId
  ];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (!k) continue;
    for (var j = 0; j < prefixes.length; j++) {
      if (k.indexOf(prefixes[j]) === 0) {
        localStorage.removeItem(k);
        i--; // インデックスがずれるので調整
        break;
      }
    }
  }
}

/**
