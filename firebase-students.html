<script>
// ===== Firebase 生徒データ クライアントサイド関数 =====
// firebase-init.html で初期化された fbDb を使用

/**
 * 内部ヘルパー: Firestoreドキュメントから年度に合わせた生徒データを計算して返す
 * @param {Object} doc Firestoreドキュメントデータ
 * @param {string} docId ドキュメントID（studentId）
 * @param {number} year 対象年度
 * @return {Object|null} 生徒データ or null（年度範囲外）
 */
function fbComputeStudentForYear_(doc, docId, year) {
  var studentId = String(doc.studentId || docId || '').trim();
  if (!studentId || studentId.length < 10) return null;

  var registrationYear  = parseInt(studentId.substring(2, 6), 10);
  var registrationGrade = parseInt(studentId.substring(6, 8), 10);
  if (isNaN(registrationYear) || isNaN(registrationGrade)) return null;

  var currentGrade = registrationGrade + (parseInt(year, 10) - registrationYear);
  if (currentGrade < 7 || currentGrade > 18) return null;

  var sei         = String(doc.sei         || '');
  var mei         = String(doc.mei         || '');
  var seiFurigana = String(doc.seiFurigana || '');
  var meiFurigana = String(doc.meiFurigana || '');
  var campus      = String(doc.campus      || '').padStart(2, '0');

  return {
    studentId:        studentId,
    campus:           campus,
    grade:            String(currentGrade).padStart(2, '0'),
    sei:              sei,
    mei:              mei,
    name:             sei + mei,
    seiFurigana:      seiFurigana,
    meiFurigana:      meiFurigana,
    furigana:         seiFurigana + meiFurigana,
    schoolName:       String(doc.schoolName  || ''),
    registrationYear: registrationYear
  };
}

/**
 * アクティブ生徒一覧を取得（Firebase SDK）
 * @param {number} year 対象年度
 * @return {Promise<Array>} 生徒データ配列
 */
function fbGetMasterData(year) {
  return fbDb.collection('students')
    .where('isDeleted', '==', false)
    .get()
    .then(function(snapshot) {
      var results = [];
      snapshot.forEach(function(docSnap) {
        var student = fbComputeStudentForYear_(docSnap.data(), docSnap.id, year);
        if (student) results.push(student);
      });
      return results;
    });
}

/**
 * ドロップダウン用の生徒一覧を取得（Firebase SDK）
 * google.script.run.getStudentsForDropdown の代替
 * @param {string} campusCode 校舎コード
 * @param {string|null} gradeCode 学年コード（null/空の場合は全学年）
 * @param {number} selectedYear 選択年度
 * @return {Promise<Object>} { success, students, error }
 */
function fbGetStudentsForDropdown(campusCode, gradeCode, selectedYear) {
  return fbGetMasterData(selectedYear)
    .then(function(masterData) {
      var targetCampus = String(campusCode).padStart(2, '0');
      var targetGrade  = gradeCode ? String(gradeCode).padStart(2, '0') : null;

      var students = masterData.filter(function(student) {
        var campusMatch = student.campus === targetCampus;
        var gradeMatch  = !targetGrade || student.grade === targetGrade;
        return campusMatch && gradeMatch;
      }).map(function(student) {
        return {
          studentId:   student.studentId,
          sei:         student.sei,
          mei:         student.mei,
          name:        student.name,
          seiFurigana: student.seiFurigana,
          meiFurigana: student.meiFurigana,
          furigana:    student.furigana,
          schoolName:  student.schoolName
        };
      });

      students.sort(function(a, b) {
        return (a.furigana || '').localeCompare(b.furigana || '', 'ja');
      });

      return { success: true, students: students };
    })
    .catch(function(err) {
      console.error('fbGetStudentsForDropdownエラー:', err);
      return { success: false, error: err.message || String(err), students: [] };
    });
}

/**
 * 削除済み生徒を取得（Firebase SDK）
 * google.script.run.getDeletedStudents の代替
 * @param {string} campusCode 校舎コード（空=全校舎）
 * @param {string|null} gradeCode 学年コード
 * @param {number|null} selectedYear 年度
 * @return {Promise<Object>} { success, students, error }
 */
function fbGetDeletedStudents(campusCode, gradeCode, selectedYear) {
  return fbDb.collection('students')
    .where('isDeleted', '==', true)
    .get()
    .then(function(snapshot) {
      var students = [];
      snapshot.forEach(function(docSnap) {
        var doc = docSnap.data();
        var studentId = String(doc.studentId || docSnap.id || '').trim();
        if (!studentId || studentId.length < 10) return;

        var regYear  = parseInt(studentId.substring(2, 6), 10);
        var regGrade = parseInt(studentId.substring(6, 8), 10);
        var rowCampus = String(doc.campus || '').padStart(2, '0');

        if (campusCode && rowCampus !== String(campusCode).padStart(2, '0')) return;
        if (selectedYear && regYear !== parseInt(selectedYear, 10)) return;

        if (gradeCode && selectedYear) {
          var calcGrade = regGrade + (parseInt(selectedYear, 10) - regYear);
          if (String(calcGrade).padStart(2, '0') !== String(gradeCode).padStart(2, '0')) return;
        } else if (gradeCode && !selectedYear) {
          if (String(regGrade).padStart(2, '0') !== String(gradeCode).padStart(2, '0')) return;
        }

        students.push({
          studentId:         studentId,
          campus:            rowCampus,
          name:              String(doc.sei || '') + String(doc.mei || ''),
          furigana:          String(doc.seiFurigana || '') + String(doc.meiFurigana || ''),
          schoolName:        String(doc.schoolName || ''),
          registrationYear:  regYear,
          registrationGrade: regGrade
        });
      });

      students.sort(function(a, b) {
        return (a.furigana || '').localeCompare(b.furigana || '', 'ja');
      });

      return { success: true, students: students };
    })
    .catch(function(err) {
      console.error('fbGetDeletedStudentsエラー:', err);
      return { success: false, error: err.message || String(err), students: [] };
    });
}

/**
 * 一覧表用：生徒マスタと成績データを結合して返す（Firebase SDK）
 * google.script.run.getStudentListWithGrades の代替
 * @param {number} year 年度
 * @param {string} testName テスト名
 * @return {Promise<Object>} { success, students, error }
 */
function fbGetStudentListWithGrades(year, testName) {
  var targetTest = String(testName || '').trim();
  var yearInt    = parseInt(year, 10);

  return Promise.all([
    fbGetMasterData(year),
    fbDb.collection('grades')
      .where('fiscalYear', '==', yearInt)
      .where('testName', '==', targetTest)
      .get(),
    fbDb.collection('studentAnalysis')
      .where('testName', '==', targetTest)
      .where('year', '==', yearInt)
      .get()
  ]).then(function(results) {
    var masterData   = results[0];
    var gradesSnap   = results[1];
    var analysisSnap = results[2];

    // 成績データのマップ作成（studentId → 成績ドキュメント）
    var gradeMap = {};
    gradesSnap.forEach(function(docSnap) {
      var doc = docSnap.data();
      var sid = String(doc.studentId || '').trim();
      if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');
      if (sid && !gradeMap[sid]) gradeMap[sid] = doc;
    });

    // AI分析データのマップ作成（studentId|testName → {schoolName: percent}）
    var analysisPassMap = {};
    analysisSnap.forEach(function(docSnap) {
      var doc = docSnap.data();
      var sid = String(doc.studentId || '').trim();
      if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');
      var tname = String(doc.testName || '').trim();
      if (!sid || !tname) return;
      var data = null;
      try {
        data = typeof doc.analysisJson === 'string' ? JSON.parse(doc.analysisJson) : doc.analysisJson;
      } catch (e) {}
      if (!data || !Array.isArray(data.passAssessment)) return;
      var m = {};
      data.passAssessment.forEach(function(pa) {
        if (pa.schoolName && pa.probability && pa.probability.percent != null) {
          m[pa.schoolName] = pa.probability.percent;
        }
      });
      analysisPassMap[sid + '|' + tname] = m;
    });

    var students = masterData.map(function(student) {
      var g = gradeMap[String(student.studentId)] || null;
      var aKey = String(student.studentId) + '|' + targetTest;
      var aEntry = analysisPassMap[aKey] || {};
      return {
        studentId:      student.studentId,
        name:           student.name,
        furigana:       student.furigana,
        seiFurigana:    student.seiFurigana,
        meiFurigana:    student.meiFurigana,
        campus:         student.campus,
        grade:          student.grade,
        schoolName:     student.schoolName,
        kokugo:         g ? (g.kokugo  != null ? g.kokugo  : '') : '',
        shakai:         g ? (g.shakai  != null ? g.shakai  : '') : '',
        sugaku:         g ? (g.sugaku  != null ? g.sugaku  : '') : '',
        rika:           g ? (g.rika    != null ? g.rika    : '') : '',
        eigo:           g ? (g.eigo    != null ? g.eigo    : '') : '',
        total:          g ? (g.total   != null ? g.total   : '') : '',
        average:        g ? (g.average != null ? g.average : '') : '',
        shogaku1:       g ? (g.shogaku1       || '') : '',
        shogaku1_gakka: g ? (g.shogaku1_gakka || '') : '',
        shogaku2:       g ? (g.shogaku2       || '') : '',
        shogaku2_gakka: g ? (g.shogaku2_gakka || '') : '',
        hasGrade:       g !== null,
        passPercent1:   (g && g.shogaku1 && aEntry[g.shogaku1] != null) ? aEntry[g.shogaku1] : null,
        passPercent2:   (g && g.shogaku2 && aEntry[g.shogaku2] != null) ? aEntry[g.shogaku2] : null
      };
    });

    return { success: true, students: students };
  }).catch(function(err) {
    console.error('fbGetStudentListWithGradesエラー:', err);
    return { success: false, error: err.message || String(err), students: [] };
  });
}

/**
 * 内部ヘルパー: テスト名からFirestore docID用のsafe文字列を生成
 * @param {string} testName テスト名
 * @return {string} safe文字列
 */
function fbSafeTestName_(testName) {
  return String(testName).replace(/[^a-zA-Z0-9\u3040-\u9fff\u30A0-\u30FF]/g, '_');
}

/**
 * 偏差値計算（クライアントサイド）
 * @param {number|string} score 得点
 * @param {number|string} average 平均点
 * @param {number} sigma 標準偏差
 * @return {number|null} 偏差値
 */
function fbCalcDeviation_(score, average, sigma) {
  if (!sigma || sigma <= 0) return null;
  if (average === '' || average == null || isNaN(Number(average))) return null;
  if (score  === '' || score  == null || isNaN(Number(score)))   return null;
  return Math.round((50 + 10 * (Number(score) - Number(average)) / sigma) * 10) / 10;
}

/**
 * 成績データ1件を取得（Firebase SDK）
 * google.script.run.getGradeDataByStudentAndTest の代替
 * @param {number} year 学年年度
 * @param {string} studentId 生徒ID
 * @param {string} testName テスト名
 * @return {Promise<Object>} { success, found, data, error }
 */
function fbGetGradeDataByStudentAndTest(year, studentId, testName) {
  var sid = String(studentId || '').trim();
  if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');
  var docId = sid + '_' + fbSafeTestName_(testName) + '_' + String(year);

  return fbDb.collection('grades').doc(docId).get()
    .then(function(docSnap) {
      if (!docSnap.exists) return { success: true, found: false };
      var doc = docSnap.data();
      return {
        success: true,
        found: true,
        data: {
          kokugo:         doc.kokugo  != null ? doc.kokugo  : '',
          shakai:         doc.shakai  != null ? doc.shakai  : '',
          sugaku:         doc.sugaku  != null ? doc.sugaku  : '',
          rika:           doc.rika    != null ? doc.rika    : '',
          eigo:           doc.eigo    != null ? doc.eigo    : '',
          gokei:          doc.total   != null ? doc.total   : '',
          shogaku1:       String(doc.shogaku1       || ''),
          shogaku1_gakka: String(doc.shogaku1_gakka || ''),
          shogaku2:       String(doc.shogaku2       || ''),
          shogaku2_gakka: String(doc.shogaku2_gakka || '')
        }
      };
    })
    .catch(function(err) {
      console.error('fbGetGradeDataByStudentAndTestエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}

/**
 * 指定テストの成績がある生徒一覧を校舎でフィルタして返す（Firebase SDK）
 * google.script.run.getStudentsWithGradesByTest の代替
 * @param {number} year 年度
 * @param {string} campusCode 校舎コード
 * @param {string} testName テスト名
 * @return {Promise<Object>} { success, students, error }
 */
function fbGetStudentsWithGradesByTest(year, campusCode, testName) {
  var targetTest  = String(testName || '').trim();
  var yearInt     = parseInt(year, 10);

  if (!targetTest || !campusCode) {
    return Promise.resolve({ success: true, students: [] });
  }

  return Promise.all([
    fbGetMasterData(year),
    fbDb.collection('grades')
      .where('fiscalYear', '==', yearInt)
      .where('testName',   '==', targetTest)
      .get()
  ]).then(function(results) {
    var masterData = results[0];
    var gradesSnap = results[1];

    // 成績があるstudentIdのセット
    var studentIdSet = {};
    gradesSnap.forEach(function(docSnap) {
      var sid = String(docSnap.data().studentId || '').trim();
      if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');
      if (sid) studentIdSet[sid] = true;
    });

    var targetCampus = String(campusCode).padStart(2, '0');
    var students = masterData.filter(function(s) {
      return s.campus === targetCampus && studentIdSet[s.studentId];
    }).map(function(s) {
      return { studentId: s.studentId, name: s.name, furigana: s.furigana, schoolName: s.schoolName };
    });

    students.sort(function(a, b) {
      return (a.furigana || '').localeCompare(b.furigana || '', 'ja');
    });

    return { success: true, students: students };
  }).catch(function(err) {
    console.error('fbGetStudentsWithGradesByTestエラー:', err);
    return { success: false, error: err.message || String(err), students: [] };
  });
}

/**
 * 成績表用：指定生徒の全テスト成績と学校別平均を取得する（Firebase SDK）
 * google.script.run.getStudentGradeReport の代替
 * sigma値はデフォルト値を使用（カスタム設定がある場合は getStudentGradeReport(GAS)を使用）
 * @param {number} year 学年年度
 * @param {string} studentId 生徒ID
 * @return {Promise<Object>} { success, student, grades, testNames, schoolAverages, deviationValues, error }
 */
function fbGetStudentGradeReport(year, studentId) {
  if (!studentId) {
    return Promise.resolve({ success: false, error: '生徒IDが指定されていません' });
  }

  var targetId = String(studentId).trim();
  var yearInt  = parseInt(year, 10);
  var sigmaDefaults = { kokugo: 15, shakai: 18, sugaku: 23, rika: 20, eigo: 20, total: 100 };

  return Promise.all([
    fbGetMasterData(year),
    fbDb.collection('grades')
      .where('studentId',  '==', targetId)
      .where('fiscalYear', '==', yearInt)
      .get()
  ]).then(function(results) {
    var masterData = results[0];
    var gradesSnap = results[1];

    // 生徒情報を検索
    var student = null;
    for (var i = 0; i < masterData.length; i++) {
      if (masterData[i].studentId === targetId) { student = masterData[i]; break; }
    }
    if (!student) {
      return { success: false, error: '生徒が見つかりません（ID: ' + studentId + '）' };
    }

    // 成績データを収集
    var studentGrades = [];
    gradesSnap.forEach(function(docSnap) {
      var doc = docSnap.data();
      studentGrades.push({
        testName:       String(doc.testName || ''),
        kokugo:         doc.kokugo  != null ? doc.kokugo  : '',
        shakai:         doc.shakai  != null ? doc.shakai  : '',
        sugaku:         doc.sugaku  != null ? doc.sugaku  : '',
        rika:           doc.rika    != null ? doc.rika    : '',
        eigo:           doc.eigo    != null ? doc.eigo    : '',
        total:          doc.total   != null ? doc.total   : '',
        average:        doc.average != null ? doc.average : '',
        shogaku1:       String(doc.shogaku1       || ''),
        shogaku1_gakka: String(doc.shogaku1_gakka || ''),
        shogaku2:       String(doc.shogaku2       || ''),
        shogaku2_gakka: String(doc.shogaku2_gakka || '')
      });
    });

    // テスト名設定順にソート（testNamesData グローバルを使用）
    var configTestNames = (typeof testNamesData !== 'undefined' && testNamesData.length > 0)
      ? testNamesData : [];
    var testOrder = {};
    configTestNames.forEach(function(name, idx) { testOrder[name] = idx; });
    studentGrades.sort(function(a, b) {
      var orderA = testOrder[a.testName] !== undefined ? testOrder[a.testName] : 9999;
      var orderB = testOrder[b.testName] !== undefined ? testOrder[b.testName] : 9999;
      return orderA - orderB;
    });

    // 各テストの学校別平均を並列取得
    var uniqueTests = [];
    studentGrades.forEach(function(g) {
      if (uniqueTests.indexOf(g.testName) === -1) uniqueTests.push(g.testName);
    });

    var avgPromises = uniqueTests.map(function(tname) {
      var docId = String(yearInt) + '_' + fbSafeTestName_(tname);
      return fbDb.collection('schoolAverages').doc(docId).get()
        .then(function(docSnap) {
          return { testName: tname, averages: (docSnap.exists && docSnap.data().averages) ? docSnap.data().averages : [] };
        })
        .catch(function() { return { testName: tname, averages: [] }; });
    });

    return Promise.all(avgPromises).then(function(avgResults) {
      var schoolAverages = {};
      var studentSchool = (student.schoolName || '').trim();

      avgResults.forEach(function(ar) {
        var fallback = null;
        for (var j = 0; j < ar.averages.length; j++) {
          var sn = (ar.averages[j].schoolName || '').trim();
          if (studentSchool && sn === studentSchool) {
            schoolAverages[ar.testName] = ar.averages[j];
            fallback = null;
            break;
          }
          if (!fallback && sn.indexOf('平均') !== -1) fallback = ar.averages[j];
        }
        if (fallback && !schoolAverages[ar.testName]) schoolAverages[ar.testName] = fallback;
      });

      // 偏差値を計算
      var deviationValues = {};
      var subjKeys = ['kokugo', 'shakai', 'sugaku', 'rika', 'eigo', 'total'];
      studentGrades.forEach(function(g) {
        var avg = schoolAverages[g.testName];
        if (!avg) return;
        var devs = {};
        subjKeys.forEach(function(subj) {
          devs[subj] = fbCalcDeviation_(g[subj], avg[subj], sigmaDefaults[subj]);
        });
        deviationValues[g.testName] = devs;
      });

      return {
        success: true,
        student: {
          studentId:  student.studentId,
          name:       student.name,
          furigana:   student.furigana,
          campus:     student.campus,
          grade:      student.grade,
          schoolName: student.schoolName
        },
        grades:          studentGrades,
        testNames:       configTestNames,
        schoolAverages:  schoolAverages,
        deviationValues: deviationValues
      };
    });
  }).catch(function(err) {
    console.error('fbGetStudentGradeReportエラー:', err);
    return { success: false, error: err.message || String(err) };
  });
}

/**
 * 生徒情報を更新（Firebase SDK）
 * google.script.run.updateStudentInfo の代替
 * @param {string} studentId 生徒ID
 * @param {string} campusCode 校舎コード
 * @param {string} sei 姓（漢字）
 * @param {string} mei 名（漢字）
 * @param {string} seiFurigana 姓ふりがな
 * @param {string} meiFurigana 名ふりがな
 * @param {string} schoolName 学校名
 * @return {Promise<Object>} { success, message, error }
 */
function fbUpdateStudentInfo(studentId, campusCode, sei, mei, seiFurigana, meiFurigana, schoolName) {
  var sid = String(studentId || '').trim();
  if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');

  return fbDb.collection('students').doc(sid).update({
    campus:      String(campusCode || '').padStart(2, '0'),
    sei:         String(sei         || '').trim(),
    mei:         String(mei         || '').trim(),
    seiFurigana: String(seiFurigana || '').trim(),
    meiFurigana: String(meiFurigana || '').trim(),
    schoolName:  String(schoolName  || '').trim()
  })
  .then(function() {
    return { success: true, message: '生徒情報を更新しました' };
  })
  .catch(function(err) {
    console.error('fbUpdateStudentInfoエラー:', err);
    return { success: false, error: err.message || String(err) };
  });
}

/**
 * 生徒を削除（ソフトデリート）（Firebase SDK）
 * google.script.run.deleteStudent の代替
 * @param {string} studentId 生徒ID
 * @return {Promise<Object>} { success, message, error }
 */
function fbDeleteStudent(studentId) {
  var sid = String(studentId || '').trim();
  if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');

  return fbDb.collection('students').doc(sid).update({ isDeleted: true })
    .then(function() { return { success: true, message: '生徒を削除しました' }; })
    .catch(function(err) {
      console.error('fbDeleteStudentエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}

/**
 * 削除済み生徒を復元（Firebase SDK）
 * google.script.run.restoreStudent の代替
 * @param {string} studentId 生徒ID
 * @return {Promise<Object>} { success, message, error }
 */
function fbRestoreStudent(studentId) {
  var sid = String(studentId || '').trim();
  if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');

  return fbDb.collection('students').doc(sid).update({ isDeleted: false })
    .then(function() { return { success: true, message: '生徒情報を復元しました' }; })
    .catch(function(err) {
      console.error('fbRestoreStudentエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}

/**
 * 成績データを保存（Firebase SDK）
 * google.script.run.submitGradeData の代替
 * @param {number} year 学年年度
 * @param {string} studentId 生徒ID
 * @param {string} testName テスト名
 * @param {Object} scores スコアオブジェクト { kokugo, shakai, sugaku, rika, eigo, gokei, shogaku1, ... }
 * @param {string} studentName 生徒氏名（表示用・省略可）
 * @return {Promise<Object>} { success, message, error }
 */
function fbSubmitGradeData(year, studentId, testName, scores, studentName) {
  var sid = String(studentId || '').trim();
  if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');

  var kokugo = parseInt(scores.kokugo, 10); if (isNaN(kokugo)) kokugo = 0;
  var shakai = parseInt(scores.shakai, 10); if (isNaN(shakai)) shakai = 0;
  var sugaku = parseInt(scores.sugaku, 10); if (isNaN(sugaku)) sugaku = 0;
  var rika   = parseInt(scores.rika,   10); if (isNaN(rika))   rika   = 0;
  var eigo   = parseInt(scores.eigo,   10); if (isNaN(eigo))   eigo   = 0;
  var calcTotal = kokugo + shakai + sugaku + rika + eigo;
  var gokei = parseInt(scores.gokei, 10);
  var total   = (!isNaN(gokei) && gokei > 0) ? gokei : calcTotal;
  var average = total > 0 ? parseFloat((total / 5).toFixed(1)) : 0;

  var docId = sid + '_' + fbSafeTestName_(testName) + '_' + String(year);

  return fbDb.collection('grades').doc(docId).set({
    studentId:      sid,
    testName:       String(testName).trim(),
    fiscalYear:     parseInt(year, 10),
    kokugo:         kokugo,
    shakai:         shakai,
    sugaku:         sugaku,
    rika:           rika,
    eigo:           eigo,
    total:          total,
    average:        average,
    shogaku1:       scores.shogaku1       || '',
    shogaku1_gakka: scores.shogaku1_gakka || '',
    shogaku2:       scores.shogaku2       || '',
    shogaku2_gakka: scores.shogaku2_gakka || '',
    recordedAt:     new Date().toISOString(),
    studentName:    String(studentName || '')
  })
  .then(function() {
    // gradesMeta/yearsList に年度を追加（fire-and-forget）
    var fy = parseInt(year, 10);
    fbDb.collection('gradesMeta').doc('yearsList').set({
      years: firebase.firestore.FieldValue.arrayUnion(fy),
      updatedAt: new Date().toISOString()
    }, { merge: true }).catch(function(e) {
      console.warn('gradesMeta更新スキップ:', e);
    });
    return { success: true, message: '成績データを保存しました' };
  })
  .catch(function(err) {
    console.error('fbSubmitGradeDataエラー:', err);
    return { success: false, error: err.message || String(err) };
  });
}

/**
 * 成績データの年度一覧を取得（Firebase SDK）
 * gradesMeta/yearsList から取得（1ドキュメント読み取り）。未作成時は全件取得+自動修復。
 * @return {Promise<Object>} { success, years, error }
 */
function fbGetGradesYearFolders() {
  if (!window.fbCurrentUser) {
    return Promise.resolve({ success: false, error: '認証されていません。ページを再読み込みしてください。' });
  }

  var now = new Date();
  var currentFy = (now.getMonth() >= 3) ? now.getFullYear() : now.getFullYear() - 1;

  return fbDb.collection('gradesMeta').doc('yearsList').get()
    .then(function(docSnap) {
      if (docSnap.exists) {
        var data = docSnap.data();
        if (data.years && data.years.length > 0) {
          var yearSet = {};
          data.years.forEach(function(y) { yearSet[String(y)] = true; });
          yearSet[String(currentFy)] = true;
          var years = Object.keys(yearSet).filter(function(y) { return /^\d{4}$/.test(y); });
          years.sort(function(a, b) { return parseInt(b, 10) - parseInt(a, 10); });
          return { success: true, years: years };
        }
      }
      // フォールバック: メタ未作成時は全件取得 + 自動修復
      return fbDb.collection('grades').get().then(function(snapshot) {
        var yearSet2 = {};
        snapshot.forEach(function(ds) {
          var doc = ds.data();
          if (doc.fiscalYear) yearSet2[String(doc.fiscalYear)] = true;
        });
        yearSet2[String(currentFy)] = true;
        var years2 = Object.keys(yearSet2).filter(function(y) { return /^\d{4}$/.test(y); });
        years2.sort(function(a, b) { return parseInt(b, 10) - parseInt(a, 10); });

        // 自動修復: メタドキュメントを作成（fire-and-forget）
        var intYears = years2.map(function(y) { return parseInt(y, 10); });
        fbDb.collection('gradesMeta').doc('yearsList').set({
          years: intYears,
          updatedAt: new Date().toISOString()
        }).catch(function(e) { console.warn('gradesMeta自動修復スキップ:', e); });

        return { success: true, years: years2 };
      });
    })
    .catch(function(err) {
      console.error('fbGetGradesYearFoldersエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}

/**
 * 塾平均（校舎別）を計算（Firebase SDK）
 * google.script.run.getCampusAverages の代替
 * 全校舎の生徒成績データから校舎ごとの平均点を自動計算する
 * @param {number} year 学年年度
 * @param {string} testName テスト名
 * @return {Promise<Object>} { success, campuses }
 */
function fbGetCampusAverages(year, testName) {
  var targetTest = String(testName || '').trim();
  var yearInt = parseInt(year, 10);

  // ファストパス: gradeSummaries から取得（1ドキュメント読み取り）
  var summaryDocId = String(yearInt) + '_' + fbSafeTestName_(testName);
  return fbDb.collection('gradeSummaries').doc(summaryDocId).get()
    .then(function(docSnap) {
      if (docSnap.exists && docSnap.data().campusAverages) {
        var data = docSnap.data();
        var campuses = [];
        Object.keys(data.campusAverages).forEach(function(code) {
          var avg = data.campusAverages[code];
          campuses.push({
            campusCode: code,
            campusName: code === 'all' ? '全校舎' : (window._campusConfigCache && window._campusConfigCache[code] || code),
            count: avg.count || 0,
            kokugo: avg.kokugo, shakai: avg.shakai, sugaku: avg.sugaku,
            rika: avg.rika, eigo: avg.eigo, total: avg.total
          });
        });
        campuses.sort(function(a, b) {
          if (a.campusCode === 'all') return -1;
          if (b.campusCode === 'all') return 1;
          return a.campusCode.localeCompare(b.campusCode);
        });
        return { success: true, campuses: campuses };
      }
      // フォールバック: サマリーなし → フル計算
      return fbGetCampusAveragesFull_(year, testName);
    })
    .catch(function(err) {
      console.warn('gradeSummariesファストパス失敗、フォールバック:', err);
      return fbGetCampusAveragesFull_(year, testName);
    });
}

/** フォールバック: 全成績から校舎平均を計算 */
function fbGetCampusAveragesFull_(year, testName) {
  var targetTest = String(testName || '').trim();
  var yearInt = parseInt(year, 10);

  return Promise.all([
    fbGetMasterData(year),
    fbDb.collection('grades')
      .where('fiscalYear', '==', yearInt)
      .where('testName', '==', targetTest)
      .get()
  ]).then(function(results) {
    var masterData = results[0];
    var gradesSnap = results[1];

    // 成績をstudentIdでマップ化
    var gradeMap = {};
    gradesSnap.forEach(function(docSnap) {
      var doc = docSnap.data();
      var sid = String(doc.studentId || '').trim();
      if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');
      if (sid && !gradeMap[sid]) gradeMap[sid] = doc;
    });

    // 生徒マスタと成績を結合（成績ありのみ）
    var students = [];
    masterData.forEach(function(s) {
      var g = gradeMap[s.studentId];
      if (!g) return;
      students.push({
        campus: s.campus,
        kokugo: g.kokugo != null ? g.kokugo : '',
        shakai: g.shakai != null ? g.shakai : '',
        sugaku: g.sugaku != null ? g.sugaku : '',
        rika:   g.rika   != null ? g.rika   : '',
        eigo:   g.eigo   != null ? g.eigo   : ''
      });
    });

    var subjects = ['kokugo', 'shakai', 'sugaku', 'rika', 'eigo'];

    function calcAvg(arr, subj) {
      var vals = arr.map(function(s) { return s[subj]; })
        .filter(function(v) { return v !== null && v !== undefined && v !== '' && !isNaN(Number(v)); });
      if (vals.length === 0) return '';
      return Math.round(vals.reduce(function(a, b) { return a + Number(b); }, 0) / vals.length * 10) / 10;
    }

    var campuses = [];

    // 全校舎合計
    var allAvg = { campusCode: 'all', campusName: '全校舎', count: students.length };
    subjects.forEach(function(s) { allAvg[s] = calcAvg(students, s); });
    var allTotals = subjects.map(function(s) { return allAvg[s]; }).filter(function(v) { return v !== '' && v !== null && v !== undefined; });
    allAvg.total = allTotals.length === 5 ? Math.round(allTotals.reduce(function(a, b) { return a + b; }, 0) * 10) / 10 : '';
    campuses.push(allAvg);

    // 校舎ごと
    var groups = {};
    students.forEach(function(s) {
      var code = String(s.campus || 'unknown');
      if (!groups[code]) groups[code] = [];
      groups[code].push(s);
    });

    Object.keys(groups).sort().forEach(function(code) {
      var arr = groups[code];
      var avg = { campusCode: code, campusName: campusData[code] || code, count: arr.length };
      subjects.forEach(function(s) { avg[s] = calcAvg(arr, s); });
      var totals = subjects.map(function(s) { return avg[s]; }).filter(function(v) { return v !== '' && v !== null && v !== undefined; });
      avg.total = totals.length === 5 ? Math.round(totals.reduce(function(a, b) { return a + b; }, 0) * 10) / 10 : '';
      campuses.push(avg);
    });

    return { success: true, campuses: campuses };
  }).catch(function(err) {
    console.error('fbGetCampusAveragesエラー:', err);
    return { success: false, error: err.message || String(err) };
  });
}

/**
 * テスト全体AI分析を取得（Firebase SDK）
 * google.script.run.getGradeAnalysis の代替
 * @param {number} year 学年年度
 * @param {string} testName テスト名
 * @return {Promise<Object>} { success, exists, analysis, generatedAt }
 */
function fbGetGradeAnalysis(year, testName) {
  var safe = fbSafeTestName_(testName);
  var docId = String(parseInt(year, 10)) + '_' + safe;
  return fbDb.collection('testAnalysis').doc(docId).get()
    .then(function(docSnap) {
      if (!docSnap.exists) {
        return { success: true, exists: false, analysis: null, generatedAt: '' };
      }
      var doc = docSnap.data();
      if (!doc.analysisJson) {
        return { success: true, exists: false, analysis: null, generatedAt: '' };
      }
      try {
        var analysis = JSON.parse(doc.analysisJson);
        if (!analysis) return { success: true, exists: false, analysis: null, generatedAt: '' };
        return { success: true, exists: true, analysis: analysis, generatedAt: doc.generatedAt || '' };
      } catch (e) {
        console.error('fbGetGradeAnalysis JSONパースエラー:', e);
        return { success: true, exists: false, analysis: null, generatedAt: '' };
      }
    })
    .catch(function(err) {
      console.error('fbGetGradeAnalysisエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}

/**
 * 生徒別AI分析を取得（Firebase SDK）
 * google.script.run.getStudentAnalysis の代替
 * @param {number} year 年度
 * @param {string} studentId 生徒ID
 * @param {string} testName テスト名
 * @return {Promise<Object>} { success, exists, analysis, generatedAt }
 */
function fbGetStudentAnalysis(year, studentId, testName) {
  var sid = String(studentId || '').trim();
  if (/^\d+$/.test(sid) && sid.length < 10) sid = sid.padStart(10, '0');
  var safe = fbSafeTestName_(testName);
  var docId = sid + '_' + safe + '_' + String(parseInt(year, 10));

  return fbDb.collection('studentAnalysis').doc(docId).get()
    .then(function(docSnap) {
      if (docSnap.exists && docSnap.data().analysisJson) {
        try {
          var analysis = JSON.parse(docSnap.data().analysisJson);
          if (analysis) {
            return { success: true, exists: true, analysis: analysis, generatedAt: docSnap.data().generatedAt || '' };
          }
        } catch (e) { /* fall through */ }
      }

      // 基礎学力テストの特例：完全一致がない場合、N回以上のデータにフォールバック
      var targetTest = String(testName).trim();
      var basicMatch = targetTest.match(/^第(\d+)回基礎学力テスト$/);
      if (!basicMatch) {
        return { success: true, exists: false };
      }

      var targetNum = parseInt(basicMatch[1], 10);
      var promises = [];
      for (var r = 3; r > targetNum; r--) {
        var fallbackTest = '第' + r + '回基礎学力テスト';
        var fbSafe = fbSafeTestName_(fallbackTest);
        var fbDocId = sid + '_' + fbSafe + '_' + String(parseInt(year, 10));
        promises.push({ round: r, docId: fbDocId });
      }

      if (promises.length === 0) return { success: true, exists: false };

      // 高い回数から順に試みる
      return promises.reduce(function(chain, item) {
        return chain.then(function(found) {
          if (found) return found;
          return fbDb.collection('studentAnalysis').doc(item.docId).get()
            .then(function(snap) {
              if (snap.exists && snap.data().analysisJson) {
                try {
                  var a = JSON.parse(snap.data().analysisJson);
                  if (a) return { success: true, exists: true, analysis: a, generatedAt: snap.data().generatedAt || '' };
                } catch (e) { /* continue */ }
              }
              return null;
            });
        });
      }, Promise.resolve(null)).then(function(result) {
        return result || { success: true, exists: false };
      });
    })
    .catch(function(err) {
      console.error('fbGetStudentAnalysisエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}
