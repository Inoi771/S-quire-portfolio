  });

  panel.addEventListener('dragleave', (e) => {
    if (e.target === panel) {
      panel.classList.remove('drag-over');
    }
  });

  panel.addEventListener('drop', (e) => {
    e.preventDefault();
    panel.classList.remove('drag-over');

    // ✅ 左パネルからのドラッグの場合のみ処理
    if (draggedLessonName && draggedLessonIdx === undefined && availableLessons.includes(draggedLessonName)) {
      // ✅ 重複を許可：同じレッスンを複数回追加可能
      if (!selectedLessons.includes(draggedLessonName)) {
        selectedLessons.push(draggedLessonName);
      } else {

        selectedLessons.push(draggedLessonName);
      }

      renderSelectedLessonPanel();
      draggedLessonName = null;
      draggedLessonIdx = undefined;

/**
 * 空のセルへのドラッグ&ドロップ処理
 * 単語・文を新たに配置
 */ 
function setupEmptyCellDragDrop(td, rowIdx, colIdx) {
  td.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    td.classList.add('drag-over');
  });

  td.addEventListener('dragleave', () => {
    td.classList.remove('drag-over');
  });

  td.addEventListener('drop', (e) => {
    e.preventDefault();
    td.classList.remove('drag-over');

    if (!draggedItem) return;

    const newCellId = calculateCellId(rowIdx, colIdx);

    if (draggedItem.type === 'word') {
      const wordId = draggedItem.id || draggedItem.data.id;
      
      if (!wordId) {
        console.error('⚠️ WARNING: Word ID が取得できません', draggedItem);
        alert('⚠️ エラー：単語のIDが取得できません。ページをリロードしてください。');
        return;
      }

      tableData[rowIdx][colIdx] = {
        type: 'word',
        english: draggedItem.data.english,
        japanese: draggedItem.data.japanese,
        pronunciation: draggedItem.data.pronunciation || '',
        masterWordId: wordId,
        cellId: newCellId
      };

      if (draggedFromTable && draggedFromTable.isFromTable) {
        tableData[draggedFromTable.rowIdx][draggedFromTable.colIdx] = null;
      }

      hasChanges = true;
      document.getElementById('saveBtn').disabled = false;
      renderTable();

      moveRightPanelFocusToNextEmpty(rowIdx, colIdx);

      // ✅ 新規：ドラッグ完了後に検索欄をクリア
      clearSearchAfterDrop();

    } else if (draggedItem.type === 'sentence') {
      const sentenceId = draggedItem.id || draggedItem.data.id;
      
      if (!sentenceId) {
        console.error('⚠️ WARNING: Sentence ID が取得できません', draggedItem);
        alert('⚠️ エラー：英文のIDが取得できません。ページをリロードしてください。');
        return;
      }

      const hasWordInRow = tableData[rowIdx].some(cell => 
        cell && cell.type === 'word'
      );

      if (hasWordInRow) {
        alert('❌ この行には既に単語があるため、文を配置できません。\n\n文は単語がない行にのみ配置可能です。');
        return;
      }

      tableData[rowIdx][0] = {
        type: 'sentence',
        text: draggedItem.data.text,
        pronunciation: draggedItem.data.pronunciation || '',
        japanese: draggedItem.data.japanese || '',
        masterSentenceId: sentenceId,
        cellId: newCellId
      };
      tableData[rowIdx][1] = null;
      tableData[rowIdx][2] = null;

      if (draggedFromTable && draggedFromTable.isFromTable) {
        tableData[draggedFromTable.rowIdx][draggedFromTable.colIdx] = null;
      }

      hasChanges = true;
      document.getElementById('saveBtn').disabled = false;
      renderTable();

      // ✅ 新規：ドラッグ完了後に検索欄をクリア
      clearSearchAfterDrop();
    }
  });
}

    td.style.opacity = '1';
  });

  td.addEventListener('dragover', (e) => {
    if (!draggedItem) return;

    // ✅ ドラッグ元がテーブル内でない場合は禁止
    if (!draggedFromTable || !draggedFromTable.isFromTable) {
      e.dataTransfer.dropEffect = 'none';
      td.classList.remove('drag-over');
      td.classList.add('drag-forbidden');
      return;
    }

    // ✅ ドラッグ元が単語の場合のみ許可
    if (draggedItem.type === 'word') {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      td.classList.add('drag-over');
      td.classList.remove('drag-forbidden');
    } else if (draggedItem.type === 'sentence') {
      // 文は単語セルには配置不可
      e.dataTransfer.dropEffect = 'none';
      td.classList.remove('drag-over');
      td.classList.add('drag-forbidden');
    }
  });

  td.addEventListener('dragleave', () => {
    td.classList.remove('drag-over');
    td.classList.remove('drag-forbidden');
  });

  td.addEventListener('drop', (e) => {
    e.preventDefault();
    td.classList.remove('drag-over');
    td.classList.remove('drag-forbidden');

    if (!draggedItem) return;

    // ✅ ドラッグ元がテーブル内でない場合は無視
    if (!draggedFromTable || !draggedFromTable.isFromTable) {
      draggedFromTable = null;
      return;
    }

    // ✅ ドラッグ元が単語でない場合は無視
    if (draggedItem.type !== 'word') {
      draggedFromTable = null;
      return;
    }

    // ✅ 同じセルへのドラッグは無視
    if (draggedFromTable.rowIdx === rowIdx && draggedFromTable.colIdx === colIdx) {
      draggedFromTable = null;
      return;
    }

    const oldRowIdx = draggedFromTable.rowIdx;
    const oldColIdx = draggedFromTable.colIdx;

    // ✅ セルIDを再計算（新しい位置用）
    const newCellId = calculateCellId(rowIdx, colIdx);
    const oldCellId = calculateCellId(oldRowIdx, oldColIdx);

    // ✅ 修正：セル内のデータから正確にIDを取得
    const targetCell = {
      type: cell.type,
      english: cell.english,
      japanese: cell.japanese,
      pronunciation: cell.pronunciation,
      masterWordId: cell.masterWordId,
      cellId: newCellId  // ✅ 新しいセルIDを設定
    };

    const sourceCell = {
      type: draggedItem.data.type,
      english: draggedItem.data.english,
      japanese: draggedItem.data.japanese,
      pronunciation: draggedItem.data.pronunciation,
      masterWordId: draggedItem.data.masterWordId,
      cellId: oldCellId  // ✅ 元のセルIDを保持
    };

    // ✅ 入れ替え処理
    tableData[oldRowIdx][oldColIdx] = targetCell;
    tableData[rowIdx][colIdx] = sourceCell;

    hasChanges = true;
    document.getElementById('saveBtn').disabled = false;
    renderTable();

    // ✅ 新規：ドラッグ後、次の空きセルに照準を移動
    moveRightPanelFocusToNextEmpty(rowIdx, colIdx);

    draggedFromTable = null;
  });
}

      return;
    }

    if (draggedItem.type === 'sentence') {

    if (!draggedFromTable || !draggedFromTable.isFromTable) {

    }

    }

    const targetCell = {
      type: cell.type,

      pronunciation: cell.pronunciation,
      japanese: cell.japanese || '',
      masterSentenceId: cell.masterSentenceId,

    };

      japanese: draggedItem.data.japanese || '',

/**
 * ✅ 修正版：updateTableDisplayByMasterId()
 * 通常レッスンと不規則動詞の両方に対応
 * マスターデータ修正時に tableData と fukisokuDataMap を自動更新
 */
function updateTableDisplayByMasterId(masterId) {
  // ✅ 不規則動詞①②の判定
  const isFukisoku1Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞①');
  const isFukisoku2Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞②');

  if (isFukisoku1Check || isFukisoku2Check) {
    // ════════════════════════════════════════
    // 不規則動詞の場合
    // ════════════════════════════════════════
    const masterWord = allWords.find(w => w.id === masterId);
    if (!masterWord) {
      console.warn(`マスターワードID ${masterId} が見つかりません`);
      return;
    }

    const fukisokuDataMap = isFukisoku1Check
      ? (window.fukisoku1DataMap || {})
      : (window.fukisoku2DataMap || {});

    let updateCount = 0;

    // ✅ ケース1：現在形のマスターが更新された場合
    Object.entries(fukisokuDataMap).forEach(([rowIdx, data]) => {
      if (data.meaningMasterId === masterId) {
        console.log(`✅ 現在形を更新: ${data.present} → ${masterWord.english}`);
        
        // fukisokuDataMap を更新
        data.present = masterWord.english;
        data.presentPronunciation = masterWord.pronunciation || '';
        data.presentAudio = masterWord.audio || '';
        data.meaning = masterWord.japanese || '';

        // tableData も更新
        if (tableData[rowIdx] && tableData[rowIdx][0]) {
          tableData[rowIdx][0].english = masterWord.english;
          tableData[rowIdx][0].pronunciation = masterWord.pronunciation || '';
          tableData[rowIdx][0].japanese = masterWord.japanese || '';
        }

        updateCount++;
      }
    });

    // ✅ ケース2：過去形のマスターが更新された場合
    Object.entries(fukisokuDataMap).forEach(([rowIdx, data]) => {
      if (data.pastMasterId === masterId) {
        console.log(`✅ 過去形を更新: ${data.past} → ${masterWord.english}`);
        
        // fukisokuDataMap を更新
        data.past = masterWord.english;
        data.pastPronunciation = masterWord.pronunciation || '';
        data.pastAudio = masterWord.audio || '';

        updateCount++;
      }
    });

    // ✅ ケース3：過去分詞のマスターが更新された場合（②のみ）
    if (isFukisoku2Check) {
      Object.entries(fukisokuDataMap).forEach(([rowIdx, data]) => {
        if (data.pastPartMasterId === masterId) {
          console.log(`✅ 過去分詞を更新: ${data.pastPart} → ${masterWord.english}`);
          
          // fukisokuDataMap を更新
          data.pastPart = masterWord.english;
          data.pastPartPronunciation = masterWord.pronunciation || '';
          data.pastPartAudio = masterWord.audio || '';

          updateCount++;
        }
      });
    }

    // ✅ メモリに保存
    if (isFukisoku1Check) {
      window.fukisoku1DataMap = fukisokuDataMap;
    } else {
      window.fukisoku2DataMap = fukisokuDataMap;
    }

    console.log(`✅ ${updateCount}件の不規則動詞データを更新しました`);

    // ✅ テーブルを再描画
    if (updateCount > 0) {
      renderTable();
      hasChanges = true;
      document.getElementById('saveBtn').disabled = false;
    }

    return;
  }

  // ════════════════════════════════════════
  // 通常レッスンの場合（既存コード）
  // ════════════════════════════════════════
  tableData.forEach((row, rowIdx) => {
    row.forEach((cell, colIdx) => {
      if (!cell) return;

      if (cell.type === 'word' && cell.masterWordId === masterId) {
        const masterWord = allWords.find(w => w.id === masterId);
        if (masterWord) {
          cell.english = masterWord.english;
          cell.japanese = masterWord.japanese;
          cell.pronunciation = masterWord.pronunciation;
        }
      } else if (cell.type === 'sentence' && cell.masterSentenceId === masterId) {
        const masterSentence = allSentences.find(s => s.id === masterId);
        if (masterSentence) {
          cell.text = masterSentence.text;
        }
      }
    });
  });

  // テーブルを再描画
  renderTable();
}

/**
 * ════════════════════════════════════════════════════════
 * 修正版：handleSave()
 * レッスン名の変更処理を削除（editLessonTitle で既に処理済み）
 * ════════════════════════════════════════════════════════
 */

/**
 * ✅ 完全修正版：handleSave()
 * レッスン名の変更処理は削除
 */
function handleSave() {
  console.log('=== handleSave called ===');
  console.log('state:', JSON.stringify(state, null, 2));

  const isFukisoku1 = state.lesson && state.lesson.startsWith('不規則動詞①');
  const isFukisoku2 = state.lesson && state.lesson.startsWith('不規則動詞②');

  isSaving = true;
  updateUIForSaving();
  showLoadingIndicator('データを保存中...');

  let fukisokuDataMapToSave = {};

  // ===== 不規則動詞用データ準備 =====
  if (isFukisoku1 || isFukisoku2) {
    fukisokuDataMapToSave =
      convertTableDataToFukisokuMap(tableData, isFukisoku1);

    const originalDataMap = isFukisoku1
      ? window.fukisoku1DataMap || {}
      : window.fukisoku2DataMap || {};

    Object.entries(fukisokuDataMapToSave).forEach(([rowIdx, data]) => {
      const originalData = originalDataMap[rowIdx];
      if (!originalData) return;

      data.pastMasterId = originalData.pastMasterId || null;
      data.past = originalData.past || '';
      data.pastPronunciation = originalData.pastPronunciation || '';

      if (isFukisoku2) {
        data.pastPartMasterId = originalData.pastPartMasterId || null;
        data.pastPart = originalData.pastPart || '';
        data.pastPartPronunciation =
          originalData.pastPartPronunciation || '';
      }
    });
  }

  // ===== 保存処理開始 =====
  google.script.run
    .withFailureHandler(err => {
      console.error('❌ saveWords error:', err);
      finishSave();
    })
    .withSuccessHandler(() => {

      google.script.run
        .withFailureHandler(err => {
          console.error('❌ saveSentences error:', err);
          finishSave();
        })
        .withSuccessHandler(() => {

          // ===== 不規則動詞 =====
          if (isFukisoku1 || isFukisoku2) {
            google.script.run
              .withFailureHandler(err => {
                console.error('❌ saveFukisokuData error:', err);
                finishSave();
              })
              .withSuccessHandler(result => {
                finishSave();

                if (result?.success) {
                  alert('✅ スプレッドシートに保存しました！');
                  
                  // ✅ 新規：保存完了後にレッスン選択欄を更新
                  refreshLessonSelectAndCloseEditor();
                } else {
                  alert('❌ 保存失敗: ' + (result?.error || '不明なエラー'));
                }
              })
              .saveFukisokuData(
                state.year,
                state.textbook,
                state.grade,
                state.lesson,
                fukisokuDataMapToSave,
                allWords
              );

          // ===== 通常レッスン =====
          } else {
            google.script.run
              .withFailureHandler(err => {
                console.error('❌ saveLessonData error:', err);
                finishSave();
              })
              .withSuccessHandler(result => {
                finishSave();

                if (result?.success) {
                  alert('✅ スプレッドシートに保存しました！');
                  
                  // ✅ 新規：保存完了後にレッスン選択欄を更新
                  refreshLessonSelectAndCloseEditor();
                } else {
                  alert('❌ 保存失敗: ' + (result?.error || '不明なエラー'));
                }
              })
              .saveLessonData(
                state.year,
                state.textbook,
                state.grade,
                state.lesson,
                tableData,
                allWords,
                allSentences
              );
          }
        })
        .saveSentences(allSentences);
    })
    .saveWords(allWords);

  function finishSave() {
    hideLoadingIndicator();
    isSaving = false;
    hasChanges = false;
    state.isEdited = false;
    updateUIForSaving();
    const btn = document.getElementById('saveBtn');
    if (btn) btn.disabled = true;
  }
}

  showLoadingIndicator('レッスン一覧を更新中...');
  
  // ✅ 修正版：refreshLessonSelect() を呼び出し、完了後に処理実行

    const lessonSelect = document.getElementById('lessonSelect');

      hideLoadingIndicator();
      resetAfterSave();

    if (state.lesson) {

      options.forEach(option => {

        // 「その他」オプションを探す
        let otherOptionIndex = -1;
        const optionsArray = Array.from(options);
        optionsArray.forEach((option, index) => {
          if (option.value === 'other') {
            otherOptionIndex = index;
          }
        });

        // 新しいオプションを作成
        const newOption = document.createElement('option');
        newOption.value = state.lesson;
        newOption.textContent = state.lesson;

        // 「その他」の前に挿入（または最後に追加）
        if (otherOptionIndex !== -1 && otherOptionIndex < optionsArray.length - 1) {
          lessonSelect.insertBefore(newOption, optionsArray[otherOptionIndex]);
          console.log(`✅ 新しいオプション「${state.lesson}」を「その他」の前に追加しました`);
        } else {

/**
 * ✅ 修正関数：単語登録フォームを表示
 * 英語がなければ警告、他は任意
 */
function startRegisterWord() {
  if (editingWordItem) return;
  
  const leftPanel = document.getElementById('leftPanel');
  const wordList = leftPanel.querySelector('#wordList');
  
  if (!wordList) return;

  const formContainer = document.createElement('div');
  formContainer.className = 'word-registration-form';
  formContainer.style.cssText = `
    padding: 12px;
    margin: 8px 0;
    background-color: #e3f2fd;
    border: 2px solid #2196F3;
    border-radius: 4px;
    position: relative;
  `;

  const form = document.createElement('div');
  form.className = 'word-item-edit-form';
  form.innerHTML = `
    <div class="form-label">英語 *</div>
    <input type="text" class="register-english" placeholder="例: apple">
    <div class="form-label">発音</div>
    <input type="text" class="register-pronunciation" placeholder="例: アプル">
    <div class="form-label">日本語</div>
    <input type="text" class="register-japanese" placeholder="例: りんご">
  `;

  formContainer.appendChild(form);
  wordList.insertBefore(formContainer, wordList.firstChild);

  const englishInput = form.querySelector('.register-english');
  const pronunciationInput = form.querySelector('.register-pronunciation');
  const japaneseInput = form.querySelector('.register-japanese');

  englishInput.focus();

  editingWordItem = formContainer;

  let isProcessing = false;

  const saveRegister = () => {
    if (isProcessing) return;
    isProcessing = true;

    const english = englishInput.value.trim();
    const pronunciation = pronunciationInput.value.trim();
    const japanese = japaneseInput.value.trim();

    if (!english) {
      alert('英語を入力してください');
      englishInput.focus();
      isProcessing = false;
      return;
    }

    const existingWord = allWords.find(w => w.english.toLowerCase() === english.toLowerCase());

    if (existingWord) {
      isProcessing = false;
      showDuplicateDialog(
        `⚠️ すでに登録されているものがあります`,
        `【既存のデータ】\n英語: ${existingWord.english}\n発音: ${existingWord.pronunciation || '（なし）'}\n日本語: ${existingWord.japanese || '（なし）'}`,
        () => performUpdateWord(existingWord, english, pronunciation, japanese, formContainer),
        () => performNewRegistrationWord(english, pronunciation, japanese, formContainer)
      );
    } else {
      performNewRegistrationWord(english, pronunciation, japanese, formContainer);
    }
  };

  const cancelRegister = () => {
    if (isProcessing) return;
    isProcessing = true;

    if (formContainer.parentNode) {
      formContainer.remove();
    }
    editingWordItem = null;
  };

  englishInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      saveRegister();
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      cancelRegister();
    }
  });

  form.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      cancelRegister();
    }
  });

  const handleClickOutside = (e) => {
    if (!formContainer.parentNode) {
      document.removeEventListener('click', handleClickOutside);
      editingWordItem = null;
      return;
    }

    if (!formContainer.contains(e.target) && editingWordItem === formContainer) {
      const english = englishInput.value.trim();
      
      if (!english) {
        cancelRegister();
      } else {
        saveRegister();
      }
    }
  };

  setTimeout(() => {
    document.addEventListener('click', handleClickOutside);
  }, 0);
}

    if (formContainer.parentNode) {
      formContainer.remove();
    }
    editingWordItem = null;
  };

  japaneseInput.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      sentenceInput.focus();
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      cancelRegister();
    }
  });

  sentenceInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      saveRegister();
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      cancelRegister();
    }
  });

  pronunciationInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      saveRegister();
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      cancelRegister();
    }
  });

  const handleClickOutside = (e) => {
    if (!formContainer.parentNode) {
      document.removeEventListener('click', handleClickOutside);

    if (!formContainer.contains(e.target) && editingWordItem === formContainer) {
      const text = sentenceInput.value.trim();

      if (!text) {
        cancelRegister();
      } else {
        saveRegister();
      }
    }
  };

  setTimeout(() => {
    document.addEventListener('click', handleClickOutside);
  }, 0);
}

        isSaving = false;

/**

function setupRightPanelDragDropWB() {
  const panel = document.getElementById('selectedLessonPanel');

  panel.addEventListener('dragover', (e) => {
    if (draggedLessonName && draggedLessonIdx === undefined) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      panel.classList.add('drag-over');
    }
  });

  panel.addEventListener('dragleave', (e) => {
    if (e.target === panel) {
      panel.classList.remove('drag-over');
    }
  });

  panel.addEventListener('drop', (e) => {
    e.preventDefault();
    panel.classList.remove('drag-over');

    if (draggedLessonName && draggedLessonIdx === undefined && availableLessons.includes(draggedLessonName)) {
      if (!selectedLessons.includes(draggedLessonName)) {
        selectedLessons.push(draggedLessonName);
      } else {

      renderSelectedLessonPanelWB();
      draggedLessonName = null;
      draggedLessonIdx = undefined;

/**

/**
 * 右パネル：選択済みレッスンを表示
 */
function renderSelectedLessonPanel() {
  const container = document.getElementById('selectedLessonPanel');
  container.innerHTML = '';

  // ✅ 新規：padding-bottom を追加（ドラッグ&ドロップ用の余白）
  container.style.paddingBottom = '80px';

  if (selectedLessons.length === 0) {
    container.innerHTML = '<div class="no-data-message">左パネルからレッスンをドラッグして追加してください</div>';
    document.getElementById('selectedLessonCount').textContent = '(0)';
    return;
  }

  const list = document.createElement('div');
  list.style.display = 'flex';
  list.style.flexDirection = 'column';
  list.style.gap = '6px';

  selectedLessons.forEach((lesson, idx) => {
    const item = document.createElement('div');
    item.className = 'selected-lesson-item';
    item.draggable = true;
    item.dataset.lessonName = lesson;
    item.dataset.index = idx;

    // 番号
    const number = document.createElement('div');
    number.className = 'selected-lesson-number';
    number.textContent = idx + 1;

    // レッスン名
    const name = document.createElement('div');
    name.className = 'selected-lesson-name';
    name.textContent = lesson;

    // コントロール
    const controls = document.createElement('div');
    controls.className = 'selected-lesson-controls';

    const btnUp = document.createElement('button');
    btnUp.className = 'btn-move';
    btnUp.textContent = '↑';
    btnUp.disabled = idx === 0;
    btnUp.addEventListener('click', () => moveLessonUp(idx));

    const btnDown = document.createElement('button');
    btnDown.className = 'btn-move';
    btnDown.textContent = '↓';
    btnDown.disabled = idx === selectedLessons.length - 1;
    btnDown.addEventListener('click', () => moveLessonDown(idx));

    controls.appendChild(btnUp);
    controls.appendChild(btnDown);

    item.appendChild(number);
    item.appendChild(name);
    item.appendChild(controls);

    // ドラッグイベント（右パネル内での入れ替え）
    item.addEventListener('dragstart', (e) => {
      draggedLessonName = lesson;
      draggedLessonIdx = idx;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
    });

    item.addEventListener('dragover', (e) => {
      e.preventDefault();
      item.classList.add('drag-over');
      e.dataTransfer.dropEffect = 'move';
    });

    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over');
    });

    item.addEventListener('drop', (e) => {
      e.preventDefault();
      item.classList.remove('drag-over');

      if (draggedLessonName && draggedLessonName !== lesson) {
        const draggedIdx = selectedLessons.indexOf(draggedLessonName);
        if (draggedIdx !== -1 && draggedIdx !== idx) {
          const temp = selectedLessons[draggedIdx];
          selectedLessons[draggedIdx] = selectedLessons[idx];
          selectedLessons[idx] = temp;

          renderSelectedLessonPanel();
        }
      }
    });

    list.appendChild(item);
  });

  container.appendChild(list);
  document.getElementById('selectedLessonCount').textContent = `(${selectedLessons.length})`;

  setupLeftPanelDragDropForDelete();
}

 * ════════════════════════════════════════
 */

/**
 * レッスンを上に移動
 */
function moveLessonUp(idx) {
  if (idx === 0) return;

  const temp = selectedLessons[idx];
  selectedLessons[idx] = selectedLessons[idx - 1];
  selectedLessons[idx - 1] = temp;

  renderSelectedLessonPanel();
}

/**
 * レッスンを下に移動
 */
function moveLessonDown(idx) {
  if (idx === selectedLessons.length - 1) return;

  const temp = selectedLessons[idx];
  selectedLessons[idx] = selectedLessons[idx + 1];
  selectedLessons[idx + 1] = temp;

  renderSelectedLessonPanel();
}

/**
 * レッスンを削除
 */
function removeLesson(idx) {
  selectedLessons.splice(idx, 1);
  renderSelectedLessonPanel();
}

    <div style="font-size: 12px; opacity: 0.9;">ファイル名: ${escapeHtmlForToast(fileName)}</div>
  `;

  toastContainer.appendChild(toast);

  // 3秒後に自動削除
  setTimeout(() => {
    toast.style.animation = 'slideOut 0.3s ease-out';
    setTimeout(() => {
      toast.remove();
    }, 300);
  }, 3000);
}

/**
 * ✅ 新規：HTMLエスケープ（トースト用）
 */
function escapeHtmlForToast(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

  const displayItems = [];
  if (document.getElementById('pdfShowJapanese').checked) displayItems.push('japanese');
  if (document.getElementById('pdfShowEnglish').checked) displayItems.push('english');
  if (document.getElementById('pdfShowPronunciation').checked) displayItems.push('pronunciation');
  if (document.getElementById('pdfShowScore').checked) displayItems.push('score');

  if (displayItems.length === 0) {
    alert('少なくとも1つの項目をチェックしてください');
    return;
  }

  const pdfSuffix = generatePdfSuffix(displayItems);

  setAllButtonsDisabled(true);
  showLoadingIndicator('PDFデータを取得中...');

  console.log('📌 PDF用レッスンデータ取得開始');
  console.log('year:', year, 'textbook:', textbook, 'grade:', grade);

  google.script.run
    .withSuccessHandler(result => {
      console.log('✅ getAllLessonsDataForExamPrep 成功:', result);
      
      // ✅ デバッグ：過去分詞データを確認
      if (result.lessons && result.lessons.length > 0) {
        result.lessons.forEach((lesson, idx) => {
          console.log(`📌 レッスン[${idx}]: ${lesson.lesson}`);
          if (lesson.tableData && lesson.tableData.length > 0) {
            lesson.tableData.forEach((row, rowIdx) => {
              if (row[2]) { // 過去分詞セル
                console.log(`  過去分詞[${rowIdx}]:`, row[2]);
              }
            });
          }
        });
      }
      
      handlePdfDataSuccess(result, year, textbook, grade, displayItems, pdfSuffix);
    })
    .withFailureHandler(err => {
      console.error('❌ getAllLessonsDataForExamPrep エラー:', err);
      hideLoadingIndicator();
      setAllButtonsDisabled(false);
      alert(`❌ データ取得に失敗しました\n\nエラー: ${err}`);
    })
    .getAllLessonsDataForExamPrep(year, textbook, grade);
}

/**
 * ✅ 新規関数：PDF データ取得成功時の共通処理
 */
function handlePdfDataSuccess(result, year, textbook, grade, displayItems, pdfSuffix) {
  console.log('📌 handlePdfDataSuccess 開始');
  console.log('result:', result);

  if (!result || !result.lessons || result.lessons.length === 0) {
    hideLoadingIndicator();
    setAllButtonsDisabled(false);
    alert('❌ レッスンデータが見つかりません');
    return;
  }

  console.log('📌 レッスンデータ数:', result.lessons.length);
  console.log('📌 PDFを生成中...');

  showLoadingIndicator('PDFを生成中...');

  google.script.run
    .withSuccessHandler(pdfResult => {
      console.log('✅ generateAndSavePdf 応答受信:', pdfResult);

      try {
        if (pdfResult && pdfResult.success) {
          showSaveCompletedMessage(pdfResult.fileName);
        } else {
          alert(`❌ PDF生成に失敗しました: ${pdfResult?.error || '不明なエラー'}`);
        }
      } catch (e) {
        // ★ successHandler 内の JS エラー対策
        console.error('❌ successHandler 内エラー:', e);
        alert('PDFは生成されましたが、画面処理中にエラーが発生しました');
      } finally {
        // ★ 何が起きても必ず UI を復帰させる
        hideLoadingIndicator();
        setAllButtonsDisabled(false);
        console.log('📌 UI 復帰完了');
      }
    })
    .withFailureHandler(err => {
      console.error('❌ generateAndSavePdf 通信エラー:', err);
      hideLoadingIndicator();
      setAllButtonsDisabled(false);
      alert(`❌ PDF生成に失敗しました\n\nエラー: ${err}`);
    })
    .generateAndSavePdf(
      year,
      textbook,
      grade,
      displayItems,
      result.lessons,
      pdfSuffix,
      false,
      result.allWords
    );
}

/**
 * ✅ 新規関数：特殊レイアウト判定（フロント側）
 * @param {string} lessonName - レッスン名
 * @returns {boolean} 特殊レイアウトならtrue
 */
function isSpecialLayoutLesson(lessonName) {
  if (!lessonName) return false;

  // 不規則動詞①②
  if (lessonName.startsWith('不規則動詞①') || lessonName.startsWith('不規則動詞②')) {
    return true;
  }

  // 曜日・月・季節・代名詞（完全一致）
  if (lessonName === '曜日・月・季節・代名詞') {
    return true;
  }

  return false;
}

/**
 * ✅ 新規関数：チェックボックス状況からPDF名のサフィックスを生成
 * @param {Array} displayItems - チェック状況の配列
 * @returns {string} PDF名のサフィックス（例："all", "JP_EN_PR", "JP_SC"）
 */
function generatePdfSuffix(displayItems) {
  // 4つすべてチェック → "all"
  if (displayItems.length === 4) {
    return 'all';
  }

  // チェックされているものを略称に変換
  const suffixMap = {
    'japanese': 'JP',
    'english': 'EN',
    'pronunciation': 'PR',
    'score': 'SC'
  };

  const suffix = displayItems.map(item => suffixMap[item]).join('_');
  return suffix;
}

    console.log('🚀 アプリケーション起動');

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
  } else {
    setTimeout(initApp, 0);
  }

})();
