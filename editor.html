<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英単語テスト作成 - エディター</title>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Meiryo', Arial, sans-serif;
      background-color: #fff;
    }

    .editor-container {
      display: flex;
      height: 100vh;
      background-color: #fff;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background-color: #333;
      color: white;
      border-bottom: 2px solid #ddd;
    }

    .top-bar-left {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .btn-back {
      padding: 8px 12px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Meiryo', Arial, sans-serif;
    }

    .btn-back:hover {
      background-color: #0b7dda;
    }

    .btn-save {
      padding: 8px 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      font-family: 'Meiryo', Arial, sans-serif;
      transition: background-color 0.3s;
    }

    .btn-save:hover:not(:disabled) {
      background-color: #45a049;
    }

    .btn-save:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .left-panel {
      width: 30%;
      border-right: 2px solid #ddd;
      overflow-y: auto;
      padding: 20px;
      background-color: #f9f9f9;
    }

    .left-panel.drag-over {
      background-color: #ffebee;
    }

    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;             /* ✅ タブを縮小しない（固定） */
    }

    .tab-button {
      padding: 6px 12px;
      background-color: #ddd;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s;
      font-family: 'Meiryo', Arial, sans-serif;
    }

    .tab-button.active {
      background-color: #4CAF50;
      color: white;
    }

    .word-item {
      padding: 12px;
      margin: 8px 0;
      background-color: #e3f2fd;
      border: 2px solid #2196F3;
      border-radius: 4px;
      cursor: grab;
      user-select: none;
      position: relative;
    }

    .word-item.editing {
      background-color: #fff;
      border: 2px solid #ff9800;
      cursor: default;
      padding: 8px;
    }

    .word-item-english {
      font-size: 16px;
      font-weight: bold;
      color: #1976D2;
      word-break: break-all;
    }

    .word-item-pronunciation {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .word-item-japanese {
      font-size: 14px;
      color: #333;
      margin-top: 4px;
      word-break: break-all;
    }

    .word-item-edit-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .word-item-edit-form input {
      padding: 6px;
      font-size: 12px;
      border: 1px solid #999;
      border-radius: 3px;
      font-family: 'Meiryo', Arial, sans-serif;
      width: 100%;
    }

    .word-item-edit-form input:focus {
      outline: none;
      border-color: #2196F3;
      box-shadow: 0 0 4px rgba(33, 150, 243, 0.5);
    }

    .word-item-edit-form .form-label {
      font-size: 10px;
      font-weight: bold;
      color: #666;
      margin-top: 4px;
    }

    .word-item-edit-form .form-label:first-of-type {
      margin-top: 0;
    }

    .word-item-edit-buttons {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }

    .word-item-edit-save {
      flex: 1;
      padding: 6px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      font-family: 'Meiryo', Arial, sans-serif;
    }

    .word-item-edit-save:hover {
      background-color: #45a049;
    }

    .word-item-edit-cancel {
      flex: 1;
      padding: 6px;
      background-color: #f44336;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      font-family: 'Meiryo', Arial, sans-serif;
    }

    .word-item-edit-cancel:hover {
      background-color: #da190b;
    }

    .edit-field {
      margin: 4px 0;
      display: flex;
      flex-direction: column;
    }

    .edit-field label {
      font-size: 10px;
      font-weight: bold;
      margin-bottom: 2px;
      color: #666;
    }

    .edit-field input {
      padding: 4px;
      font-size: 11px;
      border: 1px solid #999;
      border-radius: 3px;
      font-family: 'Meiryo', Arial, sans-serif;
    }

    .edit-buttons {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }

    .edit-btn-save {
      flex: 1;
      padding: 4px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
    }

    .edit-btn-cancel {
      flex: 1;
      padding: 4px;
      background-color: #f44336;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
    }

    .sentence-item {
      padding: 12px;
      margin: 8px 0;
      background-color: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 4px;
      cursor: grab;
      user-select: none;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-all;
      position: relative;
    }

    .sentence-item:active {
      cursor: grabbing;
    }

    .sentence-item.dragging {
      opacity: 0.5;
    }

    .right-panel {
      width: 70%;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }

    .editor-header h2 {
      font-size: 28px;
      color: #333;
    }

    .table-wrapper {
      flex: 1;
      overflow: auto;
      margin-bottom: 20px;
    }

    .word-table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
    }

    .word-table tr {
      height: 60px;
    }

    .word-table td {
      border: 1px solid #999;
      padding: 8px;
      vertical-align: top;
      background-color: #fff;
      position: relative;
      overflow: hidden;
      min-width: 100px;
      width: 33.333%;
    }

    .word-table td.filled {
      background-color: #fffacd;
    }

    .word-table td.drag-over {
      background-color: #ffeb3b;
      border: 2px dashed #f57f17;
    }

    .cell-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      cursor: grab;
      position: relative;
    }

    .cell-content:active {
      cursor: grabbing;
    }

    .cell-japanese {
      font-size: 12px;
      color: #333;
      word-break: break-all;
      margin-bottom: 4px;
    }

    .cell-english {
      font-size: 14px;
      font-weight: bold;
      color: #1976D2;
      margin-bottom: 2px;
      word-break: break-all;
    }

    .cell-pronunciation {
      font-size: 10px;
      color: #999;
      margin-top: 2px;
      font-style: italic;
      word-break: break-all;
    }

    .cell-sentence {
      font-size: 11px;
      line-height: 1.4;
      color: #333;
      word-break: break-all;
    }

    .saving-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      background-color: #4CAF50;
      color: white;
      border-radius: 4px;
      font-size: 14px;
      display: none;
      z-index: 1000;
    }

    .saving-indicator.show {
      display: block;
      animation: fadeInOut 2s;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* 選択パネル（折りたたみ可能） */
    .selection-panel {
      background-color: #f0f0f0;
      border-bottom: 2px solid #ddd;
      transition: max-height 0.3s ease;
      overflow: hidden;
    }

    .selection-panel.collapsed {
      max-height: 50px;
    }

    .selection-panel.expanded {
      max-height: none;
    }

    .selection-header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 12px 20px;
      background-color: #333;
      color: white;
      cursor: pointer;
      user-select: none;
      min-height: 80px;
      gap: 20px;
    }

    .selection-header:hover {
      background-color: #444;
    }

.selection-toggle {
  font-size: 18px;
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 4px;
}

.toggle-icon {
  transition: transform 0.3s;
}

.toggle-icon.collapsed {
  transform: rotate(180deg);
}


    .selection-content {
      padding: 20px;
    }

    /* フォームグループ */
    .form-group {
      margin-bottom: 15px;
      display: inline-block;
      width: 23%;
      margin-right: 2%;
      vertical-align: top;
    }

    .form-group:nth-child(4n) {
      margin-right: 0;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
      font-size: 13px;
    }

    .form-group select,
    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Meiryo', Arial, sans-serif;
    }

    .form-group select:disabled {
      background-color: #f5f5f5;
      color: #999;
    }

    .form-group input:disabled {
      background-color: #f5f5f5;
      color: #999;
    }

    /* ボタングループ */
    .button-group {
      margin-top: 15px;
      text-align: right;
      padding-top: 15px;
      border-top: 1px solid #ddd;
    }

    .btn-new {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: bold;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
      font-family: 'Meiryo', Arial, sans-serif;
      transition: background-color 0.3s;
    }

    .btn-new:hover:not(:disabled) {
      background-color: #45a049;
    }

    .btn-new:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .btn-reset {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: bold;
      background-color: #757575;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
      font-family: 'Meiryo', Arial, sans-serif;
    }

    .btn-reset:hover {
      background-color: #616161;
    }

    /* 隠す */
    .hidden {
      display: none;
    }

    /* カスタムレッスン入力グループ */
    .lesson-input-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .lesson-input-group input {
      flex: 1;
    }

    .lesson-input-group button {
      padding: 8px 12px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Meiryo', Arial, sans-serif;
      font-weight: bold;
      font-size: 12px;
    }

    .lesson-input-group button:hover {
      background-color: #0b7dda;
    }

    /* エディターエリア */
    .editor-area {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 20px;
      padding: 20px;
      position: relative;
      background-color: white;
    }

    .editor-area.no-data {
      justify-content: center;
      align-items: center;
    }

    .no-data-message {
      text-align: center;
      color: #666;
      font-size: 16px;
      padding: 40px;
    }

    /* トップバー（エディター内） */
    .editor-area .btn-save {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* レスポンシブ */
    @media (max-width: 1200px) {
      .form-group {
        width: 48%;
        margin-right: 2%;
      }

      .form-group:nth-child(2n) {
        margin-right: 0;
      }
    }

    .editor-top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      min-height: 100px;
      padding: 15px 20px;
      background-color: #f5f5f5;
      border-bottom: 2px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 12px;
      z-index: 10;
    }

    .editor-title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background-color: #f9f9f9;
      border-bottom: 2px solid #ddd;
      min-height: 60px;
    }

    #lessonDisplay {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      transition: color 0.3s, background-color 0.3s;
      padding: 10px 20px;
      border-radius: 4px;
    }

    #lessonDisplay.editor-lesson-title-custom {
      cursor: pointer;
      border: 2px solid #2196F3;
      background-color: #e3f2fd;
      color: #1976D2;
    }

    #lessonDisplay.editor-lesson-title-custom:hover {
      background-color: #bbdefb;
    }

    .editor-left-panel {
      width: 30%;
      margin-top: 100px;
      border-right: 2px solid #ddd;
      overflow-y: hidden;
      padding: 20px;
      background-color: #f9f9f9;
      display: flex;
      flex-direction: column;
    }

    #wordList {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
    }

    .editor-right-panel {
      width: 70%;
      margin-top: 100px;
      padding: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .editor-lesson-title-custom {
      border-color: #2196F3 !important;
      background-color: #e3f2fd !important;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #fff;
    }

    /* タブヘッダー */
    .tab-header {
      display: flex;
      gap: 0;
      background-color: #333;
      border-bottom: 2px solid #ddd;
      padding-left: 20px;
    }

    .tab-btn {
      padding: 12px 20px;
      background-color: #555;
      color: white;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      font-family: 'Meiryo', Arial, sans-serif;
      transition: all 0.3s;
    }

    .tab-btn:hover {
      background-color: #666;
    }

    .tab-btn.active {
      background-color: #4CAF50;
      border-bottom: 3px solid #45a049;
    }

    /* タブコンテンツ */
    .tab-content {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    .tab-content.active {
      display: flex;
    }

    /* エディター用 */
    #editor-tab {
      flex-direction: column;
    }

    /* 単語帳作成用 */
    #wordbook-tab {
      flex-direction: column;
    }

    /* 既存の .editor-container を調整 */
    .editor-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
    }

.word-table td.drag-forbidden {
  background-color: #ffcccc !important;
  border: 2px dashed #ff6b6b !important;
  cursor: not-allowed;
}

    /* ════════════════════════════════════════
       単語帳作成ページ用の追加スタイル
       ════════════════════════════════════════ */

    /* 単語帳用コンテナ */
    .wordbook-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
      position: relative;
    }

    #wordbookArea {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      margin-bottom: 70px; /* 下部ボタングループ用の余白 */
      background-color: white;
    }

    .lesson-list-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lesson-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lesson-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background-color: #e3f2fd;
      border: 2px solid #2196F3;
      border-radius: 4px;
      cursor: grab;
      user-select: none;
      transition: all 0.2s;
    }

    .lesson-item:active {
      cursor: grabbing;
    }

    .lesson-item.dragging {
      opacity: 0.5;
    }

    .lesson-item.drag-over {
      background-color: #ffeb3b;
      border-color: #f57f17;
    }

    .lesson-item.exam-prep {
      background-color: #fff3cd;
      border-color: #ffc107;
    }

    .lesson-number {
      font-size: 16px;
      font-weight: bold;
      color: #1976D2;
      min-width: 30px;
      text-align: center;
    }

    .lesson-name {
      flex: 1;
      font-size: 14px;
      color: #333;
      word-break: break-all;
    }

    .lesson-controls {
      display: flex;
      gap: 4px;
    }

    .btn-move {
      padding: 6px 8px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .btn-move:hover:not(:disabled) {
      background-color: #0b7dda;
    }

    .btn-move:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .btn-remove {
      padding: 6px 8px;
      background-color: #f44336;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .btn-remove:hover {
      background-color: #da190b;
    }

    .exam-prep-separator {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 12px 0;
      color: #ffc107;
      font-weight: bold;
      font-size: 12px;
    }

    .exam-prep-label {
      background-color: #f5f5f5;
      padding: 6px 12px;
      border-radius: 4px;
      color: #ffc107;
    }

    .button-group-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      background-color: #f5f5f5;
      border-top: 2px solid #ddd;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .button-group-bottom .btn-reset {
      background-color: #757575;
    }

    .button-group-bottom .btn-reset:hover {
      background-color: #616161;
    }

  @keyframes slideIn {
    from {
      transform: translateX(400px);
    opacity: 0;
   }
    to {
     transform: translateX(0);
     opacity: 1;
   }
 }

  @keyframes slideOut {
   from {
     transform: translateX(0);
      opacity: 1;
    }
    to {
      transform: translateX(400px);
      opacity: 0;
    }
  }

.word-table td.drag-forbidden:after {
  content: '⛔';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
  opacity: 0.5;
}

/* ════════════════════════════════════════════════════════
   2パネルレッスン選択UI - スタイル
   ════════════════════════════════════════════════════════ */

.lesson-panel {
  display: flex;
  flex-direction: column;
  background-color: #f9f9f9;
  border: 2px solid #ddd;
  border-radius: 8px;
  overflow: hidden;
}

.panel-header {
  padding: 15px;
  background-color: #f0f0f0;
  border-bottom: 2px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-header h3 {
  margin: 0;
  font-size: 16px;
  color: #333;
}

.lesson-count {
  font-size: 12px;
  color: #999;
  font-weight: bold;
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* ════════════════════════════════════════
   利用可能レッスンアイテム（左パネル）
   ════════════════════════════════════════ */

.available-lesson-item {
  padding: 10px 12px;
  margin: 6px 0;
  background-color: #e3f2fd;
  border: 2px solid #2196F3;
  border-radius: 4px;
  cursor: grab;
  user-select: none;
  font-size: 13px;
  color: #333;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.available-lesson-item:hover {
  background-color: #bbdefb;
  border-color: #1976D2;
}

.available-lesson-item:active {

/**

function showDuplicateDialog(title, message, onOverwrite, onNewRegister) {
  // オーバーレイ
  const overlay = document.createElement('div');
  overlay.id = 'duplicateDialogOverlay_' + Date.now();  // ✅ ユニークなIDを付与
  overlay.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;

  // ダイアログボックス

  dialog.style.cssText = `
    background-color: white;

  `;

  // ✅ 修正：ダイアログを閉じる共通関数（必ず DOM から削除）
  const closeDialog = () => {
    const overlayEl = document.getElementById(overlay.id);
    if (overlayEl && overlayEl.parentNode) {
      overlayEl.parentNode.removeChild(overlayEl);
      console.log('✅ ダイアログを削除しました');

  };

  // 「キャンセル」ボタン

    e.stopPropagation();

  overwriteBtn.textContent = '既存のものに上書きする';
  overwriteBtn.style.cssText = `
    flex: 1;
    padding: 10px 16px;
    background-color: #f44336;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;

  overwriteBtn.addEventListener('mouseleave', () => overwriteBtn.style.backgroundColor = '#f44336');
  overwriteBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    console.log('上書きボタン押下');
    closeDialog();
    // ✅ ダイアログ削除後に遅延でコールバック実行
    setTimeout(() => {
      onOverwrite();

  });

  // 「別のものとして登録する」ボタン

    setTimeout(() => {

      console.log('オーバーレイ背景クリック');
      closeDialog();
    }
  }, true);  // ✅ キャプチャフェーズで処理
}

/**
 * 年度一覧をサーバーから取得してセレクトに追加
 */
function loadYears() {
  showLoadingIndicator('年度を読み込み中...');
  
  google.script.run
    .withSuccessHandler(data => {
      hideLoadingIndicator();
      
      const select = document.getElementById('yearSelect');
      select.innerHTML = '<option value="">選択してください</option>';
      data.years.forEach(year => {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        select.appendChild(option);
      });
    })
    .withFailureHandler(err => {
      hideLoadingIndicator();
      console.error('getYears エラー:', err);
      alert('❌ 年度の読み込みに失敗しました。\n\nエラー: ' + err);
    })
    .getEditorYears();
}

/**
 * ✅ 新規関数：カスタムレッスン入力時の選択欄更新
 * 「その他」で入力したレッスン名を選択欄に反映
 * 
 * @param {string} customLesson - カスタムレッスン名
 */
function updateLessonSelectForCustom(customLesson) {
  const lessonSelect = document.getElementById('lessonSelect');
  
  if (!lessonSelect) {
    console.warn('⚠️ lessonSelect が見つかりません');
    return;
  }

  // 選択欄内に該当するレッスン名のオプションがあるか確認
  const options = lessonSelect.querySelectorAll('option');
  let found = false;

  options.forEach(option => {
    if (option.value === customLesson) {
      lessonSelect.value = customLesson;
      found = true;
      console.log(`✅ 選択欄を「${customLesson}」に更新しました`);
    }
  });

  if (!found) {
    // 選択欄にない場合は、新しいオプションをカスタムレッスンの前に追加
    console.log(`⚠️ 選択欄に「${customLesson}」が見つかりません。新しいオプションを追加します。`);
    
    // 「その他」オプションを探す
    let otherOptionIndex = -1;
    const optionsArray = Array.from(options);
    optionsArray.forEach((option, index) => {
      if (option.value === 'other') {
        otherOptionIndex = index;
      }
    });

    // 新しいオプションを作成
    const newOption = document.createElement('option');
    newOption.value = customLesson;
    newOption.textContent = customLesson;

    // 「その他」の前に挿入（または最後に追加）
    if (otherOptionIndex !== -1 && otherOptionIndex < optionsArray.length - 1) {
      lessonSelect.insertBefore(newOption, optionsArray[otherOptionIndex]);
      console.log(`✅ 新しいオプション「${customLesson}」を「その他」の前に追加しました`);
    } else {
      lessonSelect.appendChild(newOption);
      console.log(`✅ 新しいオプション「${customLesson}」を追加しました`);
    }

    // 新しいオプションを選択
    lessonSelect.value = customLesson;
    console.log(`✅ 選択欄を「${customLesson}」に設定しました`);
  }
}

 */
function loadEditorData() {

  console.log('state:', state);
  
  searchQuery = '';
  currentItemType = 'word';
  rightPanelFocusCell = { rowIdx: 0, colIdx: 0 };

  const isFukisoku2 = state.lesson && state.lesson.startsWith('不規則動詞②');

    maxRows = 22;
  } else if (isFukisoku2) {
    maxRows = 25;
  }

          .withSuccessHandler(fukisokuResult => {

            if (fukisokuResult.success && fukisokuResult.fukisokuDataMap) {
              // ✅ 修正版：fukisokuDataMap を tableData に変換
              tableData = convertFukisokuMapToTableData(

                isFukisoku1

/**
 * 単語の検索用キーを生成（先頭文字検索用）
 * 記号を除いて、英字から始まる部分を基準にする
 * 例：~as...as → as
 * 例：(about) → about
 */
function getSearchKeyForWord(word) {
  // 英語：先頭の記号を除去して、英字から始まる部分を取得
  let english = word.english.trim();
  
  // 先頭の記号を全て除去（英字が出現するまで）
  let englishKey = english.replace(/^[^a-zA-Z]+/, '').toLowerCase();
  
  // 日本語：そのまま使用
  let japaneseKey = word.japanese.toLowerCase();
  
  return { englishKey, japaneseKey, originalEnglish: english };
}

/**
 * ════════════════════════════════════════════════════════
 * エディター描画：DOM生成とレンダリング
 * ════════════════════════════════════════════════════════
 */

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

/**
 * 新規関数：右パネルのカウント数を更新
 * 〇 = テーブル内の単語数 + 英文数×2
 * △ = 〇 × 0.9 の整数部分
 * 表示形式：△/〇（例：9/10）
 */
function updateCounts() {
  let wordCount = 0;
  let sentenceCount = 0;

  tableData.forEach((row) => {
    row.forEach((cell) => {
      if (!cell) return;

      if (cell.type === 'word') {
        wordCount++;
      } else if (cell.type === 'sentence') {
        sentenceCount++;
      }
    });
  });

  // 〇 = 単語数 + 英文数×2
  const circleCount = wordCount + sentenceCount * 2;

  // △ = 〇 × 0.9 の整数部分（小数点以下切り捨て）
  const triangleCount = Math.round(circleCount * 0.9);

  const countCircleEl = document.getElementById('countCircle');
  const countTriangleEl = document.getElementById('countTriangle');

  if (countCircleEl && countTriangleEl) {
    countTriangleEl.textContent = triangleCount;
    countCircleEl.textContent = circleCount;
  }

  console.log(`カウント更新: △=${triangleCount}, 〇=${circleCount}`);
}

/**
 * ✅ 新規関数：左パネルのキーボード操作を設定
 */
/**
 * ✅ 新規関数：照準のアイテムをテーブルに追加
 */
function addFocusedItemToTable(item) {
  const { rowIdx, colIdx } = rightPanelFocusCell;

  // ════════════════════════════════════════
  // 英文の場合
  // ════════════════════════════════════════
  if (currentItemType === 'sentence') {
    // 英文は3列使用するため、最初の空きの3列結合セルを探す
    let insertedRowIdx = -1;

    // ✅ 修正：照準位置から下へ探す
    for (let r = rowIdx; r < 16; r++) {
      // その行に単語がないかチェック
      const hasWord = tableData[r].some(cell => cell && cell.type === 'word');
      
      if (!hasWord) {
        // その行に文を配置可能
        tableData[r][0] = {
          type: 'sentence',
          text: item.text,
          pronunciation: item.pronunciation || '',
          japanese: item.japanese || '',
          masterSentenceId: item.id,
          cellId: calculateCellId(r, 0)
        };
        tableData[r][1] = null;
        tableData[r][2] = null;

        insertedRowIdx = r;
        break;
      }
    }

    // ✅ 修正：照準位置より上に空きセルがない場合は0から探す
    if (insertedRowIdx === -1 && rowIdx > 0) {
      for (let r = 0; r < rowIdx; r++) {
        const hasWord = tableData[r].some(cell => cell && cell.type === 'word');
        
        if (!hasWord) {
          tableData[r][0] = {
            type: 'sentence',
            text: item.text,
            pronunciation: item.pronunciation || '',
            japanese: item.japanese || '',
            masterSentenceId: item.id,
            cellId: calculateCellId(r, 0)
          };
          tableData[r][1] = null;
          tableData[r][2] = null;

          insertedRowIdx = r;
          break;
        }
      }
    }

    if (insertedRowIdx === -1) {
      // 追加できない
      alert('❌ 配置可能な行がありません');
      return;
    }

    hasChanges = true;
    document.getElementById('saveBtn').disabled = false;

    // ✅ 修正：照準を次の空きの行に移動（renderTable() 呼び出し前に設定！）
    let nextRowIdx = insertedRowIdx + 1;
    
    // 次の空きの行（単語がない行）を探す
    while (nextRowIdx < 16) {
      const nextRowHasWord = tableData[nextRowIdx].some(cell => cell && cell.type === 'word');
      if (!nextRowHasWord) {
        // この行に単語も文も配置されていない → 照準をここに移動
        rightPanelFocusCell = { rowIdx: nextRowIdx, colIdx: 0 };
        break;
      }
      nextRowIdx++;
    }

    // ✅ 重要：renderTable() 呼び出し前に rightPanelFocusCell を更新済み
    renderTable();

    // ✅ 新規：ドラッグ完了後に検索欄をクリア
    clearSearchAfterDrop();
    return;
  }

  // ════════════════════════════════════════
  // 単語の場合
  // ════════════════════════════════════════
  
  // 照準位置から次の空きセルを探す
  let foundRowIdx = -1;
  let foundColIdx = -1;

  // 現在のcolIdxから探す
  for (let c = colIdx; c < 3; c++) {
    for (let r = (c === colIdx ? rowIdx : 0); r < 16; r++) {
      if (tableData[r][c] === null) {
        foundRowIdx = r;
        foundColIdx = c;
        break;
      }
    }
    if (foundRowIdx !== -1) break;
  }

  if (foundRowIdx === -1) {
    // 空きセルがない
    alert('❌ 配置可能なセルがありません');
    return;
  }

  // セルに単語を追加
  const newCellId = calculateCellId(foundRowIdx, foundColIdx);
  tableData[foundRowIdx][foundColIdx] = {
    type: 'word',
    english: item.english,
    japanese: item.japanese,
    pronunciation: item.pronunciation || '',
    masterWordId: item.id,
    cellId: newCellId
  };

  hasChanges = true;
  document.getElementById('saveBtn').disabled = false;
  renderTable();

  // ✅ 新規：ドラッグ完了後に検索欄をクリア
  clearSearchAfterDrop();

  // ✅ 修正版：不規則動詞の場合、過去形・過去分詞を自動検索して fukisokuDataMap に追加
  const isFukisoku1Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞①');
  const isFukisoku2Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞②');

  if (isFukisoku1Check || isFukisoku2Check) {
    const fukisokuDataMap = isFukisoku1Check 
      ? (window.fukisoku1DataMap || {}) 
      : (window.fukisoku2DataMap || {});

    console.log('📌 Searching for past forms of:', item.english);

    // 過去形・過去分詞を自動検索
    const { past, pastParticiple } = getIrregularVerbForms(item);

    console.log('📌 Past forms found:');
    console.log('  Past:', past ? past.english : 'not found');
    console.log('  Past Participle:', pastParticiple ? pastParticiple.english : 'not found');

    // fukisokuDataMap のこの行を更新
    if (!fukisokuDataMap[foundRowIdx]) {
      fukisokuDataMap[foundRowIdx] = {
        meaningMasterId: item.id,
        present: item.english,
        presentPronunciation: item.pronunciation || '',
        presentAudio: '',
        presentMasterId: item.id,
        meaning: item.japanese,
        cellId: calculateCellId(foundRowIdx, 0),
        past: past ? past.english : '',
        pastPronunciation: past ? (past.pronunciation || '') : '',
        pastAudio: '',
        pastMasterId: past ? past.id : null
      };

      // 不規則動詞②の場合は過去分詞も追加
      if (isFukisoku2Check) {
        fukisokuDataMap[foundRowIdx].pastPart = pastParticiple ? pastParticiple.english : '';
        fukisokuDataMap[foundRowIdx].pastPartPronunciation = pastParticiple ? (pastParticiple.pronunciation || '') : '';
        fukisokuDataMap[foundRowIdx].pastPartAudio = '';
        fukisokuDataMap[foundRowIdx].pastPartMasterId = pastParticiple ? pastParticiple.id : null;
      }
    } else {
      // 既存のデータを更新（現在形と過去形のみ）
      fukisokuDataMap[foundRowIdx].presentMasterId = item.id;
      fukisokuDataMap[foundRowIdx].present = item.english;
      fukisokuDataMap[foundRowIdx].presentPronunciation = item.pronunciation || '';
      fukisokuDataMap[foundRowIdx].meaning = item.japanese;
      fukisokuDataMap[foundRowIdx].meaningMasterId = item.id;
      
      // 過去形がまだ入力されていなければ自動入力
      if (!fukisokuDataMap[foundRowIdx].past && past) {
        fukisokuDataMap[foundRowIdx].past = past.english;
        fukisokuDataMap[foundRowIdx].pastPronunciation = past.pronunciation || '';
        fukisokuDataMap[foundRowIdx].pastMasterId = past.id;
      }

      // 過去分詞②の場合
      if (isFukisoku2Check && !fukisokuDataMap[foundRowIdx].pastPart && pastParticiple) {
        fukisokuDataMap[foundRowIdx].pastPart = pastParticiple.english;
        fukisokuDataMap[foundRowIdx].pastPartPronunciation = pastParticiple.pronunciation || '';
        fukisokuDataMap[foundRowIdx].pastPartMasterId = pastParticiple.id;
      }
    }

    // メモリに保存
    if (isFukisoku1Check) {
      window.fukisoku1DataMap = fukisokuDataMap;
    } else {
      window.fukisoku2DataMap = fukisokuDataMap;
    }

    console.log('✅ fukisokuDataMap updated with past forms');
  }

  // ✅ 照準を次の空きセルに移動
  moveRightPanelFocusToNextEmpty(foundRowIdx, foundColIdx);
}

/**
 * ✅ 新規関数：右パネルの照準を次の空きセルに移動
 */
function moveRightPanelFocusToNextEmpty(lastRowIdx, lastColIdx) {
  let nextRowIdx = -1;
  let nextColIdx = -1;

  // 同じ列で下を探す
  for (let r = lastRowIdx + 1; r < 16; r++) {
    if (tableData[r][lastColIdx] === null) {
      nextRowIdx = r;
      nextColIdx = lastColIdx;
      break;
    }
  }

  // 同じ列で見つからなかった場合、次の列の一番上から探す
  if (nextRowIdx === -1) {
    for (let c = lastColIdx + 1; c < 3; c++) {
      for (let r = 0; r < 16; r++) {
        if (tableData[r][c] === null) {
          nextRowIdx = r;
          nextColIdx = c;
          break;
        }
      }
      if (nextRowIdx !== -1) break;
    }
  }

  // 見つかった場合、照準を移動
  if (nextRowIdx !== -1) {
    rightPanelFocusCell = { rowIdx: nextRowIdx, colIdx: nextColIdx };
  } else {
    // どこにも空きがない場合は照準をリセット
    rightPanelFocusCell = { rowIdx: 0, colIdx: 0 };
  }

  renderTable();
}

/**
 * 右パネルのスクロール制御（テーブル）
 */
function setupRightPanelAutoScroll() {
  const table = document.getElementById('wordTable');
  if (!table) return;

  const { rowIdx, colIdx } = rightPanelFocusCell;
  
  // 現在の照準セルを取得
  const rows = table.querySelectorAll('tr');
  if (rows.length <= rowIdx) return;

  const row = rows[rowIdx];
  const cells = row.querySelectorAll('td');
  
  // colIdx に対応するセルを取得（3列結合セルの場合は最初のセル）
  let targetCell = null;
  if (cells.length > colIdx) {
    targetCell = cells[colIdx];
  } else if (cells.length > 0) {
    targetCell = cells[0];  // フォールバック
  }

  if (!targetCell) return;

  // セルが画面内に見えるようにスクロール
  targetCell.scrollIntoView({
    behavior: 'smooth',
    block: 'nearest'
  });
}

/**
 * ✅ 修正版：特殊レイアウト用の空セルドラッグ&ドロップ処理
 * 左パネルからのドラッグを受け取る
 */
function setupSpecialLayoutEmptyCellDragDrop(cellDiv, colIdx, rowIdx) {
  cellDiv.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    cellDiv.classList.add('drag-over');
    cellDiv.style.backgroundColor = '#ffeb3b';
  });

  cellDiv.addEventListener('dragleave', () => {
    cellDiv.classList.remove('drag-over');
    cellDiv.style.backgroundColor = '#fffacd';
  });

  cellDiv.addEventListener('drop', (e) => {
    e.preventDefault();
    cellDiv.classList.remove('drag-over');

    if (!draggedItem) return;

    // ✅ 左パネルからのドラッグを処理
    if (draggedItem.type === 'word') {
      const wordId = draggedItem.id || draggedItem.data.id;
      
      if (!wordId) {
        console.error('⚠️ WARNING: Word ID が取得できません', draggedItem);
        alert('⚠️ エラー：単語のIDが取得できません。ページをリロードしてください。');
        return;
      }

      // tableDataに追加（特殊レイアウト用に最初の行に追加）
      const firstEmptyIdx = tableData.findIndex(row => row[0] === null);
      if (firstEmptyIdx === -1) {
        alert('❌ 配置可能なセルがありません');
        return;
      }

      tableData[firstEmptyIdx][0] = {
        type: 'word',
        english: draggedItem.data.english,
        japanese: draggedItem.data.japanese,
        pronunciation: draggedItem.data.pronunciation || '',
        masterWordId: wordId,
        cellId: calculateCellId(firstEmptyIdx, 0)
      };

      hasChanges = true;
      document.getElementById('saveBtn').disabled = false;
      renderTable();

    } else if (draggedItem.type === 'sentence') {
      const sentenceId = draggedItem.id || draggedItem.data.id;
      
      if (!sentenceId) {
        console.error('⚠️ WARNING: Sentence ID が取得できません', draggedItem);
        alert('⚠️ エラー：英文のIDが取得できません。ページをリロードしてください。');
        return;
      }

      // tableDataに追加
      const firstEmptyIdx = tableData.findIndex(row => row[0] === null);
      if (firstEmptyIdx === -1) {
        alert('❌ 配置可能な行がありません');
        return;
      }

      tableData[firstEmptyIdx][0] = {
        type: 'sentence',
        text: draggedItem.data.text,
        pronunciation: draggedItem.data.pronunciation || '',
        japanese: draggedItem.data.japanese || '',
        masterSentenceId: sentenceId,
        cellId: calculateCellId(firstEmptyIdx, 0)
      };
      tableData[firstEmptyIdx][1] = null;
      tableData[firstEmptyIdx][2] = null;

      hasChanges = true;
      document.getElementById('saveBtn').disabled = false;
      renderTable();
    }
  });
}

/**
 * ════════════════════════════════════════════════════════
 * 不規則動詞の過去形・過去分詞形を自動取得して入力
 * ════════════════════════════════════════════════════════
 */
/**
 * ✅ 新規関数：単語から対応する過去形・過去分詞形を取得
 * マスターデータの日本語部分を検索して、過去形・過去分詞形を探す
 * 
 * @param {Object} word - 現在形の単語オブジェクト
 * @returns {Object} { past: {word}, pastParticiple: {word} } または { past: null, pastParticiple: null }
 */
function getIrregularVerbForms(word) {
  const baseEnglish = word.english.trim().toLowerCase();

  // ✅ 過去形と過去分詞が同じ場合（ドット・カンマ・スペース柔軟対応、プレフィックスオプション）
  const combinedWord = allWords.find(w => {
    const japaneseText = (w.japanese || '').trim();
    const regex = new RegExp(`(【動】\\s*)?${baseEnglish}\\s*の過去形[・，、\\-\\s]*過去分詞形`, 'i');
    return regex.test(japaneseText);
  });

  if (combinedWord) {
    return {
      past: combinedWord,
      pastParticiple: combinedWord
    };
  }

  // ✅ 過去形を探す（プレフィックスオプション、終端柔軟対応）
  const pastWord = allWords.find(w => {
    const japaneseText = (w.japanese || '').trim();
    const regex = new RegExp(`(【動】\\s*)?${baseEnglish}\\s*の過去形[・，、\\-\\s]*$`, 'i');
    return regex.test(japaneseText);
  });

  // ✅ 過去分詞形を探す（プレフィックスオプション、スペース柔軟対応）
  const pastParticipleWord = allWords.find(w => {
    const japaneseText = (w.japanese || '').trim();
    const regex = new RegExp(`(【動】\\s*)?${baseEnglish}\\s*の過去分詞形`, 'i');
    return regex.test(japaneseText);
  });

  return {
    past: pastWord || null,
    pastParticiple: pastParticipleWord || null
  };
}

/**
 * ════════════════════════════════════════════════════════
 * 【新規追加関数】Part 1
 * 不規則動詞対応：データ変換関数
 * ════════════════════════════════════════════════════════
 */

/**
 * ✅ 新規関数：fukisokuDataMap を tableData に変換
 * スプレッドシートから読み込んだデータを、画面描画用に変換
 * 
 * @param {Object} fukisokuDataMap - { 0: {...}, 1: {...}, ... }
 * @param {boolean} isFukisoku1 - 不規則動詞①かどうか
 * スプレッドシートから読み込んだ14列・18列のデータを tableData に変換
 */
function convertFukisokuMapToTableData(fukisokuDataMap, isFukisoku1) {
  const maxRows = isFukisoku1 ? 22 : 25;
  const tableData = Array(maxRows).fill(null).map(() => [null, null, null]);
  
  Object.entries(fukisokuDataMap).forEach(([rowIdx, data]) => {
    const r = Number(rowIdx);
    if (r < 0 || r >= maxRows) return;
    
    // ✅ GAS側から読み込んだワードID（[0]番目）を保持
    tableData[r][0] = {
      type: 'word',
      english: data.present || '',
      japanese: data.meaning || '',
      pronunciation: data.presentPronunciation || '',
      masterWordId: data.meaningMasterId,  // ✅ ワードID
      cellId: data.cellId || calculateCellId(r, 0)
    };
    tableData[r][1] = null;
    tableData[r][2] = null;
  });
  
  console.log(`✅ convertFukisokuMapToTableData: ${maxRows}行に変換完了`);
  return tableData;
}

/**
 * ✅ 完全修正版：convertTableDataToFukisokuMap()
 * 
 * 不規則動詞①：14列
 * [0] word_id, [1] english, [2] pronunciation, [3] japanese, [4] audio, 
 * [5] lesson, [6] cell_id, [7] past_word_id, [8] past_english, 
 * [9] past_pronunciation, [10] past_audio
 * 
 * 不規則動詞②：18列
 * [0] word_id, [1] english, [2] pronunciation, [3] japanese, [4] audio,
 * [5] lesson, [6] cell_id, [7] past_word_id, [8] past_english,
 * [9] past_pronunciation, [10] past_audio, [11] past_participle_word_id,
 * [12] past_participle_english, [13] past_participle_pronunciation, [14] past_participle_audio
 */
function convertTableDataToFukisokuMap(tableData, isFukisoku1) {
  const fukisokuDataMap = {};

        // [1] english
        present: cell.english || '',
        // [2] pronunciation
        presentPronunciation: cell.pronunciation || '',
        // [3] japanese
        meaning: cell.japanese || '',
        // [4] audio - GAS側で取得するためここは空でOK
        // [5] lesson - GAS側で追加
        // [6] cell_id
        cellId: cell.cellId || calculateCellId(rowIdx, 0),
        // [7] past_word_id
        pastMasterId: null,
        // [8] past_english
        past: '',
        // [9] past_pronunciation
        pastPronunciation: '',
        // [10] past_audio - GAS側で取得するためここは空でOK
      };
    } else {
      // 不規則動詞②：以下の15個のフィールドを全て指定
      fukisokuDataMap[rowIdx] = {
        // [0] word_id
        meaningMasterId: cell.masterWordId || '',
        // [1] english
        present: cell.english || '',
        // [2] pronunciation
        presentPronunciation: cell.pronunciation || '',
        // [3] japanese
        meaning: cell.japanese || '',
        // [4] audio - GAS側で取得するためここは空でOK
        // [5] lesson - GAS側で追加
        // [6] cell_id
        cellId: cell.cellId || calculateCellId(rowIdx, 0),
        // [7] past_word_id
        pastMasterId: null,
        // [8] past_english
        past: '',
        // [9] past_pronunciation
        pastPronunciation: '',
        // [10] past_audio - GAS側で取得するためここは空でOK
        // [11] past_participle_word_id
        pastPartMasterId: null,
        // [12] past_participle_english
        pastPart: '',
        // [13] past_participle_pronunciation
        pastPartPronunciation: '',
        // [14] past_participle_audio - GAS側で取得するためここは空でOK
      };
    }
  });
  
  console.log(`✅ convertTableDataToFukisokuMap: ${Object.keys(fukisokuDataMap).length}行を変換完了`);
  console.log('fukisokuDataMap:', fukisokuDataMap);
  return fukisokuDataMap;
}

      padding: 8px;
      text-align: center;
      font-size: 11px;
      width: 40px;
      vertical-align: top;
      background-color: #f9f9f9;

    if (cell && cell.type === 'word') {

        border: 1px solid #999;
        padding: 8px;
        font-size: 11px;
        background-color: #fffacd;
        vertical-align: top;
        cursor: grab;
        user-select: none;

        overflow: hidden;
        width: 25%;
      `;

      const meaningDiv = document.createElement('div');
      meaningDiv.className = 'fukisoku-meaning';
      meaningDiv.draggable = true;
      meaningDiv.textContent = cell.japanese || '';
      meaningDiv.dataset.rowIdx = rowIdx;
      meaningDiv.style.cssText = `
        cursor: grab;
        user-select: none;
        word-break: break-all;
      `;

      meaningDiv.addEventListener('dragstart', (e) => {
        draggedFromTable = {
          rowIdx: rowIdx,
          isFromTable: true,
          isFukisokuTable: true,
          cellType: 'fukisokuMeaning',
          isFukisoku1: isFukisoku1
        };
        meaningDiv.style.opacity = '0.6';
        e.dataTransfer.effectAllowed = 'move';
      });

      meaningDiv.addEventListener('dragend', () => {
        meaningDiv.style.opacity = '1';
      });

      tdMeaning.appendChild(meaningDiv);
      tr.appendChild(tdMeaning);

      const tdPresent = document.createElement('td');
      tdPresent.style.cssText = `
        border: 1px solid #999;
        padding: 8px;
        font-size: 11px;
        vertical-align: top;
        background-color: #fff;
        width: ${75 / numContentCols}%;
      `;
      tdPresent.innerHTML = `
        <div style="font-weight: bold; color: #1976D2; word-break: break-all;">
          ${escapeHtml(cell.english || '')}
        </div>
        <div style="font-size: 9px; color: #666; margin-top: 2px;">
          ${escapeHtml(cell.pronunciation || '')}
        </div>
      `;
      tr.appendChild(tdPresent);

      // 過去形（変更なし）
      const tdPast = document.createElement('td');
      tdPast.style.cssText = `
        border: 1px solid #999;
        padding: 8px;
        font-size: 11px;
        vertical-align: top;
        background-color: #fff;
        width: ${75 / numContentCols}%;
      `;

      const pastData = fukisokuDataFromSheet[rowIdx];
      if (pastData && pastData.past) {
        tdPast.innerHTML = `
          <div style="font-weight: bold; color: #1976D2; word-break: break-all;">
            ${escapeHtml(pastData.past)}
          </div>
          <div style="font-size: 9px; color: #666; margin-top: 2px;">
            ${escapeHtml(pastData.pastPronunciation || '')}
          </div>
        `;
      } else {
        tdPast.innerHTML = '<div style="color: #999; font-size: 11px;">（記入欄）</div>';
      }
      tr.appendChild(tdPast);

      // 過去分詞形（強化：初期データ優先 + メモリフォールバック）
      if (!isFukisoku1) {
        const tdParticiple = document.createElement('td');
        tdParticiple.style.cssText = `
          border: 1px solid #999;
          padding: 8px;
          font-size: 11px;
          vertical-align: top;
          background-color: #fff;
          width: ${75 / numContentCols}%;
        `;

        // 初期ロードデータ（スプレッドシート由来）を優先
        let pastPartData = fukisokuDataFromSheet[rowIdx];

        // 初期データに過去分詞がなければメモリデータをフォールバック
        if (!pastPartData || !pastPartData.pastPart) {
          const memoryMap = window.fukisoku2DataMap || {};
          pastPartData = memoryMap[rowIdx];
        }

        if (pastPartData && pastPartData.pastPart) {
          tdParticiple.innerHTML = `
            <div style="font-weight: bold; color: #1976D2; word-break: break-all;">
              ${escapeHtml(pastPartData.pastPart)}
            </div>
            <div style="font-size: 9px; color: #666; margin-top: 2px;">
              ${escapeHtml(pastPartData.pastPartPronunciation || '')}
            </div>

        } else {
          tdParticiple.innerHTML = '<div style="color: #999; font-size: 11px;">（記入欄）</div>';
        }
        tr.appendChild(tdParticiple);
      }
    } else {
      const numCols = isFukisoku1 ? 4 : 5;
      for (let i = 1; i < numCols; i++) {
        const td = document.createElement('td');
        let width;
        if (i === 1) {
          width = '25%';
        } else {
          width = `${75 / numContentCols}%`;
        }
        td.style.cssText = `
          border: 1px solid #999;
          padding: 8px;
          font-size: 11px;
          vertical-align: top;
          background-color: #fff;
          position: relative;
          overflow: hidden;
          width: ${width};
        `;
        tr.appendChild(td);
      }
    }

    tbody.appendChild(tr);
  }

  table.appendChild(tbody);

  // ════════════════════════════════════════
  // ドラッグ&ドロップイベント
  // ════════════════════════════════════════

tbody.addEventListener('dragenter', (e) => {
    console.log('🔥 dragenter');
    e.preventDefault();
  });

  tbody.addEventListener('dragover', (e) => {
    if (draggedItem || draggedFromTable) {
      console.log('🔥 dragover - draggedItem:', draggedItem ? draggedItem.type : 'null', ', draggedFromTable:', draggedFromTable ? 'set' : 'null');
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }
  });

  tbody.addEventListener('drop', (e) => {
    console.log('🔥 drop detected');
    e.preventDefault();
    e.stopPropagation();

    console.log('draggedItem:', draggedItem);
    console.log('draggedFromTable:', draggedFromTable);

    let targetRow = e.target.closest('tr[data-rowIdx]');
    
    console.log('targetRow from closest:', targetRow);

    if (!targetRow) {
      console.log('⚠️ targetRow not found by closest, searching all rows...');
      
      const allRows = Array.from(tbody.querySelectorAll('tr[data-rowIdx]'));
      console.log('Found rows:', allRows.length);
      
      if (allRows.length === 0) {
        const allTrs = Array.from(tbody.querySelectorAll('tr'));
        console.log('Fallback: all tr elements:', allTrs.length);
        
        if (allTrs.length > 0) {
          const dropY = e.clientY;
          let closestRow = allTrs[0];
          let minDistance = Infinity;
          
          allTrs.forEach((row, idx) => {
            const rect = row.getBoundingClientRect();
            const rowCenter = rect.top + rect.height / 2;
            const distance = Math.abs(dropY - rowCenter);
            
            if (distance < minDistance) {
              minDistance = distance;
              closestRow = row;
            }
          });
          
          if (closestRow) {
            console.log('✅ Found closest row by Y position (fallback)');
            targetRow = closestRow;
          }
        }
      } else {
        const dropY = e.clientY;
        let closestRow = null;
        let minDistance = Infinity;
        
        allRows.forEach(row => {
          const rect = row.getBoundingClientRect();
          const rowCenter = rect.top + rect.height / 2;
          const distance = Math.abs(dropY - rowCenter);
          
          if (distance < minDistance) {
            minDistance = distance;
            closestRow = row;
          }
        });
        
        if (closestRow) {
          console.log('✅ Found closest row by Y position');
          targetRow = closestRow;
        }
      }
    }

    if (!targetRow) {
      console.log('❌ targetRow still not found - dropping to first row as fallback');
      
      const firstRow = tbody.querySelector('tr');
      if (firstRow) {
        targetRow = firstRow;
        console.log('✅ Using first row as fallback');
      } else {
        console.log('❌ No rows found at all - aborting');
        draggedItem = null;
        draggedFromTable = null;
        return;
      }
    }

    let rowIdx = Number(targetRow.dataset.rowIdx);
    
    if (isNaN(rowIdx)) {
      const allTrs = Array.from(tbody.querySelectorAll('tr'));
      rowIdx = allTrs.indexOf(targetRow);
      console.log('rowIdx from position:', rowIdx);
      
      if (rowIdx === -1) {
        console.log('❌ Could not determine row index');
        draggedItem = null;
        draggedFromTable = null;
        return;
      }
    }

    console.log('rowIdx:', rowIdx);
    
    if (isNaN(rowIdx) || rowIdx < 0) {
      console.log('❌ Invalid rowIdx');
      draggedItem = null;
      draggedFromTable = null;
      return;
    }

    // ✅ ケース1: 左パネルからのドラッグ（draggedItem が設定されている）
    if (draggedItem && draggedItem.type === 'word') {
      console.log('✅ Left panel word drag detected');
      const word = draggedItem.data;
      const wordId = draggedItem.id || word.id;

      if (!tableData[rowIdx]) {
        tableData[rowIdx] = [null, null, null];
      }

      tableData[rowIdx][0] = {
        type: 'word',
        english: word.english,
        japanese: word.japanese,
        pronunciation: word.pronunciation || '',
        masterWordId: wordId,
        cellId: calculateCellId(rowIdx, 0)
      };

      tableData[rowIdx][1] = null;
      tableData[rowIdx][2] = null;

      hasChanges = true;
      const saveBtn = document.getElementById('saveBtn');
      if (saveBtn) {
        saveBtn.disabled = false;
      }

      console.log('✅ Word placed at row:', rowIdx);

      // ✅ 過去形・過去分詞を自動検索して fukisokuDataMap に追加
      const isFukisoku1Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞①');
      const isFukisoku2Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞②');

      if (isFukisoku1Check || isFukisoku2Check) {
        const fukisokuDataMap = isFukisoku1Check 
          ? (window.fukisoku1DataMap || {}) 
          : (window.fukisoku2DataMap || {});

        console.log('📌 Searching for past forms of:', word.english);

        // 過去形・過去分詞を自動検索
        const { past, pastParticiple } = getIrregularVerbForms(word);

        console.log('📌 Past forms found:');
        console.log('  Past:', past ? past.english : 'not found');
        console.log('  Past Participle:', pastParticiple ? pastParticiple.english : 'not found');

        // fukisokuDataMap のこの行を更新
        if (!fukisokuDataMap[rowIdx]) {
          fukisokuDataMap[rowIdx] = {
            meaningMasterId: wordId,
            present: word.english,
            presentPronunciation: word.pronunciation || '',
            presentAudio: '',
            presentMasterId: wordId,
            meaning: word.japanese,
            cellId: calculateCellId(rowIdx, 0),
            past: past ? past.english : '',
            pastPronunciation: past ? (past.pronunciation || '') : '',
            pastAudio: '',
            pastMasterId: past ? past.id : null
          };

          // 不規則動詞②の場合は過去分詞も追加
          if (isFukisoku2Check) {
            fukisokuDataMap[rowIdx].pastPart = pastParticiple ? pastParticiple.english : '';
            fukisokuDataMap[rowIdx].pastPartPronunciation = pastParticiple ? (pastParticiple.pronunciation || '') : '';
            fukisokuDataMap[rowIdx].pastPartAudio = '';
            fukisokuDataMap[rowIdx].pastPartMasterId = pastParticiple ? pastParticiple.id : null;
          }
        } else {
          // 既存のデータを更新（現在形と過去形のみ）
          fukisokuDataMap[rowIdx].presentMasterId = wordId;
          fukisokuDataMap[rowIdx].present = word.english;
          fukisokuDataMap[rowIdx].presentPronunciation = word.pronunciation || '';
          fukisokuDataMap[rowIdx].meaning = word.japanese;
          fukisokuDataMap[rowIdx].meaningMasterId = wordId;
          
          // 過去形がまだ入力されていなければ自動入力
          if (!fukisokuDataMap[rowIdx].past && past) {
            fukisokuDataMap[rowIdx].past = past.english;
            fukisokuDataMap[rowIdx].pastPronunciation = past.pronunciation || '';
            fukisokuDataMap[rowIdx].pastMasterId = past.id;
          }

          // 過去分詞②の場合
          if (isFukisoku2Check && !fukisokuDataMap[rowIdx].pastPart && pastParticiple) {
            fukisokuDataMap[rowIdx].pastPart = pastParticiple.english;
            fukisokuDataMap[rowIdx].pastPartPronunciation = pastParticiple.pronunciation || '';
            fukisokuDataMap[rowIdx].pastPartMasterId = pastParticiple.id;
          }
        }

        // メモリに保存
        if (isFukisoku1Check) {
          window.fukisoku1DataMap = fukisokuDataMap;
        } else {
          window.fukisoku2DataMap = fukisokuDataMap;
        }

        console.log('✅ fukisokuDataMap updated with past forms');
      }

      draggedItem = null;
      draggedFromTable = null;
      renderTable();
      
      // ✅ ここに追加：検索欄をクリア
      clearSearchAfterDrop();
      
      return;
    }

    // ✅ ケース2: テーブル内のドラッグ（draggedFromTable が設定されている）
    // ✅ 修正版：右パネル内での行入れ替え処理を追加
    if (draggedFromTable && draggedFromTable.isFukisokuTable) {
      console.log('✅ Fukisoku table row swap detected');
    
      const draggedRowIdx = draggedFromTable.rowIdx;
    
      // ✅ 修正：同じ行へのドロップは無視
      if (draggedRowIdx === rowIdx) {
        draggedFromTable = null;
        return;
      }

      // ✅ 修正版：行を入れ替え（tableData と fukisokuDataMap の両方を同期）
      if (draggedRowIdx < rowIdx) {
        // ドラッグ元が上、ドロップ先が下の場合
        for (let i = draggedRowIdx; i < rowIdx; i++) {
          // tableData を入れ替え
          const temp = tableData[i];
          tableData[i] = tableData[i + 1];
          tableData[i + 1] = temp;

          // fukisokuDataMap も入れ替え
          const isFukisoku1Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞①');
          const fukisokuDataMap = isFukisoku1Check 
            ? (window.fukisoku1DataMap || {}) 
            : (window.fukisoku2DataMap || {});

          const tempData = fukisokuDataMap[i];
          fukisokuDataMap[i] = fukisokuDataMap[i + 1];
          fukisokuDataMap[i + 1] = tempData;

          if (isFukisoku1Check) {
            window.fukisoku1DataMap = fukisokuDataMap;
          } else {
            window.fukisoku2DataMap = fukisokuDataMap;
          }
        }
      } else {
        // ドラッグ元が下、ドロップ先が上の場合
        for (let i = draggedRowIdx; i > rowIdx; i--) {
          // tableData を入れ替え
          const temp = tableData[i];
          tableData[i] = tableData[i - 1];
          tableData[i - 1] = temp;

          // fukisokuDataMap も入れ替え
          const isFukisoku1Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞①');
          const fukisokuDataMap = isFukisoku1Check 
            ? (window.fukisoku1DataMap || {}) 
            : (window.fukisoku2DataMap || {});

          const tempData = fukisokuDataMap[i];
          fukisokuDataMap[i] = fukisokuDataMap[i - 1];
          fukisokuDataMap[i - 1] = tempData;

          if (isFukisoku1Check) {
            window.fukisoku1DataMap = fukisokuDataMap;
          } else {
            window.fukisoku2DataMap = fukisokuDataMap;
          }
        }
      }

      hasChanges = true;
      document.getElementById('saveBtn').disabled = false;

      console.log('✅ 行を入れ替えました（tableDataとfukisokuDataMapを同期）');
      draggedItem = null;
      draggedFromTable = null;
      renderTable();
      return;
    }

    console.log('❌ No valid drag source detected');
    draggedItem = null;
  });

  console.log('=== renderFukisokuTable END ===');

  // 左パネルへのドラッグ&ドロップで削除
  setupLeftPanelDragDropForFukisokuDelete();
  blockTableDropOnlyForLeftPanel();
}

/**
 * ✅ 完全修正版：左パネルへのドラッグ&ドロップで削除（不規則動詞用）
 * + テーブル内での行の入れ替えも可能
 */
function setupLeftPanelDragDropForFukisokuDelete() {
  const leftPanel = document.getElementById('leftPanel');
  if (!leftPanel) {
    console.error('❌ leftPanel not found');
    return;
  }

  // ✅ 既存のリスナーをクリーンアップ
  if (leftPanel._fukisokuDeleteListeners) {
    leftPanel._fukisokuDeleteListeners.forEach(({ event, listener, target }) => {
      target.removeEventListener(event, listener);
    });
    leftPanel._fukisokuDeleteListeners = [];
  }

  const listeners = [];

  // ✅ dragenter: ドラッグ中のデータを確認
  const dragEnterListener = (e) => {
    if (draggedFromTable && draggedFromTable.isFukisokuTable) {
      console.log('✅ 🎯 dragenter on leftPanel - Drag from fukisoku table detected');
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
    }
  };

  // ✅ dragover: 視覚的フィードバック＋伝播を止める
  const dragOverListener = (e) => {
    if (draggedFromTable && draggedFromTable.isFukisokuTable) {
      console.log('✅ 🔄 dragover on leftPanel');
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      
      leftPanel.style.backgroundColor = '#ffcccc';
      leftPanel.style.borderColor = '#ff6b6b';
      leftPanel.style.borderWidth = '2px';
    }
  };

  // ✅ dragleave: 視覚的フィードバックをリセット
  const dragLeaveListener = (e) => {
    if (e.relatedTarget && leftPanel.contains(e.relatedTarget)) {
      return;
    }
    
    console.log('✅ 📍 dragleave from leftPanel');
    leftPanel.style.backgroundColor = '';
    leftPanel.style.borderColor = '';
    leftPanel.style.borderWidth = '';
  };

  // ✅ drop: 削除処理（capture フェーズで先に処理するのが重要！）
  const dropListener = (e) => {
    console.log('✅ 💥 DROP on leftPanel!!!');
    console.log('draggedFromTable:', draggedFromTable);
    
    // ✅ draggedFromTable が設定されていない場合はスキップ
    if (!draggedFromTable || !draggedFromTable.isFukisokuTable) {
      console.log('⚠️ Drop on leftPanel but draggedFromTable is not set - skipping');
      return;
    }

    // ✅ 絶対に伝播を止める（キャプチャフェーズでも）
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();

    // ✅ 視覚的フィードバックをリセット
    leftPanel.style.backgroundColor = '';
    leftPanel.style.borderColor = '';
    leftPanel.style.borderWidth = '';

    // ✅ 削除対象の行インデックス
    const rowIdx = draggedFromTable.rowIdx;
    console.log('🗑️ Deleting row:', rowIdx);

    // ✅ tableData から削除
    if (tableData && tableData[rowIdx]) {
      tableData[rowIdx] = [null, null, null];
      console.log('✅ Cleared tableData[' + rowIdx + ']');
    }

    // ✅ fukisokuDataMap から削除
    const isFukisoku1Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞①');
    const isFukisoku2Check = state.textbook === '入試対策編' && state.lesson.startsWith('不規則動詞②');

    if (isFukisoku1Check || isFukisoku2Check) {
      const fukisokuDataMap = isFukisoku1Check 
        ? (window.fukisoku1DataMap || {}) 
        : (window.fukisoku2DataMap || {});

      // ✅ その行のデータを削除
      if (fukisokuDataMap[rowIdx]) {
        delete fukisokuDataMap[rowIdx];
        console.log('✅ Deleted fukisokuDataMap[' + rowIdx + ']');
      }

      // メモリに保存
      if (isFukisoku1Check) {
        window.fukisoku1DataMap = fukisokuDataMap;
      } else {
        window.fukisoku2DataMap = fukisokuDataMap;
      }
    }

    // ✅ 変更フラグとボタン状態を更新
    hasChanges = true;
    const saveBtn = document.getElementById('saveBtn');
    if (saveBtn) {
      saveBtn.disabled = false;
      console.log('✅ Save button enabled');
    }

    // ✅ グローバル変数をリセット
    draggedFromTable = null;
    draggedItem = null;

    // ✅ テーブルを再描画
    console.log('✅ Calling renderTable()');
    renderTable();
  };

  // ✅ イベントリスナーを追加
  // drop は capture: true で capture フェーズで処理（他のハンドラより優先される）
  leftPanel.addEventListener('dragenter', dragEnterListener, false);
  leftPanel.addEventListener('dragover', dragOverListener, false);
  leftPanel.addEventListener('dragleave', dragLeaveListener, false);
  leftPanel.addEventListener('drop', dropListener, true);  // ← true = capture フェーズで先に処理

  listeners.push(
    { event: 'dragenter', listener: dragEnterListener, target: leftPanel },
    { event: 'dragover', listener: dragOverListener, target: leftPanel },
    { event: 'dragleave', listener: dragLeaveListener, target: leftPanel },
    { event: 'drop', listener: dropListener, target: leftPanel }
  );

  leftPanel._fukisokuDeleteListeners = listeners;

  console.log('✅ setupLeftPanelDragDropForFukisokuDelete complete (capture phase enabled)');
}

/**
 * ✅ 修正版：テーブルの drop イベントで左パネルへのドロップを検出
 * 左パネルへのドロップの場合のみブロック、テーブル内の移動は許可
 */
function blockTableDropOnlyForLeftPanel() {
  const tbody = document.getElementById('fukisokuTableBody');
  if (!tbody) {
    console.log('⚠️ fukisokuTableBody not found for drop barrier');
    return;
  }

  // ✅ 既存の listeners をクリーンアップ
  if (tbody._blockDropListener) {
    tbody.removeEventListener('drop', tbody._blockDropListener, true);
  }

  // ✅ drop イベントで判定：左パネルへのドロップか、テーブル内の移動か
  const blockDropListener = (e) => {
    // ✅ ドラッグがテーブルから発生しており、かつドロップ位置がテーブルの外（左パネル）の場合
    if (draggedFromTable && draggedFromTable.isFukisokuTable) {
      // ドロップ位置を確認
      const dropTarget = e.target;
      const tbody = document.getElementById('fukisokuTableBody');
      
      // ✅ ドロップがテーブル内なら許可（行の入れ替え）
      if (tbody && tbody.contains(dropTarget)) {
        console.log('✅ Drop on table - allowing row swap');
        return; // テーブル内の処理に任せる
      }
      
      // ✅ ドロップがテーブル外なら完全にブロック（左パネルで処理）
      console.log('⚠️ Drop outside table - blocking to allow leftPanel handling');
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      return false;
    }
  };

  tbody.addEventListener('drop', blockDropListener, true);  // ← capture フェーズで先に処理
  tbody._blockDropListener = blockDropListener;
  
  console.log('✅ Table drop barrier enabled (only blocks leftPanel drops)');
}

/**
 * ✅ 新規関数：右パネルのキーダウンハンドラ
 */
function handleRightPanelKeyDown(e) {
  const { rowIdx, colIdx } = rightPanelFocusCell;

  switch (e.key) {
    case 'Tab':
      e.preventDefault();
      // Tab: 次の列へ移動
      let nextColIdx = colIdx + 1;
      if (nextColIdx >= 3) {
        nextColIdx = 0;
      }
      // 次の列で最初の空きセルを探す
      let foundRowIdx = -1;
      for (let r = 0; r < 16; r++) {
        if (tableData[r][nextColIdx] === null) {
          foundRowIdx = r;
          break;
        }
      }
      if (foundRowIdx !== -1) {
        rightPanelFocusCell = { rowIdx: foundRowIdx, colIdx: nextColIdx };
      }
      renderTable();
      break;

    default:
      break;
  }
}

/**
 * ════════════════════════════════════════════════════════
 * データ処理：読み込み・編集
 * ════════════════════════════════════════════════════════
 */

/**
 * ✅ 修正：セルIDから行列インデックスを逆算（縦方向）
 * 
 * cellId から rowIdx, colIdx を計算
 * 
 * @param {number} cellId - セルID（1-48）
 * @returns {Object} { rowIdx, colIdx } または null
 */
function getCellIndices(cellId) {
  if (!cellId || cellId < 1 || cellId > 48) {
    return null;
  }

  // ✅ 縦方向：cellId = rowIdx + 1 + colIdx * 16
  const colIdx = Math.floor((cellId - 1) / 16);
  const rowIdx = (cellId - 1) % 16;

  return { rowIdx, colIdx };
}

/**
 * セルID計算
 * rowIdx, colIdx から cellId を計算
 */
function calculateCellId(rowIdx, colIdx) {
  // ✅ 縦方向：cellId = rowIdx + 1 + colIdx * 16
  return rowIdx + 1 + colIdx * 16;
}

/**
 * スプレッドシートから取得したデータをtableDataに復元
 * cellIdから行列位置を計算して正確に復元
 */
function loadExistingData(existingData) {
  console.log('=== loadExistingData called (デバッグ版) ===');
  console.log('existingData count:', existingData.length);
  console.log('existingData:', existingData);  // ✅ デバッグ：完全なデータを出力
  
  tableData = Array(16).fill(null).map(() => [null, null, null]);

  existingData.forEach((data, index) => {
    console.log(`\n--- Processing data ${index} ---`);
    console.log('data object:', data);
    
    if (data.cellId === null || data.cellId < 1 || data.cellId > 48) {
      console.warn(`❌ Invalid cellId: ${data.cellId}`);
      return;
    }
    
    // ✅ 修正：cellIdから行列を逆算（縦方向）
    const indices = getCellIndices(data.cellId);
    if (!indices) {
      console.warn(`❌ Cannot calculate indices for cellId: ${data.cellId}`);
      return;
    }

    const { rowIdx, colIdx } = indices;

    console.log(`✅ cellId: ${data.cellId} → rowIdx: ${rowIdx}, colIdx: ${colIdx}`);

    // ✅ 修正：masterWordId の判定を追加
    if (data.english && data.english !== '') {
      // 単語の場合（masterWordId < 10000）
      if (data.masterWordId && data.masterWordId < 10000) {
        tableData[rowIdx][colIdx] = {
          type: 'word',
          english: data.english,
          japanese: data.japanese,
          pronunciation: data.pronunciation || '',
          masterWordId: data.masterWordId,
          cellId: data.cellId
        };
        console.log(`✅ Word added: ${data.english} (ID: ${data.masterWordId})`);
      } 
      // 英文の場合（masterWordId >= 10000）
      else if (data.masterWordId && data.masterWordId >= 10000) {
        tableData[rowIdx][0] = {
          type: 'sentence',
          text: data.english,
          japanese: data.japanese || '',
          pronunciation: data.pronunciation || '',
          masterSentenceId: data.masterWordId,
          cellId: data.cellId
        };
        tableData[rowIdx][1] = null;
        tableData[rowIdx][2] = null;
        console.log(`✅ Sentence added: ${data.english} (ID: ${data.masterWordId})`);
      } else {
        console.warn(`⚠️ No masterWordId or invalid: ${data.masterWordId}`);
      }
    } else if (data.japanese && data.japanese !== '') {
      // 文の場合（日本語のみ）
      console.log('Processing sentence (japanese only)');
      tableData[rowIdx][0] = {
        type: 'sentence',
        text: data.japanese,
        japanese: data.japanese || '',
        pronunciation: data.pronunciation || '',
        masterSentenceId: data.masterWordId,
        cellId: data.cellId
      };
      tableData[rowIdx][1] = null;
      tableData[rowIdx][2] = null;
      console.log(`✅ Sentence added: ${data.japanese} (ID: ${data.masterWordId})`);
    } else {
      console.warn(`⚠️ No english or japanese: `, data);
    }
  });

  console.log('=== loadExistingData finished ===');
  console.log('tableData:', tableData);
  console.log('✅ テーブル内の単語数:', tableData.flat().filter(c => c && c.type === 'word').length);
  console.log('✅ テーブル内の文数:', tableData.flat().filter(c => c && c.type === 'sentence').length);

  const isFukisoku1 = state.textbook === '入試対策編' && state.grade === '不規則動詞①';
  const isFukisoku2 = state.textbook === '入試対策編' && state.grade === '不規則動詞②';

  if (isFukisoku1 || isFukisoku2) {
  const fukisokuDataMap = {};

  tableData.slice(0, isFukisoku1 ? 22 : 25).forEach((row, rowIdx) => {
    if (row[0] && row[0].type === 'word') {
      const mapData = {
        meaning: row[0].japanese,
        meaningMasterId: row[0].masterWordId,
        present: row[0].english,
        presentPronunciation: row[0].pronunciation || '',
        presentMasterId: row[0].masterWordId,
        cellId: row[0].cellId
      };

      // ✅ 修正：拡張カラムのデータを取得
      // existingData から同じcellIdを持つレコードを探して過去形・過去分詞を取得
      const existingRecord = existingData.find(d => d.cellId === row[0].cellId);
      
      if (existingRecord) {
        mapData.past = existingRecord.pastEnglish || '';
        mapData.pastPronunciation = existingRecord.pastPronunciation || '';
        mapData.pastMasterId = null;  // masterIdは使用しない（データから直接取得）
        
        if (isFukisoku2) {
          mapData.pastPart = existingRecord.pastParticipleEnglish || '';
          mapData.pastPartPronunciation = existingRecord.pastParticiplePronunciation || '';
          mapData.pastPartMasterId = null;
        }
      } else {
        mapData.past = '';
        mapData.pastPronunciation = '';
        mapData.pastMasterId = null;
        
        if (isFukisoku2) {
          mapData.pastPart = '';
          mapData.pastPartPronunciation = '';
          mapData.pastPartMasterId = null;
        }
      }

      fukisokuDataMap[rowIdx] = mapData;
    }
  });

  if (isFukisoku1) {
    window.fukisoku1DataMap = fukisokuDataMap;
  } else {
    window.fukisoku2DataMap = fukisokuDataMap;
  }
  }

} 

/**

 */
function editWordItem(div, word) {
  if (editingWordItem) return;
  editingWordItem = div;

  const form = document.createElement('div');
  form.className = 'word-item-edit-form';
  form.innerHTML = `
    <div class="form-label">日本語</div>
    <input type="text" class="edit-japanese" value="${word.japanese || ''}">
    <div class="form-label">発音</div>
    <input type="text" class="edit-pronunciation" value="${word.pronunciation || ''}">
    <div class="form-label">英語</div>
    <input type="text" class="edit-english" value="${word.english}">
  `;

  div.classList.add('editing');
  const displayDiv = div.querySelector('.word-item-display');
  if (displayDiv) {
    displayDiv.remove();
  }
  div.appendChild(form);

  const inputs = form.querySelectorAll('input');
  inputs[0].focus();
  inputs[0].select();

  let handleClickOutside = null;

  const saveEdit = () => {
    const newJapanese = inputs[0].value.trim();
    const newPronunciation = inputs[1].value.trim();
    const newEnglish = inputs[2].value.trim();

    if (!newEnglish) {
      alert('英語を入力してください');
      inputs[2].focus();
      return;
    }

    if (handleClickOutside) {
      document.removeEventListener('click', handleClickOutside);
    }

    showLoadingIndicator('単語を更新中...');
    isSaving = true;
    updateUIForSaving();

    google.script.run
      .withSuccessHandler(() => {
        google.script.run
          .withSuccessHandler(() => {
            word.english = newEnglish;
            word.pronunciation = newPronunciation;
            word.japanese = newJapanese;

            const masterWord = allWords.find(w => w.id === word.id);
            if (masterWord) {
              masterWord.english = newEnglish;
              masterWord.pronunciation = newPronunciation;
              masterWord.japanese = newJapanese;
            }

            updateTableDisplayByMasterId(word.id);

            editingWordItem = null;
            renderWordList();

            isSaving = false;
            updateUIForSaving();
            hideLoadingIndicator();
          })
          .withFailureHandler(err => {
            console.error('updateAllLessonDataInYear エラー:', err);
            hideLoadingIndicator();
            alert('❌ レッスンデータの更新に失敗しました。\n\nエラー: ' + err);
            isSaving = false;
            updateUIForSaving();
            editingWordItem = null;
          })
          .updateAllLessonDataInYear(state.year, word.id, newEnglish, newPronunciation, newJapanese, 'word', allWords, allSentences);
      })
      .withFailureHandler(err => {
        console.error('updateMasterWord エラー:', err);
        hideLoadingIndicator();
        alert('❌ マスター単語の保存に失敗しました。\n\nエラー: ' + err);
        isSaving = false;
        updateUIForSaving();
        editingWordItem = null;
      })
      .updateMasterWord(word.id, newEnglish, newPronunciation, newJapanese);
  };

  const cancelEdit = () => {
    if (handleClickOutside) {
      document.removeEventListener('click', handleClickOutside);
    }
    editingWordItem = null;
    div.classList.remove('editing');
    renderWordList();
  };

  inputs.forEach((input, idx) => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        e.stopPropagation();
        saveEdit();
        return;
      }
      
      if (e.key === 'Tab') {
        e.preventDefault();
        e.stopPropagation();
        if (e.shiftKey) {
          const prevIdx = (idx - 1 + inputs.length) % inputs.length;
          inputs[prevIdx].focus();
          inputs[prevIdx].select();
        } else {
          const nextIdx = (idx + 1) % inputs.length;
          inputs[nextIdx].focus();
          inputs[nextIdx].select();
        }
        return;
      }
    });
  });

  handleClickOutside = (e) => {
    if (!div.contains(e.target) && editingWordItem === div) {
      saveEdit();
    }
  };

  setTimeout(() => {
    if (editingWordItem === div) {
      document.addEventListener('click', handleClickOutside);
    }
  }, 0);
}

/**
 * レッスンタイトルをクリックして編集（カスタムレッスン時）
 * ✅ 修正：「入試対策編」対応
 */
function editLessonTitle() {
  const lessonDisplay = document.getElementById('lessonDisplay');
  
  // 既に編集中なら何もしない
  if (lessonDisplay.classList.contains('editing')) {
    return;
  }

  const oldLessonName = state.lesson;  // 編集前のレッスン名を保持

  const input = document.createElement('input');
  input.type = 'text';
  input.value = state.lesson;
  input.style.cssText = 'width: 300px; padding: 8px; font-size: 20px; border: 2px solid #2196F3; border-radius: 4px; text-align: center; font-weight: bold;';

  lessonDisplay.classList.add('editing');
  lessonDisplay.innerHTML = '';
  lessonDisplay.appendChild(input);
  input.focus();
  input.select();

  const updateDisplay = () => {
    lessonDisplay.classList.remove('editing');
    
    if (state.textbook === '入試対策編') {
      lessonDisplay.textContent = state.lesson;
    } else {
      lessonDisplay.textContent = `${state.grade}ー${state.lesson}`;
    }
  };

  const save = () => {
    const newLesson = input.value.trim();
    
    if (!newLesson) {
      // 空欄なら変更なし
      state.lesson = oldLessonName;
      updateDisplay();
      return;
    }

    if (newLesson === oldLessonName) {
      // 変更なし
      console.log('レッスン名に変更がありません');
      updateDisplay();
      return;
    }

    // ✅ 修正：レッスン名が変更された場合、即座に保存
    console.log(`レッスン名変更: "${oldLessonName}" → "${newLesson}"`);
    
    state.lesson = newLesson;
    state.originalLessonName = oldLessonName;
    state.isEdited = true;
    
    updateDisplay();

    // ✅ 修正：即座にレッスン名を保存
    saveLessonNameImmediately(oldLessonName, newLesson, () => {
      // ✅ 新規：保存完了後に選択欄の値も更新
      updateLessonSelectValue(newLesson);
    });
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      save();
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      state.lesson = oldLessonName;
      updateDisplay();
    }
  });
}

/**
 * ✅ 新規関数：レッスン選択欄の値を更新
 * @param {string} lessonName - 新しいレッスン名
 */
function updateLessonSelectValue(lessonName) {
  const lessonSelect = document.getElementById('lessonSelect');
  
  if (!lessonSelect) {
    console.warn('⚠️ lessonSelect が見つかりません');
    return;
  }

  // 選択欄内に該当するレッスン名のオプションがあるか確認
  const options = lessonSelect.querySelectorAll('option');
  let found = false;

  options.forEach(option => {
    if (option.value === lessonName) {
      lessonSelect.value = lessonName;
      found = true;
      console.log(`✅ 選択欄を「${lessonName}」に更新しました`);
    }
  });

  if (!found) {
    // 選択欄にない場合は、新しいオプションを追加
    console.log(`⚠️ 選択欄に「${lessonName}」が見つかりません。新しいオプションを追加します。`);
    
    const newOption = document.createElement('option');
    newOption.value = lessonName;
    newOption.textContent = lessonName;
    lessonSelect.appendChild(newOption);
    lessonSelect.value = lessonName;

    console.log(`✅ 新しいオプション「${lessonName}」を追加して選択しました`);
  }
}

function setupRightPanelDragDrop() {
  const panel = document.getElementById('selectedLessonPanel');

  panel.addEventListener('dragover', (e) => {

      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
