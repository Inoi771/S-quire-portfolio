<script>

    function loadProperties() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            displayProperties(result.properties);
          }
        })
        .withFailureHandler(function(err) {
          showMessage('adminMessage', 'プロパティの読み込みに失敗しました: ' + err, 'error');
        })
        .getAllScriptPropertiesForGUI();
    }
    
    function displayProperties(properties) {
      var container = document.getElementById('propertiesList');
      var html = '';
      
      properties.forEach(function(prop) {
        var eKey = escapeHtml_(prop.key);
        var eValue = escapeHtml_(prop.value);
        html += '<div class="property-item">' +
                '<div style="display: flex; justify-content: space-between; width: 100%;">' +
                '<strong>' + eKey + ':</strong>' +
                '<button onclick="deleteProperty(\'' + eKey + '\')">削除</button>' +
                '</div>' +
                '<div class="prop-value">' + eValue + '</div>' +
                '</div>';
      });
      
      container.innerHTML = html || '<p style="text-align: center; color: #999;">プロパティがありません</p>';
    }
    
    function addProperty() {
      var key = document.getElementById('newPropKey').value.trim();
      var value = document.getElementById('newPropValue').value.trim();

      if (!key || !value) {
        showMessage('adminMessage', '❌ キーと値を入力してください', 'error');
        return;
      }

      var btn = document.getElementById('btnAddProperty');
      if (btn) { btn.disabled = true; btn.textContent = '追加中...'; }
      google.script.run
        .withSuccessHandler(function(result) {
          if (btn) { btn.disabled = false; btn.textContent = '追加'; }
          if (result.success) {
            showMessage('adminMessage', '✓ プロパティを追加しました', 'success');
            document.getElementById('newPropKey').value = '';
            document.getElementById('newPropValue').value = '';
            loadProperties();
          } else {
            showMessage('adminMessage', '❌ ' + result.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = '追加'; }
          showMessage('adminMessage', '❌ エラー: ' + err, 'error');
        })
        .updateScriptPropertyFromGUI(key, value);
    }
    
    function deleteProperty(key) {
      appConfirm('このプロパティを削除しますか？\n' + key).then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              showMessage('adminMessage', '✓ プロパティを削除しました', 'success');
              loadProperties();
            } else {
              showMessage('adminMessage', '❌ ' + result.error, 'error');
            }
          })
          .deleteScriptPropertyFromGUI(key);
      });
    }

    function loadGradesSettings() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            displayGradesSettings(result);
          } else {
            showMessage('adminMessage', 'エラー: ' + result.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          showMessage('adminMessage', '成績設定の読み込みに失敗しました: ' + err, 'error');
        })
        .getGradesConfigForWeb();
    }

    function displayGradesSettings(config) {
      var btnEdit   = 'background:#667eea;color:white;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;';
      var btnDel    = 'background:#ff6b6b;color:white;border:none;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;';
      var btnSave   = 'background:#43a047;color:white;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:10px;flex:1;';
      var btnCancel = 'background:#9e9e9e;color:white;border:none;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:10px;flex:1;';
      var inputSt   = 'width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:3px;box-sizing:border-box;font-size:12px;margin-bottom:4px;';
      var editBg    = 'background:#fff9e6;padding:8px 10px;border-radius:4px;margin-bottom:6px;border:1px solid #ffc107;font-size:12px;display:none;';

      // テスト名リスト
      var testNameHtml = '';
      config.testNames.forEach(function(testName, idx) {
        var esc  = testName.replace(/'/g, "\\'");
        var html = testName.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        testNameHtml +=
          '<div id="tn-view-' + idx + '" style="background:white;padding:6px 10px;border-radius:4px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e0e0e0;font-size:12px;">' +
            '<span>📋 ' + html + '</span>' +
            '<div style="display:flex;gap:4px;">' +
              '<button onclick="editTestNameRow(' + idx + ')" style="' + btnEdit + '">編集</button>' +
              '<button onclick="deleteTestNameItem(\'' + esc + '\')" style="' + btnDel + '">削除</button>' +
            '</div>' +
          '</div>' +
          '<div id="tn-edit-' + idx + '" style="' + editBg + 'margin-bottom:6px;">' +
            '<input id="tn-input-' + idx + '" value="' + html + '" style="' + inputSt + '">' +
            '<div style="display:flex;gap:4px;">' +
              '<button onclick="saveTestNameRow(' + idx + ',\'' + esc + '\', this)" style="' + btnSave + '">保存</button>' +
              '<button onclick="cancelEditRow(\'tn\',' + idx + ')" style="' + btnCancel + '">キャンセル</button>' +
            '</div>' +
          '</div>';
      });
      document.getElementById('testNamesList').innerHTML = testNameHtml || '<p style="text-align:center;color:#999;font-size:11px;">テスト名なし</p>';

      // 校舎リスト
      var campusHtml = '';
      config.campuses.forEach(function(campus, idx) {
        var codeEsc = campus.code.replace(/'/g, "\\'");
        var nameHtml = campus.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        campusHtml +=
          '<div id="cp-view-' + idx + '" style="background:white;padding:6px 10px;border-radius:4px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e0e0e0;font-size:12px;">' +
            '<span>🏢 ' + escapeHtml_(campus.code) + ': ' + nameHtml + '</span>' +
            '<div style="display:flex;gap:4px;">' +
              '<button onclick="editCampusRow(' + idx + ')" style="' + btnEdit + '">編集</button>' +
              '<button onclick="deleteCampusItem(\'' + codeEsc + '\')" style="' + btnDel + '">削除</button>' +
            '</div>' +
          '</div>' +
          '<div id="cp-edit-' + idx + '" style="' + editBg + 'margin-bottom:6px;">' +
            '<div style="font-size:11px;color:#666;margin-bottom:4px;">コード: <strong>' + campus.code + '</strong>（変更不可）</div>' +
            '<input id="cp-input-' + idx + '" value="' + nameHtml + '" placeholder="校舎名" style="' + inputSt + '">' +
            '<div style="display:flex;gap:4px;">' +
              '<button onclick="saveCampusRow(' + idx + ',\'' + codeEsc + '\', this)" style="' + btnSave + '">保存</button>' +
              '<button onclick="cancelEditRow(\'cp\',' + idx + ')" style="' + btnCancel + '">キャンセル</button>' +
            '</div>' +
          '</div>';
      });
      document.getElementById('campusList').innerHTML = campusHtml || '<p style="text-align:center;color:#999;font-size:11px;">校舎なし</p>';

      // 学年チェックボックス（表示切替）
      var gradeHtml = '';
      var visibleCodes = config.visibleGradeCodes || [];
      (config.allGrades || config.grades).forEach(function(grade) {
        var checked = visibleCodes.indexOf(grade.code) !== -1 ? ' checked' : '';
        gradeHtml +=
          '<label style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:white;border:1px solid #e0e0e0;border-radius:4px;font-size:12px;cursor:pointer;">' +
            '<input type="checkbox" value="' + grade.code + '"' + checked +
            ' onchange="saveVisibleGrades()" style="margin:0;">' +
            grade.code + ': ' + grade.name +
          '</label>';
      });
      document.getElementById('gradesList').innerHTML = gradeHtml || '<p style="text-align:center;color:#999;font-size:11px;">学年なし</p>';

      // 志望校リスト
      var schoolHtml = '';
      (config.schools || []).forEach(function(school, idx) {
        var nameEsc  = school.name.replace(/'/g, "\\'");
        var nameHtml = school.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
        var deptStr = (school.departments && school.departments.length > 0)
          ? school.departments.map(function(d) {
              if (typeof d === 'string') return d;
              return d.deviation != null ? d.name + '<span style="color:#43a047;margin-left:2px;">(' + d.deviation + ')</span>' : d.name;
            }).join('、')
          : '（学科未設定）';
        var deptInputVal = (school.departments && school.departments.length > 0)
          ? school.departments.map(function(d) {
              if (typeof d === 'string') return d;
              return d.deviation != null ? d.name + ':' + d.deviation : d.name;
            }).join(', ').replace(/&/g,'&amp;').replace(/"/g,'&quot;')
          : '';
        schoolHtml +=
          '<div id="sc-view-' + idx + '" style="background:white;padding:6px 10px;border-radius:4px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e0e0e0;font-size:12px;">' +
            '<span>🏫 ' + nameHtml + '<span style="color:#999;margin-left:6px;">' + deptStr + '</span></span>' +
            '<div style="display:flex;gap:4px;">' +
              '<button onclick="editSchoolRow(' + idx + ')" style="' + btnEdit + '">編集</button>' +
              '<button onclick="deleteSchoolItem(\'' + nameEsc + '\')" style="' + btnDel + '">削除</button>' +
            '</div>' +
          '</div>' +
          '<div id="sc-edit-' + idx + '" style="' + editBg + 'margin-bottom:6px;">' +
            '<input id="sc-name-' + idx + '" value="' + nameHtml + '" placeholder="高校名" style="' + inputSt + '">' +
            '<input id="sc-depts-' + idx + '" value="' + deptInputVal + '" placeholder="学科と偏差値（例: 普通科:55, 理数科:62）" style="' + inputSt + '">' +
            '<div style="display:flex;gap:4px;">' +
              '<button onclick="saveSchoolRow(' + idx + ',\'' + nameEsc + '\', this)" style="' + btnSave + '">保存</button>' +
              '<button onclick="cancelEditRow(\'sc\',' + idx + ')" style="' + btnCancel + '">キャンセル</button>' +
            '</div>' +
          '</div>';
      });
      document.getElementById('schoolList').innerHTML = schoolHtml || '<p style="text-align:center;color:#999;font-size:11px;">志望校なし</p>';
    }

    // --- インライン編集ヘルパー ---
    function cancelEditRow(prefix, idx) {
      document.getElementById(prefix + '-view-' + idx).style.display = 'flex';
      document.getElementById(prefix + '-edit-' + idx).style.display = 'none';
    }

    // テスト名 編集/保存
    function editTestNameRow(idx) {
      document.getElementById('tn-view-' + idx).style.display = 'none';
      document.getElementById('tn-edit-' + idx).style.display = 'block';
      document.getElementById('tn-input-' + idx).focus();
    }
    function saveTestNameRow(idx, oldName, btn) {
      var newName = document.getElementById('tn-input-' + idx).value.trim();
      if (!newName) { showMessage('adminMessage', 'テスト名を入力してください', 'error'); return; }
      if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
      google.script.run
        .withSuccessHandler(function(result) {
          if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
            loadGradesSettings();
            if (typeof loadDropdownData === 'function') loadDropdownData();
          } else { showMessage('adminMessage', '❌ ' + result.error, 'error'); }
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          showMessage('adminMessage', '❌ ' + err, 'error');
        })
        .updateTestName(oldName, newName);
    }

    // 校舎 編集/保存
    function editCampusRow(idx) {
      document.getElementById('cp-view-' + idx).style.display = 'none';
      document.getElementById('cp-edit-' + idx).style.display = 'block';
      document.getElementById('cp-input-' + idx).focus();
    }
    function saveCampusRow(idx, campusCode, btn) {
      var newName = document.getElementById('cp-input-' + idx).value.trim();
      if (!newName) { showMessage('adminMessage', '校舎名を入力してください', 'error'); return; }
      if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
      google.script.run
        .withSuccessHandler(function(result) {
          if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
            loadGradesSettings();
            if (typeof loadDropdownData === 'function') loadDropdownData();
          } else { showMessage('adminMessage', '❌ ' + result.error, 'error'); }
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          showMessage('adminMessage', '❌ ' + err, 'error');
        })
        .updateCampusName(campusCode, newName);
    }

    // 学年 表示切替
    function saveVisibleGrades() {
      var checkboxes = document.querySelectorAll('#gradesList input[type="checkbox"]');
      var visibleCodes = [];
      checkboxes.forEach(function(cb) {
        if (cb.checked) visibleCodes.push(cb.value);
      });
      if (visibleCodes.length === 0) {
        showMessage('adminMessage', '少なくとも1つの学年を選択してください', 'error');
        loadGradesSettings();
        return;
      }
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
            if (typeof loadDropdownData === 'function') loadDropdownData();
          } else {
            showMessage('adminMessage', '❌ ' + result.error, 'error');
            loadGradesSettings();
          }
        })
        .withFailureHandler(function(err) {
          showMessage('adminMessage', '❌ ' + err, 'error');
          loadGradesSettings();
        })
        .updateVisibleGrades(visibleCodes);
    }

    // 志望校 編集/保存
    function editSchoolRow(idx) {
      document.getElementById('sc-view-' + idx).style.display = 'none';
      document.getElementById('sc-edit-' + idx).style.display = 'block';
      document.getElementById('sc-name-' + idx).focus();
    }
    function saveSchoolRow(idx, oldName, btn) {
      var newName  = document.getElementById('sc-name-' + idx).value.trim();
      var newDepts = document.getElementById('sc-depts-' + idx).value.trim();
      if (!newName) { showMessage('adminMessage', '学校名を入力してください', 'error'); return; }
      if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
      google.script.run
        .withSuccessHandler(function(result) {
          if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
            loadGradesSettings();
            if (typeof loadDropdownData === 'function') loadDropdownData();
          } else { showMessage('adminMessage', '❌ ' + result.error, 'error'); }
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = '保存'; }
          showMessage('adminMessage', '❌ ' + err, 'error');
        })
        .updateSchool(oldName, newName, newDepts);
    }
    // --- インライン編集ヘルパー ここまで ---

    function addNewSchool() {
      var name = document.getElementById('newSchoolName').value.trim();
      var depts = document.getElementById('newSchoolDepts').value.trim();
      if (!name) {
        showMessage('adminMessage', '高校名を入力してください', 'error');
        return;
      }
      var btn = document.getElementById('btnAddSchool');
      if (btn) { btn.disabled = true; btn.textContent = '追加中...'; }
      google.script.run
        .withSuccessHandler(function(result) {
          if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
            document.getElementById('newSchoolName').value = '';
            document.getElementById('newSchoolDepts').value = '';
            loadGradesSettings();
            if (typeof loadDropdownData === 'function') loadDropdownData();
          } else {
            showMessage('adminMessage', '❌ ' + result.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
          showMessage('adminMessage', '❌ エラー: ' + err, 'error');
        })
        .addSchool(name, depts);
    }

    function deleteSchoolItem(schoolName) {
      appConfirm('「' + schoolName + '」を削除しますか？').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              showMessage('adminMessage', '✓ ' + result.message, 'success');
              loadGradesSettings();
              if (typeof loadDropdownData === 'function') loadDropdownData();
            } else {
              showMessage('adminMessage', '❌ ' + result.error, 'error');
            }
          })
          .deleteSchool(schoolName);
      });
    }

    function addNewTestName() {
      var testName = document.getElementById('newTestName').value.trim();

      if (!testName) {
        showMessage('adminMessage', 'テスト名を入力してください', 'error');
        return;
      }

      var btn = document.getElementById('btnAddTestName');
      if (btn) { btn.disabled = true; btn.textContent = '追加中...'; }
      google.script.run
        .withSuccessHandler(function(result) {
          if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
            document.getElementById('newTestName').value = '';
            loadGradesSettings();
            if (typeof loadDropdownData === 'function') loadDropdownData();
          } else {
            showMessage('adminMessage', '❌ ' + result.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
          showMessage('adminMessage', '❌ エラー: ' + err, 'error');
        })
        .addTestName(testName);
    }

    function deleteTestNameItem(testName) {
      appConfirm('「' + testName + '」を削除しますか？').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              showMessage('adminMessage', '✓ ' + result.message, 'success');
              loadGradesSettings();
            } else {
              showMessage('adminMessage', '❌ ' + result.error, 'error');
            }
          })
          .deleteTestName(testName);
      });
    }

    function addNewCampus() {
      var campusCode = document.getElementById('newCampusCode').value.trim();
      var campusName = document.getElementById('newCampusName').value.trim();

      if (!campusCode || !campusName) {
        showMessage('adminMessage', 'コードと校舎名を入力してください', 'error');
        return;
      }

      var btn = document.getElementById('btnAddCampus');
      if (btn) { btn.disabled = true; btn.textContent = '追加中...'; }
      google.script.run
        .withSuccessHandler(function(result) {
          if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
            document.getElementById('newCampusCode').value = '';
            document.getElementById('newCampusName').value = '';
            loadGradesSettings();
            if (typeof loadDropdownData === 'function') loadDropdownData();
          } else {
            showMessage('adminMessage', '❌ ' + result.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          if (btn) { btn.disabled = false; btn.textContent = '➕ 追加'; }
          showMessage('adminMessage', '❌ エラー: ' + err, 'error');
        })
        .addCampus(campusCode, campusName);
    }

    function deleteCampusItem(campusCode) {
      appConfirm('コード「' + campusCode + '」の校舎を削除しますか？').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              showMessage('adminMessage', '✓ ' + result.message, 'success');
              loadGradesSettings();
              if (typeof loadDropdownData === 'function') {
                loadDropdownData();
              }
            } else {
              showMessage('adminMessage', '❌ ' + result.error, 'error');
            }
          })
          .deleteCampus(campusCode);
      });
    }


    function loadSigmaSettings() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.success) return;
          var s = result.sigma;
          document.getElementById('sigma-kokugo').value = s.kokugo;
          document.getElementById('sigma-shakai').value = s.shakai;
          document.getElementById('sigma-sugaku').value = s.sugaku;
          document.getElementById('sigma-rika').value   = s.rika;
          document.getElementById('sigma-eigo').value   = s.eigo;
          document.getElementById('sigma-total').value  = s.total;
        })
        .withFailureHandler(function(err) {
          console.error('σ設定読み込みエラー:', err);
        })
        .getGradeAnalysisSigmaConfig();
    }

    function saveSigmaSettings() {
      var sigmaData = {
        kokugo: Number(document.getElementById('sigma-kokugo').value),
        shakai: Number(document.getElementById('sigma-shakai').value),
        sugaku: Number(document.getElementById('sigma-sugaku').value),
        rika:   Number(document.getElementById('sigma-rika').value),
        eigo:   Number(document.getElementById('sigma-eigo').value),
        total:  Number(document.getElementById('sigma-total').value)
      };
      for (var k in sigmaData) {
        if (isNaN(sigmaData[k]) || sigmaData[k] <= 0) {
          showMessage('adminMessage', '❌ ' + k + ' の値が正しくありません（1以上の数値を入力してください）', 'error');
          return;
        }
      }
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showMessage('adminMessage', '✓ ' + result.message, 'success');
          } else {
            showMessage('adminMessage', '❌ ' + result.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          showMessage('adminMessage', '❌ σ設定の保存に失敗しました: ' + err, 'error');
        })
        .updateGradeAnalysisSigmaConfig(sigmaData);
    }

    function resetSigmaSettings() {
      appConfirm('σ設定をデフォルト値に戻しますか？').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              showMessage('adminMessage', '✓ ' + result.message, 'success');
              loadSigmaSettings();
            } else {
              showMessage('adminMessage', '❌ ' + result.error, 'error');
            }
          })
          .withFailureHandler(function(err) {
            showMessage('adminMessage', '❌ σ設定のリセットに失敗しました: ' + err, 'error');
          })
          .resetGradeAnalysisSigmaConfig();
      });
    }

    /** 生徒別AI分析の年度・テスト名ドロップダウンを初期化 */
    function initStudentAnalysisPanel() {
      var yearSelect = document.getElementById('student-analysis-year');
      var testSelect = document.getElementById('student-analysis-test');
      if (!yearSelect || !testSelect) return;

      // 年度を grades コレクションから取得（Firebase SDK）
      yearSelect.innerHTML = '<option value="">読み込み中...</option>';
      fbGetGradesYearFolders().then(function(result) {
        var yearOpts = '<option value="">選択してください</option>';
        if (result && result.years && result.years.length > 0) {
          result.years.forEach(function(y) {

    /**
     * AI成績分析（全体＋生徒別）一括生成ボタンハンドラー
     * skipExisting=true: 未分析のみ生成（既存データを保持）
     * skipExisting=false: 全員を上書き生成
     */
    function generateAllAnalysesAdmin(skipExisting) {
      var year = parseInt(document.getElementById('student-analysis-year').value, 10);
      var testName = document.getElementById('student-analysis-test').value;
      var statusEl = document.getElementById('student-analysis-status');
      var btnSkip = document.getElementById('btn-gen-analysis-skip');
      var btnOverwrite = document.getElementById('btn-gen-analysis-overwrite');

      if (!testName) {
        statusEl.innerHTML = '<span style="color:#e53935;">テスト名を選択してください</span>';
        return;
      }

      var confirmMsg = skipExisting
        ? year + '年度「' + testName + '」の未分析の生徒のみ分析を生成します。\n既存の分析はそのまま保持されます。よろしいですか？'
        : year + '年度「' + testName + '」のテスト全体分析と全生徒の個別分析を一括生成します。\n既存のデータは上書きされます。よろしいですか？';

      appConfirm(confirmMsg).then(function(ok) {
        if (!ok) return;

        var autoRetryCount = 0;
        var maxAutoRetry = 5;
        var autoRetryTimer = null;
        var cancelled = false;

        function cancelAutoRetry() {
          cancelled = true;
          if (autoRetryTimer) clearTimeout(autoRetryTimer);
          btnSkip.disabled = false;
          btnOverwrite.disabled = false;
          statusEl.innerHTML = '<span style="color:#999;">キャンセルしました。</span>';
        }
        window._cancelAnalysisAutoRetry = cancelAutoRetry;

        function execute() {
          btnSkip.disabled = true;
          btnOverwrite.disabled = true;
          var retryLabel = autoRetryCount > 0 ? '（' + autoRetryCount + '回目の続き）' : '';
          statusEl.innerHTML = '<span style="color:#999;">AIが分析を生成しています' + retryLabel + '。しばらくお待ちください...</span>';

          google.script.run
            .withSuccessHandler(function(result) {
              btnSkip.disabled = false;
              btnOverwrite.disabled = false;
              if (result.success) {
                if (result.skipped) {
                  statusEl.innerHTML = '<span style="color:#2e7d32;">✅ すべての分析が完了しています</span>';
                  showToast('✅ すべての分析が完了しています', 'success');
                } else if (skipExisting) {
                  statusEl.innerHTML = '<span style="color:#2e7d32;">✅ ' + result.studentCount + ' 人分の生徒別分析を新規生成しました（' + (result.skippedCount || 0) + ' 人はスキップ）</span>';
                  showToast('✅ AI分析を生成しました（' + result.studentCount + ' 人）', 'success');
                } else {
                  statusEl.innerHTML = '<span style="color:#2e7d32;">✅ テスト全体分析と ' + result.studentCount + ' 人分の生徒別分析を生成しました。</span>';
                  showToast('✅ AI分析の生成が完了しました（' + result.studentCount + ' 人）', 'success');
                }
              } else {
                statusEl.innerHTML = '<span style="color:#e53935;">❌ ' + result.error + '</span>';
                showToast('❌ AI分析の生成に失敗しました', 'error');
              }
            })
            .withFailureHandler(function(err) {
              var isAbort = (err.name === 'AbortError' || String(err).indexOf('AbortError') >= 0);
              if (isAbort && !cancelled && autoRetryCount < maxAutoRetry) {
                autoRetryCount++;
                var waitSec = 120;
                var remaining = waitSec;
                statusEl.innerHTML = '<span style="color:#f57c00;">⏳ バックグラウンドで処理中です。' + remaining + '秒後に自動で続きを実行します。'
                  + ' <button onclick="window._cancelAnalysisAutoRetry()" style="margin-left:8px;padding:2px 8px;font-size:12px;cursor:pointer;">中止</button></span>';
                showToast('⏳ AI分析を処理中です。しばらくお待ちください', 'info');
                var countdown = setInterval(function() {
                  remaining -= 10;
                  if (remaining <= 0 || cancelled) { clearInterval(countdown); return; }
                  statusEl.innerHTML = '<span style="color:#f57c00;">⏳ バックグラウンドで処理中です。' + remaining + '秒後に自動で続きを実行します。'
                    + ' <button onclick="window._cancelAnalysisAutoRetry()" style="margin-left:8px;padding:2px 8px;font-size:12px;cursor:pointer;">中止</button></span>';
                }, 10000);
                autoRetryTimer = setTimeout(function() {
                  clearInterval(countdown);
                  if (!cancelled) execute();
                }, waitSec * 1000);
              } else {
                btnSkip.disabled = false;
                btnOverwrite.disabled = false;
                if (isAbort) {
                  statusEl.innerHTML = '<span style="color:#f57c00;">⏳ 処理はバックグラウンドで完了している可能性があります。分析タブを確認してください。</span>';
                  showToast('⏳ 処理完了の可能性あり。分析タブを確認してください', 'info');
                } else {
                  statusEl.innerHTML = '<span style="color:#e53935;">❌ 通信エラー: ' + err + '</span>';
                  showToast('❌ 通信エラーが発生しました', 'error');
                }
              }
            })
            .generateAllAnalyses(year, testName, skipExisting);
        }

        execute();
      });
    }

              + '</div>'
              + '<button onclick="toggleTrigger_(\'' + def.key + '\',' + active + ')" '
              +   'style="padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:700;font-size:13px;white-space:nowrap;' + btnStyle + '">'
              +   btnLabel
              + '</button>'
              + '</div>';

        })
        .withFailureHandler(function(e) {
          if (listEl) listEl.innerHTML = '<div style="color:#c62828;">❌ エラー: ' + e.message + '</div>';
          console.error(e);
        })
        .getAllTriggerStatuses();

    /** トリガーのON/OFFを切り替える */
    function toggleTrigger_(key, currentlyActive) {
      var def = TRIGGER_DEFS_.filter(function(d) { return d.key === key; })[0];
      if (!def) return;
      var msg = currentlyActive
        ? '「' + def.label + '」を停止しますか？'
        : '「' + def.label + '」を開始しますか？';
      appConfirm(msg).then(function(ok) {
        if (!ok) return;
        var msgEl = document.getElementById('triggerMessage');
        if (msgEl) msgEl.innerHTML = '⏳ 処理中...';
        var fn = currentlyActive ? def.deleteFn : def.setupFn;
        google.script.run
          .withSuccessHandler(function(r) {
            if (msgEl) {
              msgEl.innerHTML = r.success
                ? '<span style="color:#2e7d32;">✅ ' + r.message + '</span>'
                : '<span style="color:#c62828;">❌ ' + (r.error || '') + '</span>';
            }
            loadAllTriggerStatuses();
          })
          .withFailureHandler(function(e) {
            if (msgEl) msgEl.innerHTML = '<span style="color:#c62828;">❌ ' + e.message + '</span>';
            loadAllTriggerStatuses();
          })
          [fn]();
      });
    }

    /**
     * 管理タブ：公立高校一般選抜日程テーブルを描画する
     * @param {number} yr 学年年度
     */
    function renderPubHighExamDateTable(yr) {
      // 自動計算日（フロントエンドで計算）
      var march1Dow = new Date(yr + 1, 2, 1).getDay();
      var daysToTue = (2 - march1Dow + 7) % 7;
      var firstTueDay = 1 + daysToTue;
      var autoTueDay = (firstTueDay <= 2) ? firstTueDay + 7 : firstTueDay;
      var autoWedDay = autoTueDay + 1;
      var autoDateStr = (yr + 1) + '年3月' + autoTueDay + '日（火）・' + autoWedDay + '日（水）';

      var overrideKey = String(yr);
      var hasOverride = !!pubHighExamDateOverrides[overrideKey];
      var overrideDateVal = '';
      if (hasOverride) {
        var p = pubHighExamDateOverrides[overrideKey].split('/');
        overrideDateVal = p[0] + '-' + (p[1].length < 2 ? '0' + p[1] : p[1]) + '-' + (p[2].length < 2 ? '0' + p[2] : p[2]);
      }

      var html = '<table style="width:100%; border-collapse:collapse; font-size:13px;">';
      html += '<thead><tr style="background:#f5f5f5;">';
      html += '<th style="padding:10px; border:1px solid #ddd; text-align:left;">試験年</th>';
      html += '<th style="padding:10px; border:1px solid #ddd; text-align:left;">自動計算日</th>';
      html += '<th style="padding:10px; border:1px solid #ddd; text-align:left;">設定中の日程</th>';
      html += '<th style="padding:10px; border:1px solid #ddd; text-align:left;">変更（1日目を入力）</th>';
      html += '</tr></thead><tbody>';

      html += '<tr>';
      html += '<td style="padding:10px; border:1px solid #ddd;">' + (yr + 1) + '年3月</td>';
      html += '<td style="padding:10px; border:1px solid #ddd; color:#666;">' + autoDateStr + '</td>';
      if (hasOverride) {
        var pd = pubHighExamDateOverrides[overrideKey].split('/');
        var wedDay2 = parseInt(pd[2]) + 1;
        var setStr = pd[0] + '年' + parseInt(pd[1]) + '月' + parseInt(pd[2]) + '日（火）・' + wedDay2 + '日（水）';
        html += '<td style="padding:10px; border:1px solid #ddd; color:#e67e22; font-weight:600;">' + setStr + '</td>';
      } else {
        html += '<td style="padding:10px; border:1px solid #ddd; color:#999;">自動計算</td>';
      }
      html += '<td style="padding:10px; border:1px solid #ddd;">';
      html += '<div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">';
      html += '<input type="date" id="pubHighExamInput_' + yr + '" value="' + overrideDateVal + '" style="padding:6px; border:1px solid #ddd; border-radius:5px; font-size:13px;">';

      var thisYear = now.getFullYear();
      var fiscalYear = (now.getMonth() + 1) >= 4 ? thisYear : thisYear - 1;
      for (var y = fiscalYear - 1; y <= fiscalYear + 2; y++) {
        var opt = document.createElement('option');
        opt.value = y;

    /**

    function onCustomEventTypeChange() {
      var type = document.querySelector('input[name="customEventType"]:checked').value;

      if (type === 'juku') {

        }
      }
    }

    /**
     * 管理タブ：カスタムイベント追加フォームを送信する
     */
    function submitCustomScheduleEntry() {
      var type = document.querySelector('input[name="customEventType"]:checked').value;
      var schoolInput = document.getElementById('customSchoolName');
      var eventName = document.getElementById('customEventName').value.trim();
      var dateVal = document.getElementById('customEventDate').value;
      var details = document.getElementById('customEventDetails').value.trim();

      // 学校名の決定
      var schoolName;
      if (type === 'juku') {
        schoolName = '塾';
      } else {
        schoolName = schoolInput ? schoolInput.value.trim() : '';
        if (!schoolName) {
          appAlert('学校名を入力してください');
          return;
        }
        // 高校の場合、塾・中学が含まれていないか確認
        if (type === 'high' && (schoolName.includes('塾') || schoolName.includes('中学'))) {
          appAlert('高校の予定として追加する場合、学校名に「塾」「中学」は使えません。\n変更してください。');
          return;
        }
      }
      if (!eventName) { appAlert('イベント名を入力してください'); return; }
      if (!dateVal)   { appAlert('日付を選択してください'); return; }

      // 中学校の場合、学校名に「中学」が含まれているか確認
      function doSubmit() {
        var parts = dateVal.split('-');
        var dateYear = parseInt(parts[0]);
        var dateMonth = parseInt(parts[1]);
        var dateDay = parseInt(parts[2]);

        var btn = document.querySelector('button[onclick="submitCustomScheduleEntry()"]');
        btn.disabled = true;
        btn.textContent = '追加中...';

        google.script.run
          .withSuccessHandler(function(result) {
            btn.disabled = false;
            btn.textContent = '追加する';
            if (result.success) {
              document.getElementById('customEventName').value = '';
              document.getElementById('customEventDate').value = '';
              document.getElementById('customEventDetails').value = '';
              loadCustomScheduleEntries();
              allSchedules.push({
                timestamp: result.timestamp || new Date().toISOString(),
                school: schoolName,
                eventType: eventName,
                schedule: dateYear + '年' + dateMonth + '月' + dateDay + '日',
                details: details,
                source: 'Admin 直接入力'
              });
              renderCalendar();
              showMessage('adminMessage', '✅ 追加しました', 'success');
            } else {
              showMessage('adminMessage', '❌ ' + result.error, 'error');
            }
          })
          .withFailureHandler(function(err) {
            btn.disabled = false;
            btn.textContent = '追加する';
            showMessage('adminMessage', '❌ 通信エラー: ' + (err.message || err), 'error');
          })
          .addCustomScheduleEntry(schoolName, eventName, dateYear, dateMonth, dateDay, details);
      }

      if (type === 'junior' && !schoolName.includes('中学')) {
        appConfirm('学校名に「中学」が含まれていないと中学校の予定タブに表示されません。\n入力値: ' + schoolName + '\nこのまま追加しますか？').then(function(ok) {
          if (ok) doSubmit();
        });
      } else {
        doSubmit();
      }
    }

          '</td>' +

    /**

    function saveJukuEvent(type, year, month) {
      var dateEl = document.getElementById('jukuDate_' + type);
      var detailsEl = document.getElementById('jukuDetails_' + type);
      if (!dateEl || !dateEl.value) { appAlert('日付を入力してください'); return; }
      var parts = dateEl.value.split('-');
      var dateStr = parts[0] + '/' + parseInt(parts[1]) + '/' + parseInt(parts[2]);
      var details = detailsEl ? detailsEl.value : '';
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            jukuEventOverrides[type + '_' + year + '_' + month] = { date: dateStr, details: details };
            loadJukuEventsTable();
            renderCalendar();
            showMessage('adminMessage', '✅ ' + result.message, 'success');
          } else { showMessage('adminMessage', '❌ ' + result.error, 'error'); }
        })
        .withFailureHandler(function(err) { showMessage('adminMessage', '❌ 通信エラー: ' + (err.message || err), 'error'); })
        .setJukuEventOverride(type, year, month, dateStr, details);
    }

    function closeAIWidget() {

    function sendAIWidgetMessage() {
      var input = document.getElementById('aiWidgetInput');
      var message = input.value.trim();

      if (!message) {
        return;
      }

      // 確認待ちアクションがある場合は「はい/いいえ」をローカルで処理
      if (typeof checkPendingAiAction_ === 'function' && checkPendingAiAction_(message)) {
        input.value = '';
        return;
      }

      // ユーザーメッセージを表示
      addAIWidgetMessage('user', message);
      input.value = '';

      // AI 処理中を表示
      var thinkingId = 'thinking_' + Date.now();
      addAIWidgetMessage('ai', '🤔 考え中...', thinkingId);

      // 送信前の履歴（直近10件）をコピーしてからユーザーメッセージを履歴に追加
      var historyToSend = aiWidgetChatHistory.slice(-10);
      aiWidgetChatHistory.push({ role: 'user', text: message });

      // AI に送信（履歴も渡す）
      google.script.run
        .withSuccessHandler(function(result) {
          removeAIWidgetMessage(thinkingId);
          var aiText = handleAIWidgetResponse(result);
          // AI応答を履歴に追加
          if (aiText) {
            aiWidgetChatHistory.push({ role: 'ai', text: aiText });
          }
        })
        .withFailureHandler(function(error) {
          removeAIWidgetMessage(thinkingId);
          addAIWidgetMessage('ai', '❌ エラー: ' + error);
        })
        .requestAIAssistant(message, historyToSend);
    }

      modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
    }

    // マイク権限の状態を確認し、拒否されていればモーダルを表示して false を返す
    function checkMicPermissionAndStart() {
      if (navigator.permissions && navigator.permissions.query) {
        return navigator.permissions.query({ name: 'microphone' }).then(function(result) {
          if (result.state === 'denied') {
            showMicPermissionModal();
            return false;
          }
          return true;
        }).catch(function() {
          return true; // Permissions API 非対応の場合はスルーして通常起動
        });
      }
      return Promise.resolve(true);
    }

    // 音声認識を実際に開始する
    function startVoiceRecognition() {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      aiMicRecognition = new SR();
      aiMicRecognition.lang = 'ja-JP';
      aiMicRecognition.continuous = false;
      aiMicRecognition.interimResults = true;

      var micBtn = document.getElementById('aiMicBtn');

      aiMicRecognition.onstart = function() {
        aiMicListening = true;
        micBtn.classList.add('recording');
        micBtn.title = 'タップして停止';
      };

      aiMicRecognition.onresult = function(event) {
        var transcript = '';
        for (var i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        document.getElementById('aiWidgetInput').value = transcript;
      };

      aiMicRecognition.onend = function() {
        aiMicListening = false;
        micBtn.classList.remove('recording');
        micBtn.title = '音声入力';
      };

      aiMicRecognition.onerror = function(event) {
        aiMicListening = false;
        micBtn.classList.remove('recording');
        micBtn.title = '音声入力';
        if (event.error === 'not-allowed') {
          showMicPermissionModal();
        } else if (event.error === 'no-speech') {
          addAIWidgetMessage('ai', '⚠️ 音声が検出されませんでした。');
        } else {
          addAIWidgetMessage('ai', '⚠️ 音声入力エラー: ' + event.error);
        }
      };

      aiMicRecognition.start();
    }

    function toggleVoiceInput() {
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        addAIWidgetMessage('ai', '⚠️ お使いのブラウザは音声入力に対応していません。Chrome または Edge をお使いください。');
        return;
      }

      // 録音中なら停止
      if (aiMicListening) {
        aiMicRecognition.stop();
        return;
      }

      // 権限を確認してから音声認識を開始
      checkMicPermissionAndStart().then(function(canProceed) {
        if (!canProceed) return;
        startVoiceRecognition();
      });

    }

    function addAIWidgetMessage(role, message, messageId) {
      var container = document.getElementById('aiWidgetMessages');
      var messageEl = document.createElement('div');
      messageEl.id = messageId || '';
      messageEl.style.cssText = 'margin-bottom: 12px; animation: fadeIn 0.3s ease-in;';
      
      if (role === 'user') {
        messageEl.innerHTML = '<div style="background: #4facfe; color: white; padding: 10px 14px; border-radius: 12px; margin-left: 40px; word-break: break-word;">' +
                              '<small style="opacity: 0.8;">' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + '</small><br>' +
                              message.replace(/\n/g, '<br>') +
                              '</div>';
      } else {
        var displayMessage = message
          .replace(/\\n/g, '<br>')
          .replace(/\n/g, '<br>');
        
        messageEl.innerHTML = '<div style="background: #f0f0f0; color: #333; padding: 10px 14px; border-radius: 12px; margin-right: 40px; word-break: break-word;">' +
                              '<small style="opacity: 0.8;">' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + '</small><br>' +
                              displayMessage +
                              '</div>';
      }
      
      container.appendChild(messageEl);
      container.scrollTop = container.scrollHeight;
    }
    
    function removeAIWidgetMessage(messageId) {
      var el = document.getElementById(messageId);
      if (el) {
        el.remove();
      }
    }
    
    function handleAIWidgetResponse(result) {
      if (!result) {
        addAIWidgetMessage('ai', '❌ レスポンスが空です');
        return null;
      }

      var type = result.type;
      var message = '';

      if (!result.success && result.type === 'error') {
        addAIWidgetMessage('ai', '❌ ' + (result.error || 'エラーが発生しました'));
        return null;
      }

      if (type === 'config_change') {
        if (result.success) {
          // バックエンドで設定は適用済み → フロントエンドに即時反映
          if (result.recommendedSettings) {
            var rs = result.recommendedSettings;
            if (rs.themeColor) applyThemeColor(rs.themeColor);
            if (rs.aiAssistantName) {
              var titleEl = document.querySelector('#aiWidgetModal div[style*="font-size: 18px"]');
              if (titleEl) titleEl.textContent = '🤖 AI ' + rs.aiAssistantName;
            }
          }
          message = '✓ 🔧 ' + (result.explanation || '設定を変更しました');
        } else {
          message = '❌ ' + (result.error || '設定の変更に失敗しました');
        }
      } else if (type === 'qa_help') {
        if (result.success) {
          message = '📚 ' + (result.answer || 'ご質問にお答えしました');
        } else {
          message = '❌ ' + (result.error || 'お答えできませんでした');
        }
      } else if (type === 'other') {
        if (result.success) {
          message = '💬 ' + (result.response || 'ご質問にお答えしました');
        } else {
          message = '❌ ' + (result.error || 'お答えできませんでした');
        }
      } else if (type === 'app_action') {
        // app_action は js-ai-actions.html の dispatchAiAction_ に委譲
        return dispatchAiAction_(result);
      } else {
        message = '❌ 不明な応答タイプです';
      }

      addAIWidgetMessage('ai', message);
      return message;
    }

    /**
     * switchSubTab用ダミーイベント生成（event.target.style アクセスによるエラーを防ぐ）
     */
    function makeDummySubTabEvt_() {
      return { preventDefault: function(){}, stopPropagation: function(){}, currentTarget: null, target: { style: {}, classList: { add: function(){}, remove: function(){} } } };
    }

    /**
     * AIアシスタントから成績一覧表タブへ自動ナビゲートする
     * テスト名セレクトの選択肢が揃うまでポーリングして待機してからフィルターをセットする
     * @param {string} campusCode 校舎コード2桁（空文字なら全校舎）
     * @param {string} testName テスト名（空文字なら未選択）
     * @param {number} year 学年年度（省略時は currentFiscalYear）
     */
    function navigateToGradesList_fromAI(campusCode, testName, year) {
      switchTab('grades');
      switchSubTab(makeDummySubTabEvt_(), 'grades-list');
      // 年度セレクト＋テスト名セレクトの両方が揃うまでポーリング（最大5秒）
      var attempts = 0;
      var timer = setInterval(function() {
        attempts++;
        var yearSel = document.getElementById('gradesYearSelect');
        var yearReady = yearSel && !yearSel.disabled && yearSel.options.length > 0 && yearSel.options[0].value !== '';
        var testSel = document.getElementById('list-test-select');
        var ready = yearReady && testSel && testSel.options.length > 1;
        if (ready || attempts >= 50) {
          clearInterval(timer);
          if (!ready) return;
          // ① 年度をセットしてchangeイベント発火（AIからのyearを最優先、未指定ならcurrentFiscalYear）
          var targetYear = (year != null && year !== '') ? String(year) : String(currentFiscalYear);
          yearSel.value = targetYear;
          yearSel.dispatchEvent(new Event('change'));
          // ② 年度変更の反映を待ってからテスト名・校舎をセット
          setTimeout(function() {
            var testSelRefresh = document.getElementById('list-test-select');
            if (testName && testSelRefresh) {
              testSelRefresh.value = testName;
              testSelRefresh.dispatchEvent(new Event('change'));
            }
            // ③ 校舎フィルター
            if (campusCode) {
              var allCb = document.getElementById('list-campus-all');
              if (allCb) allCb.checked = false;
              document.querySelectorAll('#list-campus-checkboxes input[type="checkbox"]').forEach(function(cb) {
                cb.checked = (cb.value === String(campusCode));
              });
            }
            loadGradesList();
          }, 300);
        }
      }, 100);
    }

    /**
     * AIアシスタントから成績表タブへ自動ナビゲートする
     * 校舎・テスト名をセットして生徒タブを構築し、指定生徒の成績表を表示する
     * @param {string} studentId 生徒ID10桁（先頭2桁が校舎コード）
     * @param {number} year 学年年度
     * @param {string} testName テスト名（会話で特定できた場合のみ。空文字なら全テスト表示）
     */
    function navigateToStudentReport_fromAI(studentId, year, testName) {
      if (!studentId) return;
      var campusCode = String(studentId).substring(0, 2);
      switchTab('grades');
      switchSubTab(makeDummySubTabEvt_(), 'grades-report');

      // 年度セレクト＋校舎セレクトが揃うまでポーリング
      var attempts = 0;
      var timer = setInterval(function() {
        attempts++;
        var yearSel   = document.getElementById('gradesYearSelect');
        var campusSel = document.getElementById('report-campus');
        var ready = yearSel && !yearSel.disabled && yearSel.options.length > 0 && campusSel && campusSel.options.length > 1;
        if (ready || attempts >= 50) {
          clearInterval(timer);
          if (!ready) return;
          // ① 年度セット
          var targetYear = (year != null && year !== '') ? String(year) : String(currentFiscalYear);
          yearSel.value = targetYear;
          yearSel.dispatchEvent(new Event('change'));
          // ② 校舎セット
          setTimeout(function() {
            var cs = document.getElementById('report-campus');
            if (cs) { cs.value = campusCode; cs.dispatchEvent(new Event('change')); }
            // ③ テスト名セット
            setTimeout(function() {
              var testSel = document.getElementById('report-test');
              if (testSel && testName) { testSel.value = testName; }
              // ④ loadReportStudentList() を呼んでタブを構築
              loadReportStudentList();
              // ⑤ タブが構築されるまでポーリング → 指定生徒に切り替え
              var stAttempts = 0;
              var stTimer = setInterval(function() {
                stAttempts++;
                var found = reportStudentListData.filter(function(s) { return s.studentId === studentId; });
                if (found.length > 0 || stAttempts >= 60) {
                  clearInterval(stTimer);
                  if (found.length > 0) {
                    switchReportStudentTab(studentId);
                  }
                }
              }, 100);
            }, 300);
          }, 300);
        }
      }, 100);
    }
    
    /**
     * キーボードイベント（Enter で送信）
     */
    document.addEventListener('DOMContentLoaded', function() {
      var aiInput = document.getElementById('aiWidgetInput');
      if (aiInput) {
        aiInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendAIWidgetMessage();
          } else if (e.key === 'Enter' && e.shiftKey) {
            // Shift+Enter で改行
          }
        });
      }
      
      // オーバーレイをクリックで閉じる
      document.getElementById('aiWidgetOverlay').addEventListener('click', closeAIWidget);
    });

</script>
