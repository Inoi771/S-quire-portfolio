<script>
    // ========================================
    // 料金表ロジック
    // ========================================

    var pricingData = null;
    var currentPricingTab = null;

    /**
     * 料金表データを読み込んで表示する
     */
    function loadPricingTable() {
      var output = document.getElementById('pricingOutput');
      if (pricingData) {
        renderPricingTable(pricingData);
        return;
      }

      // キャッシュがあれば即座に表示
      try {
        var cached = localStorage.getItem('s-quire-pricing');
        if (cached) {
          var parsed = JSON.parse(cached);
          pricingData = parsed.data;
          currentPricingTab = (pricingData.tabs && pricingData.tabs[0]) || null;
          renderPricingTable(pricingData);
        }
      } catch (e) { /* キャッシュ破損時は無視 */ }

      // キャッシュがない場合のみローディング表示
      if (!pricingData) {
        output.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">読み込み中...</p>';
      }

      // 裏で最新データを取得
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            result.data._campusMap = result.campusMap || {};
            try { localStorage.setItem('s-quire-pricing', JSON.stringify({ data: result.data })); } catch (e) {}
            pricingData = result.data;
            currentPricingTab = (pricingData.tabs && pricingData.tabs[0]) || null;
            renderPricingTable(pricingData);
          } else if (!pricingData) {
            output.innerHTML = '<p style="text-align:center;color:#e53935;padding:40px;">読み込みに失敗しました: ' + (result.error || '') + '</p>';
          }
        })
        .withFailureHandler(function(err) {
          if (!pricingData) {
            output.innerHTML = '<p style="text-align:center;color:#e53935;padding:40px;">エラー: ' + err + '</p>';
          }
        })
        .getPricingConfigForWeb();
    }

    /**
     * 料金表をHTMLでレンダリングする
     */
    /**
     * タブを切り替える
     * @param {string} tabName 切り替え先のタブ名
     */
    function switchPricingTab(tabName) {
      currentPricingTab = tabName;
      renderPricingTable(pricingData);
    }

    /**
     * 1列目のセル結合（rowspan）を計算する
     * 空文字列が続く行は直前の非空セルに吸収される
     * @param {Array} rows セクションの行データ
     * @return {Array} 各行の rowspan 値（0 = スキップ）
     */
    function computeRowSpans(rows) {
      var spans = [];
      var i = 0;
      while (i < rows.length) {
        var count = 1;
        while (i + count < rows.length && rows[i + count][0] === '') count++;
        spans.push(count);
        for (var j = 1; j < count; j++) spans.push(0);
        i += count;
      }
      return spans;
    }

    function renderPricingTable(data) {
      var output = document.getElementById('pricingOutput');
      var html = '';
      html += '<div class="pricing-title">' + escapeHtml(data.title) + '</div>';

      // タブボタン描画（tabs が定義されている場合のみ）
      if (data.tabs && data.tabs.length > 1) {
        html += '<div class="pricing-tabs-container">';
        data.tabs.forEach(function(tabName) {
          var isActive = tabName === currentPricingTab;
          html += '<button class="pricing-tab-btn' + (isActive ? ' active' : '') + '" onclick="switchPricingTab(\'' + escapeHtml(tabName) + '\')">' + escapeHtml(tabName) + '</button>';
        });
        html += '</div>';
      }

      // 表示するセクションを絞り込む（タブなし or tabs未定義の場合は全件）
      var tabSections = data.sections.map(function(s, i) { return { section: s, globalIdx: i }; });
      if (data.tabs && currentPricingTab) {
        tabSections = tabSections.filter(function(x) { return x.section.tab === currentPricingTab; });
      }

      tabSections.forEach(function(item, tIdx) {
        var section = item.section;
        var sIdx = item.globalIdx; // 常にグローバルインデックスを使う
        var isFirstSection = tIdx === 0;
        var isLastSection = tIdx === tabSections.length - 1;
        var isAutoGenerated = section._autoGenerated === true;
        var isFromNormalConfig = section._fromNormalConfig === true;
        var isLocked = isAutoGenerated || isFromNormalConfig;

        // 校舎スコープバッジ（_fromNormalConfig / _autoGenerated セクション）
        var scopeBadge = '';
        if (isLocked && section.campusScope === 'specific' && section.campusCodes && section.campusCodes.length > 0) {
          var campusMap = data._campusMap || {};
          var campusNames = (section.campusResolvedNames && section.campusResolvedNames.length > 0)
            ? section.campusResolvedNames
            : section.campusCodes.map(function(code) { return campusMap[code] || code; });
          scopeBadge = ' <span style="font-size:11px;padding:2px 6px;background:#fff3e0;color:#ff8c00;border:1px solid #ff8c00;border-radius:8px;">' + escapeHtml(campusNames.join('・')) + 'のみ</span>';
        }

        html += '<div class="pricing-section" data-section-idx="' + sIdx + '">';
        html += '<div class="pricing-section-header">';
        if (isLocked) {
          html += '<span>🔗 ' + escapeHtml(section.name) + scopeBadge + '</span>';
        } else {
          html += '<span>' + escapeHtml(section.name) + '</span>';
        }
        html += '</div>';

        // rowspan 計算
        var rowSpans = computeRowSpans(section.rows);

        // テーブル（横スクロール対応ラッパー）
        html += '<div class="pricing-table-wrap">';
        html += '<table class="pricing-table">';
        // ヘッダー
        html += '<thead><tr>';
        section.headers.forEach(function(h) {
          html += '<th>' + escapeHtml(h) + '</th>';
        });
        html += '</tr></thead>';

        // 行
        html += '<tbody>';
        section.rows.forEach(function(row, rIdx) {
          html += '<tr>';
          row.forEach(function(cell, cIdx) {
            if (cIdx === 0) {
              // 1列目: rowspan で結合
              if (rowSpans[rIdx] > 0) {
                html += '<td class="pricing-label-cell"' + (rowSpans[rIdx] > 1 ? ' rowspan="' + rowSpans[rIdx] + '"' : '') + '>' + formatPriceCell(cell) + '</td>';
              }
              // rowSpans[rIdx] === 0 → 結合済みなので td を出力しない
            } else {
              var cls = (cIdx >= 2 && cell && /\d/.test(cell)) ? ' class="price-cell"' : '';
              html += '<td' + cls + '>' + formatPriceCell(cell) + '</td>';
            }
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        html += '</div>'; // .pricing-table-wrap

        // ノート（ロック済みセクションは「管理タブ」言及の管理メモのみ除外）
        var displayNotes = isLocked
          ? (section.notes || []).filter(function(n) { return n.indexOf('管理タブ') === -1; })
          : (section.notes || []);
        if (displayNotes.length > 0) {
          html += '<div class="pricing-notes">';
          displayNotes.forEach(function(n) {
            html += '<p>' + escapeHtml(n) + '</p>';
          });
          html += '</div>';
        }

        html += '</div>';
      });

      // フッターノート
      if (data.footerNotes && data.footerNotes.length > 0) {
        html += '<div class="pricing-footer-notes">';
        data.footerNotes.forEach(function(n) {
          html += '<p>' + escapeHtml(n) + '</p>';
        });
        html += '</div>';
      }

      output.innerHTML = html;

      // 横スクロール可能なテーブルにヒント（右端フェード）を付与
      var wraps = output.querySelectorAll('.pricing-table-wrap');
      wraps.forEach(function(wrap) {
        // 既存リスナーを除去してメモリリークを防止
        if (wrap._checkScrollHandler) {
          wrap.removeEventListener('scroll', wrap._checkScrollHandler);
        }
        function checkScroll() {
          if (wrap.scrollWidth > wrap.clientWidth + 2) {
            wrap.classList.add('has-scroll');
            if (wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 4) {
              wrap.classList.add('scrolled-end');
            } else {
              wrap.classList.remove('scrolled-end');
            }
          } else {
            wrap.classList.remove('has-scroll');
          }
        }
        wrap._checkScrollHandler = checkScroll;
        wrap.addEventListener('scroll', checkScroll, { passive: true });
        checkScroll();
      });
    }

    /**
     * 価格セルをフォーマット表示する（税込括弧を小さく表示）
     */
    function formatPriceCell(text) {
      if (!text) return '';
      // "6,000 (6,600)" → "6,000 <span class='tax-inc'>(6,600)</span>" のように変換
      var match = text.match(/^(.+?)(\s*\(.+?\))$/);
      if (match) {
        return escapeHtml(match[1]) + '<span class="tax-inc">' + escapeHtml(match[2]) + '</span>';
      }
      return escapeHtml(text);
    }

    /**
     * HTMLエスケープ（料金表用）
     */
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /**
     * セルの値が変更されたときのハンドラー
     */
    function onPricingCellChange(input) {
      var s = parseInt(input.dataset.s);
      var r = parseInt(input.dataset.r);
      var c = parseInt(input.dataset.c);
      pricingData.sections[s].rows[r][c] = input.value;
    }

    /**
     * 結合ボタン: 1列目を空文字にして上の行と結合 / 解除
     */
    function togglePricingMerge(sIdx, rIdx) {
      var row = pricingData.sections[sIdx].rows[rIdx];
      if (row[0] === '') {
        // 結合解除: 上の非空セルの値をコピー
        for (var i = rIdx - 1; i >= 0; i--) {
          if (pricingData.sections[sIdx].rows[i][0] !== '') {
            row[0] = pricingData.sections[sIdx].rows[i][0];
            break;
          }
        }
        if (row[0] === '') row[0] = '項目名';
      } else {
        // 結合: 空文字にする
        row[0] = '';
      }
      renderPricingTable(pricingData);
    }

    /**
     * 行を末尾に追加
     */
    function addPricingRow(sIdx) {
      var section = pricingData.sections[sIdx];
      var newRow = section.headers.map(function() { return ''; });
      section.rows.push(newRow);
      renderPricingTable(pricingData);
    }

    /**
     * 指定した行の上に新しい行を挿入
     */
    function insertPricingRowAt(sIdx, rIdx) {
      var section = pricingData.sections[sIdx];
      var newRow = section.headers.map(function() { return ''; });
      section.rows.splice(rIdx, 0, newRow);
      renderPricingTable(pricingData);
    }

    /**
     * ヘッダー名を変更
     */
    function onPricingHeaderChange(input) {
      var s = parseInt(input.dataset.s);
      var h = parseInt(input.dataset.h);
      pricingData.sections[s].headers[h] = input.value;
    }

    /**
     * 列を末尾に追加
     */
    function addPricingColumn(sIdx) {
      var section = pricingData.sections[sIdx];
      var headerName = prompt('新しい列のヘッダー名を入力してください:');
      if (headerName === null) return;
      section.headers.push(headerName || ('列' + (section.headers.length + 1)));
      section.rows.forEach(function(row) { row.push(''); });
      renderPricingTable(pricingData);
    }

    /**
     * 指定した列の左に新しい列を挿入
     */
    function insertPricingColumnAt(sIdx, cIdx) {
      var section = pricingData.sections[sIdx];
      var headerName = prompt('新しい列のヘッダー名を入力してください:');
      if (headerName === null) return;
      section.headers.splice(cIdx, 0, headerName || '列');
      section.rows.forEach(function(row) { row.splice(cIdx, 0, ''); });
      renderPricingTable(pricingData);
    }

    /**
     * 列を削除
     */
    function deletePricingColumn(sIdx, cIdx) {
      var section = pricingData.sections[sIdx];
      appConfirm('「' + section.headers[cIdx] + '」列を削除しますか？\nこの列のデータもすべて削除されます。').then(function(ok) {
        if (!ok) return;
        section.headers.splice(cIdx, 1);
        section.rows.forEach(function(row) { row.splice(cIdx, 1); });
        renderPricingTable(pricingData);
      });
    }

    /**
     * 行を上下に移動
     */
    function movePricingRow(sIdx, rIdx, dir) {
      var rows = pricingData.sections[sIdx].rows;
      var targetIdx = rIdx + dir;
      if (targetIdx < 0 || targetIdx >= rows.length) return;
      var tmp = rows[rIdx];
      rows[rIdx] = rows[targetIdx];
      rows[targetIdx] = tmp;
      renderPricingTable(pricingData);
    }

    /**
     * セクションを同タブ内で上下に移動
     */
    function movePricingSection(sIdx, dir) {
      var tab = pricingData.sections[sIdx].tab;
      // 同じタブのグローバルインデックス一覧を取得
      var tabIndices = pricingData.sections.map(function(s, i) { return i; }).filter(function(i) {
        return !pricingData.tabs || pricingData.sections[i].tab === tab;
      });
      var posInTab = tabIndices.indexOf(sIdx);
      var targetPos = posInTab + dir;
      if (targetPos < 0 || targetPos >= tabIndices.length) return;
      var targetGlobalIdx = tabIndices[targetPos];
      var tmp = pricingData.sections[sIdx];
      pricingData.sections[sIdx] = pricingData.sections[targetGlobalIdx];
      pricingData.sections[targetGlobalIdx] = tmp;
      renderPricingTable(pricingData);
    }

    /**
     * 行を削除
     */
    function deletePricingRow(sIdx, rIdx) {
      appConfirm('この行を削除しますか？').then(function(ok) {
        if (!ok) return;
        pricingData.sections[sIdx].rows.splice(rIdx, 1);
        renderPricingTable(pricingData);
      });
    }

    /**
     * セクション名を編集
     */
    function editSectionName(sIdx) {
      var current = pricingData.sections[sIdx].name;
      var newName = prompt('セクション名を入力してください:', current);
      if (newName !== null && newName.trim()) {
        pricingData.sections[sIdx].name = newName.trim();
        renderPricingTable(pricingData);
      }
    }

    /**
     * セクションを削除
     */
    function deleteSection(sIdx) {
      var name = pricingData.sections[sIdx].name;
      appConfirm('「' + name + '」セクションを削除しますか？').then(function(ok) {
        if (!ok) return;
        pricingData.sections.splice(sIdx, 1);
        renderPricingTable(pricingData);
      });
    }

    /**
     * 新しいセクションを追加
     */
    function addNewSection() {
      var name = prompt('新しいセクション名を入力してください:');
      if (!name || !name.trim()) return;
      var headerCount = prompt('列数を入力してください（例: 3）:', '3');
      var count = parseInt(headerCount) || 3;
      var headers = [];
      for (var i = 0; i < count; i++) {
        var h = prompt('列' + (i + 1) + 'のヘッダー名を入力してください:');
        headers.push(h || '列' + (i + 1));
      }
      pricingData.sections.push({
        id: 'sec_' + Date.now(),
        name: name.trim(),
        tab: currentPricingTab || '通常授業',
        headers: headers,
        rows: [],
        notes: []
      });
      renderPricingTable(pricingData);
    }

    /**
     * フッター注記を編集
     */
    function editFooterNotes() {
      var current = (pricingData.footerNotes || []).join('\n');
      var newVal = prompt('フッター注記（1行に1つ）:', current);
      if (newVal !== null) {
        pricingData.footerNotes = newVal.split('\n').filter(function(l) { return l.trim(); });
        renderPricingTable(pricingData);
      }
    }

    /**
     * タイトルを編集
     */
    function editPricingTitle() {
      var current = pricingData.title;
      var newVal = prompt('タイトルを入力してください:', current);
      if (newVal !== null && newVal.trim()) {
        pricingData.title = newVal.trim();
        renderPricingTable(pricingData);
      }
    }

    /**
     * 料金表PDFメニューの表示切替
     */
    function togglePricingPdfMenu(event) {
      event.stopPropagation();
      var menu = document.getElementById('pricingPdfDropdownMenu');
      if (menu.style.display === 'none') {
        menu.style.display = 'block';
        setTimeout(function() {
          document.addEventListener('click', closePricingPdfMenu, { once: true });
        }, 0);
      } else {
        menu.style.display = 'none';
      }
    }

    function closePricingPdfMenu() {
      document.getElementById('pricingPdfDropdownMenu').style.display = 'none';
    }

    /**
     * 料金表をPDFとしてダウンロードまたは印刷する
     * 現在表示中のタブのみキャプチャ。A4に収まらない場合は中央で2ページに分割
     */
    function downloadPricingPDF(mode) {
      var btn = document.getElementById('pricingPdfBtn');
      var arrowBtn = document.getElementById('pricingPdfArrowBtn');
      btn.textContent = '⏳ 生成中...';
      btn.disabled = true;
      arrowBtn.disabled = true;

      // 編集モード中なら一旦閲覧モードに戻す
      var wasEditMode = pricingEditMode;
      if (wasEditMode) {
        pricingEditMode = false;
        renderPricingTable(pricingData);
      }

      var printWindow = null;
      if (mode === 'print') {
        printWindow = window.open('', '_blank');
        if (printWindow) {
          printWindow.document.write('<html><body style="margin:0;background:#f0f0f0;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#555;">⏳ 料金表を生成中...</body></html>');
        }
      }

      // 印刷用ヘッダー表示、コントロール非表示
      var printHeader = document.getElementById('pricingPrintHeader');
      var controls = document.querySelector('#univ-pricing .pricing-controls-row');
      var editToggle = document.getElementById('pricingEditToggle');
      printHeader.style.display = 'block';
      var tabLabel = currentPricingTab || '';
      document.getElementById('pricingPrintTitle').textContent = pricingData.title + (tabLabel ? '（' + tabLabel + '）' : '');
      controls.style.display = 'none';
      if (editToggle) editToggle.style.display = 'none';

      var pricingDiv = document.getElementById('univ-pricing');
      var pricingOutput = document.getElementById('pricingOutput');
      var prevMinWidth = pricingDiv.style.minWidth;
      pricingDiv.style.minWidth = '800px';

      function restoreStyles() {
        printHeader.style.display = 'none';
        controls.style.display = '';
        if (editToggle && pricingIsAdmin) editToggle.style.display = 'inline';
        pricingDiv.style.minWidth = prevMinWidth;
        pricingDiv.classList.remove('pricing-print-mode');
        btn.textContent = '📄 PDF出力';
        btn.disabled = false;
        arrowBtn.disabled = false;
        if (wasEditMode) {
          pricingEditMode = true;
          renderPricingTable(pricingData);
          var editBtn = document.getElementById('pricingEditBtn');
          editBtn.textContent = '💾 編集を終了して保存';
          editBtn.style.background = '#43a047';
        }
      }

      pricingDiv.classList.add('pricing-print-mode');

      // html2canvas 共通設定
      var canvasOpts = { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff', windowWidth: 900 };

      // まず全体をキャプチャしてA4に収まるか判定
      html2canvas(pricingDiv, canvasOpts).then(function(fullCanvas) {
        var a4Ratio = 297 / 210; // A4縦横比
        var contentRatio = fullCanvas.height / fullCanvas.width;

        if (contentRatio <= a4Ratio * 1.05) {
          // A4 1枚に収まる → 従来通り
          finalizePdf(mode, [fullCanvas], printWindow, restoreStyles);
        } else {
          // 2ページ分割: 「講習料金」を含むセクションを境に分割
          var sections = pricingOutput.querySelectorAll('.pricing-section');
          var splitIdx = -1;
          for (var i = 0; i < pricingData.sections.length; i++) {
            if (pricingData.sections[i].name.indexOf('講習') !== -1) {
              splitIdx = i;
              break;
            }
          }
          if (splitIdx <= 0) splitIdx = Math.ceil(sections.length / 2);

          // フッターノートを一時的に非表示
          var footerNotes = pricingOutput.querySelector('.pricing-footer-notes');
          var footerDisplay = footerNotes ? footerNotes.style.display : '';

          // ページ1: splitIdx より前のセクション + タイトルを表示、後半を非表示
          var hiddenEls = [];
          for (var i = splitIdx; i < sections.length; i++) {
            sections[i].style.display = 'none';
            hiddenEls.push(sections[i]);
          }
          if (footerNotes) footerNotes.style.display = 'none';

          html2canvas(pricingDiv, canvasOpts).then(function(page1Canvas) {
            // ページ1のセクションを復元、ページ2準備
            hiddenEls.forEach(function(el) { el.style.display = ''; });

            // ページ2: 前半のセクション + タイトル + 印刷ヘッダーを非表示
            var hiddenEls2 = [];
            for (var i = 0; i < splitIdx; i++) {
              sections[i].style.display = 'none';
              hiddenEls2.push(sections[i]);
            }
            // タイトルも非表示
            var titleEl = pricingOutput.querySelector('.pricing-title');
            var titleDisplay = titleEl ? titleEl.style.display : '';
            if (titleEl) titleEl.style.display = 'none';
            printHeader.style.display = 'none';
            // フッターノートは表示
            if (footerNotes) footerNotes.style.display = '';

            html2canvas(pricingDiv, canvasOpts).then(function(page2Canvas) {
              // 全要素を復元
              hiddenEls2.forEach(function(el) { el.style.display = ''; });
              if (titleEl) titleEl.style.display = titleDisplay;
              if (footerNotes) footerNotes.style.display = footerDisplay;
              printHeader.style.display = 'block';

              finalizePdf(mode, [page1Canvas, page2Canvas], printWindow, restoreStyles);
            }).catch(function(e) {
              // 復元してエラー処理
              hiddenEls2.forEach(function(el) { el.style.display = ''; });
              if (titleEl) titleEl.style.display = titleDisplay;
              if (footerNotes) footerNotes.style.display = footerDisplay;
              printHeader.style.display = 'block';
              handlePdfError(e, printWindow, restoreStyles);
            });
          }).catch(function(e) {
            hiddenEls.forEach(function(el) { el.style.display = ''; });
            if (footerNotes) footerNotes.style.display = footerDisplay;
            handlePdfError(e, printWindow, restoreStyles);
          });
        }
      }).catch(function(e) {
        handlePdfError(e, printWindow, restoreStyles);
      });
    }

    /**
     * PDF生成エラー時の共通処理
     */
    function handlePdfError(e, printWindow, restoreStyles) {
      console.error('料金表PDF生成エラー:', e);
      if (printWindow) printWindow.close();
      restoreStyles();
      appAlert('PDF生成に失敗しました。\nブラウザを更新して再度お試しください。');
    }

    /**
     * キャプチャ済みcanvas配列からPDF/印刷を実行する
     * @param {string} mode 'download' or 'print'
     * @param {Array} canvases canvas配列（1枚 or 2枚）
     * @param {Window} printWindow 印刷用ウィンドウ（printモード時）
     * @param {Function} restoreStyles スタイル復元関数
     */
    function finalizePdf(mode, canvases, printWindow, restoreStyles) {
      if (mode === 'print') {
        // 印刷モード: 全ページを img タグで出力
        var imgsHtml = '';
        canvases.forEach(function(c, idx) {
          var imgDataPng = c.toDataURL('image/png');
          var pageBreak = idx < canvases.length - 1 ? 'page-break-after: always;' : '';
          imgsHtml += '<img src="' + imgDataPng + '" style="width:100%;height:auto;display:block;' + pageBreak + '"' + (idx === canvases.length - 1 ? ' onload="window.print();"' : '') + '>';
        });
        if (printWindow) {
          printWindow.document.open();
          printWindow.document.write(
            '<!DOCTYPE html><html><head>' +
            '<title>' + pricingData.title + '</title>' +
            '<style>' +
            '* { margin: 0; padding: 0; box-sizing: border-box; }' +
            'body { background: #fff; }' +
            '@page { size: A4 portrait; margin: 7mm; }' +
            '</style></head><body>' +
            imgsHtml +
            '</body></html>'
          );
          printWindow.document.close();
        } else {
          appAlert('ポップアップがブロックされました。\nブラウザのポップアップ許可設定を確認してください。');
        }
      } else {
        // ダウンロードモード: jsPDF で各ページを追加
        var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        var pageW = pdf.internal.pageSize.getWidth();
        var pageH = pdf.internal.pageSize.getHeight();
        var margin = 7;
        var maxW = pageW - margin * 2;
        var maxH = pageH - margin * 2;

        canvases.forEach(function(c, idx) {
          if (idx > 0) pdf.addPage();
          var imgData = c.toDataURL('image/jpeg', 0.92);
          var ratio = c.width / c.height;
          var drawW = maxW;
          var drawH = drawW / ratio;
          if (drawH > maxH) { drawH = maxH; drawW = drawH * ratio; }
          pdf.addImage(imgData, 'JPEG', margin, margin, drawW, drawH);
        });
        pdf.save((currentPricingTab || '料金表') + '.pdf');
      }
      restoreStyles();
    }

    // ========================================
    // 年度カレンダー生成ロジック
    // ========================================

    /**
     * 〇 回数報告書提出日（Sub2ロジック）
     * 月ごとの固定日付。日曜なら前日。
     */
    function getReportDay(year, month) {
      var base = { 4:21,5:24,6:23,7:24,8:24,9:13,10:20,11:23,12:21,1:24,2:21,3:13 };
      var day = base[month];
      if (!day) return null;
      var d = new Date(year, month - 1, day);
      if (d.getDay() === 0) day -= 1; // 日曜→前日
      return day;
    }

    /**
     * □ 全体ミーティング日。8月は除外。
     * 4・5・6月: 第2金曜日（1日が金曜なら第3金曜）
     * 7〜3月（8月除く）: 基準日を含む直前の金曜日
     *   7月=9日基準, 9月=7日基準, 10月=9日基準, 11月=19日基準,
     *   12月=10日基準, 1月=20日基準, 2月=7日基準, 3月=14日基準
     */
    function getMeetingDay(year, month) {
      if (month === 8) return null;

      // 4・5・6月: 第2金曜日（1日が金曜なら第3金曜）
      if (month === 4 || month === 5 || month === 6) {
        var firstDay = new Date(year, month - 1, 1).getDay();
        var vbFriday = ((firstDay - 5 + 7) % 7) + 1;
        return 1 - vbFriday + 15;
      }

      // それ以外: 基準日を含む直前の金曜日
      var refDays = { 7:9, 9:7, 10:9, 11:19, 12:10, 1:20, 2:7, 3:14 };
      var refDay = refDays[month];
      var d = new Date(year, month - 1, refDay);
      var dow = d.getDay(); // 0=日 〜 6=土
      var daysBack = (dow - 5 + 7) % 7; // 金曜日までの遡り日数
      return refDay - daysBack;
    }

    /**
     * ★引落データ送信日 / △メール送信日（Sub4ロジック）
     * 基準日の曜日でオフセット計算。
     * @return {Object} { debit: number, email: number } （日付の数値）
     */
    function getDebitDays(year, month) {
      // 月別基準日
      var baseDay = (month === 8) ? 8 : (month === 1) ? 18 : 13;
      var d1 = new Date(year, month - 1, baseDay);
      var dow = d1.getDay(); // 0=日,1=月,2=火,3=水,4=木,5=金,6=土
      var debitOff, emailOff;
      if (dow === 3 || dow === 4) { debitOff = 0;  emailOff = -1; } // 水・木
      else if (dow === 5)         { debitOff = -1; emailOff = -2; } // 金
      else if (dow === 6)         { debitOff = -2; emailOff = -3; } // 土
      else if (dow === 0)         { debitOff = -3; emailOff = -4; } // 日
      else if (dow === 1)         { debitOff = -4; emailOff = -5; } // 月
      else                        { debitOff = 0;  emailOff = -5; } // 火
      return { debit: baseDay + debitOff, email: baseDay + emailOff };
    }

    /**
     * 年度の休校日（日曜以外の特定の塾休校日）を返す
     * ユーザー確認済みのルールを実装：
     *   GW：4/30〜5/5 固定 + (5/7=日→5/6、それ以外→4/29)
     *   お盆：8/10〜8/15 固定 + (8/17=日→8/16、それ以外→8/9)
     *   秋季：10/28〜11/2 固定
     *   年末年始：12/29〜翌1/3 固定
     *   春季：翌3/15〜17 固定（翌年うるう年なら3/14も追加）
     * @param {number} fiscalYear 年度開始年（例: 2025年度なら2025）
     * @return {Object} dateKey（'YYYY-MM-DD'）をキーとするオブジェクト
     */
    function getClosedDays(fiscalYear) {
      var y = fiscalYear;
      var n = fiscalYear + 1; // 翌年（1〜3月分）
      var c = {};
      var add = function(yr, mo, da) {
        var mm = mo < 10 ? '0' + mo : '' + mo;
        var dd = da < 10 ? '0' + da : '' + da;
        c[yr + '-' + mm + '-' + dd] = true;
      };

      // ゴールデンウィーク: 4/30〜5/5 固定
      add(y, 4, 30);
      add(y, 5, 1); add(y, 5, 2); add(y, 5, 3); add(y, 5, 4); add(y, 5, 5);
      // 5/7が日曜→5/6も休校、それ以外→4/29も休校
      if (new Date(y, 4, 7).getDay() === 0) { add(y, 5, 6); } else { add(y, 4, 29); }

      // お盆: 8/10〜8/15 固定
      add(y, 8, 10); add(y, 8, 11); add(y, 8, 12); add(y, 8, 13); add(y, 8, 14); add(y, 8, 15);
      // 8/17が日曜→8/16も休校、それ以外→8/9も休校
      if (new Date(y, 7, 17).getDay() === 0) { add(y, 8, 16); } else { add(y, 8, 9); }

      // 秋季休校: 10/28〜11/2 固定
      add(y, 10, 28); add(y, 10, 29); add(y, 10, 30); add(y, 10, 31);
      add(y, 11, 1); add(y, 11, 2);

      // 年末年始: 12/29〜翌1/3 固定
      add(y, 12, 29); add(y, 12, 30); add(y, 12, 31);
      add(n, 1, 1); add(n, 1, 2); add(n, 1, 3);

      // 春季休校: 翌3/15〜17 固定。翌年がうるう年なら3/14も追加
      add(n, 3, 15); add(n, 3, 16); add(n, 3, 17);
      var isLeapN = (n % 4 === 0 && (n % 100 !== 0 || n % 400 === 0));
      if (isLeapN) add(n, 3, 14);

      return c;
    }

    /**
     * 指定年の日本の国民の祝日（振替休日・国民の休日含む）を計算して返す
     * @param {number} year 年
     * @return {Object} dateKey → true のオブジェクト
     */
    function getJapaneseHolidays(year) {
      var h = {};
      function fmt(y, m, d) {
        return y + '-' + (m < 10 ? '0' : '') + m + '-' + (d < 10 ? '0' : '') + d;
      }
      function addH(y, m, d) { h[fmt(y, m, d)] = true; }
      function dowOf(y, m, d) { return new Date(y, m - 1, d).getDay(); }
      function nthMonday(y, m, n) {
        var first = dowOf(y, m, 1);
        var diff = (1 - first + 7) % 7;
        return 1 + diff + (n - 1) * 7;
      }
      // 春分・秋分（近似式）
      function shunbun(y) { return Math.floor(20.8431 + 0.242194 * (y - 1980) - Math.floor((y - 1980) / 4)); }
      function shubun(y)  { return Math.floor(23.2488 + 0.242194 * (y - 1980) - Math.floor((y - 1980) / 4)); }

      // 固定祝日
      addH(year, 1, 1);  addH(year, 2, 11);
      if (year >= 2020) addH(year, 2, 23);  // 天皇誕生日
      addH(year, 4, 29); addH(year, 5, 3);  addH(year, 5, 4);  addH(year, 5, 5);
      if (year >= 2016) addH(year, 8, 11);  // 山の日
      addH(year, 11, 3); addH(year, 11, 23);

      // 可変祝日
      addH(year, 1,  nthMonday(year, 1, 2));   // 成人の日
      addH(year, 3,  shunbun(year));            // 春分の日
      addH(year, 7,  nthMonday(year, 7, 3));    // 海の日
      addH(year, 9,  nthMonday(year, 9, 3));    // 敬老の日
      addH(year, 9,  shubun(year));             // 秋分の日
      addH(year, 10, nthMonday(year, 10, 2));   // スポーツの日

      // 国民の休日（祝日と祝日に挟まれた平日）
      for (var m = 1; m <= 12; m++) {
        var dInM = new Date(year, m, 0).getDate();
        for (var d = 2; d < dInM; d++) {
          if (h[fmt(year, m, d)]) continue;
          if (dowOf(year, m, d) === 0) continue; // 日曜除外
          if (h[fmt(year, m, d - 1)] && h[fmt(year, m, d + 1)]) addH(year, m, d);
        }
      }

      // 振替休日（祝日が日曜 → 翌月曜、翌月曜も祝日なら翌火曜…）
      var snap = Object.keys(h).sort();
      snap.forEach(function(key) {
        var p = key.split('-');
        var ky = +p[0], km = +p[1], kd = +p[2];
        if (dowOf(ky, km, kd) === 0) {
          var next = new Date(ky, km - 1, kd + 1);
          while (h[fmt(next.getFullYear(), next.getMonth() + 1, next.getDate())]) {
            next = new Date(next.getFullYear(), next.getMonth(), next.getDate() + 1);
          }
          addH(next.getFullYear(), next.getMonth() + 1, next.getDate());
        }
      });

      return h;
    }

    /**
     * 指定日付が土曜・日曜・祝日かどうかを返す
     * Googleカレンダーの祝日データが取得済みならそれを優先、未取得ならアルゴリズム計算にフォールバック
     * @param {Date} date 判定する日付
     * @return {boolean}
     */
    function isWeekendOrHoliday(date) {
      var dow = date.getDay();
      if (dow === 0 || dow === 6) return true;
      var y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
      var key = y + '-' + (m < 10 ? '0' : '') + m + '-' + (d < 10 ? '0' : '') + d;
      if (googleCalendarHolidays !== null) {
        return !!googleCalendarHolidays[key];
      }
      // Googleカレンダーデータ未取得の場合はアルゴリズム計算で代替
      return !!getJapaneseHolidays(y)[key];
    }

    /**
     * 指定日以降（その日を含む）で最初の平日を返す
     * @param {Date} date 起点日
     * @return {Date}
     */
    function getNextWeekday(date) {
      var d = new Date(date.getTime());
      while (isWeekendOrHoliday(d)) {
        d.setDate(d.getDate() + 1);
      }
      return d;
    }

    /**
     * 指定日以降（その日を含む）で最初の水曜日を返す
     * @param {Date} date 起点日
     * @return {Date}
     */
    function getFirstWednesdayOnOrAfter(date) {
      var d = new Date(date.getTime());
      var daysUntilWed = (3 - d.getDay() + 7) % 7; // 3 = 水曜
      d.setDate(d.getDate() + daysUntilWed);
      return d;
    }

    /**
     * 基礎学力テストの自動計算日を返す
     * @param {number} academicYear 学年年度（例: 2025 → 2025-2026年度）
     * @param {number} testNum テスト番号（1, 2, 3）
     * @return {Date}
     */
    function getComputedBasicTestDate(academicYear, testNum) {
      if (testNum === 1) {
        // 9月30日を含むそれ以降の最初の水曜日
        return getFirstWednesdayOnOrAfter(new Date(academicYear, 8, 30)); // 8 = 9月
      } else if (testNum === 2) {
        // 11月11日を含むそれ以降の最初の水曜日
        return getFirstWednesdayOnOrAfter(new Date(academicYear, 10, 11)); // 10 = 11月
      } else {
        // 第3回: 1月8日の次の平日。ただし1月8日が土日祝日なら次の次の平日
        var jan8 = new Date(academicYear + 1, 0, 8); // 翌年1月8日
        var firstWeekday = getNextWeekday(new Date(academicYear + 1, 0, 9)); // 1月9日以降の最初の平日
        if (isWeekendOrHoliday(jan8)) {
          // 1月8日が土日祝日 → firstWeekday のさらに次の平日
          var dayAfterFirst = new Date(firstWeekday.getTime());
          dayAfterFirst.setDate(dayAfterFirst.getDate() + 1);
          return getNextWeekday(dayAfterFirst);
        }
        return firstWeekday;
      }
    }

    /**
     * 中1・中2対象の基礎学力テスト日（翌年2月の第2水曜日）を返す
     * @param {number} academicYear 学年年度
     * @return {Date}
     */
    function getChuu12BasicTestDate(academicYear) {
      var feb1 = new Date(academicYear + 1, 1, 1); // 翌年2月1日
      var firstWed = getFirstWednesdayOnOrAfter(feb1);
      var secondWed = new Date(firstWed.getTime());
      secondWed.setDate(secondWed.getDate() + 7);
      return secondWed;
    }

    /**
     * 指定したカレンダー月に含まれる基礎学力テスト仮想イベントを返す
     * 上書き設定があればそれを優先、なければ自動計算値を使用
     * @param {number} calYear 表示中のカレンダー年
     * @param {number} calMonth 表示中のカレンダー月（1〜12）
     * @return {Array} イベントオブジェクトの配列
     */
    function getBasicTestEventsForMonth(calYear, calMonth) {
      // 学年年度を判定（4月始まり）
      var academicYear = calMonth >= 4 ? calYear : calYear - 1;
      var testNames = ['第1回基礎学力テスト', '第2回基礎学力テスト', '第3回基礎学力テスト'];
      var result = [];
      for (var i = 1; i <= 3; i++) {
        var overrideKey = academicYear + '-' + i;
        var testDate;
        if (basicTestDateOverrides[overrideKey]) {
          var parts = basicTestDateOverrides[overrideKey].split('/');
          testDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        } else {
          testDate = getComputedBasicTestDate(academicYear, i);
        }
        if (testDate.getFullYear() === calYear && testDate.getMonth() + 1 === calMonth) {
          var detailsVal = basicTestDetailsOverrides[overrideKey] !== undefined
            ? basicTestDetailsOverrides[overrideKey]
            : '中3';
          result.push({
            day: testDate.getDate(),
            school: '中学校（共通）',
            eventType: testNames[i - 1],
            details: detailsVal,
            schedule: calYear + '年' + calMonth + '月' + testDate.getDate() + '日',
            _basicTest: true,
            _academicYear: academicYear,
            _testNum: i
          });
        }
      }
      // 中1・中2対象の基礎学力テスト（翌年2月の第2水曜日・上書き可能）
      var chuu12Key = academicYear + '-chuu12';
      var chuu12Date;
      if (basicTestDateOverrides[chuu12Key]) {
        var p12 = basicTestDateOverrides[chuu12Key].split('/');
        chuu12Date = new Date(parseInt(p12[0]), parseInt(p12[1]) - 1, parseInt(p12[2]));
      } else {
        chuu12Date = getChuu12BasicTestDate(academicYear);
      }
      if (chuu12Date.getFullYear() === calYear && chuu12Date.getMonth() + 1 === calMonth) {
        result.push({
          day: chuu12Date.getDate(),
          school: '中学校（共通）',
          eventType: '基礎学力テスト',
          details: '中1・中2',
          schedule: calYear + '年' + calMonth + '月' + chuu12Date.getDate() + '日',
          _basicTest: true,
          _academicYear: academicYear,
          _testNum: null
        });
      }
      return result;
    }

    /**
     * 指定カレンダー月に含まれる公立高校一般選抜の仮想イベントを返す
     * 3月の第1火曜日・水曜日（第1火曜が1日か2日なら第2火曜・水曜）
     * @param {number} calYear カレンダー年
     * @param {number} calMonth カレンダー月（1〜12）
     * @return {Array} イベントオブジェクトの配列
     */
    function getPublicHighSchoolExamDaysForMonth(calYear, calMonth) {
      if (calMonth !== 3) return [];
      var academicYear = calYear - 1; // 3月は前学年年度（例: 2026年3月 → 2025年度）
      var examTuesdayDay;

      // オーバーライド確認
      var overrideKey = String(academicYear);
      if (pubHighExamDateOverrides[overrideKey]) {
        var p = pubHighExamDateOverrides[overrideKey].split('/');
        var od = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
        if (od.getFullYear() === calYear && od.getMonth() === 2) {
          examTuesdayDay = od.getDate();
        }
      }

      // 自動計算（オーバーライドがない場合）
      if (!examTuesdayDay) {
        var march1Dow = new Date(calYear, 2, 1).getDay();
        var daysToTuesday = (2 - march1Dow + 7) % 7;
        var firstTuesdayDay = 1 + daysToTuesday;
        examTuesdayDay = (firstTuesdayDay <= 2) ? firstTuesdayDay + 7 : firstTuesdayDay;
      }

      var examWednesdayDay = examTuesdayDay + 1;
      return [
        { day: examTuesdayDay, school: '中学校（共通）', eventType: '公立高校一般選抜', details: '1日目', schedule: calYear + '年3月' + examTuesdayDay + '日', _virtual: true },
        { day: examWednesdayDay, school: '中学校（共通）', eventType: '公立高校一般選抜', details: '2日目', schedule: calYear + '年3月' + examWednesdayDay + '日', _virtual: true }
      ];
    }

    /**
     * 1ヶ月分のカレンダーHTML文字列を返す（月曜始まり）
     * @param {number} year 年
     * @param {number} month 月（1〜12）
     * @param {Object} closedDays getClosedDays()の戻り値
     * @param {Object} periodBorders computePeriodBorders()の戻り値
     * @param {Object} holidays getJapaneseHolidays()の戻り値（2年分合算）
     */
    function renderFiscalMonth(year, month, closedDays, periodBorders, holidays) {
      var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      var today = new Date();
      // 月曜始まり: 月=0, 火=1, ..., 土=5, 日=6
      var rawDow = new Date(year, month - 1, 1).getDay(); // 0=日
      var firstDow = (rawDow + 6) % 7;                    // 月曜=0に変換
      var daysInMonth = new Date(year, month, 0).getDate();

      // 記号計算
      var reportDay  = getReportDay(year, month);
      var meetingDay = getMeetingDay(year, month);
      var debitDays  = getDebitDays(year, month);
      var debitDay   = debitDays.debit;
      var emailDay   = debitDays.email;

      var html = '<div class="univ-month-card">';
      html += '<div class="univ-month-title">' + year + '年 ' + monthNames[month - 1] + '</div>';
      html += '<div class="univ-month-grid">';

      // 曜日ヘッダー（月曜始まり）
      var headers = ['月','火','水','木','金','土','日'];
      var hdCls   = ['','','','','','sat','sun'];
      headers.forEach(function(h, i) {
        html += '<div class="univ-day-header ' + hdCls[i] + '">' + h + '</div>';
      });

      // 月初め前の空白セル
      for (var b = 0; b < firstDow; b++) {
        html += '<div class="univ-day-cell other-month"></div>';
      }

      // 日付セル
      for (var day = 1; day <= daysInMonth; day++) {
        var dow = (firstDow + day - 1) % 7; // 0=月,...,5=土,6=日
        var mm = month < 10 ? '0' + month : '' + month;
        var dd = day   < 10 ? '0' + day   : '' + day;
        var dateKey = year + '-' + mm + '-' + dd;
        var isSunday   = (dow === 6);
        var isSaturday = (dow === 5);
        var isClosedExtra = !!(closedDays && closedDays[dateKey]);
        var isClosed = isSunday || isClosedExtra; // 休校日
        var isToday  = (year === today.getFullYear() && month === today.getMonth() + 1 && day === today.getDate());

        var cellCls = 'univ-day-cell';
        if (isClosed)            cellCls += ' closed-day';
        if (isToday && !isClosed) cellCls += ' today';
        // 授業日24日ごとの期間枠線
        var pb = periodBorders && periodBorders[dateKey];
        if (pb) {
          if (pb.lt) cellCls += ' vac-lt';
          if (pb.rb) cellCls += ' vac-rb';
        }

        // 数字の色クラス
        // 祝日・日曜 → 赤、土曜（祝日でない） → 青、それ以外 → デフォルト
        var isHoliday = !!(holidays && holidays[dateKey]);
        var numCls = 'univ-day-num';
        if (isSunday || isHoliday)        numCls += ' dn-hol'; // 赤
        else if (isSaturday)              numCls += ' dn-sat'; // 青

        html += '<div class="' + cellCls + '">';
        html += '<div class="' + numCls + '">' + day + '</div>';
        // 記号（数字の上に透明で重ねる）
        if (day === reportDay)  html += '<div class="univ-sym univ-sym-circle"></div>';
        if (day === meetingDay) html += '<div class="univ-sym univ-sym-square"></div>';
        if (day === debitDay)   html += '<svg class="univ-sym univ-sym-star" viewBox="-4 -4 108 108" xmlns="http://www.w3.org/2000/svg"><polygon class="sym-poly" points="50,5 61.2,34.6 92.8,36.1 68.1,55.9 76.5,86.4 50,69 23.5,86.4 31.9,55.9 7.2,36.1 38.8,34.6" fill="none" stroke-width="6"/></svg>';
        if (day === emailDay)   html += '<svg class="univ-sym univ-sym-triangle" viewBox="-4 -4 108 108" xmlns="http://www.w3.org/2000/svg"><polygon class="sym-poly" points="50,5 97,92 3,92" fill="none" stroke-width="6"/></svg>';
        html += '</div>';
      }

      // 末尾の空白セル（7の倍数になるよう補完）
      var totalCells = firstDow + daysInMonth;
      var remainder = totalCells % 7;
      if (remainder !== 0) {
        for (var a = 0; a < 7 - remainder; a++) {
          html += '<div class="univ-day-cell other-month"></div>';
        }
      }

      html += '</div></div>';
      return html;
    }

    /**
     * 年度の授業日（休校日を除く）を24日ごとに区切り、
     * 各期間の先頭日（左上枠線）と末尾日（右下枠線）を返す。
     * 枠線が当たる日が休校日の場合、次の授業日に自動的にずれる（授業日だけを数えるため）。
     * @param {number} fiscalYear 年度開始年
     * @param {Object} closedDays getClosedDays()の戻り値
     * @return {Object} dateKey -> { lt: true } / { rb: true } のオブジェクト
     */
    function computePeriodBorders(fiscalYear, closedDays) {
      var allDates = [];
      var y = fiscalYear, n = fiscalYear + 1;

      function addMonth(yr, mo) {
        var days = new Date(yr, mo, 0).getDate();
        for (var da = 1; da <= days; da++) {
          var mm = mo < 10 ? '0' + mo : '' + mo;
          var dd = da < 10 ? '0' + da : '' + da;
          allDates.push(yr + '-' + mm + '-' + dd);
        }
      }
      // 年度全日付リスト（4月〜12月 → 翌年1月〜3月）
      for (var mo = 4; mo <= 12; mo++) addMonth(y, mo);
      for (var mo2 = 1; mo2 <= 3; mo2++) addMonth(n, mo2);

      // 授業日（非休校日）のみ抽出
      // ※ closedDays は特定の休校日のみ持っているため、日曜日は別途除外する
      var workDates = allDates.filter(function(d) {
        if (closedDays[d]) return false; // 特定の休校日
        var parts = d.split('-');
        var dow = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])).getDay();
        if (dow === 0) return false; // 日曜日
        return true;
      });

      var borders = {};
      var PERIOD = 24;

      for (var i = 0; i < workDates.length; i += PERIOD) {
        // 期間の先頭授業日 → 左上枠線
        var startKey = workDates[i];
        borders[startKey] = borders[startKey] || {};
        borders[startKey].lt = true;

        // 期間の末尾授業日（24日目）→ 右下枠線
        var endIdx = i + PERIOD - 1;
        if (endIdx < workDates.length) {
          var endKey = workDates[endIdx];
          borders[endKey] = borders[endKey] || {};
          borders[endKey].rb = true;
        }
        // 末尾に満たない端数期間は右下枠線なし
      }

      return borders;
    }

    /**
     * PDF出力ドロップダウンメニューを開閉する
     * @param {Event} event - クリックイベント
     */
    function togglePdfMenu(event) {
      event.stopPropagation();
      var menu = document.getElementById('pdfDropdownMenu');
      var isOpen = menu.style.display === 'block';
      menu.style.display = isOpen ? 'none' : 'block';
      if (!isOpen) {
        // メニューが開いたとき、外側クリックで閉じるリスナーを1回だけ登録
        document.addEventListener('click', closePdfMenu, { once: true });
      }
    }

    /**
     * PDF出力ドロップダウンメニューを閉じる
     */
    function closePdfMenu() {
      var menu = document.getElementById('pdfDropdownMenu');
      if (menu) menu.style.display = 'none';
    }

    /**
     * 年度カレンダーを生成して画面に表示する（HP用カラー）
     */
    function generateFiscalCalendar() {
      var startYear = parseInt(document.getElementById('univCalYearInput').value);
      if (isNaN(startYear) || startYear < 2020 || startYear > 2099) return;

      // 年度の休校日を事前計算（Excelの条件付き書式ロジックと同じ）
      var closedDays = getClosedDays(startYear);
      // 授業日24日ごとの期間枠線位置を計算
      var periodBorders = computePeriodBorders(startYear, closedDays);
      // 日本の祝日（Googleカレンダーキャッシュが取得済みならそれを使用、未取得ならアルゴリズム計算）
      var holidays;
      if (googleCalendarHolidays !== null) {
        holidays = googleCalendarHolidays;
      } else {
        var h1 = getJapaneseHolidays(startYear);
        var h2 = getJapaneseHolidays(startYear + 1);
        holidays = Object.assign({}, h1, h2);
      }

      var html = '';
      // 4月〜12月（startYear）
      for (var m = 4; m <= 12; m++) {
        html += renderFiscalMonth(startYear, m, closedDays, periodBorders, holidays);
      }
      // 1月〜3月（翌年）
      for (var m2 = 1; m2 <= 3; m2++) {
        html += renderFiscalMonth(startYear + 1, m2, closedDays, periodBorders, holidays);
      }

      document.getElementById('univCalOutput').innerHTML = html;
      document.getElementById('univCalLegend').style.display = 'flex';
      document.getElementById('univPrintBtnWrapper').style.display = 'inline-block';
      document.getElementById('univColorPdfBtn').style.display = 'inline-block';
      document.getElementById('univSymChecks').style.display = 'flex';
      document.getElementById('univPrintYearTitle').textContent = startYear + '年度';
    }

    /**
     * 記号のチェックボックスON/OFFに連動して表示を切り替える
     * @param {string} symName - 'circle' / 'square' / 'star' / 'triangle'
     * @param {boolean} checked - チェック状態
     */
    function toggleSymbol(symName, checked) {
      document.getElementById('univ-calendar').classList.toggle('hide-sym-' + symName, !checked);
    }

    /**
     * 年度カレンダーをPDF出力する（ダウンロードまたは印刷）
     * @param {string} mode - 'download'（保存）または 'print'（印刷ダイアログ表示）
     */
    function downloadFiscalCalendarPDF(mode) {
      var startYear = parseInt(document.getElementById('univCalYearInput').value);
      var btn      = document.getElementById('univPrintBtn');
      var arrowBtn = document.getElementById('univPdfArrowBtn');

      // ボタンを「生成中」表示にする
      btn.textContent = '⏳ 生成中...';
      btn.disabled    = true;
      arrowBtn.disabled = true;

      // 印刷モードの場合、新しいウィンドウをここで開いておく（ポップアップブロック回避）
      var printWindow = null;
      if (mode === 'print') {
        printWindow = window.open('', '_blank');
        if (printWindow) {
          printWindow.document.write('<html><body style="margin:0;background:#f0f0f0;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#555;">⏳ カレンダーを生成中...</body></html>');
        }
      }

      // 印刷用ヘッダーを一時的に表示、操作行・チェックボックス行・凡例は非表示にする
      var header    = document.getElementById('univPrintHeader');
      var controls  = document.querySelector('#univ-calendar .univ-controls-row');
      var legend    = document.getElementById('univCalLegend');
      var symChecks = document.getElementById('univSymChecks');
      header.style.display    = 'flex';
      controls.style.display  = 'none';
      legend.style.display    = 'none';
      symChecks.style.display = 'none';

      var calendarDiv = document.getElementById('univ-calendar');

      // PDF用に3列レイアウトを強制（画面幅に関わらず常に3列×4行になるよう固定）
      var calOutput = document.getElementById('univCalOutput');
      var prevColumns  = calOutput.style.gridTemplateColumns;
      var prevGap      = calOutput.style.gap;
      var prevMinWidth = calendarDiv.style.minWidth;
      calOutput.style.gridTemplateColumns = 'repeat(3, 1fr)';
      calOutput.style.gap = '8px';
      calendarDiv.style.minWidth = '860px';

      // 復元用ヘルパー（成功・失敗共通）
      function restoreStyles() {
        header.style.display            = 'none';
        controls.style.display          = '';
        legend.style.display            = 'flex';
        symChecks.style.display         = 'flex';
        calOutput.style.gridTemplateColumns = prevColumns;
        calOutput.style.gap             = prevGap;
        calendarDiv.style.minWidth      = prevMinWidth;
        btn.textContent   = '📄 PDF出力';
        btn.disabled      = false;
        arrowBtn.disabled = false;
      }

      // 室長用モード（モノクロ・濃いグレー）を適用
      calendarDiv.classList.add('print-mode');

      // html2canvasでカレンダー全体を画像としてキャプチャ（倍率2倍で高解像度化）
      html2canvas(calendarDiv, {
        scale: 2,
        useCORS: true,
        logging: false,
        backgroundColor: '#ffffff',
        windowWidth: 1100
      }).then(function(canvas) {
        calendarDiv.classList.remove('print-mode');

        if (mode === 'print') {
          // 印刷モード: 新しいウィンドウにカレンダー画像を表示してブラウザの印刷ダイアログを呼び出す
          var imgDataPng = canvas.toDataURL('image/png');
          if (printWindow) {
            printWindow.document.open();
            printWindow.document.write(
              '<!DOCTYPE html><html><head>' +
              '<title>' + startYear + '年度 スクエア年間時間割</title>' +
              '<style>' +
              '* { margin: 0; padding: 0; box-sizing: border-box; }' +
              'body { background: #fff; }' +
              'img { width: 100%; height: auto; display: block; }' +
              '@page { size: A4 portrait; margin: 7mm; }' +
              '@media print { img { width: 100%; } }' +
              '</style></head><body>' +
              '<img src="' + imgDataPng + '" onload="window.print();">' +
              '</body></html>'
            );
            printWindow.document.close();
          } else {
            appAlert('ポップアップがブロックされました。\nブラウザのポップアップ許可設定を確認してください。');
          }
        } else {
          // ダウンロードモード: jsPDFでA4 PDFを生成してファイル保存
          var imgData = canvas.toDataURL('image/jpeg', 0.92);
          var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          var pageW  = pdf.internal.pageSize.getWidth();
          var pageH  = pdf.internal.pageSize.getHeight();
          var margin = 7; // ページ余白 7mm
          var maxW   = pageW - margin * 2;
          var maxH   = pageH - margin * 2;

          // キャプチャ画像のアスペクト比を保ちながら最大サイズに収める
          var ratio  = canvas.width / canvas.height;
          var drawW  = maxW;
          var drawH  = drawW / ratio;
          if (drawH > maxH) { drawH = maxH; drawW = drawH * ratio; }

          pdf.addImage(imgData, 'JPEG', margin, margin, drawW, drawH);
          pdf.save(startYear + '年度_スクエア年間時間割.pdf');
        }

        restoreStyles();

      }).catch(function(e) {
        calendarDiv.classList.remove('print-mode');
        console.error('PDF生成エラー:', e);
        if (printWindow) printWindow.close();
        restoreStyles();
        appAlert('PDF生成に失敗しました。\nブラウザを更新して再度お試しください。');
      });
    }

    /**
     * 年度カレンダーをカラーPDFとしてダウンロードする（HP用・全記号表示・チェックボックス無視）
     */
    function downloadColorCalendarPDF() {
      var startYear = parseInt(document.getElementById('univCalYearInput').value);
      var btn = document.getElementById('univColorPdfBtn');

      btn.textContent = '⏳ 生成中...';
      btn.disabled = true;

      var header    = document.getElementById('univPrintHeader');
      var controls  = document.querySelector('#univ-calendar .univ-controls-row');
      var legend    = document.getElementById('univCalLegend');
      var symChecks = document.getElementById('univSymChecks');
      header.style.display    = 'flex';
      controls.style.display  = 'none';
      legend.style.display    = 'none';
      symChecks.style.display = 'none';

      var calendarDiv = document.getElementById('univ-calendar');

      // チェックボックスの状態に関わらず、全記号を一時的に非表示にする
      var visibleSyms = [];
      ['circle', 'square', 'star', 'triangle'].forEach(function(sym) {
        if (!calendarDiv.classList.contains('hide-sym-' + sym)) {
          calendarDiv.classList.add('hide-sym-' + sym);
          visibleSyms.push(sym);
        }
      });

      var calOutput = document.getElementById('univCalOutput');
      var prevColumns  = calOutput.style.gridTemplateColumns;
      var prevGap      = calOutput.style.gap;
      var prevMinWidth = calendarDiv.style.minWidth;
      calOutput.style.gridTemplateColumns = 'repeat(3, 1fr)';
      calOutput.style.gap = '8px';
      calendarDiv.style.minWidth = '860px';
      calendarDiv.classList.add('color-pdf-mode');

      function restoreStyles() {
        header.style.display            = 'none';
        controls.style.display          = '';
        legend.style.display            = 'flex';
        symChecks.style.display         = 'flex';
        calendarDiv.classList.remove('color-pdf-mode');
        calOutput.style.gridTemplateColumns = prevColumns;
        calOutput.style.gap             = prevGap;
        calendarDiv.style.minWidth      = prevMinWidth;
        // 強制非表示にした記号を元の表示状態に戻す
        visibleSyms.forEach(function(sym) {
          calendarDiv.classList.remove('hide-sym-' + sym);
        });
        btn.textContent = '🌈 カラーPDF';
        btn.disabled = false;
      }

      // print-mode は適用しない（カラーのままキャプチャ）
      html2canvas(calendarDiv, {
        scale: 2,
        useCORS: true,
        logging: false,
        backgroundColor: '#ffffff',
        windowWidth: 1100
      }).then(function(canvas) {
        var imgData = canvas.toDataURL('image/jpeg', 0.92);
        var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        var pageW  = pdf.internal.pageSize.getWidth();
        var pageH  = pdf.internal.pageSize.getHeight();
        var margin = 7;
        var maxW   = pageW - margin * 2;
        var maxH   = pageH - margin * 2;
        var ratio  = canvas.width / canvas.height;
        var drawW  = maxW;
        var drawH  = drawW / ratio;
        if (drawH > maxH) { drawH = maxH; drawW = drawH * ratio; }
        pdf.addImage(imgData, 'JPEG', margin, margin, drawW, drawH);
        pdf.save(startYear + '年度_スクエア年間時間割_カラー.pdf');
        restoreStyles();
      }).catch(function(e) {
        console.error('カラーPDF生成エラー:', e);
        restoreStyles();
        appAlert('PDF生成に失敗しました。\nブラウザを更新して再度お試しください。');
      });
    }

</script>
