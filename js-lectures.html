      var tbody = document.getElementById('lec-ocr-result-body');
      var rows = tbody.querySelectorAll('tr');
      if (rows.length === 0) { showToast('保存するエントリがありません', 'warning'); return; }
      showAppConfirm_(rows.length + '件を保存します。\nよろしいですか？', '保存する', '#43a047', saveLecOcrEntriesConfirmed_);
    }

    function saveLecOcrEntriesConfirmed_() {
      var tbody = document.getElementById('lec-ocr-result-body');
      var rows = tbody.querySelectorAll('tr');

      // 別講師名の確認ダイアログ（非管理者のみ）
      if (!isAdminUser) {
        var mismatchTeachers = [];
        rows.forEach(function(tr) {
          var ocrName = tr.dataset.ocrTeacher;
          if (ocrName && mismatchTeachers.indexOf(ocrName) < 0) mismatchTeachers.push(ocrName);
        });
        if (mismatchTeachers.length > 0) {
          var confirmed = window.confirm('「' + mismatchTeachers.join('」「') + '」という別の講師名が含まれています。\nこの日程をご自身（' + (myTeacherName || 'あなた') + '）の日程として保存しますか？');
          if (!confirmed) return;
        }
      }

      // 操作タイプ別に校舎ごとにグループ化
      var opsByCampus = {};
      lecOcrHasNullCampus = false;

      rows.forEach(function(tr) {
        var op         = tr.dataset.op || 'create';
        var date       = tr.querySelector('[data-field="date"]').value;
        var startTime  = tr.querySelector('[data-field="startTime"]').value;
        var durationM  = parseInt(tr.querySelector('[data-field="durationMinutes"]').value, 10) || 90;
        var subject    = tr.querySelector('[data-field="subject"]').value;
        var grade      = tr.querySelector('[data-field="grade"]').value;
        var classLabel = tr.querySelector('[data-field="classLabel"]').value || null;
        var campusCode = tr.querySelector('[data-field="campusCode"]').value;
        if (!campusCode) { lecOcrHasNullCampus = true; return; }
        if (!opsByCampus[campusCode]) opsByCampus[campusCode] = { creates: [], edits: [], deletes: [] };

        // 行ごとの講師情報を取得（管理者用ドロップダウン → 全体ドロップダウン → 自分）
        var rowTeacherName  = myTeacherName  || '';
        var rowTeacherEmail = myTeacherEmail || '';
        var rowTeacherId    = myTeacherId    || '';
        var teacherSelect   = tr.querySelector('[data-field="teacher"]');
        if (teacherSelect && teacherSelect.value) {
          var tOpt = teacherSelect.options[teacherSelect.selectedIndex];
          if (tOpt) {
            rowTeacherEmail = teacherSelect.value;
            rowTeacherName  = tOpt.getAttribute('data-name') || tOpt.textContent || teacherSelect.value;
            rowTeacherId    = tOpt.getAttribute('data-teacherid') || '';
          }
        } else if (isAdminUser && lecAdminTeacherName) {
          rowTeacherName  = lecAdminTeacherName;
          rowTeacherEmail = lecAdminTeacherEmail;
          rowTeacherId    = lecAdminTeacherId;
        }

        if (op === 'create') {
          if (!date || !startTime) return;
          opsByCampus[campusCode].creates.push({
            id:            'ent_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
            lectureId:     currentLectureId,
            campusCode:    campusCode,
            date:          date,
            startTime:     startTime,
            durationSlots: Math.max(1, Math.round(durationM / 10)),
            subject:       subject || '',
            grade:         grade || '',
            classLabel:    classLabel,
            teacherName:   rowTeacherName,
            teacherEmail:  rowTeacherEmail,
            teacherId:     rowTeacherId
          });
        } else if (op === 'edit') {
          opsByCampus[campusCode].edits.push({
            originalDate:      tr.dataset.originalDate || '',
            originalStartTime: tr.dataset.originalStartTime || '',
            originalGrade:     tr.dataset.originalGrade || '',
            originalSubject:   tr.dataset.originalSubject || '',
            newValues: {
              date: date, startTime: startTime,
              durationSlots: Math.max(1, Math.round(durationM / 10)),
              subject: subject || '', grade: grade || '', classLabel: classLabel
            }
          });
        } else if (op === 'delete') {
          opsByCampus[campusCode].deletes.push({
            originalDate:      tr.dataset.originalDate || '',
            originalStartTime: tr.dataset.originalStartTime || '',
            originalGrade:     tr.dataset.originalGrade || '',
            originalSubject:   tr.dataset.originalSubject || ''
          });
        }
      });

      var campusKeys = Object.keys(opsByCampus);
      if (campusKeys.length === 0) {
        showToast(lecOcrHasNullCampus ? '校舎を選択してください' : '保存するエントリがありません', 'warning');
        return;
      }

      var saveBtn = document.getElementById('lec-ocr-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      // 各校舎の既存エントリを取得してから操作を適用
      var pending = campusKeys.length;
      var mergedByCampus = {};
      var ocrSkipped = 0;

      campusKeys.forEach(function(code) {
        var ops = opsByCampus[code];
        var cached = lectureEntries[code];
        if (cached !== undefined) {
          mergedByCampus[code] = applyOcrOps_(cached.slice(), ops);
          pending--;
          if (pending === 0) doOcrSave_();
        } else {
          (function(campusCode, campusOps) {
            google.script.run
              .withSuccessHandler(function(res) {
                var existEnts = Array.isArray(res) ? res.map(function(e) {
                  return { id: e.entryId || '', lectureId: currentLectureId, campusCode: campusCode,
                           date: e.date || '', startTime: e.startTime || '',
                           durationSlots: Number(e.durationSlots) || 9, subject: e.subject || '',
                           grade: e.grade || '', teacherName: e.teacherName || '',
                           teacherEmail: e.teacherEmail || '', classLabel: e.classLabel || null,
                           teacherId: e.teacherId || '' };
                }) : [];
                mergedByCampus[campusCode] = applyOcrOps_(existEnts, campusOps);
                pending--;
                if (pending === 0) doOcrSave_();
              })
              .withFailureHandler(function() {
                mergedByCampus[campusCode] = applyOcrOps_([], campusOps);
                pending--;
                if (pending === 0) doOcrSave_();
              })
              .getLectureScheduleEntries(currentLectureId, campusCode);
          })(code, ops);
        }
      });

      // 既存エントリ配列に操作を適用する
      function applyOcrOps_(existing, ops) {
        // 1. 削除
        ops.deletes.forEach(function(del) {
          var idx = findOcrEntryIdx_(existing, del.originalDate, del.originalGrade, del.originalSubject, del.originalStartTime);
          if (idx !== -1) {
            existing.splice(idx, 1);
          } else {
            ocrSkipped++;
          }
        });
        // 2. 編集
        ops.edits.forEach(function(edit) {
          var idx = findOcrEntryIdx_(existing, edit.originalDate, edit.originalGrade, edit.originalSubject, edit.originalStartTime);
          if (idx !== -1) {
            var nv = edit.newValues;
            if (nv.date) existing[idx].date = nv.date;
            if (nv.startTime) existing[idx].startTime = nv.startTime;
            if (nv.durationSlots) existing[idx].durationSlots = nv.durationSlots;
            if (nv.subject) existing[idx].subject = nv.subject;
            if (nv.grade) existing[idx].grade = nv.grade;
            if (nv.classLabel !== undefined) existing[idx].classLabel = nv.classLabel;
          } else {
            ocrSkipped++;
          }
        });
        // 3. 追加
        ops.creates.forEach(function(newEnt) {
          existing.push(newEnt);
        });
        return existing;
      }

      function doOcrSave_() {
        var keys = Object.keys(mergedByCampus);
        var completed = 0;
        var failed = 0;
        var savedByCampus = {};
        keys.forEach(function(campusCode) {
          google.script.run
            .withSuccessHandler(function(result) {
              completed++;
              if (!result || !result.success) {
                failed++;
              } else if (Array.isArray(result.entries)) {
                savedByCampus[campusCode] = result.entries;
              }
              if (completed === keys.length) {
                saveBtn.disabled = false;
                saveBtn.textContent = 'このまま保存';
                if (failed > 0) {
                  showToast('一部の保存に失敗しました', 'error');
                } else {
                  var msg = (lecOcrHasNullCampus ? '校舎未設定の行はスキップして、' : '') +
                    keys.length + '校舎分を保存しました';
                  if (ocrSkipped > 0) msg += '（' + ocrSkipped + '件の変更・削除対象が見つかりませんでした）';
                  showToast(msg, 'success');
                  // サーバー応答 (lectureId/campusCode 付き) を採用。応答が空なら merge 結果に fallback
                  keys.forEach(function(cc) { lectureEntries[cc] = savedByCampus[cc] || mergedByCampus[cc]; });
                  renderLecEntries(currentLectureCampus);
                  closeLecOcrModalDirect_();
                }
              }
            })
            .withFailureHandler(function(err) {
              completed++;
              failed++;
              if (completed === keys.length) {
                saveBtn.disabled = false;
                saveBtn.textContent = 'このまま保存';
                showToast('保存エラー: ' + (err.message || err), 'error');
              }
            })
            .saveLectureScheduleEntries(currentLectureId, campusCode, JSON.stringify(mergedByCampus[campusCode]));
        });
      }
    }

    // ====== 一覧表示（マイ日程） ======

    /**
     * 一覧モーダルを表示する
     */
    function showLecScheduleListView() {
      if (!currentLectureId) {
        showToast('講習を選択してください', 'error');
        return;
      }

      var modal = document.getElementById('lec-listview-modal');
      var content = document.getElementById('lec-listview-content');
      if (!modal || !content) return;

      // モーダル表示＋ローディング
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
      content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#999;font-size:15px;">⏳ 読み込み中...</div>';

      // 対象講師の特定
      var targetTeacherId = (isAdminUser && lecAdminTeacherId) ? lecAdminTeacherId : myTeacherId;
      var targetTeacherName = (isAdminUser && lecAdminTeacherId) ? lecAdminTeacherName : (myTeacherName || '');

      fbGetAllLectureEntries(currentLectureId)
        .then(function(allEntries) {
          var myEntries = allEntries.filter(function(e) {
            return e.teacherId === targetTeacherId;
          });

          if (myEntries.length === 0) {
            content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#999;font-size:15px;">登録されたコマがありません</div>';
            return;
          }

          content.innerHTML = buildLecListViewHTML_(myEntries, targetTeacherName);
        })
        .catch(function(err) {
          console.error('一覧表示エラー:', err);
          content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#e57373;font-size:15px;">データの取得に失敗しました</div>';
        });
    }

    /**
     * 一覧モーダルを閉じる
     */
    function closeLecListViewModal() {
      var modal = document.getElementById('lec-listview-modal');
      if (modal) modal.style.display = 'none';
      document.body.style.overflow = '';
    }

    /**
     * 一覧表示用HTMLを生成する
     * @param {Array} entries 対象講師のエントリ配列（全校舎分）
     * @param {string} teacherName 講師名
     * @return {string} HTML文字列
     */
    function buildLecListViewHTML_(entries, teacherName) {
      var lectureId = currentLectureId;
      var period = (lecturePeriods || []).find(function(lp) { return lp.id === lectureId; });
      var fy = parseInt((lectureId || '').split('-')[0], 10);
      var lecName = period ? period.name : lectureId;

      // 学年グループ定義（名前ベースでマッチ）
      var GRADE_GROUPS = [
        { label: '小学生', names: ['小'] },
        { label: '中１', names: ['中1', '新中1'] },
        { label: '中２', names: ['中2', '新中2'] },
        { label: '中３', names: ['中3', '新中3'] },
        { label: '高１', names: ['高1', '新高1'] },
        { label: '高２', names: ['高2', '新高2'] },
        { label: '高３', names: ['高3', '新高3'] }
      ];

      // ヘルパー: 終了時刻計算
      function endTimeLV_(start, slots) {
        var parts = (start || '00:00').split(':');
        var h = parseInt(parts[0], 10) || 0;
        var m = parseInt(parts[1], 10) || 0;
        var totalMin = h * 60 + m + (slots || 0) * 10;
        var eh = Math.floor(totalMin / 60);
        var em = totalMin % 60;
        return ('0' + eh).slice(-2) + ':' + ('0' + em).slice(-2);
      }

      // ヘルパー: 日付フォーマット（"7/15(火)・22(火)・8/1(金)" 形式）
      function fmtDatesLV_(sortedDates) {
        var DOW = ['日', '月', '火', '水', '木', '金', '土'];
        var prevMonth = -1;
        return sortedDates.map(function(d) {
          var dt = new Date(d + 'T00:00:00');
          var mo = dt.getMonth() + 1;
          var day = dt.getDate();
          var dow = DOW[dt.getDay()];
          var str = (mo !== prevMonth ? mo + '/' : '') + day + '(' + dow + ')';
          prevMonth = mo;
          return str;
        }).join('・');
      }

      // ヘルパー: HTMLエスケープ
      function escLV_(str) {
        var d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      // エントリを校舎ごとにグルーピング
      var campusBuckets = {};
      entries.forEach(function(e) {
        var cc = e.campusCode || '??';
        if (!campusBuckets[cc]) campusBuckets[cc] = [];
        campusBuckets[cc].push(e);
      });
      var campusCodes = Object.keys(campusBuckets).sort();

      // 全教科リスト（出現順を統一）
      var ALL_SUBJECTS = ['英語', '数学', '算数', '国語', '理科', '社会', '物理', '化学'];

      // 全テーブル横幅を最長の日付文字列に揃えるため DOM 測定で最大幅を事前計算（font-size:13px・テーブルと同じフォント）
      var allDateStrsLV_ = [];
      var groupKeyMapLV_ = {};
      entries.forEach(function(e) {
        var k = (e.campusCode || '') + '|' + (e.subject || '') + '|' + (e.grade || '') + '|' + (e.classLabel || '') + '|' + (e.startTime || '') + '|' + (e.durationSlots || 0);
        if (!groupKeyMapLV_[k]) groupKeyMapLV_[k] = [];
        if (groupKeyMapLV_[k].indexOf(e.date) === -1) groupKeyMapLV_[k].push(e.date);
      });
      Object.keys(groupKeyMapLV_).forEach(function(k) {
        allDateStrsLV_.push(fmtDatesLV_(groupKeyMapLV_[k].slice().sort()));
      });
      var dateColWidthLV_ = 0;
      if (allDateStrsLV_.length > 0) {
        var measureSpanLV_ = document.createElement('span');
        measureSpanLV_.style.cssText = 'position:absolute;left:-9999px;top:-9999px;visibility:hidden;white-space:nowrap;font-size:13px;font-family:inherit;';
        document.body.appendChild(measureSpanLV_);
        allDateStrsLV_.forEach(function(s) {
          measureSpanLV_.textContent = s;
          if (measureSpanLV_.offsetWidth > dateColWidthLV_) dateColWidthLV_ = measureSpanLV_.offsetWidth;
        });
        document.body.removeChild(measureSpanLV_);
        dateColWidthLV_ += 18; // padding 8px*2 + border 1px*2
      }
      var tableTotalWidthLV_ = (dateColWidthLV_ > 0) ? (60 + dateColWidthLV_ + 110) : 0;

      // テーブル style と colgroup（複数テーブル間で共通）— margin:0 auto で水平方向中央寄せ
      var tableStyleLV_ = 'border-collapse:collapse;border:1px solid #999;margin:0 auto 10px auto;';
      if (tableTotalWidthLV_ > 0) {
        tableStyleLV_ = 'table-layout:fixed;width:' + tableTotalWidthLV_ + 'px;' + tableStyleLV_;
      }
      var colgroupHtmlLV_ = '';
      if (tableTotalWidthLV_ > 0) {
        colgroupHtmlLV_ = '<colgroup><col style="width:60px"><col style="width:' + dateColWidthLV_ + 'px"><col style="width:110px"></colgroup>';
      }

      // スタイル定義
      var cellBase = 'border:1px solid #999;padding:5px 8px;font-size:13px;vertical-align:middle;';
      var cellSubject = cellBase + 'width:60px;text-align:center;font-weight:bold;white-space:nowrap;';
      var cellDate = cellBase + 'white-space:nowrap;' + (dateColWidthLV_ > 0 ? 'width:' + dateColWidthLV_ + 'px;' : '');
      var cellTime = cellBase + 'width:110px;text-align:center;white-space:nowrap;';

      var html = '';

      // タイトル
      html += '<div style="margin-bottom:16px;">';
      html += '<div style="font-size:17px;font-weight:700;color:#333;">' + escLV_(fy + '年度 ' + lecName) + '</div>';
      html += '<div style="font-size:14px;color:#666;margin-top:4px;">講師: ' + escLV_(teacherName) + '</div>';
      html += '</div>';

      // 校舎ループ
      campusCodes.forEach(function(cc) {
        var campusName = (campusData && campusData[cc]) ? campusData[cc] : cc;
        var campusEntries = campusBuckets[cc];

        html += '<div style="margin-bottom:20px;">';
        html += '<div style="font-size:15px;font-weight:700;color:#333;margin-bottom:8px;padding:6px 10px;background:#f5f5f5;border-radius:6px;">■ ' + escLV_(campusName) + '</div>';

        // 教科ループ（定義順）
        ALL_SUBJECTS.forEach(function(subject) {
          var subjectEntries = campusEntries.filter(function(e) {
            return (e.subject || '') === subject;
          });
          if (subjectEntries.length === 0) return;

          html += '<table style="' + tableStyleLV_ + '">';
          html += colgroupHtmlLV_;

          // 教科ヘッダー
          html += '<thead>';
          html += '<tr><th colspan="3" style="border:1px solid #999;padding:5px 10px;font-size:14px;font-weight:bold;text-align:left;background:#fafafa;">';
          html += escLV_(subject);
          html += '</th></tr>';
          html += '<tr style="border-bottom:1px solid #999;">';
          html += '<th style="' + cellSubject + 'border-bottom:1px solid #999;">学年</th>';
          html += '<th style="' + cellDate + 'border-bottom:1px solid #999;text-align:center;font-weight:bold;">日付</th>';
          html += '<th style="' + cellTime + 'border-bottom:1px solid #999;font-weight:bold;">時間</th>';
          html += '</tr></thead><tbody>';

          // 学年グループループ（定義順）
          GRADE_GROUPS.forEach(function(gg) {
            var gradeEntries = subjectEntries.filter(function(e) {
              return gg.names.indexOf(e.grade || '') !== -1;
            });
            if (gradeEntries.length === 0) return;

            // classLabel ごとにも分ける
            var classLabels = [];
            var classMap = {};
            gradeEntries.forEach(function(e) {
              var cl = e.classLabel || '';
              if (!classMap[cl]) { classMap[cl] = []; classLabels.push(cl); }
              classMap[cl].push(e);
            });
            classLabels.sort();

            classLabels.forEach(function(cl) {
              var clEntries = classMap[cl];
              var gradeLabel = gg.label + (cl ? ' (' + cl + ')' : '');

              // (startTime, durationSlots) でグループ化
              var timeGroupMap = {};
              var timeGroupOrder = [];
              clEntries.forEach(function(e) {
                var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
                if (!timeGroupMap[key]) {
                  timeGroupMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] };
                  timeGroupOrder.push(key);
                }
                if (timeGroupMap[key].dates.indexOf(e.date) === -1) {
                  timeGroupMap[key].dates.push(e.date);
                }
              });
              timeGroupOrder.forEach(function(key) {
                timeGroupMap[key].dates.sort();
              });

              var groups = timeGroupOrder.map(function(k) { return timeGroupMap[k]; });
              var rowCount = groups.length;

              groups.forEach(function(grp, idx) {
                var timeStr = (grp.startTime || '') + '～' + endTimeLV_(grp.startTime, grp.durationSlots);
                var dateStr = fmtDatesLV_(grp.dates);
                html += '<tr>';
                if (idx === 0) {
                  html += '<td rowspan="' + rowCount + '" style="' + cellSubject + '">' + escLV_(gradeLabel) + '</td>';
                }
                html += '<td style="' + cellDate + '">' + escLV_(dateStr) + '</td>';
                html += '<td style="' + cellTime + '">' + escLV_(timeStr) + '</td>';
                html += '</tr>';
              });
            });
          });

          // 定義外の学年もフォールバック表示（教科テーブル内）
          var allGroupedNames_s = [];
          GRADE_GROUPS.forEach(function(gg) { allGroupedNames_s = allGroupedNames_s.concat(gg.names); });
          var otherGradeEntries = subjectEntries.filter(function(e) {
            return allGroupedNames_s.indexOf(e.grade || '') === -1;
          });
          if (otherGradeEntries.length > 0) {
            var otherGrades = [];
            var otherGradeMap = {};
            otherGradeEntries.forEach(function(e) {
              var g = e.grade || '(不明)';
              if (!otherGradeMap[g]) { otherGradeMap[g] = []; otherGrades.push(g); }
              otherGradeMap[g].push(e);
            });
            otherGrades.forEach(function(g) {
              var ges = otherGradeMap[g];
              var timeGroupMap = {};
              var timeGroupOrder = [];
              ges.forEach(function(e) {
                var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
                if (!timeGroupMap[key]) {
                  timeGroupMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] };
                  timeGroupOrder.push(key);
                }
                if (timeGroupMap[key].dates.indexOf(e.date) === -1) timeGroupMap[key].dates.push(e.date);
              });
              timeGroupOrder.forEach(function(k) { timeGroupMap[k].dates.sort(); });
              var groups = timeGroupOrder.map(function(k) { return timeGroupMap[k]; });
              var rowCount = groups.length;
              groups.forEach(function(grp, idx) {
                var timeStr = (grp.startTime || '') + '～' + endTimeLV_(grp.startTime, grp.durationSlots);
                html += '<tr>';
                if (idx === 0) html += '<td rowspan="' + rowCount + '" style="' + cellSubject + '">' + escLV_(g) + '</td>';
                html += '<td style="' + cellDate + '">' + escLV_(fmtDatesLV_(grp.dates)) + '</td>';
                html += '<td style="' + cellTime + '">' + escLV_(timeStr) + '</td>';
                html += '</tr>';
              });
            });
          }

          html += '</tbody></table>';
        });

        // ALL_SUBJECTS に属さない教科のフォールバック（校舎単位で別テーブル）
        var knownSubjects = {};
        ALL_SUBJECTS.forEach(function(s) { knownSubjects[s] = true; });
        var ungroupedSubjectEntries = campusEntries.filter(function(e) {
          return !knownSubjects[e.subject || ''];
        });
        if (ungroupedSubjectEntries.length > 0) {
          var ugSubjects = [];
          var ugSubMap = {};
          ungroupedSubjectEntries.forEach(function(e) {
            var s = e.subject || '(不明)';
            if (!ugSubMap[s]) { ugSubMap[s] = []; ugSubjects.push(s); }
            ugSubMap[s].push(e);
          });
          ugSubjects.forEach(function(subject) {
            var ses = ugSubMap[subject];
            html += '<table style="' + tableStyleLV_ + '">';
            html += colgroupHtmlLV_;
            html += '<thead><tr><th colspan="3" style="border:1px solid #999;padding:5px 10px;font-size:14px;font-weight:bold;text-align:left;background:#fafafa;">' + escLV_(subject) + '</th></tr>';
            html += '<tr style="border-bottom:1px solid #999;">';
            html += '<th style="' + cellSubject + '">学年</th><th style="' + cellDate + 'text-align:center;font-weight:bold;">日付</th><th style="' + cellTime + 'font-weight:bold;">時間</th>';
            html += '</tr></thead><tbody>';

            // 学年グループで整理
            GRADE_GROUPS.forEach(function(gg) {
              var gEntries = ses.filter(function(e) { return gg.names.indexOf(e.grade || '') !== -1; });
              if (gEntries.length === 0) return;
              var tgMap = {};
              var tgOrder = [];
              gEntries.forEach(function(e) {
                var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
                if (!tgMap[key]) { tgMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] }; tgOrder.push(key); }
                if (tgMap[key].dates.indexOf(e.date) === -1) tgMap[key].dates.push(e.date);
              });
              tgOrder.forEach(function(k) { tgMap[k].dates.sort(); });
              var groups = tgOrder.map(function(k) { return tgMap[k]; });
              groups.forEach(function(grp, idx) {
                html += '<tr>';
                if (idx === 0) html += '<td rowspan="' + groups.length + '" style="' + cellSubject + '">' + escLV_(gg.label) + '</td>';
                html += '<td style="' + cellDate + '">' + escLV_(fmtDatesLV_(grp.dates)) + '</td>';
                html += '<td style="' + cellTime + '">' + escLV_((grp.startTime || '') + '～' + endTimeLV_(grp.startTime, grp.durationSlots)) + '</td>';
                html += '</tr>';
              });

            // GRADE_GROUPSに属さない学年
            var allGN2 = [];

              ugGEs.forEach(function(e) {

                });

    }

    /**
     * 一覧表の1校舎ぶんのPDF/印刷用HTMLを生成する
     * @param {string} campusCode 校舎コード
     * @param {Array} campusEntries その校舎のエントリ配列
     * @param {string} teacherName 講師名
     * @param {string} lectureTitle 講習タイトル（例: "2026年度 春期講習"）
     * @param {boolean} isFirstPage 先頭ページかどうか（タイトル有無）
     * @return {string} 印刷用HTML文字列
     */
    function buildLecListPageHTML_(campusCode, campusEntries, teacherName, lectureTitle, isFirstPage) {
      var GRADE_GROUPS = [
        { label: '小学生', names: ['小'] },
        { label: '中１', names: ['中1', '新中1'] },
        { label: '中２', names: ['中2', '新中2'] },
        { label: '中３', names: ['中3', '新中3'] },
        { label: '高１', names: ['高1', '新高1'] },
        { label: '高２', names: ['高2', '新高2'] },
        { label: '高３', names: ['高3', '新高3'] }
      ];
      var ALL_SUBJECTS = ['英語', '数学', '算数', '国語', '理科', '社会', '物理', '化学'];

      function endTimeLP_(start, slots) {
        var parts = (start || '00:00').split(':');
        var h = parseInt(parts[0], 10) || 0;
        var m = parseInt(parts[1], 10) || 0;
        var totalMin = h * 60 + m + (slots || 0) * 10;
        var eh = Math.floor(totalMin / 60);
        var em = totalMin % 60;
        return ('0' + eh).slice(-2) + ':' + ('0' + em).slice(-2);
      }
      function fmtDatesLP_(sortedDates) {
        var DOW = ['日', '月', '火', '水', '木', '金', '土'];
        var prevMonth = -1;
        return sortedDates.map(function(d) {
          var dt = new Date(d + 'T00:00:00');
          var mo = dt.getMonth() + 1;
          var day = dt.getDate();
          var dow = DOW[dt.getDay()];
          var str = (mo !== prevMonth ? mo + '/' : '') + day + '(' + dow + ')';
          prevMonth = mo;
          return str;
        }).join('・');
      }
      function escLP_(str) {
        var d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      // 全テーブル横幅を最長の日付文字列に揃えるため DOM 測定で最大幅を事前計算（font-size:12px・PDF と同じフォント）
      var allDateStrsLP_ = [];
      var groupKeyMapLP_ = {};
      campusEntries.forEach(function(e) {
        var k = (e.subject || '') + '|' + (e.grade || '') + '|' + (e.classLabel || '') + '|' + (e.startTime || '') + '|' + (e.durationSlots || 0);
        if (!groupKeyMapLP_[k]) groupKeyMapLP_[k] = [];
        if (groupKeyMapLP_[k].indexOf(e.date) === -1) groupKeyMapLP_[k].push(e.date);
      });
      Object.keys(groupKeyMapLP_).forEach(function(k) {
        allDateStrsLP_.push(fmtDatesLP_(groupKeyMapLP_[k].slice().sort()));
      });
      var dateColWidthLP_ = 0;
      if (allDateStrsLP_.length > 0) {
        var measureSpanLP_ = document.createElement('span');
        measureSpanLP_.style.cssText = "position:absolute;left:-9999px;top:-9999px;visibility:hidden;white-space:nowrap;font-size:12px;font-family:'Meiryo','ヒラギノ角ゴ ProN W3',sans-serif;";
        document.body.appendChild(measureSpanLP_);
        allDateStrsLP_.forEach(function(s) {
          measureSpanLP_.textContent = s;
          if (measureSpanLP_.offsetWidth > dateColWidthLP_) dateColWidthLP_ = measureSpanLP_.offsetWidth;
        });
        document.body.removeChild(measureSpanLP_);
        dateColWidthLP_ += 18; // padding 8px*2 + border 1px*2
      }
      var tableTotalWidthLP_ = (dateColWidthLP_ > 0) ? (70 + dateColWidthLP_ + 120) : 0;

      // テーブル style と colgroup（複数テーブル間で共通）— margin:0 auto でA4ページ内中央寄せ
      var tableStyleLP_ = 'border-collapse:collapse;border:1px solid #333;margin:0 auto 8px auto;';
      if (tableTotalWidthLP_ > 0) {
        tableStyleLP_ = 'table-layout:fixed;width:' + tableTotalWidthLP_ + 'px;' + tableStyleLP_;
      }
      var colgroupHtmlLP_ = '';
      if (tableTotalWidthLP_ > 0) {
        colgroupHtmlLP_ = '<colgroup><col style="width:70px"><col style="width:' + dateColWidthLP_ + 'px"><col style="width:120px"></colgroup>';
      }

      var cellBase = 'border:1px solid #333;padding:5px 8px;font-size:12px;vertical-align:middle;color:#000;';
      var cellSubject = cellBase + 'width:70px;text-align:center;font-weight:bold;white-space:nowrap;background:#fafafa;';
      var cellDate = cellBase + 'white-space:nowrap;' + (dateColWidthLP_ > 0 ? 'width:' + dateColWidthLP_ + 'px;' : '');
      var cellTime = cellBase + 'width:120px;text-align:center;white-space:nowrap;';

      var html = '';
      html += '<div style="padding:16px 20px;box-sizing:border-box;font-family:\'Meiryo\',\'ヒラギノ角ゴ ProN W3\',sans-serif;color:#000;">';

      if (isFirstPage) {

        html += '<div style="font-size:18px;font-weight:700;">' + escLP_(lectureTitle) + ' 日程一覧</div>';

      var campusName = (campusData && campusData[campusCode]) ? campusData[campusCode] : campusCode;

      ALL_SUBJECTS.forEach(function(subject) {

          if (gradeEntries.length === 0) return;

          var classLabels = [];

          gradeEntries.forEach(function(e) {

          classLabels.forEach(function(cl) {
            var clEntries = classMap[cl];
            var gradeLabel = gg.label + (cl ? ' (' + cl + ')' : '');
            var timeGroupMap = {};
            var timeGroupOrder = [];
            clEntries.forEach(function(e) {
              var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
              if (!timeGroupMap[key]) {
                timeGroupMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] };
                timeGroupOrder.push(key);
              }
              if (timeGroupMap[key].dates.indexOf(e.date) === -1) timeGroupMap[key].dates.push(e.date);
            });
            timeGroupOrder.forEach(function(k) { timeGroupMap[k].dates.sort(); });
            var groups = timeGroupOrder.map(function(k) { return timeGroupMap[k]; });
            var rowCount = groups.length;

            groups.forEach(function(grp, idx) {
              var timeStr = (grp.startTime || '') + '～' + endTimeLP_(grp.startTime, grp.durationSlots);
              var dateStr = fmtDatesLP_(grp.dates);
              html += '<tr>';

        // 定義外の学年フォールバック
        var allGN = [];
        GRADE_GROUPS.forEach(function(gg) { allGN = allGN.concat(gg.names); });
        var otherGradeEntries = subjectEntries.filter(function(e) { return allGN.indexOf(e.grade || '') === -1; });
        if (otherGradeEntries.length > 0) {
          var otherGrades = [];
          var otherGradeMap = {};
          otherGradeEntries.forEach(function(e) {
            var g = e.grade || '(不明)';
            if (!otherGradeMap[g]) { otherGradeMap[g] = []; otherGrades.push(g); }
            otherGradeMap[g].push(e);
          });
          otherGrades.forEach(function(g) {
            var ges = otherGradeMap[g];
            var tgMap = {}; var tgOrder = [];
            ges.forEach(function(e) {
              var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
              if (!tgMap[key]) { tgMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] }; tgOrder.push(key); }
              if (tgMap[key].dates.indexOf(e.date) === -1) tgMap[key].dates.push(e.date);
            });
            tgOrder.forEach(function(k) { tgMap[k].dates.sort(); });
            var groups = tgOrder.map(function(k) { return tgMap[k]; });
            var rowCount = groups.length;
            groups.forEach(function(grp, idx) {
              html += '<tr>';
              if (idx === 0) html += '<td rowspan="' + rowCount + '" style="' + cellSubject + '">' + escLP_(g) + '</td>';
              html += '<td style="' + cellDate + '">' + escLP_(fmtDatesLP_(grp.dates)) + '</td>';
              html += '<td style="' + cellTime + '">' + escLP_((grp.startTime || '') + '～' + endTimeLP_(grp.startTime, grp.durationSlots)) + '</td>';
              html += '</tr>';
            });
          });
        }

        html += '</tbody></table>';
      });

      // ALL_SUBJECTSに属さない教科のフォールバック
      var knownSubjects = {};
      ALL_SUBJECTS.forEach(function(s) { knownSubjects[s] = true; });
      var ungroupedSubjectEntries = campusEntries.filter(function(e) { return !knownSubjects[e.subject || '']; });
      if (ungroupedSubjectEntries.length > 0) {
        var ugSubjects = [];
        var ugSubMap = {};
        ungroupedSubjectEntries.forEach(function(e) {
          var s = e.subject || '(不明)';
          if (!ugSubMap[s]) { ugSubMap[s] = []; ugSubjects.push(s); }
          ugSubMap[s].push(e);
        });
        ugSubjects.forEach(function(subject) {
          var ses = ugSubMap[subject];
          html += '<table style="' + tableStyleLP_ + '">';
          html += colgroupHtmlLP_;
          html += '<thead><tr><th colspan="3" style="border:1px solid #333;padding:5px 10px;font-size:13px;font-weight:bold;text-align:left;background:#f0f0f0;">' + escLP_(subject) + '</th></tr>';
          html += '<tr><th style="' + cellSubject + 'font-weight:bold;">学年</th><th style="' + cellDate + 'text-align:center;font-weight:bold;">日付</th><th style="' + cellTime + 'font-weight:bold;">時間</th></tr></thead><tbody>';
          var allGN2 = [];
          GRADE_GROUPS.forEach(function(gg) { allGN2 = allGN2.concat(gg.names); });
          GRADE_GROUPS.forEach(function(gg) {
            var gEs = ses.filter(function(e) { return gg.names.indexOf(e.grade || '') !== -1; });
            if (gEs.length === 0) return;
            var tgMap = {}; var tgOrder = [];
            gEs.forEach(function(e) {
              var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
              if (!tgMap[key]) { tgMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] }; tgOrder.push(key); }
              if (tgMap[key].dates.indexOf(e.date) === -1) tgMap[key].dates.push(e.date);
            });
            tgOrder.forEach(function(k) { tgMap[k].dates.sort(); });
            var groups = tgOrder.map(function(k) { return tgMap[k]; });
            groups.forEach(function(grp, idx) {
              html += '<tr>';
              if (idx === 0) html += '<td rowspan="' + groups.length + '" style="' + cellSubject + '">' + escLP_(gg.label) + '</td>';
              html += '<td style="' + cellDate + '">' + escLP_(fmtDatesLP_(grp.dates)) + '</td>';
              html += '<td style="' + cellTime + '">' + escLP_((grp.startTime || '') + '～' + endTimeLP_(grp.startTime, grp.durationSlots)) + '</td>';
              html += '</tr>';
            });
          });
          var ugGEs = ses.filter(function(e) { return allGN2.indexOf(e.grade || '') === -1; });
          if (ugGEs.length > 0) {
            var ugGList = []; var ugGMap = {};
            ugGEs.forEach(function(e) {
              var g = e.grade || '(不明)';
              if (!ugGMap[g]) { ugGMap[g] = []; ugGList.push(g); }
              ugGMap[g].push(e);
            });
            ugGList.forEach(function(g) {
              var ges = ugGMap[g];
              var tgMap = {}; var tgOrder = [];
              ges.forEach(function(e) {
                var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
                if (!tgMap[key]) { tgMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] }; tgOrder.push(key); }
                if (tgMap[key].dates.indexOf(e.date) === -1) tgMap[key].dates.push(e.date);
              });
              tgOrder.forEach(function(k) { tgMap[k].dates.sort(); });
              var groups = tgOrder.map(function(k) { return tgMap[k]; });
              groups.forEach(function(grp, idx) {
                html += '<tr>';
                if (idx === 0) html += '<td rowspan="' + groups.length + '" style="' + cellSubject + '">' + escLP_(g) + '</td>';
                html += '<td style="' + cellDate + '">' + escLP_(fmtDatesLP_(grp.dates)) + '</td>';
                html += '<td style="' + cellTime + '">' + escLP_((grp.startTime || '') + '～' + endTimeLP_(grp.startTime, grp.durationSlots)) + '</td>';
                html += '</tr>';
              });
            });
          }
          html += '</tbody></table>';
        });
      }

      html += '</div>';
      return html;
    }

    /**
     * 日程一覧をPDFダウンロード／印刷する
     * @param {string} mode 'download' または 'print'
     */
    function generateLecListPDF_(mode) {
      if (!currentLectureId) { showToast('講習を選択してください', 'error'); return; }

      var pdfBtn = document.getElementById('lecListPdfBtn');
      var printBtn = document.getElementById('lecListPrintBtn');
      var pdfOrig = pdfBtn ? pdfBtn.textContent : '';
      var printOrig = printBtn ? printBtn.textContent : '';
      if (pdfBtn) { pdfBtn.textContent = '⏳ 生成中...'; pdfBtn.disabled = true; }
      if (printBtn) { printBtn.textContent = '⏳'; printBtn.disabled = true; }

      function restoreBtns() {
        if (pdfBtn) { pdfBtn.textContent = pdfOrig; pdfBtn.disabled = false; }
        if (printBtn) { printBtn.textContent = printOrig; printBtn.disabled = false; }
      }

      // 印刷モードはポップアップブロック回避のため同期的にウィンドウを開いておく
      var printWindow = null;
      if (mode === 'print') {
        printWindow = window.open('', '_blank');
        if (printWindow) {
          printWindow.document.write('<html><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#555;font-size:16px;">⏳ 日程一覧を生成中...</body></html>');
        }
      }

      var targetTeacherId = (typeof isAdminUser !== 'undefined' && isAdminUser && typeof lecAdminTeacherId !== 'undefined' && lecAdminTeacherId) ? lecAdminTeacherId : myTeacherId;
      var targetTeacherName = (typeof isAdminUser !== 'undefined' && isAdminUser && typeof lecAdminTeacherId !== 'undefined' && lecAdminTeacherId) ? lecAdminTeacherName : (myTeacherName || '');

      var period = (lecturePeriods || []).find(function(lp) { return lp.id === currentLectureId; });
      var fy = parseInt((currentLectureId || '').split('-')[0], 10);
      var lecName = period ? period.name : currentLectureId;
      var lectureTitle = fy + '年度 ' + lecName;
      var docTitle = fy + '年度_' + lecName + '_' + (targetTeacherName || '講師') + '_日程一覧';

      fbGetAllLectureEntries(currentLectureId)
        .then(function(allEntries) {
          var myEntries = allEntries.filter(function(e) { return e.teacherId === targetTeacherId; });
          if (myEntries.length === 0) {
            restoreBtns();
            if (printWindow) printWindow.close();
            appAlert('登録されたコマがありません。');
            return;
          }

          // 校舎ごとに分割
          var campusBuckets = {};
          myEntries.forEach(function(e) {
            var cc = e.campusCode || '??';
            if (!campusBuckets[cc]) campusBuckets[cc] = [];
            campusBuckets[cc].push(e);
          });
          var campusCodes = Object.keys(campusBuckets).sort();

          var canvases = [];
          var pageIdx = 0;

          function renderNextCampus_() {
            if (pageIdx >= campusCodes.length) {
              restoreBtns();
              finalizeLecListPdf_(mode, canvases, printWindow, docTitle);
              return;
            }

            var cc = campusCodes[pageIdx];
            var pageHtml = buildLecListPageHTML_(cc, campusBuckets[cc], targetTeacherName, lectureTitle, pageIdx === 0);
            pageIdx++;

            var container = document.createElement('div');
            container.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:white;';
            document.body.appendChild(container);
            container.innerHTML = pageHtml;

            html2canvas(container, {
              scale: 2,
              backgroundColor: '#ffffff',
              windowWidth: 840,
              useCORS: true
            }).then(function(canvas) {
              document.body.removeChild(container);
              canvases.push(canvas);
              renderNextCampus_();
            }).catch(function(e) {
              if (container.parentNode) document.body.removeChild(container);
              restoreBtns();
              if (printWindow) printWindow.close();
              console.error('日程一覧PDF生成エラー:', e);
              appAlert('PDF生成に失敗しました。\nブラウザを更新して再度お試しください。');
            });
          }

          renderNextCampus_();
        })
        .catch(function(err) {
          restoreBtns();
          if (printWindow) printWindow.close();
          console.error('エントリ取得失敗:', err);
          appAlert('データの取得に失敗しました。');
        });
    }

    /**
     * 日程一覧PDF/印刷出力を実行する
     * @param {string} mode 'download' または 'print'
     * @param {Array} canvases canvas配列
     * @param {Window} printWindow 印刷ウィンドウ（printモード時）
     * @param {string} docTitle ドキュメントタイトル（ファイル名・ウィンドウタイトル）
     */
    function finalizeLecListPdf_(mode, canvases, printWindow, docTitle) {
      var safeTitle = docTitle || '日程一覧';

      // A4縦の用紙サイズ（mm）と余白
      var PAGE_W_MM = 210;
      var PAGE_H_MM = 297;
      var MARGIN_MM = 7;
      var GAP_MM = 6; // 同一ページ内で校舎間に入れる余白
      var MAX_W_MM = PAGE_W_MM - MARGIN_MM * 2;
      var MAX_H_MM = PAGE_H_MM - MARGIN_MM * 2;

      // 各canvasのmm寸法（PDF/印刷で共通）と動的ページ割当
      var items = canvases.map(function(c) {
        var ratio = c.width / c.height;
        var drawW = MAX_W_MM;
        var drawH = drawW / ratio;
        // 1校舎単体でページ高を超える場合のみ縮小（収まる校舎は縮小しない）
        if (drawH > MAX_H_MM) {
          drawH = MAX_H_MM;
          drawW = drawH * ratio;
        }
        return { canvas: c, drawW: drawW, drawH: drawH };
      });

      // 校舎単位でページにパッキング（first-fit greedy）
      // 校舎は分割しない: 残り高に収まらなければ次ページ送り
      var pages = [];
      var currentPage = [];
      var currentY = 0;
      items.forEach(function(it) {
        var needed = (currentPage.length === 0 ? 0 : GAP_MM) + it.drawH;
        if (currentPage.length > 0 && currentY + needed > MAX_H_MM) {
          pages.push(currentPage);
          currentPage = [];
          currentY = 0;
          needed = it.drawH;
        }
        currentPage.push(it);
        currentY += needed;
      });
      if (currentPage.length > 0) pages.push(currentPage);

      if (mode === 'print') {
        var pagesHtml = '';
        var totalImgs = 0;
        pages.forEach(function(p) { totalImgs += p.length; });
        var imgIdx = 0;
        pages.forEach(function(page, pIdx) {
          var pageBreak = pIdx < pages.length - 1 ? 'page-break-after: always;' : '';
          pagesHtml += '<div style="' + pageBreak + '">';
          page.forEach(function(item, iIdx) {
            var imgDataPng = item.canvas.toDataURL('image/png');
            var marginTop = iIdx > 0 ? GAP_MM + 'mm' : '0';
            imgIdx++;
            var onloadAttr = imgIdx === totalImgs ? ' onload="window.print();"' : '';
            pagesHtml += '<img src="' + imgDataPng + '" style="display:block;width:' + item.drawW + 'mm;height:' + item.drawH + 'mm;margin-top:' + marginTop + ';"' + onloadAttr + '>';
          });
          pagesHtml += '</div>';
        });
        if (printWindow) {
          printWindow.document.open();
          printWindow.document.write(
            '<!DOCTYPE html><html><head>' +
            '<title>' + safeTitle + '</title>' +
            '<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #fff; } @page { size: A4 portrait; margin: 7mm; }</style>' +
            '</head><body>' + pagesHtml + '</body></html>'
          );
          printWindow.document.close();
        } else {
          appAlert('ポップアップがブロックされました。\nブラウザのポップアップ許可設定を確認してください。');
        }
      } else {
        var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        pages.forEach(function(page, pIdx) {
          if (pIdx > 0) pdf.addPage();
          var y = MARGIN_MM;
          page.forEach(function(item, iIdx) {
            if (iIdx > 0) y += GAP_MM;
            var imgData = item.canvas.toDataURL('image/jpeg', 0.92);
            pdf.addImage(imgData, 'JPEG', MARGIN_MM, y, item.drawW, item.drawH);
            y += item.drawH;
          });
        });
        pdf.save(safeTitle + '.pdf');
      }
    }

    /**
     * AIアシスタントから呼ばれるカレンダーエクスポート
     * Firestoreから直接全校舎のエントリを取得してICSダウンロード＋Googleカレンダーインポート画面を開く
     * @param {string} lectureId 講習ID
     */
    function exportLecCalendarFromAI_(lectureId) {
      if (!lectureId) {
        showToast('講習が指定されていません', 'error');
        return;
      }
      var targetTeacherId = myTeacherId;
      var targetTeacherName = myTeacherName || '';

      fbGetAllLectureEntries(lectureId)
        .then(function(allEntries) {
          var myEntries = allEntries.filter(function(e) {
            return e.teacherId === targetTeacherId;
          });
          if (myEntries.length === 0) {
            showToast('エクスポートするコマがありません', 'error');
            return;
          }
          var lectureName = '';
          var lp = (lecturePeriods || []).find(function(p) { return p.id === lectureId; });
          if (lp) lectureName = lp.name;

          var icsContent = generateLecICS(myEntries, lectureName, targetTeacherName);
          var filename = (lectureName || lectureId) + '_' + targetTeacherName + '.ics';
          downloadFile(icsContent, filename, 'text/calendar;charset=utf-8');
          showToast(myEntries.length + '件のコマをカレンダーにエクスポートしました', 'success');

          setTimeout(function() {
            window.open('https://calendar.google.com/calendar/u/0/r/settings/export', '_blank');
          }, 500);
        })
        .catch(function(err) {
          console.error('AIカレンダーエクスポートエラー:', err);
          showToast('カレンダーエクスポートに失敗しました', 'error');
        });
    }

</script>
