<script>
    // ===== 【講習管理タブ】 =====
    // ========================================

    /**
     * 講習管理タブ サブタブ切り替え（.lecture-sub-content / .lecture-sub-tab にスコープ）
     */
    function switchLectureSubTab(event, name) {
      // 現在のサブタブのスクロール位置を保存
      document.querySelectorAll('.lecture-sub-content').forEach(function(el) {
        if (el.style.display !== 'none') saveScrollPosition(el.id);
      });

      document.querySelectorAll('.lecture-sub-content').forEach(function(el) {
        el.style.display = 'none';
      });
      document.querySelectorAll('.lecture-sub-tab').forEach(function(el) {
        el.style.borderBottomColor = 'transparent';
        el.style.color = '#666';
      });
      document.getElementById(name).style.display = 'block';

      // ボタンをアクティブ状態に（data-subtab属性で全コピーを同期）
      var activeKey = (event.target.getAttribute && event.target.getAttribute('data-subtab')) || name;
      document.querySelectorAll('.lecture-sub-tab[data-subtab="' + activeKey + '"]').forEach(function(el) {
        el.style.borderBottomColor = '#667eea';
        el.style.color = '#667eea';
      });

      // スクロール位置を復元
      restoreScrollPosition(name);
      if (name === 'lectures-schedule') {
        initLecturesSchedule();
      } else if (name === 'lectures-materials') {
        initLecturesMaterials();
      } else if (name === 'lectures-flyer') {
        initFlyerAi();
      } else if (name === 'lectures-imagen') {
        initImagenTab();
      }
    }

    /**
     * 講習タブの状態を localStorage から自動復元する
     * 2つの非同期処理（GASロード・チェックボックス生成）が両方完了したタイミングで実行される
     */
    function tryAutoRestoreLectures() {
      if (!campusCheckboxesBuilt || !currentLectureId) return;
      if (pendingAutoRestoreCampuses) {
        var campuses = pendingAutoRestoreCampuses;
        pendingAutoRestoreCampuses = null;
        var allChecked = true;
        document.querySelectorAll('.lec-campus-cb').forEach(function(cb) {
          cb.checked = campuses.indexOf(cb.value) !== -1;
          if (!cb.checked) allChecked = false;
        });
        var allCb = document.getElementById('lec-campus-all');
        if (allCb) allCb.checked = allChecked;
      }
      showLectureCampusTabs(); // 常にグリッドを表示（初回・復元ともに）
    }

    /**
     * 講習管理タブ 初期化（switchTab('lectures') から呼ばれる）
     * lecturePeriods をバックエンドから取得し、年度セレクトを構築する
     */
    function initLecturesTab() {
      if (lectureTabInitialized) return;
      initLecturesSchedule(); // 校舎チェックボックスを初期構築（「日程作成」タブがデフォルト表示のため）
      var yearSel = document.getElementById('lec-year-select');
      yearSel.innerHTML = '<option value="">読み込み中...</option>';
      yearSel.disabled = true;

      // キャッシュがあれば即座に反映
      try {
        var cached = localStorage.getItem('s-quire-lecture-periods');
        if (cached) {
          lecturePeriods = JSON.parse(cached);
          lectureTabInitialized = true;
          buildLectureYearSelect();
        }
      } catch (e) { /* キャッシュ破損時は無視 */ }

      // 裏で最新データを取得
      google.script.run
        .withSuccessHandler(function(result) {
          lecturePeriods = Array.isArray(result) ? result : [];
          try { localStorage.setItem('s-quire-lecture-periods', JSON.stringify(lecturePeriods)); } catch (e) {}
          lectureTabInitialized = true;
          buildLectureYearSelect();
        })
        .withFailureHandler(function(err) {
          console.error('getLecturePeriods エラー:', err);
          if (!lectureTabInitialized) {
            yearSel.innerHTML = '<option value="">取得失敗</option>';
          }
        })
        .getLecturePeriods();
    }

    /**
     * 講習の年度（4月始まり）を返す
     * 春期講習（名前に「春期」を含む）が1〜3月開始の場合は翌年度として扱う
     * @param {Object} lp 講習期間オブジェクト（startDate, name を持つ）
     * @return {number} 年度
     */
    function getLectureFy_(lp) {
      var d = new Date(lp.startDate);
      var isSpring = lp.name && lp.name.indexOf('春期') !== -1;
      if (isSpring && d.getMonth() < 3) { // getMonth(): 0=Jan, 1=Feb, 2=Mar
        return d.getFullYear(); // 春期は翌年度扱い
      }
      return (d.getMonth() >= 3) ? d.getFullYear() : d.getFullYear() - 1;
    }

    /**
     * 直近の未開始講習（startDate >= 今日）を返す
     * 未来の講習がない場合は null を返す
     * @return {Object|null} 講習期間オブジェクト
     */
    function getNextUpcomingLecture_() {
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var sorted = lecturePeriods.slice().sort(function(a, b) {
        return new Date(a.startDate) - new Date(b.startDate);
      });
      for (var i = 0; i < sorted.length; i++) {
        var d = new Date(sorted[i].startDate);
        d.setHours(0, 0, 0, 0);
        if (d >= today) return sorted[i];
      }
      return null; // 未来の講習なし
    }

    /**
     * 年度セレクトを構築する
     * - 常に現在の年度を含める
     * - 1〜3月は次年度（新年度）も含める
     * - 登録済み講習の年度も含める（春期は翌年度として扱う）
     * - 直近の未開始講習の年度をデフォルト選択（なければ最新年度）
     */
    function buildLectureYearSelect() {
      var yearSel = document.getElementById('lec-year-select');
      yearSel.innerHTML = '';

      var now = new Date();
      var currentMonth = now.getMonth() + 1; // 1〜12
      var calYear = now.getFullYear();
      var currentFy = (currentMonth >= 4) ? calYear : calYear - 1;

      // lecturePeriods から年度を抽出（春期は翌年度扱い）
      var years = [];
      lecturePeriods.forEach(function(lp) {
        var fy = getLectureFy_(lp);
        if (years.indexOf(fy) === -1) years.push(fy);
      });

      // 常に現在の年度を含める
      if (years.indexOf(currentFy) === -1) years.push(currentFy);

      // 1〜3月は次年度も含める（新年度の講習を事前登録できるように）
      if (currentMonth <= 3) {
        var nextFy = currentFy + 1;
        if (years.indexOf(nextFy) === -1) years.push(nextFy);
      }

      years.sort(function(a, b) { return b - a; }); // 降順（最新年度が先頭）

      years.forEach(function(fy) {
        var opt = document.createElement('option');
        opt.value = fy;
        opt.textContent = fy + '年度';
        yearSel.appendChild(opt);
      });
      yearSel.disabled = false;

      // 直近の未開始講習の年度をデフォルト選択（なければ最新年度）
      var upcoming = getNextUpcomingLecture_();
      var defaultFy = upcoming ? getLectureFy_(upcoming) : years[0];
      if (years.indexOf(defaultFy) === -1) defaultFy = years[0];
      yearSel.value = defaultFy;
      currentLectureYear = defaultFy;

      buildLectureNameSelect(currentLectureYear);
    }

    /**
     * 年度変更時ハンドラー
     */
    function onLectureYearChange() {
      var sel = document.getElementById('lec-year-select');
      currentLectureYear = sel.value ? parseInt(sel.value) : null;
      buildLectureNameSelect(currentLectureYear);
    }

    /**
     * 選択年度に合わせた講習セレクトを構築する
     * @param {number} fy 年度
     */
    function buildLectureNameSelect(fy) {
      var nameSel = document.getElementById('lec-name-select');
      nameSel.innerHTML = '';

      var filtered = lecturePeriods.filter(function(lp) {
        if (!lp.startDate) return false;
        var d = new Date(lp.startDate);
        if (isNaN(d.getTime())) return false;
        return getLectureFy_(lp) === fy;
      });

      // 開始日昇順でソート（時系列順に表示）
      filtered.sort(function(a, b) { return new Date(a.startDate) - new Date(b.startDate); });

      if (filtered.length === 0) {
        nameSel.innerHTML = '<option value="">（この年度の講習なし）</option>';
        document.getElementById('lec-period-label').textContent = '';
        currentLectureId = null;
        return;
      }

      filtered.forEach(function(lp) {
        var opt = document.createElement('option');
        opt.value = lp.id;
        opt.textContent = lp.name;
        nameSel.appendChild(opt);
      });

      // 直近の未開始講習（startDate >= 今日）をデフォルト選択、なければ先頭
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var defaultLp = filtered.find(function(lp) {
        var d = new Date(lp.startDate);
        d.setHours(0, 0, 0, 0);
        return d >= today;
      }) || filtered[0];
      nameSel.value = defaultLp.id;
      currentLectureId = defaultLp.id;
      var selectedLp = defaultLp;

      updateLecturePeriodLabel();
      // 週を選択した講習の開始週にセット
      currentLectureWeekStart = getLectureWeekMonday(selectedLp.startDate);
      currentLectureScrollTop = 0; // 14:00 にリセット

      // 保存済み校舎があれば自動復元リクエストをセット
      var savedCampuses = JSON.parse(localStorage.getItem('lecLastCampuses') || 'null');
      if (savedCampuses && savedCampuses.length > 0) {
        pendingAutoRestoreCampuses = savedCampuses;
      }
      currentLectureScrollLeft = (13 - 8) * 6 * 20; // 講習変更時は13:00にスクロールをリセット（8:00始まりのため offset 補正）
      tryAutoRestoreLectures();
    }

    /**
     * 講習変更時ハンドラー
     */
    function onLectureChange() {
      var nameSel = document.getElementById('lec-name-select');
      currentLectureId = nameSel.value || null;
      updateLecturePeriodLabel();
      if (currentLectureId) {
        var lp = lecturePeriods.find(function(p) { return p.id === currentLectureId; });
        if (lp) {
          currentLectureWeekStart = getLectureWeekMonday(lp.startDate);
          currentLectureScrollTop = 0;
        }
      }
      // 重複チェックキャッシュをリセット
      allCampusEntriesCache = [];
      // チェックモードを自分にリセット＋自分チェックボタンを強調
      currentCheckMode = 'self';
      setActiveCheckButton('lec-self-check-btn');
      renderDuplicatePanel([]);
      // クラス選択をリセット
      selectedLecClass = null;
      ['A', 'B', 'C'].forEach(function(c) {
        var btn = document.getElementById('lec-class-btn-' + c);
        if (btn) applyLecBtnActive(btn, false);
      });
      updateLecRemainingCounter();
      // 校舎タブが表示中なら再描画
      if (currentLectureCampus) {
        // 講習が切り替わったのでキャッシュをクリア（未保存変更がない場合のみ）
        // → 次の renderLectureWeekGrid → refreshLecEntries で新しい講習のデータを取得させる
        if (!dirtyCampuses[currentLectureCampus]) {
          lectureEntries[currentLectureCampus] = undefined;
        }
        updateLectureWeekLabel();
        renderLectureWeekGrid(currentLectureCampus);
      }
      // チラシサブタブが表示中なら自動更新
      if (typeof initFlyerAi === 'function' &&
          document.getElementById('lectures-flyer') &&
          document.getElementById('lectures-flyer').style.display !== 'none') {
        initFlyerAi();
      }
      // 配布物サブタブが表示中なら自動更新（エントリキャッシュをリセットして再取得）
      if (typeof updateMatPreviewOnCampusChange === 'function' &&
          document.getElementById('lectures-materials') &&
          document.getElementById('lectures-materials').style.display !== 'none') {
        matEntriesCache = {};
        matWebEntriesCache = {};
        updateMatPreviewOnCampusChange();
        // HP掲載用タブが表示中なら再取得
        if (typeof onMatWebCampusChange === 'function' &&
            document.getElementById('mat-tab-web') &&
            document.getElementById('mat-tab-web').style.display !== 'none') {
          onMatWebCampusChange();
        }
      }
    }

    /**
     * 期間ラベルを更新する（例：2025/03/29 〜 2025/04/06）
     */
    function updateLecturePeriodLabel() {
      var label = document.getElementById('lec-period-label');
      if (!currentLectureId || !label) return;
      var lp = lecturePeriods.find(function(p) { return p.id === currentLectureId; });
      if (lp) {
        label.textContent = lp.startDate.replace(/-/g, '/') + ' 〜 ' + lp.endDate.replace(/-/g, '/');
      } else {
        label.textContent = '';
      }
    }

    /**
     * 指定日が属する週の月曜日（Dateオブジェクト）を返す
     * @param {string} dateStr YYYY-MM-DD 形式
     * @return {Date} その週の月曜日
     */
    function getLectureWeekMonday(dateStr) {
      var d = new Date(dateStr + 'T00:00:00');
      var day = d.getDay(); // 0=日, 1=月, ...
      var diff = (day === 0) ? -6 : 1 - day; // 月曜日を基準
      d.setDate(d.getDate() + diff);
      return d;
    }

    /**
     * 週ナビゲーション：±1週移動
     * @param {number} dir +1（次週）または -1（前週）
     */
    function navigateLectureWeek(dir) {
      if (!currentLectureWeekStart) return;
      currentLectureWeekStart = new Date(currentLectureWeekStart);
      currentLectureWeekStart.setDate(currentLectureWeekStart.getDate() + dir * 7);
      updateLectureWeekLabel();
      if (currentLectureCampus) {
        renderLectureWeekGrid(currentLectureCampus);
      }
      updateLecToolbarState(); // 週切り替え後も移動モード表示を維持
    }

    /**
     * 週ラベルを更新する（例：2025/03/29 〜 2025/04/04）
     */
    function updateLectureWeekLabel() {
      var label = document.getElementById('lec-week-label');
      if (!label || !currentLectureWeekStart) return;
      var mon = new Date(currentLectureWeekStart);
      var sun = new Date(mon);
      sun.setDate(sun.getDate() + 6);
      label.textContent = formatLecDate(mon) + ' 〜 ' + formatLecDate(sun);
    }

    /**
     * Date → YYYY/MM/DD(曜) 形式の文字列
     */
    function formatLecDate(d) {
      var days = ['日','月','火','水','木','金','土'];
      var mm = ('0' + (d.getMonth() + 1)).slice(-2);
      var dd = ('0' + d.getDate()).slice(-2);
      return d.getFullYear() + '/' + mm + '/' + dd + '(' + days[d.getDay()] + ')';
    }

    /**
     * YYYY/MM/DD 形式の簡易表示（ヘッダー用）
     */
    function formatLecDateShort(d) {
      var days = ['日','月','火','水','木','金','土'];
      var mm = ('0' + (d.getMonth() + 1)).slice(-2);
      var dd = ('0' + d.getDate()).slice(-2);
      return mm + '/' + dd + '\n(' + days[d.getDay()] + ')';
    }

    // ===== 日程作成サブタブ =====

    /**
     * 日程作成サブタブ 初期化
     * GAS呼び出しはgetLecturePeriodsと同時に発火しないよう遅延させる
     * （同時リクエストが多いとGASがHTML応答を返し通信エラーになるため）
     */
    function initLecturesSchedule() {
      buildLectureCampusCheckboxes();
      // GAS呼び出しを遅延して同時リクエスト数を減らす
      // getLecturePeriods（initLecturesTabから発火）が先に処理されるようにする
      setTimeout(function() {
        // 全ユーザー：講師名マップを取得（グリッド表示名を常に最新にするため）
        loadLecTeacherNameMap();
        // 管理者の場合は講師選択エリアを表示してリストを読み込む
        if (isAdminUser) {
          var area = document.getElementById('lec-admin-teacher-area');
          if (area) area.style.display = 'flex';
          // さらに遅延して getAllowedUsers → getPlacementTeacherNames の同時発火を避ける
          setTimeout(function() { loadLectureTeachers(); }, 2000);
        }
      }, 2000);
      updateLecOcrBtnState();
    }

    /**
     * teacherId → { email, name } マップをバックエンドから取得してキャッシュする（全ユーザー）
     * グリッド上の講師名表示を常に最新の表示名で行うために使用
     */
    function loadLecTeacherNameMap() {
      if (Object.keys(lecTeacherNameMap || {}).length > 0) return; // セッション中はキャッシュを再利用
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success) {
            lecTeacherNameMap = result.map || {};
          }
        })
        .withFailureHandler(function(err) {
          console.error('getTeacherNamesMap エラー:', err);
        })
        .getTeacherNamesMap();
    }

    /**
     * 管理者用：アクセス許可ユーザー一覧を取得してドロップダウンに設定する
     * getAllowedUsers() をベースにするため、講習入力実績のない講師も表示される
     */
    function loadLectureTeachers() {
      google.script.run
        .withSuccessHandler(function(result) {
          var sel = document.getElementById('lec-teacher-select');
          if (!sel) return;
          if (!result || !result.success || !result.users || !result.users.length) {
            sel.innerHTML = '<option value="">（ユーザーなし）</option>';
            return;
          }
          var myEmailLower = (myTeacherEmail || '').toLowerCase();
          var html = '<option value="">-- 自分として入力 (' + (myTeacherName || 'あなた') + ') --</option>';
          var existingNames = {};
          result.users.forEach(function(u) {
            if (!u.email) return;
            var emailLower = u.email.toLowerCase();
            if (emailLower === myEmailLower) return; // 自分はデフォルト選択肢に表示
            var tid = u.teacherId || '';
            var uName = u.name || u.email;
            existingNames[uName] = true;
            var subjectAttr = (u.subjects && u.subjects.length === 1) ? ' data-subject="' + u.subjects[0] + '"' : '';
            html += '<option value="' + u.email + '" data-name="' + uName + '" data-teacherid="' + tid + '"' + subjectAttr + '>'
                  + uName + '</option>';
          });
          // 講師配置表に登録された講師も追加（Supabase未登録の手動追加講師のみ）
          google.script.run
            .withSuccessHandler(function(pr) {
              if (pr && pr.success) {
                (pr.teachers || []).forEach(function(t) {
                  if (!t.name || existingNames[t.name]) return; // 重複スキップ
                  html += '<option value="__placement__' + t.name + '" data-name="' + t.name + '" data-teacherid="" data-subject="' + (t.subject || '') + '">'
                        + t.name + '（配置表）</option>';
                });
              }
              sel.innerHTML = html;
              lecAdminTeacherEmail = '';
              lecAdminTeacherName  = '';
              lecAdminTeacherId    = '';
            })
            .withFailureHandler(function() {
              sel.innerHTML = html; // エラーでも既存ユーザーは表示
              lecAdminTeacherEmail = '';
              lecAdminTeacherName  = '';
              lecAdminTeacherId    = '';
            })
            .getPlacementTeacherNames();
        })
        .withFailureHandler(function(err) {
          console.error('getAllowedUsers エラー:', err);
        })
        .getAllowedUsers();
    }

    /**
     * 管理者用：講師選択ドロップダウン変更時のハンドラー
     */
    function onLecTeacherChange() {
      var sel = document.getElementById('lec-teacher-select');
      if (!sel) return;
      var badge = document.getElementById('lec-admin-teacher-badge');
      if (sel.value) {
        var opt = sel.options[sel.selectedIndex];
        if (sel.value.indexOf('__placement__') === 0) {
          // 配置表のみ登録の講師（メール・teacherId なし）
          lecAdminTeacherEmail = '';
          lecAdminTeacherName  = opt.getAttribute('data-name') || sel.value.replace('__placement__', '');
          lecAdminTeacherId    = '';
          // 科目が1つ登録されていれば自動選択
          var placementSubject = opt.getAttribute('data-subject') || '';
          if (placementSubject && selectedSubjectForEntry !== placementSubject) {
            var subjectBtn = document.querySelector('.lec-subject-btn[data-subject="' + placementSubject + '"]');
            if (subjectBtn) toggleLecSubjectBtn(placementSubject);
          }
        } else {
          lecAdminTeacherEmail = sel.value;
          lecAdminTeacherName  = opt.getAttribute('data-name') || sel.value;
          lecAdminTeacherId    = opt.getAttribute('data-teacherid') || '';
          // 科目が1つだけなら自動選択
          var appSubject = opt.getAttribute('data-subject') || '';
          if (appSubject && selectedSubjectForEntry !== appSubject) {
            var appSubjectBtn = document.querySelector('.lec-subject-btn[data-subject="' + appSubject + '"]');
            if (appSubjectBtn) toggleLecSubjectBtn(appSubject);
          }
        }
        if (badge) badge.textContent = '「' + lecAdminTeacherName + '」として入力・編集します';
      } else {
        lecAdminTeacherEmail = '';
        lecAdminTeacherName  = '';
        lecAdminTeacherId    = '';
        if (badge) badge.textContent = '';
      }
      updateLecOcrBtnState();
    }

    /**
     * 「日程を読み込む（AI）」ボタンの有効/無効を更新する
     * 管理者は講師を選択していること（lecAdminTeacherName が非空）を必須とする
     */
    function updateLecOcrBtnState() {
      var btn = document.getElementById('lec-ocr-btn');
      if (!btn) return;
      var hint = document.getElementById('lec-ocr-admin-hint');
      if (isAdminUser) {
        if (hint) hint.style.display = '';
        if (!lecAdminTeacherName) {
          btn.disabled = true;
          btn.style.opacity = '0.4';
          btn.style.cursor = 'not-allowed';
          btn.title = '先に講師を選択してください';
        } else {
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.style.cursor = 'pointer';
          btn.title = '';
        }
      } else {
        if (hint) hint.style.display = 'none';
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
        btn.title = '';
      }
    }

    /**
     * 校舎チェックボックスを構築する（preferredCampuses を先頭にチェック済みで表示）
     */
    function buildLectureCampusCheckboxes() {
      var container = document.getElementById('lec-campus-checkboxes');
      if (!container) return;

      var arr = Object.keys(campusData).map(function(code) {
        return { code: code, name: campusData[code] };
      });

    /**
     * ICS用文字列エスケープ（RFC 5545）
     * @param {string} str
     * @return {string}
     */
    function escapeICS(str) {
      if (!str) return '';
      return str.replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
    }

    /**
     * 数値を2桁ゼロ埋め文字列にする
     * @param {number} n
     * @return {string}
     */
    function pad2ICS(n) {
      return ('0' + n).slice(-2);
    }

    /**
     * 講習エントリからICSファイル文字列を生成する
     * @param {Array} entries エントリ配列
     * @param {string} lectureName 講習名
     * @param {string} teacherName 講師名
     * @return {string} ICSファイル内容
     */
    function generateLecICS(entries, lectureName, teacherName) {
      var lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//S-quire//LectureExport//JP',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
        'X-WR-TIMEZONE:Asia/Tokyo',
        'BEGIN:VTIMEZONE',
        'TZID:Asia/Tokyo',
        'X-LIC-LOCATION:Asia/Tokyo',
        'BEGIN:STANDARD',
        'TZOFFSETFROM:+0900',
        'TZOFFSETTO:+0900',
        'TZNAME:JST',
        'DTSTART:19700101T000000',
        'END:STANDARD',
        'END:VTIMEZONE'
      ];

      entries.sort(function(a, b) {
        return (a.date + a.startTime).localeCompare(b.date + b.startTime);
      });

      entries.forEach(function(entry) {
        var dateStr = entry.date.replace(/-/g, '');
        var startParts = entry.startTime.split(':');
        var startH = parseInt(startParts[0]);
        var startM = parseInt(startParts[1]);
        var totalEndMin = startH * 60 + startM + (entry.durationSlots * 10);
        var endH = Math.floor(totalEndMin / 60);
        var endM = totalEndMin % 60;

        var dtStart = dateStr + 'T' + pad2ICS(startH) + pad2ICS(startM) + '00';
        var dtEnd   = dateStr + 'T' + pad2ICS(endH) + pad2ICS(endM) + '00';

        var summary = '【' + lectureName + '】' + entry.grade + ' ' + entry.subject;
        if (entry.classLabel) summary += entry.classLabel;

        var resolvedName = (entry.teacherId && lecTeacherNameMap[entry.teacherId])
          ? lecTeacherNameMap[entry.teacherId].name
          : (entry.teacherName || teacherName);

        lines.push('BEGIN:VEVENT');
        lines.push('UID:' + entry.id + '@squire.app');
        lines.push('DTSTART;TZID=Asia/Tokyo:' + dtStart);
        lines.push('DTEND;TZID=Asia/Tokyo:' + dtEnd);
        lines.push('SUMMARY:' + escapeICS(summary));
        lines.push('DESCRIPTION:' + escapeICS('講師: ' + resolvedName));
        lines.push('END:VEVENT');
      });

      lines.push('END:VCALENDAR');
      return lines.join('\r\n');
    }

    /**
     * カレンダーエクスポート実行
     * @param {string} mode 'google' または 'ics'
     */
    function exportLecCalendar(mode) {
      closeLecCalExportModal();

      // 対象講師を決定（Admin代理操作時はそちらを優先）
      var targetTeacherId = (isAdminUser && lecAdminTeacherId) ? lecAdminTeacherId : myTeacherId;
      var targetTeacherName = (isAdminUser && lecAdminTeacherId) ? lecAdminTeacherName : myTeacherName;

      // 全校舎から currentLectureId かつ対象講師のエントリを収集
      var allEntries = [];
      Object.keys(lectureEntries).forEach(function(campusCode) {
        var entries = lectureEntries[campusCode] || [];
        entries.forEach(function(e) {
          if (e.lectureId === currentLectureId && e.teacherId === targetTeacherId) {
            allEntries.push(e);
          }
        });
      });

      if (allEntries.length === 0) {
        showToast('エクスポートするコマがありません', 'error');
        return;
      }

      // 講習名を取得
      var lectureName = '';
      var lp = lecturePeriods.find(function(p) { return p.id === currentLectureId; });
      if (lp) lectureName = lp.name;

      // ICS生成＆ダウンロード
      var icsContent = generateLecICS(allEntries, lectureName, targetTeacherName);
      var filename = lectureName + '_' + targetTeacherName + '.ics';
      downloadFile(icsContent, filename, 'text/calendar;charset=utf-8');

      showToast(allEntries.length + '件のコマをエクスポートしました', 'success');

      // Googleカレンダーモード：インポート画面を新タブで開く
      if (mode === 'google') {
        setTimeout(function() {
          window.open('https://calendar.google.com/calendar/u/0/r/settings/export', '_blank');
        }, 500);
      }
    }

    /**
     * 週間タイムグリッドを描画する（横スクロール版：時間軸＝X、曜日＝Y）
     * @param {string} campusCode 校舎コード
     */
    function renderLectureWeekGrid(campusCode) {
      var container = document.getElementById('lec-grid-container');
      if (!container || !currentLectureWeekStart) return;

      var lp = currentLectureId ? lecturePeriods.find(function(p) { return p.id === currentLectureId; }) : null;
      var startDate = lp ? new Date(lp.startDate + 'T00:00:00') : null;
      var endDate   = lp ? new Date(lp.endDate   + 'T00:00:00') : null;

      // 週の7日を生成
      var weekDays = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(currentLectureWeekStart);
        d.setDate(d.getDate() + i);
        weekDays.push(d);
      }

      var dayNames = ['月','火','水','木','金','土','日'];

      // レイアウト定数（10分刻み）
      var START_HOUR = 8;                        // 表示開始時刻（8:00から）
      var END_HOUR   = 24;                       // 表示終了時刻（24:00まで）
      var SLOTS      = (END_HOUR - START_HOUR) * 6; // 10分スロット数 = 96
      var SLOT_W     = 20;                       // 1スロット（10分）の幅 px
      var DAY_W      = 52;                       // 曜日ラベル列の幅 px
      var BASE_ROW_H = 56;                       // 1行（1日）の基本高さ px
      var HEAD_H     = 36;                       // ヘッダー行（時刻ラベル）の高さ px
      var START_SLOT = START_HOUR * 6;           // 表示開始スロット番号（48=8:00）
      var TOTAL_W    = DAY_W + SLOTS * SLOT_W;  // 52 + 96*20 = 1972px

      // 休校日マップ（管理タブの上書き設定も反映）
      var lecFy = (function() {
        if (lp && lp.startDate) {
          var _d = new Date(lp.startDate + 'T00:00:00');
          return _d.getMonth() >= 3 ? _d.getFullYear() : _d.getFullYear() - 1;
        }
        var _d = currentLectureWeekStart;
        return _d.getMonth() >= 3 ? _d.getFullYear() : _d.getFullYear() - 1;
      })();
      var lecClosedDays = getClosedDays(lecFy);
      if (closedDayOverrides) {
        (closedDayOverrides.del || []).forEach(function(dk) { delete lecClosedDays[dk]; });
        (closedDayOverrides.add || []).forEach(function(dk) { lecClosedDays[dk] = true; });
      }

      // ── ヘッダー行（時刻ラベル）──
      var headerHtml = '<div style="display:flex;height:' + HEAD_H + 'px;'
                     + 'border-bottom:2px solid #ccc;background:#f8fafc;'
                     + 'min-width:' + TOTAL_W + 'px;'
                     + 'position:sticky;top:0;z-index:20;">';
      // 左上コーナー（横スクロール時も左上に固定）
      headerHtml += '<div style="width:' + DAY_W + 'px;flex-shrink:0;border-right:1px solid #ddd;'
                  + 'box-sizing:border-box;'
                  + 'position:sticky;left:0;z-index:21;background:#f8fafc;"></div>';
      // 10分ごとのスロット（9:00〜20:50）
      for (var s = 0; s < SLOTS; s++) {
        var slotMin   = s * 10;
        var hh        = START_HOUR + Math.floor(slotMin / 60);
        var mmMin     = slotMin % 60;
        var isHour    = (mmMin === 0);
        var isHalf    = (mmMin === 30);
        // 境界線の強さは「このスロットの右端 = 次のスロットの開始時刻」で決める
        // こうすると HH:00 の太線がスロット90の左端（=右端より1スロット手前）に来て
        // タップした位置と保存される時刻が視覚的に一致する
        var nextMm    = (slotMin + 10) % 60;
        var borderCol = (nextMm === 0) ? '#bbb' : (nextMm === 30) ? '#ddd' : '#eee';
        var labelHtml = '';
        if (isHour) {
          labelHtml = '<span style="position:absolute;left:1px;top:50%;transform:translateY(-50%);'
                    + 'font-size:10px;font-weight:600;color:#555;white-space:nowrap;">'
                    + ('0' + hh).slice(-2) + ':00</span>';
        } else if (isHalf) {
          labelHtml = '<span style="position:absolute;left:1px;top:50%;transform:translateY(-50%);'
                    + 'font-size:9px;color:#aaa;white-space:nowrap;">:30</span>';
        }
        headerHtml += '<div style="width:' + SLOT_W + 'px;flex-shrink:0;position:relative;'
                    + 'box-sizing:border-box;border-right:1px solid ' + borderCol + ';">'
                    + labelHtml + '</div>';
      }
      // 21:00 終端ラベル
      headerHtml += '<div style="width:0;position:relative;">'
                  + '<span style="position:absolute;right:1px;top:50%;transform:translateY(-50%);'
                  + 'font-size:10px;font-weight:600;color:#555;white-space:nowrap;">24:00</span></div>';
      headerHtml += '</div>';

      // ── 7日分の行 ──
      var rowsHtml = '';
      weekDays.forEach(function(d, idx) {
        var mm2 = ('0' + (d.getMonth() + 1)).slice(-2);
        var dd2 = ('0' + d.getDate()).slice(-2);
        var dateStr = d.getFullYear() + '-' + mm2 + '-' + dd2;
        var isSat = (d.getDay() === 6), isSun = (d.getDay() === 0);
        var rowBg = isSun ? '#fff8f8' : isSat ? '#f0f8ff' : '#fff';
        var dayBg = isSun ? '#fee2e2' : isSat ? '#eff6ff' : '#f8fafc';
        var dayTxtCol = isSun ? '#dc2626' : isSat ? '#2563eb' : '#333';

        // 開始日・終了日バッジ
        var badge = '';
        if (startDate && dateStr === formatDateKey(startDate)) {
          badge = '<div style="font-size:9px;background:#22c55e;color:white;padding:1px 3px;border-radius:3px;margin-top:2px;white-space:nowrap;">開始</div>';
        } else if (endDate && dateStr === formatDateKey(endDate)) {
          badge = '<div style="font-size:9px;background:#f97316;color:white;padding:1px 3px;border-radius:3px;margin-top:2px;white-space:nowrap;">終了</div>';
        }
        // 休校日バッジ（入力は可能、表示のみ）
        var closedBadge = lecClosedDays[dateStr]
          ? '<div style="font-size:8px;background:#94a3b8;color:white;padding:1px 3px;border-radius:3px;margin-top:1px;white-space:nowrap;">休校日</div>'
          : '';

        // 行ラッパー（data-date-row でエントリ追加時に高さを更新する）
        rowsHtml += '<div data-date-row="' + dateStr + '" '
                  + 'style="display:flex;height:' + BASE_ROW_H + 'px;'
                  + 'min-width:' + TOTAL_W + 'px;">';

        // 曜日ラベル（sticky left）— data-date-label で高さを同期更新する
        rowsHtml += '<div data-date-label="' + dateStr + '" '
                  + 'style="width:' + DAY_W + 'px;flex-shrink:0;position:sticky;left:0;z-index:10;'
                  + 'background:' + dayBg + ';border-right:1px solid #ddd;border-bottom:1px solid #ccc;'
                  + 'display:flex;flex-direction:column;align-items:center;justify-content:center;'
                  + 'padding:2px 0;box-sizing:border-box;height:' + BASE_ROW_H + 'px;">'
                  + '<span style="font-size:11px;font-weight:600;color:' + dayTxtCol + ';">'
                  + mm2 + '/' + dd2 + '</span>'
                  + '<span style="font-size:11px;color:' + dayTxtCol + ';">(' + dayNames[idx] + ')</span>'
                  + badge
                  + closedBadge
                  + '</div>';

        // コンテンツエリア（タイムセル群 + エントリの絶対配置基盤）
        rowsHtml += '<div class="lec-day-row" data-date="' + dateStr + '" '
                  + 'style="position:relative;height:' + BASE_ROW_H + 'px;background:' + rowBg + ';'
                  + 'border-bottom:1px solid #ccc;'
                  + 'width:' + (SLOTS * SLOT_W) + 'px;flex-shrink:0;'
                  + '-webkit-tap-highlight-color:transparent;'
                  + '-webkit-touch-callout:none;'
                  + '-webkit-user-select:none;user-select:none;">';

        // 10分ごとのタイムセル（クリック/タップ判定用）
        for (var s2 = 0; s2 < SLOTS; s2++) {
          var cellSlot  = START_SLOT + s2;          // 絶対スロット番号（0〜143）
          var cellMm     = s2 * 10 % 60;
          // ヘッダーと同じロジック：右境界の強さは「次のスロットの開始時刻」で決める
          var nextCellMm = (s2 * 10 + 10) % 60;
          var cellBorder = (nextCellMm === 0) ? '#ddd' : (nextCellMm === 30) ? '#e8e8e8' : '#f0f0f0';
          rowsHtml += '<div class="lec-time-cell" data-date="' + dateStr + '" data-slot="' + cellSlot + '" '
                    + 'style="position:absolute;left:' + (s2 * SLOT_W) + 'px;top:0;'
                    + 'width:' + SLOT_W + 'px;height:100%;'
                    + 'border-right:1px solid ' + cellBorder + ';'
                    + 'box-sizing:border-box;cursor:pointer;"></div>';
        }

        rowsHtml += '</div>';  // .lec-day-row
        rowsHtml += '</div>';  // [data-date-row]
      });

      // DOM に書き込み
      container.innerHTML = '<div style="display:flex;flex-direction:column;">'
                          + headerHtml + rowsHtml + '</div>';

      // 横・縦スクロール位置復元（DOM描画完了後に設定するためrAFを使用）
      var _sl = currentLectureScrollLeft;
      var _st = currentLectureScrollTop;
      requestAnimationFrame(function() {
        container.scrollLeft = _sl;
        container.scrollTop  = _st;
      });
      container.onscroll = function() {
        currentLectureScrollLeft = container.scrollLeft;
        currentLectureScrollTop  = container.scrollTop;
      };

      // クリック/タップでエントリ作成（イベント委譲でリスナーを最小化）
      // getBoundingClientRect を使うことで CSS zoom やスクロール位置にも自動対応する
      var touchStartX = 0, touchStartY = 0;

      // X座標（viewport基準）からスロット番号を計算する（10分単位に自動スナップ）
      function calcSlotFromX(row, clientX) {
        var rect = row.getBoundingClientRect();
        var x    = clientX - rect.left;
        var slot = Math.floor(x / (rect.width / SLOTS));
        return START_SLOT + Math.max(0, Math.min(slot, SLOTS - 1));
      }

      // 既存リスナーを除去して再登録（メモリリーク防止）
      if (container._lecClickHandler) container.removeEventListener('click', container._lecClickHandler);
      if (container._lecTouchStartHandler) container.removeEventListener('touchstart', container._lecTouchStartHandler);
      if (container._lecTouchEndHandler) container.removeEventListener('touchend', container._lecTouchEndHandler);

      // デスクトップ：クリックで即時作成（イベント委譲）
      container._lecClickHandler = function(ev) {
        var row = ev.target.closest('.lec-day-row');
        if (!row || ev.target.closest('.lec-entry')) return;
        ev.stopPropagation();
        handleLecGridAction(row.dataset.date, calcSlotFromX(row, ev.clientX));
      };
      container.addEventListener('click', container._lecClickHandler);

      // モバイル：touchstart で座標記録（イベント委譲）
      container._lecTouchStartHandler = function(ev) {
        if (!ev.target.closest('.lec-day-row')) return;
        var t = ev.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
      };
      container.addEventListener('touchstart', container._lecTouchStartHandler, { passive: true });

      // モバイル：touchend で判定（イベント委譲）
      container._lecTouchEndHandler = function(ev) {
        var row = ev.target.closest('.lec-day-row');
        if (!row) return;
        var t = ev.changedTouches[0];
        var dx = Math.abs(t.clientX - touchStartX);
        var dy = Math.abs(t.clientY - touchStartY);
        ev.preventDefault(); // 合成clickを常にブロック（指ズレによる誤操作防止）
        if (dx < 10 && dy < 10) {
          // CSS zoom 環境でも正確に判定するため getBoundingClientRect で座標比較
          var entries = row.querySelectorAll('.lec-entry:not(.lec-entry-readonly)');
          for (var i = 0; i < entries.length; i++) {
            var rect = entries[i].getBoundingClientRect();
            if (t.clientX >= rect.left && t.clientX <= rect.right &&
                t.clientY >= rect.top  && t.clientY <= rect.bottom) {
              var eid = entries[i].dataset.entryId;
              if (eid) {
                // 右側 1/4（最小32px）が削除エリア。それ以外は従来どおり選択（移動）モード
                // ※モバイルは touchend で preventDefault するためボタンの click が発火しないので
                //   ここで座標判定して削除に分岐する必要がある
                var delZoneWidth = Math.max(rect.width * 0.25, 32);
                if (t.clientX >= rect.right - delZoneWidth) {
                  if (confirm('このコマを削除しますか？')) deleteLecEntry(eid);
                } else {
                  onEntryClick(ev, eid);
                }
                return;
              }
            }
          }
          handleLecGridAction(row.dataset.date, calcSlotFromX(row, t.clientX));
        }
      };
      container.addEventListener('touchend', container._lecTouchEndHandler, { passive: false });

      // エントリ描画
      renderLecEntries(campusCode);
    }

    /**
     * Date を 'YYYY-MM-DD' 形式の文字列に変換する
     * @param {Date} d
     * @return {string}
     */
    function formatDateKey(d) {
      var mm = ('0' + (d.getMonth() + 1)).slice(-2);
      var dd = ('0' + d.getDate()).slice(-2);
      return d.getFullYear() + '-' + mm + '-' + dd;
    }

    // ===== 講習エントリ操作 =====

    /**
     * 現在選択中の講習名に「春期」が含まれるか判定する
     * @return {boolean}
     */
    function isSpringLecture() {
      if (!currentLectureId) return false;
      var lp = lecturePeriods.find(function(p) { return p.id === currentLectureId; });
      return lp ? lp.name.indexOf('春期') !== -1 : false;
    }

    /**
     * 講習名と学年コードからデフォルトのコマ設定を返す（フロントエンド版）
     * @param {string} lectureName 講習名
     * @param {string} grade 学年コード
     * @return {{duration: number, count: number}}
     */
    function getDefaultGradeSettingsJS(lectureName, grade) {
      var spring     = lectureName.indexOf('春期') !== -1;
      var isKiso     = lectureName.indexOf('基礎学力テスト対策') !== -1;
      var isNyushi   = lectureName.indexOf('入試直前') !== -1;
      var multiCount = lectureName.indexOf('夏期') !== -1
                    || lectureName.indexOf('冬期') !== -1;
      // 基礎学力テスト対策・入試直前は中3のみ有効
      if (isKiso || isNyushi) {
        if (grade === '中3') {
          return { duration: 8, count: isNyushi ? 6 : 4 };
        }
        return { duration: 0, count: 0 };
      }
      var dMap = {
        '小':5, '中1':8, '中2':8, '中3':8, '高1':9, '高2':9, '高3':12,
        '新中1': spring ? 5 : 8, '新中2':8, '新中3':8, '新高1':9, '新高2':9, '新高3':12
      };
      var cMap = {
        '小':4, '中1':4, '中2':4, '中3': multiCount ? 6 : 4, '高1':4, '高2':4, '高3':4,
        '新中1': spring ? 2 : 4, '新中2':4, '新中3':4, '新高1':4, '新高2':4, '新高3':4
      };
      return { duration: dMap[grade] || 9, count: cMap[grade] || 4 };
    }

    /**
     * 現在選択中の講習の学年別設定を取得する
     * 講習に gradeSettings があればそちらを使い、なければ名前から計算したデフォルトを返す
     * @param {string} grade 学年コード
     * @return {{duration: number, count: number}}
     */
    function getLecGradeSettings(grade) {
      var lp = currentLectureId
        ? lecturePeriods.find(function(p) { return p.id === currentLectureId; })
        : null;
      if (lp && lp.gradeSettings && lp.gradeSettings[grade]) {
        return lp.gradeSettings[grade];
      }
      return getDefaultGradeSettingsJS(lp ? lp.name : '', grade);
    }

    /**
     * 教科ボタン群を構築する（selectedSubjects から生成。1教科なら自動選択）
     */
    function buildLecSubjectButtons() {
      var container = document.getElementById('lec-subject-buttons');
      if (!container) return;
      var subjects = selectedSubjects.length > 0 ? selectedSubjects : [];
      if (subjects.length === 0) {
        container.innerHTML = '<span style="font-size:13px;color:#999;">設定タブで担当教科を登録してください</span>';
        return;
      }
      var html = '';
      subjects.forEach(function(s) {
        html += '<button class="lec-subject-btn" data-subject="' + escapeHtml(s) + '" '
              + 'onclick="toggleLecSubjectBtn(\'' + escapeHtml(s) + '\')" '
              + 'style="padding:6px 14px;border:1px solid #ccc;border-radius:16px;background:white;font-size:13px;cursor:pointer;">'
              + escapeHtml(s) + '</button>';
      });
      container.innerHTML = html;
      // 先頭の教科を自動選択
      if (subjects.length > 0) {
        selectedSubjectForEntry = subjects[0];
        var btn = container.querySelector('.lec-subject-btn');
        if (btn) applyLecBtnActive(btn, true);
      } else {
        selectedSubjectForEntry = null;
      }
    }

    /**
     * 学年ボタン群を構築する（春期なら「新」付与）
     */
    function buildLecGradeButtons() {
      var container = document.getElementById('lec-grade-buttons');
      if (!container) return;
      var spring = isSpringLecture();
      // code と label を一致させる（春期かどうかでコードも変える）
      var allGrades = spring
        ? ['小','新中1','新中2','新中3','新高1','新高2','新高3']
        : ['小','中1','中2','中3','高1','高2','高3'];

      // 設定タブで選択した担当学年のみに絞る
      var userLecGrades = (typeof lecGrades !== 'undefined' && Array.isArray(lecGrades)) ? lecGrades : [];
      var grades;
      if (userLecGrades.length === 0) {
        grades = [];
      } else if (spring) {
        // 春期モード：「新中1」→「中1」に変換してフィルタ（「小」は例外）
        grades = allGrades.filter(function(springGrade) {
          if (springGrade === '小') return userLecGrades.indexOf('小') !== -1;
          return userLecGrades.indexOf(springGrade.replace('新', '')) !== -1;
        });
      } else {
        grades = allGrades.filter(function(grade) {
          return userLecGrades.indexOf(grade) !== -1;
        });
      }

      if (grades.length === 0) {
        container.innerHTML = '<span style="font-size:13px;color:#999;">設定タブで講習担当学年を選択してください</span>';
        selectedGradeForEntry = null;
        return;
      }

      var html = '';
      grades.forEach(function(grade) {
        var cfg = getLecGradeSettings(grade);
        var mins = cfg.duration * 10;
        var sub  = mins + '分 × ' + cfg.count + '回';
        html += '<button class="lec-grade-btn" data-grade="' + escapeHtml(grade) + '" '
              + 'onclick="toggleLecGradeBtn(\'' + escapeHtml(grade) + '\')" '
              + 'style="padding:5px 12px;border:1px solid #ccc;border-radius:16px;background:white;font-size:13px;cursor:pointer;line-height:1.3;text-align:center;">'
              + escapeHtml(grade)
              + '<br><span style="font-size:10px;color:#888;">' + sub + '</span></button>';
      });
      container.innerHTML = html;
      // 自動選択しない（ユーザーが明示的にタップする必要がある）
      selectedGradeForEntry = null;
    }

    /**
     * ボタンのアクティブスタイルを適用・解除する
     */
    function applyLecBtnActive(btn, active) {
      if (active) {
        btn.style.background    = 'var(--theme-color)';
        btn.style.color         = 'white';
        btn.style.borderColor   = 'var(--theme-color)';
        btn.style.fontWeight    = '600';
      } else {
        btn.style.background    = 'white';
        btn.style.color         = '';
        btn.style.borderColor   = '#ccc';
        btn.style.fontWeight    = '';
      }
    }

    /**
     * 教科ボタンを排他選択する（同ボタン再押しで解除）
     * @param {string} subject
     */
    function toggleLecSubjectBtn(subject) {
      document.querySelectorAll('.lec-subject-btn').forEach(function(btn) {
        applyLecBtnActive(btn, btn.dataset.subject === subject && selectedSubjectForEntry !== subject);
      });
      selectedSubjectForEntry = (selectedSubjectForEntry === subject) ? null : subject;
      updateLecRemainingCounter();
    }

    /**
     * 学年ボタンを排他選択する（同ボタン再押しで解除）
     * @param {string} grade
     */
    function toggleLecGradeBtn(grade) {
      document.querySelectorAll('.lec-grade-btn').forEach(function(btn) {
        applyLecBtnActive(btn, btn.dataset.grade === grade && selectedGradeForEntry !== grade);
      });
      selectedGradeForEntry = (selectedGradeForEntry === grade) ? null : grade;
      updateLecRemainingCounter();
    }

    /**
     * A/B/Cクラスボタンの排他選択（同ボタン再押しで解除）
     * @param {string} cls 'A'/'B'/'C'
     */
    function toggleLecClassBtn(cls) {
      selectedLecClass = (selectedLecClass === cls) ? null : cls;
      ['A', 'B', 'C'].forEach(function(c) {
        var btn = document.getElementById('lec-class-btn-' + c);
        if (!btn) return;
        applyLecBtnActive(btn, selectedLecClass === c);
      });
      updateLecRemainingCounter();
    }

    /**
     * 現在選択中の学年・教科・クラスの入力済み件数と残り回数を表示する
     */
    function updateLecRemainingCounter() {
      var el = document.getElementById('lec-remaining-counter');
      if (!el) return;
      if (!selectedGradeForEntry || !selectedSubjectForEntry) {
        el.textContent = '';
        return;
      }
      var settings = getLecGradeSettings(selectedGradeForEntry);
      var total = settings ? settings.count : 0;
      var entries = lectureEntries[currentLectureCampus] || [];
      var count = entries.filter(function(e) {
        return e.lectureId === currentLectureId &&
               e.grade === selectedGradeForEntry &&
               e.subject === selectedSubjectForEntry &&
               (e.classLabel || null) === selectedLecClass;
      }).length;
      var label = selectedGradeForEntry + ' ' + selectedSubjectForEntry + (selectedLecClass || '');
      var remaining = total - count;
      if (remaining > 0) {
        el.innerHTML = '<span style="color:#555;">' + label + ': ' + count + '件 / ' + total + '回設定（<b>あと' + remaining + '回</b>）</span>';
      } else if (remaining === 0) {
        el.innerHTML = '<span style="color:#22c55e;">✓ ' + label + ': ' + count + '件 / ' + total + '回（完了）</span>';
      } else {
        el.innerHTML = '<span style="color:#f97316;">' + label + ': ' + count + '件 / ' + total + '回設定（+' + (-remaining) + '超過）</span>';
      }
    }

    /**
     * 時刻文字列をスロット番号に変換する（HH:MM → slot）
     * @param {string} timeStr
     * @return {number}
     */
    function timeToSlot(timeStr) {
      var parts = timeStr.split(':');
      return Math.round((parseInt(parts[0]) * 60 + parseInt(parts[1])) / 10);
    }

    /**
     * スロット番号を時刻文字列に変換する
     * @param {number} slot
     * @return {string} HH:MM
     */
    function slotToTimeStr(slot) {
      var totalMin = slot * 10;
      var h = Math.floor(totalMin / 60);
      var m = totalMin % 60;
      return ('0' + h).slice(-2) + ':' + ('0' + m).slice(-2);
    }

    /**
     * 教科・学年から HSL カラーセットを返す
     * @param {string} subject 教科名
     * @param {string} grade 学年コード
     * @return {{solid:string, bg:string, text:string}}
     */
    function getEntryColors(subject, grade) {
      var hueMap = {
        '国語':355,'現代文':355,'古文':355,'漢文':355,
        '英語':28,'英会話':28,
        '数学':215,'算数':215,
        '理科':145,'物理':145,'化学':145,'生物':145,'地学':145,
        '社会':280,'地理':280,'歴史':280,'公民':280,'政治経済':280
      };
      var lightMap = {
        '小':75,
        '中1':67,'新中1':67,
        '中2':60,'新中2':60,
        '中3':53,'新中3':53,
        '高1':46,'新高1':46,
        '高2':40,'新高2':40,
        '高3':34,'新高3':34
      };
      var hue = (hueMap[subject]  !== undefined) ? hueMap[subject]  : 215;
      var l   = (lightMap[grade] !== undefined) ? lightMap[grade] : 53;
      return {
        solid : 'hsl('  + hue + ',70%,' + l + '%)',
        bg    : 'hsla(' + hue + ',70%,' + l + '%,0.22)',
        text  : l < 50 ? 'white' : 'hsl(' + hue + ',60%,20%)'
      };
    }

    /**
     * 先生ごとの色を取得する（未割当なら自動割当）
     * @param {string} email
     * @return {string} 16進数カラーコード
     */
    function getTeacherColor(teacherId) {
      if (!teacherId) return teacherColorPalette[0];
      if (!teacherColorMap[teacherId]) {
        var idx = Object.keys(teacherColorMap).length % teacherColorPalette.length;
        teacherColorMap[teacherId] = teacherColorPalette[idx];
      }
      return teacherColorMap[teacherId];
    }

    /**
     * 移動モードバナーの表示/非表示を更新する
     */
    function updateLecToolbarState() {
      if (selectedEntryId) {
        var banner = document.getElementById('lec-move-banner');
        if (banner) banner.style.display = 'flex';
        // 初回のみ下部トーストも表示
        if (!lecMoveModeActive) {
          showToast('コマを選択しました。移動先をタップしてください', 'warning');
        }
        lecMoveModeActive = true;
      } else {
        // フラグで確実にバナーを消去
        if (lecMoveModeActive) {
          var banner = document.getElementById('lec-move-banner');
          if (banner) banner.style.display = 'none';
