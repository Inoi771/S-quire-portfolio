    /**
     * OCR検出名を lec-teacher-select の選択肢と照合し、一致するスタッフを返す
     * 部分一致は「OCR検出名が登録スタッフ名に含まれる」方向のみ（逆方向は誤マッチ防止のため不使用）
     * @param {string} ocrName OCRが返した講師名（例: "田中"）
     * @return {Object|null} { email, name, teacherId } or null
     */
    function matchOcrTeacherName_(ocrName) {
      if (!ocrName || !isAdminUser) return null;
      var sel = document.getElementById('lec-teacher-select');
      if (!sel) return null;
      var candidates = [];
      for (var i = 0; i < sel.options.length; i++) {
        var opt = sel.options[i];
        if (!opt.value) continue;
        var staffName = opt.getAttribute('data-name') || '';
        if (!staffName) continue;
        if (staffName === ocrName) {
          return { email: opt.value, name: staffName, teacherId: opt.getAttribute('data-teacherid') || '' };
        }
        if (staffName.indexOf(ocrName) >= 0) {
          candidates.push({ email: opt.value, name: staffName, teacherId: opt.getAttribute('data-teacherid') || '' });
        }
      }
      // 自分自身もチェック
      var selfName = myTeacherName || '';
      if (selfName && (selfName === ocrName || selfName.indexOf(ocrName) >= 0)) {
        candidates.push({ email: '', name: selfName, teacherId: myTeacherId || '' });
      }
      if (candidates.length === 1) return candidates[0];
      return null;
    }

    function renderLecOcrResult_(entries) {
      var tbody = document.getElementById('lec-ocr-result-body');
      tbody.innerHTML = '';
      var allGrades = ['小', '中1', '中2', '中3', '高1', '高2', '高3', '新中1', '新中2', '新中3', '新高1', '新高2', '新高3'];
      var subjects = (selectedSubjects && selectedSubjects.length > 0)
        ? selectedSubjects
        : ['国語', '社会', '数学', '理科', '英語'];

      // 管理者用：講師ヘッダー表示切替 & 講師オプション構築
      var thTeacher = document.getElementById('lec-ocr-th-teacher');
      if (thTeacher) thTeacher.style.display = isAdminUser ? '' : 'none';
      var teacherOpts = [];
      if (isAdminUser) {
        var tSel = document.getElementById('lec-teacher-select');
        if (tSel) {
          for (var ti = 0; ti < tSel.options.length; ti++) {
            var tOpt = tSel.options[ti];
            teacherOpts.push({
              v: tOpt.value,
              l: tOpt.textContent,
              name: tOpt.getAttribute('data-name') || '',
              tid: tOpt.getAttribute('data-teacherid') || ''
            });
          }
        }
      }

      var hasIssue = false;
      var ocrMismatchNames = []; // 別講師名検出チェック用（非管理者）
      entries.forEach(function(entry, idx) {
        var tr = document.createElement('tr');
        var op = entry.op || 'create';
        tr.dataset.op = op;

        // edit: changes で上書きした表示用データを作る。元の値を data 属性に保存
        var displayEntry = {};
        Object.keys(entry).forEach(function(k) { displayEntry[k] = entry[k]; });
        if (op === 'edit' && entry.changes) {
          tr.dataset.originalDate = entry.date || '';
          tr.dataset.originalStartTime = entry.startTime || '';
          tr.dataset.originalGrade = entry.grade || '';
          tr.dataset.originalSubject = entry.subject || '';
          Object.keys(entry.changes).forEach(function(k) { displayEntry[k] = entry.changes[k]; });
        }
        if (op === 'delete') {
          tr.dataset.originalDate = entry.date || '';
          tr.dataset.originalStartTime = entry.startTime || '';
          tr.dataset.originalGrade = entry.grade || '';
          tr.dataset.originalSubject = entry.subject || '';
        }

        // 選択科目に固定：別科目エントリはスキップ、null科目は選択科目で補完
        if (selectedSubjectForEntry) {
          if (displayEntry.subject && displayEntry.subject !== selectedSubjectForEntry) {
            return; // 別科目 → このエントリは読み込まない
          }
          if (!displayEntry.subject) {
            displayEntry.subject = selectedSubjectForEntry;
          }
        }
        // null校舎を選択中の校舎タブで補完
        if (!displayEntry.campusCode && currentLectureCampus) {
          displayEntry.campusCode = currentLectureCampus;
        }

        var hasCampusIssue = !displayEntry.campusCode;
        var hasSubjectIssue = !displayEntry.subject;
        var hasGradeIssue = !displayEntry.grade;
        if (hasCampusIssue || hasSubjectIssue || hasGradeIssue) hasIssue = true;

        // 非管理者用：別講師名検出チェック（敬称除去＋前方一致で同一人物判定）
        if (!isAdminUser && displayEntry.teacherName) {
          var stripped_ = displayEntry.teacherName.replace(/先生|さん|くん|ちゃん|氏|様/g, '').trim();
          if (stripped_.length >= 2 && stripped_ !== myTeacherName && !myTeacherName.startsWith(stripped_)) {
            tr.dataset.ocrTeacher = displayEntry.teacherName;
            if (ocrMismatchNames.indexOf(displayEntry.teacherName) < 0) {
              ocrMismatchNames.push(displayEntry.teacherName);
            }
          }
        }

        // 操作タイプ別の背景色
        if (op === 'delete') {
          tr.style.background = '#ffebee';
        } else if (op === 'edit') {
          tr.style.background = '#fff8e1';
        } else if (hasCampusIssue) {
          tr.style.background = '#fff3f3';
        } else if (hasSubjectIssue || hasGradeIssue) {
          tr.style.background = '#fffde7';
        }

        function mkInput(type, val, field, extraStyle) {
          var el = document.createElement('input');
          el.type = type;
          el.value = val != null ? val : '';
          el.dataset.field = field;
          el.style.cssText = 'border:1px solid #ccc; border-radius:4px; font-size:12px; padding:2px 4px;' + (extraStyle || '');
          if (op === 'delete') { el.readOnly = true; el.style.opacity = '0.6'; el.style.textDecoration = 'line-through'; }
          return el;
        }
        function mkSelect(options, val, field, warn) {
          var sel = document.createElement('select');
          sel.dataset.field = field;
          sel.style.cssText = 'border:1px solid ' + (warn ? '#e57373' : '#ccc') + '; border-radius:4px; font-size:12px; padding:2px 3px; max-width:80px;';
          if (op === 'delete') { sel.disabled = true; sel.style.opacity = '0.6'; }
          options.forEach(function(o) {
            var opt = document.createElement('option');
            opt.value = o.v;
            opt.textContent = o.l;
            if (o.v === (val || '')) opt.selected = true;
            sel.appendChild(opt);
          });
          return sel;
        }
        function td(el, extraStyle) {
          var cell = document.createElement('td');
          cell.style.cssText = 'padding:4px 5px; vertical-align:middle;' + (extraStyle || '');
          if (el) cell.appendChild(el);
          return cell;
        }

        // 操作列
        var opLabels = { create: '🟢追加', edit: '🟡変更', 'delete': '🔴削除' };
        var opSpan = document.createElement('span');
        opSpan.textContent = opLabels[op] || '🟢追加';
        opSpan.style.cssText = 'font-size:11px; font-weight:600; white-space:nowrap;';
        tr.appendChild(td(opSpan));

        tr.appendChild(td(mkInput('date', displayEntry.date, 'date', 'width:110px;')));
        tr.appendChild(td(mkInput('time', displayEntry.startTime, 'startTime', 'width:72px;')));
        var durMin = displayEntry.durationMinutes;
        if (!durMin) {
          var lpForDur = lecturePeriods.find(function(p) { return p.id === currentLectureId; });
          if (lpForDur && lpForDur.gradeSettings && displayEntry.grade) {
            var gs = lpForDur.gradeSettings[displayEntry.grade];
            if (!gs) {
              var altGrade = displayEntry.grade.indexOf('新') === 0 ? displayEntry.grade.slice(1) : '新' + displayEntry.grade;
              gs = lpForDur.gradeSettings[altGrade];
            }
            durMin = gs && gs.duration ? gs.duration * 10 : 90;
          } else { durMin = 90; }
        }
        tr.appendChild(td(mkInput('number', durMin, 'durationMinutes', 'width:48px;')));

        var subjectOpts = [{v:'', l:'未設定'}].concat(subjects.map(function(s) { return {v:s, l:s}; }));
        tr.appendChild(td(mkSelect(subjectOpts, displayEntry.subject, 'subject', hasSubjectIssue)));

        var gradeOpts = [{v:'', l:'未設定'}].concat(allGrades.map(function(g) { return {v:g, l:g}; }));
        tr.appendChild(td(mkSelect(gradeOpts, displayEntry.grade, 'grade', hasGradeIssue)));

        var classOpts = [{v:'', l:'なし'}, {v:'A', l:'A'}, {v:'B', l:'B'}, {v:'C', l:'C'}];
        tr.appendChild(td(mkSelect(classOpts, displayEntry.classLabel, 'classLabel', false)));

        var campusOpts = [{v:'', l:'未設定'}].concat(lecOcrCampusCodes.map(function(code) {
          return {v: code, l: lecOcrCampusNames[code] || code};
        }));
        tr.appendChild(td(mkSelect(campusOpts, displayEntry.campusCode, 'campusCode', hasCampusIssue)));

        // 管理者用：講師ドロップダウン（OCR検出名でマッチング → ドロップダウン選択 → 自分 の優先順）
        if (isAdminUser && teacherOpts.length > 0) {
          var matched = matchOcrTeacherName_(displayEntry.teacherName);
          var teacherVal = '';
          if (matched) {
            teacherVal = matched.email;
          } else if (lecAdminTeacherEmail) {
            teacherVal = lecAdminTeacherEmail;
          }
          var tSelect = document.createElement('select');
          tSelect.dataset.field = 'teacher';
          tSelect.style.cssText = 'border:1px solid #ccc; border-radius:4px; font-size:12px; padding:2px 3px; max-width:80px;';
          if (op === 'delete') { tSelect.disabled = true; tSelect.style.opacity = '0.6'; }
          teacherOpts.forEach(function(o) {
            var optEl = document.createElement('option');
            optEl.value = o.v;
            optEl.textContent = o.l;
            optEl.setAttribute('data-name', o.name || '');
            optEl.setAttribute('data-teacherid', o.tid || '');
            if (o.v === teacherVal) optEl.selected = true;
            tSelect.appendChild(optEl);
          });
          if (displayEntry.teacherName) {
            tSelect.title = 'OCR検出: ' + displayEntry.teacherName;
          }
          tr.appendChild(td(tSelect));
        }

        var btnDel = document.createElement('button');
        btnDel.textContent = '✕';
        btnDel.style.cssText = 'background:none; border:none; color:#bbb; font-size:15px; cursor:pointer; padding:0 3px;';
        btnDel.onclick = function() { tr.remove(); };
        tr.appendChild(td(btnDel));

        tbody.appendChild(tr);
      });

      // 別講師名警告バナーの表示/非表示
      var existingWarn = document.getElementById('lec-ocr-teacher-warning');
      if (existingWarn) existingWarn.remove();
      if (!isAdminUser && ocrMismatchNames.length > 0) {
        var warnBanner = document.createElement('div');
        warnBanner.id = 'lec-ocr-teacher-warning';
        warnBanner.style.cssText = 'background:#fff3cd; border:1px solid #ffc107; border-radius:6px; padding:10px 14px; margin-bottom:10px; font-size:13px; color:#856404;';
        warnBanner.innerHTML = '⚠️ <b>別の講師名を検出しました：「' + ocrMismatchNames.join('」「') + '」</b><br>この日程は別の講師のものである可能性があります。ご自身の日程であれば、そのまま「保存」してください。';
        var tableEl = tbody.parentElement;
        if (tableEl && tableEl.parentElement) {
          tableEl.parentElement.insertBefore(warnBanner, tableEl);
        }
      }

      var warnEl = document.getElementById('lec-ocr-warn-msg');
      warnEl.textContent = hasIssue ? '⚠ 赤・黄色の行は未設定の項目があります。保存前に確認してください。' : '';

      // クラス列：全行が未設定なら非表示
      var hasClassLabel = entries.some(function(e) { return e.classLabel; });
      var classTh = document.getElementById('lec-ocr-th-class');
      if (classTh) classTh.style.display = hasClassLabel ? '' : 'none';
      tbody.querySelectorAll('[data-field="classLabel"]').forEach(function(sel) {
        sel.closest('td').style.display = hasClassLabel ? '' : 'none';
      });

      document.getElementById('lec-ocr-result-area').style.display = 'block';
      fitToScreen();
    }

    // 既存エントリから date+grade+subject(+startTime) で照合するヘルパー
    function findOcrEntryIdx_(entries, date, grade, subject, startTime) {
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        if (e.date === date && e.grade === grade && e.subject === subject && e.startTime === startTime) {
          return i;
        }
      }
      if (!startTime) {
        for (var j = 0; j < entries.length; j++) {
          if (entries[j].date === date && entries[j].grade === grade && entries[j].subject === subject) {
            return j;
          }
        }
      }
      return -1;
    }

    function saveLecOcrEntries() {
      var tbody = document.getElementById('lec-ocr-result-body');
      var rows = tbody.querySelectorAll('tr');
      if (rows.length === 0) { showToast('保存するエントリがありません', 'warning'); return; }
      showAppConfirm_(rows.length + '件を保存します。\nよろしいですか？', '保存する', '#43a047', saveLecOcrEntriesConfirmed_);
    }

    function saveLecOcrEntriesConfirmed_() {
      var tbody = document.getElementById('lec-ocr-result-body');
      var rows = tbody.querySelectorAll('tr');

      // 別講師名の確認ダイアログ（非管理者のみ）
      if (!isAdminUser) {
        var mismatchTeachers = [];
        rows.forEach(function(tr) {
          var ocrName = tr.dataset.ocrTeacher;
          if (ocrName && mismatchTeachers.indexOf(ocrName) < 0) mismatchTeachers.push(ocrName);
        });
        if (mismatchTeachers.length > 0) {
          var confirmed = window.confirm('「' + mismatchTeachers.join('」「') + '」という別の講師名が含まれています。\nこの日程をご自身（' + (myTeacherName || 'あなた') + '）の日程として保存しますか？');
          if (!confirmed) return;
        }
      }

      // 操作タイプ別に校舎ごとにグループ化
      var opsByCampus = {};
      lecOcrHasNullCampus = false;

      rows.forEach(function(tr) {
        var op         = tr.dataset.op || 'create';
        var date       = tr.querySelector('[data-field="date"]').value;
        var startTime  = tr.querySelector('[data-field="startTime"]').value;
        var durationM  = parseInt(tr.querySelector('[data-field="durationMinutes"]').value, 10) || 90;
        var subject    = tr.querySelector('[data-field="subject"]').value;
        var grade      = tr.querySelector('[data-field="grade"]').value;
        var classLabel = tr.querySelector('[data-field="classLabel"]').value || null;
        var campusCode = tr.querySelector('[data-field="campusCode"]').value;
        if (!campusCode) { lecOcrHasNullCampus = true; return; }
        if (!opsByCampus[campusCode]) opsByCampus[campusCode] = { creates: [], edits: [], deletes: [] };

        // 行ごとの講師情報を取得（管理者用ドロップダウン → 全体ドロップダウン → 自分）
        var rowTeacherName  = myTeacherName  || '';
        var rowTeacherEmail = myTeacherEmail || '';
        var rowTeacherId    = myTeacherId    || '';
        var teacherSelect   = tr.querySelector('[data-field="teacher"]');
        if (teacherSelect && teacherSelect.value) {
          var tOpt = teacherSelect.options[teacherSelect.selectedIndex];
          if (tOpt) {
            rowTeacherEmail = teacherSelect.value;
            rowTeacherName  = tOpt.getAttribute('data-name') || tOpt.textContent || teacherSelect.value;
            rowTeacherId    = tOpt.getAttribute('data-teacherid') || '';
          }
        } else if (isAdminUser && lecAdminTeacherName) {
          rowTeacherName  = lecAdminTeacherName;
          rowTeacherEmail = lecAdminTeacherEmail;
          rowTeacherId    = lecAdminTeacherId;
        }

        if (op === 'create') {
          if (!date || !startTime) return;
          opsByCampus[campusCode].creates.push({
            id:            'ent_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
            date:          date,
            startTime:     startTime,
            durationSlots: Math.max(1, Math.round(durationM / 10)),
            subject:       subject || '',
            grade:         grade || '',
            classLabel:    classLabel,
            teacherName:   rowTeacherName,
            teacherEmail:  rowTeacherEmail,
            teacherId:     rowTeacherId
          });
        } else if (op === 'edit') {
          opsByCampus[campusCode].edits.push({
            originalDate:      tr.dataset.originalDate || '',
            originalStartTime: tr.dataset.originalStartTime || '',
            originalGrade:     tr.dataset.originalGrade || '',
            originalSubject:   tr.dataset.originalSubject || '',
            newValues: {
              date: date, startTime: startTime,
              durationSlots: Math.max(1, Math.round(durationM / 10)),
              subject: subject || '', grade: grade || '', classLabel: classLabel
            }
          });
        } else if (op === 'delete') {
          opsByCampus[campusCode].deletes.push({
            originalDate:      tr.dataset.originalDate || '',
            originalStartTime: tr.dataset.originalStartTime || '',
            originalGrade:     tr.dataset.originalGrade || '',
            originalSubject:   tr.dataset.originalSubject || ''
          });
        }
      });

      var campusKeys = Object.keys(opsByCampus);
      if (campusKeys.length === 0) {
        showToast(lecOcrHasNullCampus ? '校舎を選択してください' : '保存するエントリがありません', 'warning');
        return;
      }

      var saveBtn = document.getElementById('lec-ocr-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      // 各校舎の既存エントリを取得してから操作を適用
      var pending = campusKeys.length;
      var mergedByCampus = {};
      var ocrSkipped = 0;

      campusKeys.forEach(function(code) {
        var ops = opsByCampus[code];
        var cached = lectureEntries[code];
        if (cached !== undefined) {
          mergedByCampus[code] = applyOcrOps_(cached.slice(), ops);
          pending--;
          if (pending === 0) doOcrSave_();
        } else {
          (function(campusCode, campusOps) {
            google.script.run
              .withSuccessHandler(function(res) {
                var existEnts = (res && res.entries) ? res.entries.map(function(e) {
                  return { id: e.entryId || '', date: e.date || '', startTime: e.startTime || '',
                           durationSlots: Number(e.durationSlots) || 9, subject: e.subject || '',
                           grade: e.grade || '', teacherName: e.teacherName || '',
                           teacherEmail: e.teacherEmail || '', classLabel: e.classLabel || null,
                           teacherId: e.teacherId || '' };
                }) : [];
                mergedByCampus[campusCode] = applyOcrOps_(existEnts, campusOps);
                pending--;
                if (pending === 0) doOcrSave_();
              })
              .withFailureHandler(function() {
                mergedByCampus[campusCode] = applyOcrOps_([], campusOps);
                pending--;
                if (pending === 0) doOcrSave_();
              })
              .getLectureScheduleEntries(currentLectureId, campusCode);
          })(code, ops);
        }
      });

      // 既存エントリ配列に操作を適用する
      function applyOcrOps_(existing, ops) {
        // 1. 削除
        ops.deletes.forEach(function(del) {
          var idx = findOcrEntryIdx_(existing, del.originalDate, del.originalGrade, del.originalSubject, del.originalStartTime);
          if (idx !== -1) {
            existing.splice(idx, 1);
          } else {
            ocrSkipped++;
          }
        });
        // 2. 編集
        ops.edits.forEach(function(edit) {
          var idx = findOcrEntryIdx_(existing, edit.originalDate, edit.originalGrade, edit.originalSubject, edit.originalStartTime);
          if (idx !== -1) {
            var nv = edit.newValues;
            if (nv.date) existing[idx].date = nv.date;
            if (nv.startTime) existing[idx].startTime = nv.startTime;
            if (nv.durationSlots) existing[idx].durationSlots = nv.durationSlots;
            if (nv.subject) existing[idx].subject = nv.subject;
            if (nv.grade) existing[idx].grade = nv.grade;
            if (nv.classLabel !== undefined) existing[idx].classLabel = nv.classLabel;
          } else {
            ocrSkipped++;
          }
        });
        // 3. 追加
        ops.creates.forEach(function(newEnt) {
          existing.push(newEnt);
        });
        return existing;
      }

      function doOcrSave_() {
        var keys = Object.keys(mergedByCampus);
        var completed = 0;
        var failed = 0;
        keys.forEach(function(campusCode) {
          google.script.run
            .withSuccessHandler(function(result) {
              completed++;
              if (!result || !result.success) failed++;
              if (completed === keys.length) {
                saveBtn.disabled = false;
                saveBtn.textContent = 'このまま保存';
                if (failed > 0) {
                  showToast('一部の保存に失敗しました', 'error');
                } else {
                  var msg = (lecOcrHasNullCampus ? '校舎未設定の行はスキップして、' : '') +
                    keys.length + '校舎分を保存しました';
                  if (ocrSkipped > 0) msg += '（' + ocrSkipped + '件の変更・削除対象が見つかりませんでした）';
                  showToast(msg, 'success');
                  keys.forEach(function(cc) { lectureEntries[cc] = mergedByCampus[cc]; });
                  renderLecEntries(currentLectureCampus);
                  closeLecOcrModalDirect_();
                }
              }
            })
            .withFailureHandler(function(err) {
              completed++;
              failed++;
              if (completed === keys.length) {
                saveBtn.disabled = false;
                saveBtn.textContent = 'このまま保存';
                showToast('保存エラー: ' + (err.message || err), 'error');
              }
            })
            .saveLectureScheduleEntries(currentLectureId, campusCode, JSON.stringify(mergedByCampus[campusCode]));
        });
      }
    }

      var targetTeacherId = (isAdminUser && lecAdminTeacherId) ? lecAdminTeacherId : myTeacherId;

    /**
     * 一覧表示用HTMLを生成する
     * @param {Array} entries 対象講師のエントリ配列（全校舎分）
     * @param {string} teacherName 講師名
     * @return {string} HTML文字列
     */
    function buildLecListViewHTML_(entries, teacherName) {
      var lectureId = currentLectureId;
      var period = (lecturePeriods || []).find(function(lp) { return lp.id === lectureId; });
      var fy = parseInt((lectureId || '').split('-')[0], 10);
      var lecName = period ? period.name : lectureId;

      // 学年グループ定義（名前ベースでマッチ）
      var GRADE_GROUPS = [
        { label: '小学生', names: ['小'] },
        { label: '中１', names: ['中1', '新中1'] },
        { label: '中２', names: ['中2', '新中2'] },
        { label: '中３', names: ['中3', '新中3'] },
        { label: '高１', names: ['高1', '新高1'] },
        { label: '高２', names: ['高2', '新高2'] },
        { label: '高３', names: ['高3', '新高3'] }
      ];

      // ヘルパー: 終了時刻計算
      function endTimeLV_(start, slots) {
        var parts = (start || '00:00').split(':');
        var h = parseInt(parts[0], 10) || 0;
        var m = parseInt(parts[1], 10) || 0;
        var totalMin = h * 60 + m + (slots || 0) * 10;
        var eh = Math.floor(totalMin / 60);
        var em = totalMin % 60;
        return ('0' + eh).slice(-2) + ':' + ('0' + em).slice(-2);
      }

      // ヘルパー: 日付フォーマット（"7/15(火)・22(火)・8/1(金)" 形式）
      function fmtDatesLV_(sortedDates) {
        var DOW = ['日', '月', '火', '水', '木', '金', '土'];
        var prevMonth = -1;
        return sortedDates.map(function(d) {
          var dt = new Date(d + 'T00:00:00');
          var mo = dt.getMonth() + 1;
          var day = dt.getDate();
          var dow = DOW[dt.getDay()];
          var str = (mo !== prevMonth ? mo + '/' : '') + day + '(' + dow + ')';
          prevMonth = mo;
          return str;
        }).join('・');
      }

      // ヘルパー: HTMLエスケープ
      function escLV_(str) {
        var d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      // エントリを校舎ごとにグルーピング
      var campusBuckets = {};
      entries.forEach(function(e) {
        var cc = e.campusCode || '??';
        if (!campusBuckets[cc]) campusBuckets[cc] = [];
        campusBuckets[cc].push(e);
      });
      var campusCodes = Object.keys(campusBuckets).sort();

      // 全教科リスト（出現順を統一）
      var ALL_SUBJECTS = ['英語', '数学', '算数', '国語', '理科', '社会', '物理', '化学'];

      // スタイル定義
      var cellBase = 'border:1px solid #999;padding:5px 8px;font-size:13px;vertical-align:middle;';
      var cellSubject = cellBase + 'width:60px;text-align:center;font-weight:bold;white-space:nowrap;';
      var cellDate = cellBase + 'word-break:break-word;';
      var cellTime = cellBase + 'width:110px;text-align:center;white-space:nowrap;';

      var html = '';

      // タイトル
      html += '<div style="margin-bottom:16px;">';
      html += '<div style="font-size:17px;font-weight:700;color:#333;">' + escLV_(fy + '年度 ' + lecName) + '</div>';
      html += '<div style="font-size:14px;color:#666;margin-top:4px;">講師: ' + escLV_(teacherName) + '</div>';
      html += '</div>';

      // 校舎ループ
      campusCodes.forEach(function(cc) {
        var campusName = (campusData && campusData[cc]) ? campusData[cc] : cc;
        var campusEntries = campusBuckets[cc];

        html += '<div style="margin-bottom:20px;">';
        html += '<div style="font-size:15px;font-weight:700;color:#333;margin-bottom:8px;padding:6px 10px;background:#f5f5f5;border-radius:6px;">■ ' + escLV_(campusName) + '</div>';

        // 学年グループループ
        GRADE_GROUPS.forEach(function(gg) {
          var gradeEntries = campusEntries.filter(function(e) {
            return gg.names.indexOf(e.grade || '') !== -1;
          });
          if (gradeEntries.length === 0) return;

          html += '<table style="width:100%;border-collapse:collapse;border:1px solid #999;margin-bottom:10px;">';

          // 学年ヘッダー
          html += '<thead>';
          html += '<tr><th colspan="3" style="border:1px solid #999;padding:5px 10px;font-size:14px;font-weight:bold;text-align:left;background:#fafafa;">';
          html += escLV_(gg.label);
          html += '</th></tr>';
          html += '<tr style="border-bottom:1px solid #999;">';
          html += '<th style="' + cellSubject + 'border-bottom:1px solid #999;">教科</th>';
          html += '<th style="' + cellDate + 'border-bottom:1px solid #999;text-align:center;font-weight:bold;">日付</th>';
          html += '<th style="' + cellTime + 'border-bottom:1px solid #999;font-weight:bold;">時間</th>';
          html += '</tr></thead><tbody>';

          // 教科ループ（定義順）
          ALL_SUBJECTS.forEach(function(subject) {
            var subEntries = gradeEntries.filter(function(e) { return (e.subject || '') === subject; });
            if (subEntries.length === 0) return;

            // classLabel ごとにも分ける
            var classLabels = [];
            var classMap = {};
            subEntries.forEach(function(e) {
              var cl = e.classLabel || '';
              if (!classMap[cl]) { classMap[cl] = []; classLabels.push(cl); }
              classMap[cl].push(e);
            });
            classLabels.sort();

            classLabels.forEach(function(cl) {
              var clEntries = classMap[cl];
              var subjectLabel = subject + (cl ? ' (' + cl + ')' : '');

              // (startTime, durationSlots) でグループ化
              var timeGroupMap = {};
              var timeGroupOrder = [];
              clEntries.forEach(function(e) {
                var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
                if (!timeGroupMap[key]) {
                  timeGroupMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] };
                  timeGroupOrder.push(key);
                }
                if (timeGroupMap[key].dates.indexOf(e.date) === -1) {
                  timeGroupMap[key].dates.push(e.date);
                }
              });
              timeGroupOrder.forEach(function(key) {
                timeGroupMap[key].dates.sort();
              });

              var groups = timeGroupOrder.map(function(k) { return timeGroupMap[k]; });
              var rowCount = groups.length;

              groups.forEach(function(grp, idx) {
                var timeStr = (grp.startTime || '') + '～' + endTimeLV_(grp.startTime, grp.durationSlots);
                var dateStr = fmtDatesLV_(grp.dates);
                html += '<tr>';
                if (idx === 0) {
                  html += '<td rowspan="' + rowCount + '" style="' + cellSubject + '">' + escLV_(subjectLabel) + '</td>';
                }
                html += '<td style="' + cellDate + '">' + escLV_(dateStr) + '</td>';
                html += '<td style="' + cellTime + '">' + escLV_(timeStr) + '</td>';
                html += '</tr>';
              });
            });
          });

          // 定義外の教科もフォールバック表示
          var knownSubjects = {};
          ALL_SUBJECTS.forEach(function(s) { knownSubjects[s] = true; });
          var otherEntries = gradeEntries.filter(function(e) { return !knownSubjects[e.subject || '']; });
          if (otherEntries.length > 0) {
            var otherSubjects = [];
            var otherSubMap = {};
            otherEntries.forEach(function(e) {
              var s = e.subject || '(不明)';
              if (!otherSubMap[s]) { otherSubMap[s] = []; otherSubjects.push(s); }
              otherSubMap[s].push(e);
            });
            otherSubjects.forEach(function(subject) {
              var subEs = otherSubMap[subject];
              var timeGroupMap = {};
              var timeGroupOrder = [];
              subEs.forEach(function(e) {
                var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
                if (!timeGroupMap[key]) {
                  timeGroupMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] };
                  timeGroupOrder.push(key);
                }
                if (timeGroupMap[key].dates.indexOf(e.date) === -1) timeGroupMap[key].dates.push(e.date);
              });
              timeGroupOrder.forEach(function(k) { timeGroupMap[k].dates.sort(); });
              var groups = timeGroupOrder.map(function(k) { return timeGroupMap[k]; });
              var rowCount = groups.length;
              groups.forEach(function(grp, idx) {
                var timeStr = (grp.startTime || '') + '～' + endTimeLV_(grp.startTime, grp.durationSlots);
                html += '<tr>';
                if (idx === 0) html += '<td rowspan="' + rowCount + '" style="' + cellSubject + '">' + escLV_(subject) + '</td>';
                html += '<td style="' + cellDate + '">' + escLV_(fmtDatesLV_(grp.dates)) + '</td>';
                html += '<td style="' + cellTime + '">' + escLV_(timeStr) + '</td>';
                html += '</tr>';
              });
            });
          }

          html += '</tbody></table>';
        });

        // 学年グループに属さないエントリのフォールバック
        var allGroupedNames = [];
        GRADE_GROUPS.forEach(function(gg) { allGroupedNames = allGroupedNames.concat(gg.names); });
        var ungrouped = campusEntries.filter(function(e) { return allGroupedNames.indexOf(e.grade || '') === -1; });
        if (ungrouped.length > 0) {
          var ugGrades = [];
          var ugMap = {};
          ungrouped.forEach(function(e) {
            var g = e.grade || '(不明)';
            if (!ugMap[g]) { ugMap[g] = []; ugGrades.push(g); }
            ugMap[g].push(e);
          });
          ugGrades.forEach(function(g) {
            html += '<table style="width:100%;border-collapse:collapse;border:1px solid #999;margin-bottom:10px;">';
            html += '<thead><tr><th colspan="3" style="border:1px solid #999;padding:5px 10px;font-size:14px;font-weight:bold;text-align:left;background:#fafafa;">' + escLV_(g) + '</th></tr>';
            html += '<tr style="border-bottom:1px solid #999;">';
            html += '<th style="' + cellSubject + '">教科</th><th style="' + cellDate + 'text-align:center;font-weight:bold;">日付</th><th style="' + cellTime + 'font-weight:bold;">時間</th>';
            html += '</tr></thead><tbody>';
            var subMap2 = {};
            var subOrder2 = [];
            ugMap[g].forEach(function(e) {
              var s = e.subject || '(不明)';
              if (!subMap2[s]) { subMap2[s] = []; subOrder2.push(s); }
              subMap2[s].push(e);
            });
            subOrder2.forEach(function(subject) {
              var ses = subMap2[subject];
              var tgMap = {};
              var tgOrder = [];
              ses.forEach(function(e) {
                var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
                if (!tgMap[key]) { tgMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] }; tgOrder.push(key); }
                if (tgMap[key].dates.indexOf(e.date) === -1) tgMap[key].dates.push(e.date);
              });
              tgOrder.forEach(function(k) { tgMap[k].dates.sort(); });
              var groups = tgOrder.map(function(k) { return tgMap[k]; });
              groups.forEach(function(grp, idx) {
                html += '<tr>';
                if (idx === 0) html += '<td rowspan="' + groups.length + '" style="' + cellSubject + '">' + escLV_(subject) + '</td>';
                html += '<td style="' + cellDate + '">' + escLV_(fmtDatesLV_(grp.dates)) + '</td>';
                html += '<td style="' + cellTime + '">' + escLV_((grp.startTime || '') + '～' + endTimeLV_(grp.startTime, grp.durationSlots)) + '</td>';
                html += '</tr>';
              });
            });
            html += '</tbody></table>';
          });
        }

        html += '</div>'; // campus section end
      });

      return html;
    }

    /**
     * AIアシスタントから呼ばれるカレンダーエクスポート
     * Firestoreから直接全校舎のエントリを取得してICSダウンロード＋Googleカレンダーインポート画面を開く
     * @param {string} lectureId 講習ID
     */
    function exportLecCalendarFromAI_(lectureId) {
      if (!lectureId) {
        showToast('講習が指定されていません', 'error');
        return;
      }
      var targetTeacherId = myTeacherId;
      var targetTeacherName = myTeacherName || '';

      fbGetAllLectureEntries(lectureId)
        .then(function(allEntries) {
          var myEntries = allEntries.filter(function(e) {
            return e.teacherId === targetTeacherId;
          });
          if (myEntries.length === 0) {
            showToast('エクスポートするコマがありません', 'error');
            return;
          }
          var lectureName = '';
          var lp = (lecturePeriods || []).find(function(p) { return p.id === lectureId; });
          if (lp) lectureName = lp.name;

          var icsContent = generateLecICS(myEntries, lectureName, targetTeacherName);
          var filename = (lectureName || lectureId) + '_' + targetTeacherName + '.ics';
          downloadFile(icsContent, filename, 'text/calendar;charset=utf-8');
          showToast(myEntries.length + '件のコマをカレンダーにエクスポートしました', 'success');

          setTimeout(function() {
            window.open('https://calendar.google.com/calendar/u/0/r/settings/export', '_blank');
          }, 500);
        })
        .catch(function(err) {
          console.error('AIカレンダーエクスポートエラー:', err);
          showToast('カレンダーエクスポートに失敗しました', 'error');
        });
    }

</script>
