<script>
    // ========================================
    // 【配布物サブタブ】
    // ========================================
    // 講習管理 > 配布物タブ：年度・講習・校舎を選択して保護者向け講習案内PDFを生成する

    var matLecPricingData = null;  // 講習別料金データのキャッシュ（typeId → {rows:[{type,gradeKey,duration,count,internal,external}]}）
    var matEntriesCache = {};  // プレビュー用エントリキャッシュ: "lectureId_campusCode" → entries[]
    var matGreetingsData_ = null;  // 講習別学年挨拶文キャッシュ { typeId: { gradeKey: "挨拶文" } }
    var matActiveGradeKey_ = null; // 現在選択中のタブID（'chu1' / 'ko1:4set' / 'ko1:per' 等）

    // 中3限定講習タイプ（基礎学力テスト・入試直前）
    var MAT_CHU3_ONLY_TYPES_ = ['kiso1', 'kiso2', 'nyushi'];

    // 高校生ページを生成する講習タイプ（春期・夏期・冬期のみ）
    var MAT_HS_SEASON_TYPES_ = ['spring', 'summer', 'winter'];

    // 中3追加行（多教科セット）を配布物に表示する講習タイプ（ホワイトリスト）
    // 将来の講習追加時に誤って表示されないよう、対象を明示的に列挙する
    var MAT_CHU3_MULTI_TYPES_ = ['summer', 'winter', 'nyushi'];

    // 高校生料金ページ選択（チェックボックスと連動）
    var matHsShow4Set_ = true;      // 4回セットページを含める
    var matHsShowPerCount_ = true;  // 回数別料金ページを含める

    // 学年グループ定義（PDFページ単位・申込欄の isHigh で高校生フォームに切替）
    // codes: 実データに存在しうる学年値をすべて列挙（手動UIのラベル + 春期「新」接頭 + AIの2桁コード）
    var MAT_GRADE_GROUPS_ = [
      { key: 'sho',  label: '小学生', codes: ['小','07','08','09','10','11','12'], isHigh: false },
      { key: 'chu1', label: '中1',    codes: ['中1','新中1','13'], isHigh: false },
      { key: 'chu2', label: '中2',    codes: ['中2','新中2','14'], isHigh: false },
      { key: 'chu3', label: '中3',    codes: ['中3','新中3','15'], isHigh: false },
      { key: 'ko1',  label: '高1',    codes: ['高1','新高1','16'], isHigh: true  },
      { key: 'ko2',  label: '高2',    codes: ['高2','新高2','17'], isHigh: true  },
      { key: 'ko3',  label: '高3',    codes: ['高3','新高3','18'], isHigh: true  }
    ];

    // 日程表での科目表示順
    var MAT_SUBJECT_ORDER_ = ['英語', '数学', '国語', '理科', '社会'];

    // 学年別デフォルト挨拶文（夏期講習用。ユーザーがtextareaで上書き可能）
    var MAT_DEFAULT_GREETINGS_ = {
      sho:  'スクエアの教育活動にご理解，ご配慮を賜りまして御礼申し上げます。\n　さて，今年も下記の日程で夏期講習を実施いたします。小学生において基本的・基礎的な内容の定着を怠ると，学習内容が難しくなるにつれて，応用問題だけでなく基本問題さえ解けないという状態になってしまう場合があります。学習内容をその都度習得するために，是非とも受講をご検討下さいますようお願い申し上げます。',
      chu1: 'スクエアの教育活動にご理解，ご配慮を賜りまして御礼申し上げます。\n　さて，1学期も終わり，中学校生活にも慣れてきたことと存じます。中学内容の基礎を学ぶ1年生において，テストの点数で何点取っているから安心というラインはありません。最初のつまずきをなくすために，また学校では触れることのない応用問題に取り組むためにも，夏期講習の受講を是非ともご検討下さいますようお願い申し上げます。',
      chu2: 'スクエアの教育活動にご理解，ご配慮を賜りまして御礼申し上げます。\n　さて，1学期も終わり，テストの結果はいかがだったでしょうか。学習内容をその都度復習し定着させることが必要であり，また学校では触れることのない応用問題に取り組むことが重要です。1学期の学習内容の定着を図るために，夏期講習の受講を是非ともご検討下さいますようお願い申し上げます。',
      chu3: 'スクエアの教育活動にご理解，ご配慮を賜りまして御礼申し上げます。\n　さて，10月には，志望校を決定する際に最重視される第一回目の基礎学力テストが行われます。スクエアの夏期講習では，各教科の講師陣が出題傾向を分析し，基本問題から応用問題までポイントをおさえたテキストを独自に作成致しました。基礎学力テスト及び高校受験対策として，夏期講習の受講を是非ともご検討下さいますようお願い申し上げます。',
      ko1:  'スクエアの教育活動にご理解，ご配慮を賜りまして御礼申し上げます。\n　さて，1学期も終わり，高校生活にも慣れてきたことと存じます。しかし中学校の時と違い，高校の勉強は格段に難しくなっています。早いうちに最初のつまづきをなくすために，夏期特別時間割を組ませていただきました。受講をご検討下さいますようお願い申し上げます。',
      ko2:  'スクエアの教育活動にご理解，ご配慮を賜りまして御礼申し上げます。\n　さて，1学期も終わり，高校生活も半分近く過ぎました。来年度にはいよいよ大学受験です。今までに学んだことを復習するために，夏期特別時間割を組ませていただきました。受講をご検討下さいますようお願い申し上げます。',
      ko3:  'スクエアの教育活動にご理解，ご配慮を賜りまして御礼申し上げます。\n　さて，1学期も終わり，高校生活も残り半年余りとなりました。2学期に入ると，志望校別に受験が始まります。受験へのラストスパートをかけるために，夏期講習の受講を是非ともご検討下さいますようお願い申し上げます。'
    };

    /**
     * 配布物サブタブを初期化する
     * switchLectureSubTab から呼ばれる。lecturePeriods は initLecturesTab() 済みで利用可能。
     */
    function initLecturesMaterials() {
      // 校舎セレクト: campusData が利用可能なら即時、そうでなければフェッチ
      if (campusData && Object.keys(campusData).length > 0) {
        buildMatCampusSelect();
        updateMatPreview();
      } else {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.campuses) {
              result.campuses.forEach(function(c) { campusData[c.code] = c.name; });
            }
            buildMatCampusSelect();
            updateMatPreview();
          })
          .withFailureHandler(function(err) { console.error('配布物 校舎取得失敗:', err); })
          .getGradesConfigForWeb();
      }

      // 講習別挨拶文データのキャッシュ（1回のみフェッチ）
      if (!matGreetingsData_) {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success && result.data) {
              matGreetingsData_ = result.data;
            } else {
              matGreetingsData_ = {};
            }
            updateMatPreview();
          })
          .withFailureHandler(function(err) {
            console.error('配布物 挨拶文取得失敗:', err);
            matGreetingsData_ = {};
          })
          .getLectureGreetings();
      }

      // 講習別料金データのキャッシュ（1回のみフェッチ。ロード後にプレビュー再描画）
      if (!matLecPricingData) {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success && result.data) {
              matLecPricingData = result.data;
              updateMatPreview();
            }
          })
          .withFailureHandler(function(err) { console.error('配布物 講習別料金取得失敗:', err); })
          .getLecturePricingConfig();
      }

      // 保存済みファイル一覧を初期化
      loadDistributionFilesList();

      // リサイズリスナー（1回のみ登録）
      if (!window._matResizeListenerAdded) {
        window.addEventListener('resize', resizeMatPreview);
        window._matResizeListenerAdded = true;
      }

      // 最初のタブを選択状態にする
      switchMatSubTab('mat-tab-entry', null);
    }


    /**
     * 校舎セレクトを buildCampusOptions を使って構築する（配属校舎が先頭）
     */
    function buildMatCampusSelect() {
      var campuses = Object.keys(campusData || {}).map(function(code) {
        return { code: code, name: campusData[code] };
      });
      var html = buildCampusOptions(campuses, '校舎');
      document.getElementById('mat-campus-select').innerHTML = html;
    }

    /**
     * 校舎変更時：スケジュールエントリを取得（キャッシュ優先）してプレビューとファイル一覧を更新する
     */
    function updateMatPreviewOnCampusChange() {
      var lectureId = currentLectureId;
      var campusCode = document.getElementById('mat-campus-select').value;

      // ファイル一覧を更新（校舎変更のたびに再取得）
      loadDistributionFilesList();

      if (!lectureId || !campusCode) {
        updateMatPreview();
        return;
      }

      var cacheKey = lectureId + '_' + campusCode;
      if (matEntriesCache[cacheKey]) {
        updateMatPreview();
        return;
      }

      // キャッシュなし → バックエンドから取得
      var inner = document.getElementById('mat-preview-inner');
      if (inner) {
        inner.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#bbb;font-size:14px;">⏳ 日程データを読み込み中...</div>';
        resizeMatPreview();
      }

      fbGetLectureScheduleEntries(lectureId, campusCode)
        .then(function(entries) {
          matEntriesCache[cacheKey] = entries || [];
          updateMatPreview();
        })
        .catch(function(err) {
          console.error('配布物プレビュー エントリ取得失敗:', err);
          updateMatPreview();
        });
    }

    /**
     * 学年グループ別のページ定義配列を生成する（updateMatPreview・generateMaterialsPDF で共用）
     * @param {Array} entries 講習エントリ
     * @param {string} campusName 校舎名
     * @param {string} campusCode 校舎コード
     * @param {string} lecName 講習名
     * @param {Object|null} typeData 講習別料金データ
     * @param {boolean} isSpring 春期講習か
     * @param {string} typeId 講習タイプID
     * @return {Array} gradePages 配列（tabId / tabLabel / pricingType 等を含む）
     */
    function buildGradePages_(entries, campusName, campusCode, lecName, typeData, isSpring, typeId) {
      var isChu3Only = MAT_CHU3_ONLY_TYPES_.indexOf(typeId) !== -1;
      var isHsSeason = MAT_HS_SEASON_TYPES_.indexOf(typeId) !== -1;
      var targetGroups = isChu3Only
        ? MAT_GRADE_GROUPS_.filter(function(g) { return g.key === 'chu3'; })
        : MAT_GRADE_GROUPS_;

      var pages = [];
      targetGroups.forEach(function(grp) {
        var grpEntries = (entries || []).filter(function(e) {
          var gc = String(e.grade || '').trim();
          if (/^\d+$/.test(gc) && gc.length < 2) gc = gc.padStart(2, '0');
          return grp.codes.indexOf(gc) !== -1;
        });
        if (grpEntries.length === 0) return;

        var base = { gradeGroup: grp, entries: grpEntries, campusName: campusName, campusCode: campusCode, lecName: lecName, typeData: typeData, isSpring: isSpring, typeId: typeId };

        if (grp.isHigh && isHsSeason) {
          // 高校生・HS season → 4回セット / 回数別 を別ページとして生成
          if (matHsShow4Set_) {
            pages.push(Object.assign({}, base, { tabId: grp.key + ':4set', tabLabel: grp.label + ' 4回セット', pricingType: '4set' }));
          }
          if (matHsShowPerCount_) {
            pages.push(Object.assign({}, base, { tabId: grp.key + ':per', tabLabel: grp.label + ' 回数別', pricingType: 'per' }));
          }
        } else if (!grp.isHigh) {
          // 中学生・小学生（高校生以外は常に含める）
          pages.push(Object.assign({}, base, { tabId: grp.key, tabLabel: grp.label, pricingType: null }));
        }
        // 高校生 かつ HS season でない場合はページを生成しない
      });
      return pages;
    }

    /**
     * 配布物プレビューを更新する（学年タブ描画 + アクティブ学年の1ページ表示）
     */
    function updateMatPreview() {
      var inner = document.getElementById('mat-preview-inner');
      var tabNav = document.getElementById('mat-grade-tab-nav');
      if (!inner) return;

      var lectureId = currentLectureId;
      if (!lectureId) {
        inner.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#bbb;font-size:14px;">講習を選択するとプレビューが表示されます</div>';
        if (tabNav) tabNav.innerHTML = '';
        var hsOpts = document.getElementById('mat-hs-pricing-opts');
        if (hsOpts) hsOpts.style.display = 'none';
        resizeMatPreview();
        return;
      }

      var campusCode = document.getElementById('mat-campus-select') ? document.getElementById('mat-campus-select').value : '';
      var period = (lecturePeriods || []).find(function(lp) { return lp.id === lectureId; });
      var campusName = (campusData && campusCode && campusData[campusCode])
        ? campusData[campusCode] : (campusCode || '（校舎未選択）');
      var lecName = period ? period.name : lectureId;
      var cacheKey = lectureId + '_' + campusCode;
      var entries = (campusCode && matEntriesCache[cacheKey]) ? matEntriesCache[cacheKey] : [];
      var typeId = (lectureId || '').replace(/^\d{4}-/, '');
      var typeData = (matLecPricingData && matLecPricingData[typeId]) ? matLecPricingData[typeId] : null;
      var isSpring = lecName.indexOf('春') !== -1;

      // 高校生料金チェックボックスの表示切り替え
      var hsOpts = document.getElementById('mat-hs-pricing-opts');
      if (hsOpts) hsOpts.style.display = MAT_HS_SEASON_TYPES_.indexOf(typeId) !== -1 ? 'block' : 'none';

      // gradePages を構築
      var gradePages = buildGradePages_(entries, campusName, campusCode, lecName, typeData, isSpring, typeId);

      // タブを描画（アクティブIDが存在しない場合は最初のタブにリセット）
      var activeExists = gradePages.some(function(p) { return p.tabId === matActiveGradeKey_; });
      if (!activeExists && gradePages.length > 0) matActiveGradeKey_ = gradePages[0].tabId;
      renderMatGradeTabs_(gradePages);

      if (gradePages.length === 0) {
        inner.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#bbb;font-size:14px;">（選択した校舎にデータがありません）</div>';
        resizeMatPreview();
        return;
      }

      // アクティブタブの1ページ分を描画
      var activePage = gradePages.find(function(p) { return p.tabId === matActiveGradeKey_; });
      var greeting = getMatGreeting_(activePage.gradeGroup.key);
      inner.innerHTML = buildMatOnePage_(activePage.gradeGroup, activePage.entries, activePage.campusName, activePage.campusCode, activePage.lecName, greeting, activePage.typeData, activePage.isSpring, activePage.pricingType, activePage.typeId);
      applySchedulesInContainer_(inner);
      resizeMatPreview();
    }

    /**
     * 学年タブバーを描画する
     * @param {Array} gradePages buildGradePages_ の返値
     */
    function renderMatGradeTabs_(gradePages) {
      var tabNav = document.getElementById('mat-grade-tab-nav');
      if (!tabNav) return;
      if (gradePages.length === 0) { tabNav.innerHTML = ''; return; }
      var html = '';
      gradePages.forEach(function(p) {
        var isActive = p.tabId === matActiveGradeKey_;
        var style = 'background:none;border:none;padding:6px 12px;font-size:13px;cursor:pointer;'
          + (isActive
            ? 'color:#667eea;font-weight:600;border-bottom:2px solid #667eea;'
            : 'color:#999;font-weight:normal;border-bottom:2px solid transparent;');
        html += '<button onclick="switchMatGradeTab_(\'' + escapeHtmlMat_(p.tabId) + '\')" style="' + style + '">'
              + escapeHtmlMat_(p.tabLabel) + '</button>';
      });
      tabNav.innerHTML = html;
    }

    /**
     * 学年タブを切り替える
     * @param {string} tabId ページの tabId（'chu1' / 'ko1:4set' / 'ko1:per' 等）
     */
    function switchMatGradeTab_(tabId) {
      matActiveGradeKey_ = tabId;
      updateMatPreview();
    }

    /**
     * 高校生料金チェックボックス変更時の処理
     */
    function onMatHsPricingChange_() {
      matHsShow4Set_ = !!(document.getElementById('matHs4SetChk') && document.getElementById('matHs4SetChk').checked);
      matHsShowPerCount_ = !!(document.getElementById('matHsPerChk') && document.getElementById('matHsPerChk').checked);
      matActiveGradeKey_ = null; // タブをリセット
      updateMatPreview();
    }


    /**
     * 配布物プレビューをコンテナ幅に合わせてスケーリングする（794px基準）
     */
    function resizeMatPreview() {
      var container = document.getElementById('mat-preview-container');
      var inner = document.getElementById('mat-preview-inner');
      if (!container || !inner) return;
      var containerW = container.offsetWidth;
      if (containerW < 10) return;
      var scale = containerW / 794;
      inner.style.transform = 'scale(' + scale + ')';
      inner.style.transformOrigin = 'top left';
      container.style.height = Math.round(inner.scrollHeight * scale) + 'px';
    }

    /**
     * 配布物PDFを生成してダウンロードまたは印刷する
     * @param {string} mode 'download' または 'print'
     */
    function generateMaterialsPDF(mode) {
      var lectureId = currentLectureId;
      var campusCode = document.getElementById('mat-campus-select').value;

      if (!lectureId) { appAlert('上部で講習を選択してください。'); return; }
      if (!campusCode) { appAlert('校舎を選択してください。'); return; }

      var btn = document.getElementById('matPdfBtn');
      var arrowBtn = document.getElementById('matPdfArrowBtn');
      var origText = btn.textContent;
      btn.textContent = '⏳ 生成中...';
      btn.disabled = true;
      arrowBtn.disabled = true;

      function restoreBtn() {
        btn.textContent = origText;
        btn.disabled = false;
        arrowBtn.disabled = false;
      }

      // 印刷モードは同期的にウィンドウを開いておく（ポップアップブロック回避）
      var printWindow = null;
      if (mode === 'print') {
        printWindow = window.open('', '_blank');
        if (printWindow) {
          printWindow.document.write('<html><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#555;font-size:16px;">⏳ 講習案内を生成中...</body></html>');
        }
      }

      var period = (lecturePeriods || []).find(function(lp) { return lp.id === lectureId; });
      var campusName = (campusData && campusData[campusCode]) ? campusData[campusCode] : campusCode;
      var fy = parseInt((lectureId || '').split('-')[0], 10);
      var lecName = period ? period.name : lectureId;
      var typeId = (lectureId || '').replace(/^\d{4}-/, '');
      var typeData = (matLecPricingData && matLecPricingData[typeId]) ? matLecPricingData[typeId] : null;
      var isSpring = lecName.indexOf('春') !== -1;

      function proceed(entries) {
        // buildGradePages_ を使ってページ定義を構築（チェックボックス状態を反映）
        var gradePages = buildGradePages_(entries, campusName, campusCode, lecName, typeData, isSpring, typeId);

        if (gradePages.length === 0) {
          restoreBtn();
          if (printWindow) printWindow.close();
          appAlert('選択した校舎にデータがありません。\n日程作成タブでエントリを追加してください。');
          return;
        }

        var canvases = [];
        var allPages = gradePages;
        var allPageIdx = 0;

        function renderNextPage_() {
          if (allPageIdx >= allPages.length) {
            restoreBtn();
            var docTitle = fy + '年度 ' + lecName + 'のご案内';
            finalizeMaterialsPdf_(mode, canvases, printWindow, docTitle);
            return;
          }

          var pg = allPages[allPageIdx];
          allPageIdx++;

          var pageHtml;
          {
            var greeting = getMatGreeting_(pg.gradeGroup.key);
            pageHtml = buildMatOnePage_(pg.gradeGroup, pg.entries, campusName, campusCode, lecName, greeting, typeData, isSpring, pg.pricingType);
          }

          var container = document.createElement('div');
          container.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:white;font-family:"Meiryo","ヒラギノ角ゴ ProN W3","MS Gothic",sans-serif;font-size:10pt;';
          document.body.appendChild(container);
          container.innerHTML = pageHtml;
          applySchedulesInContainer_(container);

          html2canvas(container, {
            scale: 2,
            backgroundColor: '#ffffff',
            windowWidth: 840,
            useCORS: true
          }).then(function(canvas) {
            document.body.removeChild(container);
            canvases.push(canvas);
            renderNextPage_();
          }).catch(function(e) {
            document.body.removeChild(container);
            restoreBtn();
            if (printWindow) printWindow.close();
            console.error('配布物PDF生成エラー:', e);
            appAlert('PDF生成に失敗しました。\nブラウザを更新して再度お試しください。');
          });
        }

        renderNextPage_();
      }

      var cacheKey = lectureId + '_' + campusCode;
      if (matEntriesCache[cacheKey]) {
        proceed(matEntriesCache[cacheKey]);
      } else {
        fbGetLectureScheduleEntries(lectureId, campusCode)
          .then(function(entries) {
            matEntriesCache[cacheKey] = entries || [];
            proceed(entries || []);
          })
          .catch(function(err) {
            restoreBtn();
            if (printWindow) printWindow.close();
            console.error('エントリ取得失敗:', err);
            appAlert('日程データの取得に失敗しました。');
          });
      }
    }

    /**
     * 配布物PDF/印刷出力を実行する（finalizePdf の配布物専用版・タイトルを引数で受け取る）
     * @param {string} mode 'download' または 'print'
     * @param {Array} canvases canvas配列
     * @param {Window} printWindow 印刷ウィンドウ（printモード時）
     * @param {string} docTitle ドキュメントタイトル（ファイル名・ウィンドウタイトルに使用）
     */
    function finalizeMaterialsPdf_(mode, canvases, printWindow, docTitle) {
      var safeTitle = docTitle || '講習案内';

      if (mode === 'print') {
        var imgsHtml = '';
        canvases.forEach(function(c, idx) {
          var imgDataPng = c.toDataURL('image/png');
          var pageBreak = idx < canvases.length - 1 ? 'page-break-after: always;' : '';
          var onloadAttr = idx === canvases.length - 1 ? ' onload="window.print();"' : '';
          imgsHtml += '<img src="' + imgDataPng + '" style="width:100%;height:auto;display:block;' + pageBreak + '"' + onloadAttr + '>';
        });
        if (printWindow) {
          printWindow.document.open();
          printWindow.document.write(
            '<!DOCTYPE html><html><head>' +
            '<title>' + safeTitle + '</title>' +
            '<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #fff; } @page { size: A4 portrait; margin: 7mm; }</style>' +
            '</head><body>' + imgsHtml + '</body></html>'
          );
          printWindow.document.close();
        } else {
          appAlert('ポップアップがブロックされました。\nブラウザのポップアップ許可設定を確認してください。');
        }
      } else {
        var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        var pageW = pdf.internal.pageSize.getWidth();
        var pageH = pdf.internal.pageSize.getHeight();
        var margin = 7;
        var maxW = pageW - margin * 2;
        var maxH = pageH - margin * 2;

        canvases.forEach(function(c, idx) {
          if (idx > 0) pdf.addPage();
          var imgData = c.toDataURL('image/jpeg', 0.92);
          var ratio = c.width / c.height;
          var drawW = maxW;
          var drawH = drawW / ratio;
          if (drawH > maxH) { drawH = maxH; drawW = drawH * ratio; }
          pdf.addImage(imgData, 'JPEG', margin, margin, drawW, drawH);
        });
        pdf.save(safeTitle + '.pdf');
      }
    }

    // ========== 配布物 HTML 生成ヘルパー ==========

    /**
     * 現在の講習タイプIDを取得する（currentLectureId から年度を除去）
     * @return {string} typeId（例: 'summer', 'kiso1'）。未選択なら空文字
     */
    function getMatCurrentTypeId_() {
      if (!currentLectureId) return '';
      return (currentLectureId || '').replace(/^\d{4}-/, '');
    }

    /**
     * 挨拶文編集モーダルを開く
     * 選択中の講習タイプに応じて表示する学年を切り替える
     */
    function openMatGreetingModal_() {
      var typeId = getMatCurrentTypeId_();
      if (!typeId) {
        appAlert('先に上部で講習を選択してください。');
        return;
      }

      var isChu3Only = MAT_CHU3_ONLY_TYPES_.indexOf(typeId) !== -1;
      var groups = isChu3Only
        ? MAT_GRADE_GROUPS_.filter(function(g) { return g.key === 'chu3'; })
        : MAT_GRADE_GROUPS_;

      // タイトルに講習名を表示
      var lecTypeNames = { spring: '春期講習', summer: '夏期講習', kiso1: '第1回基礎学力テスト対策講座', kiso2: '第2回基礎学力テスト対策講座', winter: '冬期講習', nyushi: '入試直前講習' };
      var titleEl = document.getElementById('matGreetingModalTitle');
      if (titleEl) titleEl.textContent = '✏️ ' + (lecTypeNames[typeId] || typeId) + ' 挨拶文';

      // 保存済みデータを取得（なければデフォルト）
      var saved = (matGreetingsData_ && matGreetingsData_[typeId]) ? matGreetingsData_[typeId] : {};

      // モーダル本体にテキストエリアを動的生成
      var body = document.getElementById('matGreetingModalBody');
      if (!body) return;
      body.innerHTML = '';

      groups.forEach(function(grp) {
        var wrap = document.createElement('div');
        wrap.style.cssText = 'border:1px solid #e0e0e0;border-radius:6px;overflow:hidden;margin-bottom:8px;';

        var lbl = document.createElement('div');
        lbl.style.cssText = 'background:#f5f5f5;padding:4px 10px;font-size:12px;font-weight:600;color:#555;border-bottom:1px solid #e0e0e0;';
        lbl.textContent = grp.label;
        wrap.appendChild(lbl);

        var ta = document.createElement('textarea');
        ta.id = 'mat-greeting-modal-' + grp.key;

        ta.style.cssText = 'width:100%;padding:8px 10px;border:none;border-radius:0;font-size:13px;resize:vertical;box-sizing:border-box;line-height:1.6;font-family:inherit;display:block;';
        ta.value = saved[grp.key] || MAT_DEFAULT_GREETINGS_[grp.key] || '';
        wrap.appendChild(ta);

        body.appendChild(wrap);

      // モーダルを表示
      var overlay = document.getElementById('matGreetingOverlay');

      if (overlay) overlay.style.display = 'block';
      if (modal) { modal.style.display = 'flex'; modal.style.flexDirection = 'column'; }

    /**
     * 挨拶文編集モーダルを閉じる
     */
    function closeMatGreetingModal_() {
      var overlay = document.getElementById('matGreetingOverlay');
      var modal = document.getElementById('matGreetingModal');
      if (overlay) overlay.style.display = 'none';
      if (modal) modal.style.display = 'none';

    /**
     * モーダル内の挨拶文を保存する
     * matGreetingsData_ に現在のタイプのデータをマージしてから全データを送信
     */
    function saveMatGreetings_() {
      var typeId = getMatCurrentTypeId_();
      if (!typeId) return;

      var isChu3Only = MAT_CHU3_ONLY_TYPES_.indexOf(typeId) !== -1;
      var groups = isChu3Only
        ? MAT_GRADE_GROUPS_.filter(function(g) { return g.key === 'chu3'; })
        : MAT_GRADE_GROUPS_;

      // 現在のタイプのデータを収集
      var typeData = {};
      groups.forEach(function(grp) {
        var ta = document.getElementById('mat-greeting-modal-' + grp.key);
        if (ta) typeData[grp.key] = ta.value;
      });

      // キャッシュにマージ
      if (!matGreetingsData_) matGreetingsData_ = {};
      matGreetingsData_[typeId] = typeData;

      // 全データを一括送信
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success) {
            showToast('挨拶文を保存しました');
            updateMatPreview();
            closeMatGreetingModal_();
          } else {
            appAlert('保存に失敗しました: ' + ((result && result.error) || '不明なエラー'));
          }
        })
        .withFailureHandler(function(err) {
          appAlert('保存に失敗しました: ' + err);
        })
        .saveLectureGreetings(JSON.stringify(matGreetingsData_));
    }

    /**
     * 指定学年グループの挨拶文を返す（保存済みデータ → デフォルト文の順でフォールバック）
     * 現在の講習タイプに基づいて取得する
     * @param {string} gradeKey MAT_GRADE_GROUPS_ の key（例: 'chu1'）
     * @return {string} 挨拶文
     */
    function getMatGreeting_(gradeKey) {
      var typeId = getMatCurrentTypeId_();
      if (typeId && matGreetingsData_ && matGreetingsData_[typeId] && matGreetingsData_[typeId][gradeKey] !== undefined) {
        return matGreetingsData_[typeId][gradeKey];
      }
      return MAT_DEFAULT_GREETINGS_[gradeKey] || '';
    }

    /**
     * 配布物PDF用のドキュメントHTMLを生成して返す（学年ごとに1ページ）
     * @param {Array} entries 講習エントリ一覧
     * @param {string} campusName 校舎名
     * @param {string} campusCode 校舎コード（勝瑞校判定用）
     * @param {number} fy 年度（西暦）
     * @param {string} lecName 講習名
     * @param {Object|null} typeData 講習別料金データ {rows:[...]}
     * @param {boolean} isSpring 春期講習か
     * @return {string} HTML文字列（学年数分のページを区切り線で連結）
     */
    function buildMaterialsDocHTML(entries, campusName, campusCode, fy, lecName, typeData, isSpring) {
      var pages = [];
      var typeId = getMatCurrentTypeId_();
      var isChu3Only = MAT_CHU3_ONLY_TYPES_.indexOf(typeId) !== -1;
      var targetGroups = isChu3Only
        ? MAT_GRADE_GROUPS_.filter(function(g) { return g.key === 'chu3'; })
        : MAT_GRADE_GROUPS_;
      targetGroups.forEach(function(grp) {
        var grpEntries = (entries || []).filter(function(e) {
          var gc = String(e.grade || '').trim();
          if (/^\d+$/.test(gc) && gc.length < 2) gc = gc.padStart(2, '0');
          return grp.codes.indexOf(gc) !== -1;
        });
        if (grpEntries.length > 0) {
          var greeting = getMatGreeting_(grp.key);
          pages.push(buildMatOnePage_(grp, grpEntries, campusName, campusCode, lecName, greeting, typeData, isSpring));
        }
      });

      if (pages.length === 0) {
        return '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#bbb;font-size:14px;">（選択した校舎にデータがありません）</div>';
      }
      return pages.join('<div style="height:20px;background:#eee;"></div>');
    }

    /**
     * 1学年分のA4ページHTMLを生成する
     * @param {Object} gradeGroup MAT_GRADE_GROUPS_ の1要素
     * @param {Array} entries その学年のエントリ一覧
     * @param {string} campusName 校舎名
     * @param {string} campusCode 校舎コード
     * @param {string} lecName 講習名
     * @param {string} greeting 挨拶文（pre-wrap表示）
     * @param {Object|null} typeData 講習別料金データ
     * @param {boolean} isSpring 春期講習か
     * @return {string} HTML文字列
     */
    function buildMatOnePage_(gradeGroup, entries, campusName, campusCode, lecName, greeting, typeData, isSpring, pricingType, typeId) {
      // 年度を現在の講習IDから抽出（"YYYY-season-XX" 形式）
      var fy = parseInt((currentLectureId || '').split('-')[0], 10) || '';

      // 科目一覧を抽出（MAT_SUBJECT_ORDER_ 順）
      var subjectSet = {};
      (entries || []).forEach(function(e) { if (e.subject) subjectSet[e.subject] = true; });
      var subjects = MAT_SUBJECT_ORDER_.filter(function(s) { return subjectSet[s]; });
      Object.keys(subjectSet).forEach(function(s) { if (MAT_SUBJECT_ORDER_.indexOf(s) === -1) subjects.push(s); });

      // 料金行フィルタ（pricingType に応じて絞り込む）
      var allRows = (typeData && typeData.rows) ? typeData.rows : [];
      var gradeRows;
      if (pricingType === '4set') {
        // 4回セット：standard + shozui 行（当該学年）
        gradeRows = allRows.filter(function(r) {
          return (r.type === 'standard' || r.type === 'shozui') && r.gradeKey === gradeGroup.key;
        });
      } else if (pricingType === 'per') {
        // 回数別料金：custom 行をラベルの先頭文字列で学年フィルタ
        var hsLabel = { ko1: '高1', ko2: '高2', ko3: '高3' }[gradeGroup.key] || '';
        gradeRows = allRows.filter(function(r) {
          return r.type === 'custom' && r.label && r.label.indexOf(hsLabel) === 0;
        });
      } else {
        // 中学生・小学生：standard 行を gradeKey でフィルタ（なければ全行）
        gradeRows = allRows.filter(function(r) { return r.gradeKey === gradeGroup.key; });
        if (gradeRows.length === 0) gradeRows = allRows;
        // 中3ページかつ MAT_CHU3_MULTI_TYPES_ に含まれる講習のとき、中3追加行（多教科セット等）を追加する。
        // このラベル判定は features.js の分離ロジックと同じく「中3」文字列に依存する。
        // ラベル表記を変更した場合（例：「中3」→「中学3年」）、この判定も必ず合わせて変更すること。
        if (gradeGroup.key === 'chu3' && MAT_CHU3_MULTI_TYPES_.indexOf(typeId) !== -1) {
          var chu3Custom = allRows.filter(function(r) {
            return r.type === 'custom' && (r.label || '').indexOf('中3') !== -1;
          });
          gradeRows = gradeRows.concat(chu3Custom);
        }
      }

      var html = '<div style="width:794px;min-height:1123px;padding:35px 45px;box-sizing:border-box;display:flex;flex-direction:column;background:white;color:#111;font-family:inherit;">';

      // 1. ヘッダー
      html += '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;font-size:10.5pt;">';
      html += '<div>保護者各位</div>';
      html += '<div>スクエア　' + escapeHtmlMat_(campusName) + '校</div>';
      html += '</div>';

      // 2. タイトル
      html += '<div style="text-align:center;font-size:16pt;font-weight:bold;margin:4px 0 10px;letter-spacing:0.05em;">';
      html += escapeHtmlMat_(lecName) + 'のお知らせ';
      html += '</div>';

      // 3. 挨拶文
      if (greeting) {
        html += '<div style="font-size:10pt;line-height:1.8;white-space:pre-wrap;margin-bottom:6px;">' + escapeHtmlMat_(greeting) + '</div>';
      }

      // 4. 敬具
      html += '<div style="text-align:right;font-size:10pt;margin-bottom:6px;">敬具</div>';

      // 5. 日程表（固定高さ 340px のゾーンに自動フィット・中央配置）
      html += '<div class="mat-schedule-zone" style="width:100%;height:340px;overflow:hidden;margin-bottom:8px;">';
      html += '<div class="mat-schedule-inner">';
      html += buildMatScheduleTable_(entries);
      html += '</div></div>';

      // スペーサー（日程表と料金枠の間を広げる）
      html += '<div style="flex:1;min-height:8px;"></div>';

      // 6. 料金枠
      if (gradeRows.length > 0) {
        html += '<div style="margin-bottom:6px;">';
        html += '<div style="font-weight:bold;font-size:10pt;margin-bottom:3px;">○時間・回数・料金</div>';
        html += buildMatLecPricingTable_(gradeRows, campusCode, isSpring);
        html += '<ul style="font-size:9pt;line-height:1.5;margin:4px 0 0;padding-left:1.2em;">';
        html += '<li>料金はすべて税込み料金です。</li>';
        html += '<li>講習についてはすべて集団授業方式となります。</li>';
        html += '<li>人数や時間割の関係上、クラス編成は当塾で決めさせていただきます。</li>';
        html += '<li>希望者は前日までに下部の用紙を提出、またはお電話にてお申し込みください。</li>';
        html += '</ul>';
        html += '</div>';
      }

      // 7. 切り取り線（テキストを線の上に配置）
      html += '<div style="display:flex;align-items:center;margin:8px 0 24px;font-size:9pt;color:#444;">';
      html += '<div style="flex:1;border-top:1px dashed #555;"></div>';
      html += '<span style="padding:0 8px;">✄ きりとりせん ✄</span>';
      html += '<div style="flex:1;border-top:1px dashed #555;"></div>';
      html += '</div>';

      // 8. 申込欄
      html += buildMatApplicationSlip_(subjects, campusName, gradeGroup, lecName, fy);

      html += '</div>';
      return html;
    }

    /**
     * 日程表の文字サイズを固定フィールドに収まるよう自動調整する
     * @param {Element} zone 固定サイズのコンテナ
     * @param {Element} inner zone 内のスケール対象ラッパ
     * @param {number} baseFontPx 基準フォントサイズ（px）
     */
    function applyScheduleAutoFit_(zone, inner, baseFontPx) {
      if (!zone || !inner) return;

      var zoneW = zone.clientWidth;
      var zoneH = zone.clientHeight;
      if (zoneW === 0 || zoneH === 0) return;

      var base = baseFontPx || 8.5;
      var scale = 1.0;

      // まず基準サイズで描画
      setScheduleFontScale_(inner, base, 1.0);

      var naturalW = inner.scrollWidth;
      var naturalH = inner.scrollHeight;

      // 収まっているならそのまま。はみ出していたら縮小係数を計算
      if (naturalW > zoneW || naturalH > zoneH) {
        var sx = zoneW / naturalW;
        var sy = zoneH / naturalH;
        scale = Math.min(sx, sy) * 0.98; // 誤差吸収
        setScheduleFontScale_(inner, base, scale);
      }

      // 中央配置（固定フィールド内で上下左右中央）
      zone.style.display = 'flex';
      zone.style.alignItems = 'center';
      zone.style.justifyContent = 'center';
    }

    /**
     * inner 内の日程表要素に対し、フォントサイズ・padding を等比スケールで適用する
     * @param {Element} inner ラッパ要素
     * @param {number} baseFontPx 基準フォント（px）
     * @param {number} scale スケール係数
     */
    function setScheduleFontScale_(inner, baseFontPx, scale) {
      if (!inner) return;
      var fs = baseFontPx * scale;
      var padV = 3 * scale;
      var padH = 6 * scale;
      var headerPadV = 4 * scale;
      var headerPadH = 8 * scale;
      var headerFs = 9.5 * scale;
      var titleLabelFs = 10 * (baseFontPx / 8.5) * scale;

      // テーブルセル全般
      var cells = inner.querySelectorAll('th, td');
      cells.forEach(function(cell) {
        if (cell.getAttribute('colspan') === '3') {
          // HP掲載用の学年ヘッダー行
          cell.style.fontSize = headerFs + 'px';
          cell.style.padding = headerPadV + 'px ' + headerPadH + 'px';
        } else {
          cell.style.fontSize = fs + 'px';
          cell.style.padding = padV + 'px ' + padH + 'px';
        }
      });

      // 申込用紙の「○講習日時」ラベル
      var labels = inner.querySelectorAll('.mat-schedule-label');
      labels.forEach(function(el) {
        el.style.fontSize = titleLabelFs + 'px';
      });
    }

    /**
     * コンテナ内のすべての日程表ゾーンに自動フィットを適用する
     * @param {Element} containerEl 検索対象コンテナ
     */
    function applySchedulesInContainer_(containerEl) {
      if (!containerEl) return;

      var matZones = containerEl.querySelectorAll('.mat-schedule-zone');
      matZones.forEach(function(zone) {
        var inner = zone.querySelector('.mat-schedule-inner');
        applyScheduleAutoFit_(zone, inner, 8.5 * 1.70);
      });

      var webZones = containerEl.querySelectorAll('.mat-web-schedule-zone');
      webZones.forEach(function(zone) {
        var inner = zone.querySelector('.mat-web-schedule-inner');
        applyScheduleAutoFit_(zone, inner, 8.5 * 1.70);
      });
    }

    /**
     * 講習日程テーブルを生成する（HP掲載用と同じ形式：科目rowspan・fmtDates_・endTime_ 使用）
     * @param {Array} entries エントリ一覧
     * @return {string} HTML文字列
     */
    function buildMatScheduleTable_(entries) {
      if (!entries || entries.length === 0) {
        return '<p style="color:#888;font-size:9.5pt;margin-bottom:8px;">（日程データがありません）</p>';
      }

      // HP掲載用と共通の時刻・日付フォーマット関数をローカル定義（外部スコープに無いため ReferenceError 防止）
      function endTime_(start, slots) {
        var parts = (start || '00:00').split(':');
        var h = parseInt(parts[0], 10) || 0;
        var m = parseInt(parts[1], 10) || 0;
        var totalMin = h * 60 + m + (slots || 0) * 10;
        var eh = Math.floor(totalMin / 60);
        var em = totalMin % 60;
        return ('0' + eh).slice(-2) + ':' + ('0' + em).slice(-2);
      }
      function fmtDates_(sortedDates) {
        var DOW_ = ['日', '月', '火', '水', '木', '金', '土'];
        var prevMonth = -1;
        return sortedDates.map(function(d) {
          var dt = new Date(d + 'T00:00:00');
          var mo = dt.getMonth() + 1;
          var day = dt.getDate();
          var dow = DOW_[dt.getDay()];
          var str = (mo !== prevMonth ? mo + '/' : '') + day + '(' + dow + ')';
          prevMonth = mo;
          return str;
        }).join('・');
      }

      var cellBase = 'border:1px solid black;padding:3px 6px;font-size:8.5px;vertical-align:middle;';
      var cellSubj = cellBase + 'width:56px;text-align:center;font-weight:bold;white-space:nowrap;';
      var cellDate = cellBase + 'white-space:nowrap;';
      var cellTime = cellBase + 'width:104px;text-align:center;white-space:nowrap;';

      // 科目ごとに (startTime, durationSlots) → dates[] のグループを作成
      var subjectMap = {};
      (entries || []).forEach(function(e) {
        var subj = e.subject || '';
        var key = (e.startTime || '') + '|' + (e.durationSlots || 0);
        if (!subjectMap[subj]) subjectMap[subj] = {};
        if (!subjectMap[subj][key]) {
          subjectMap[subj][key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] };
        }
        if (e.date) subjectMap[subj][key].dates.push(e.date);
      });

      // 科目を MAT_SUBJECT_ORDER_ 順 + 未登録科目は末尾に追加
      var subjects = MAT_SUBJECT_ORDER_.filter(function(s) { return subjectMap[s]; });
      Object.keys(subjectMap).forEach(function(s) {
        if (MAT_SUBJECT_ORDER_.indexOf(s) === -1) subjects.push(s);
      });

      if (subjects.length === 0) {
        return '<p style="color:#888;font-size:9.5pt;margin-bottom:8px;">（日程データがありません）</p>';
      }

      var html = '<div>';
      html += '<div class="mat-schedule-label" style="font-weight:bold;font-size:10pt;margin-bottom:4px;">○講習日時</div>';
      // width:auto（既定）で、日付列の最長行に合わせてテーブル幅が自動調整される
      html += '<table style="border-collapse:collapse;">';
      html += '<thead><tr>';
      html += '<th style="' + cellSubj + 'background:#f0f0f0;">科目</th>';
      html += '<th style="' + cellDate + 'background:#f0f0f0;text-align:center;font-weight:bold;">日程</th>';
      html += '<th style="' + cellTime + 'background:#f0f0f0;">時間</th>';
      html += '</tr></thead><tbody>';

      subjects.forEach(function(subject) {
        var groups = Object.keys(subjectMap[subject]).map(function(k) { return subjectMap[subject][k]; });
        groups.sort(function(a, b) { return a.startTime < b.startTime ? -1 : 1; });
        groups.forEach(function(grp) { grp.dates.sort(); });
        var rowCount = groups.length;
        groups.forEach(function(grp, idx) {
          var et = endTime_(grp.startTime, grp.durationSlots);
          var timeStr = et ? (grp.startTime + '～' + et) : (grp.startTime || '');
          var dateStr = fmtDates_(grp.dates);
          html += '<tr>';
          if (idx === 0) {
            html += '<td rowspan="' + rowCount + '" style="' + cellSubj + '">' + escapeHtmlMat_(subject) + '</td>';
          }
          html += '<td style="' + cellDate + '">' + escapeHtmlMat_(dateStr) + '</td>';
          html += '<td style="' + cellTime + '">' + escapeHtmlMat_(timeStr) + '</td>';
          html += '</tr>';
        });
      });

      html += '</tbody></table></div>';
      return html;
    }

    /**
     * 申込欄HTMLを生成する（中学生/小学生 vs 高校生でフォームが異なる）
     * @param {Array} subjects 科目名配列（MAT_SUBJECT_ORDER_ 順）
     * @param {string} campusName 校舎名
     * @param {Object} gradeGroup MAT_GRADE_GROUPS_ の1要素
     * @param {string} lecName 講習名
     * @return {string} HTML文字列
     */
    function buildMatApplicationSlip_(subjects, campusName, gradeGroup, lecName, fy) {
      // 年度 + 講習名（例：「2025年度 夏期講習」）
      var fullLecName = (fy ? fy + '年度 ' : '') + lecName;
      // 生徒氏名欄を長くする
      var nameLine = '生徒氏名______________________________';
      var header = escapeHtmlMat_(fullLecName) + '　' + escapeHtmlMat_(campusName) + '　' + escapeHtmlMat_(gradeGroup.label) + '　' + nameLine + '　印';

      var html = '<div style="font-size:9.5pt;">';

      if (!gradeGroup.isHigh) {
        // 中学生・小学生: 科目に○をつける形式（正方形化）
        html += '<div style="margin-bottom:5px;">' + header + '</div>';
        if (subjects.length > 0) {
          // 縦: ヘッダー 約22px + 記入欄 約42px = 約64px → 1辺64pxの正方形
          var cellSide = 64;
          var tableWidth = cellSide * subjects.length;
          html += '<table style="border-collapse:collapse;font-size:9.5pt;table-layout:fixed;width:' + tableWidth + 'px;margin:0 auto;">';
          html += '<tr>';

            html += '<th style="border:1px solid #555;padding:4px 6px;background:#f0f0f0;text-align:center;font-weight:bold;width:' + cellSide + 'px;">' + escapeHtmlMat_(s) + '</th>';
          });
          html += '</tr><tr>';
          subjects.forEach(function() {
            html += '<td style="border:1px solid #555;padding:14px 6px;text-align:center;width:' + cellSide + 'px;">&nbsp;</td>';
          });
          html += '</tr></table>';
        }
        html += '<div style="margin-top:4px;font-size:9pt;">受講する科目に○をつけ、各講師にお渡しください。</div>';
      } else {
        // 高校生: 科目・希望回数・希望日程の3列テーブル（レイアウトは元のまま）
        html += '<table style="width:100%;border-collapse:collapse;font-size:9.5pt;margin-bottom:5px;">';
        html += '<tr>';
        ['科目', '希望回数', '希望日程'].forEach(function(h) {

          html += '<td style="border:1px solid #555;padding:4px 6px;">&nbsp;</td>';
          html += '</tr>';
        });
        html += '</table>';
        html += '<div style="margin-bottom:4px;">' + header + '</div>';
        html += '<div style="font-size:9pt;">受講する科目の回数・日程を記入し、各講師にお渡しください。</div>';
      }

      html += '</div>';
      return html;
    }

    /**
     * 講習別料金データ（新構造）からHTMLテーブルを生成する
     * 勝瑞校（コード08）かつ高校生の場合は shozui 行の料金を使用する
     * 連続する学年で時間・回数・料金がすべて同じ場合は「中1・中2」のように1行にまとめる
     * @param {Array} rows [{type,gradeKey,duration,count,internal,external,label}]
     * @param {string} campusCode 校舎コード
     * @return {string} HTML文字列
     */
    function buildMatLecPricingTable_(rows, campusCode, isSpring) {
      var MAT_GRADE_LABELS = isSpring
        ? { sho: '小学生', chu1: '新中1', chu2: '新中2', chu3: '新中3', ko1: '新高1', ko2: '新高2', ko3: '新高3' }
        : { sho: '小学生', chu1: '中1', chu2: '中2', chu3: '中3', ko1: '高1', ko2: '高2', ko3: '高3' };
      var MAT_HS_KEYS = ['ko1', 'ko2', 'ko3'];
      var isShozui = (String(campusCode) === '08');

      // 価格フォーマット: 0 → 「無料」、正の値 → 「税込み料金 + 円」
      function fmtPrice_(val) {
        if (val <= 0) return '無料';
        return Math.floor(val * 1.1).toLocaleString() + '円';
      }

      // standard 行を元の順序で取得し、実効料金（勝瑞校高校生はshozui行）に解決する
      var standardRows = rows.filter(function(r) { return r.type === 'standard'; });
      var resolvedRows = standardRows.map(function(row) {
        var displayRow = row;
        if (isShozui && MAT_HS_KEYS.indexOf(row.gradeKey) !== -1) {
          var shozuiRow = rows.find(function(r) { return r.type === 'shozui' && r.gradeKey === row.gradeKey; });
          if (shozuiRow) displayRow = shozuiRow;
        }
        return {
          gradeKey: row.gradeKey,
          duration: displayRow.duration || 0,
          count: displayRow.count || 0,
          internal: displayRow.internal || 0,
          external: displayRow.external || 0
        };
      });

      // 内部生・外部生ともに 0 の標準行は非表示（未設定の学年）
      // 連続する学年で時間・回数・内部生料金・外部生料金がすべて同じなら1グループにまとめる
      var groups = [];
      resolvedRows.filter(function(r) { return r.internal > 0 || r.external > 0; }).forEach(function(r) {
        var last = groups.length > 0 ? groups[groups.length - 1] : null;
        if (last && last.duration === r.duration && last.count === r.count && last.internal === r.internal && last.external === r.external) {
          last.gradeLabels.push(MAT_GRADE_LABELS[r.gradeKey] || r.gradeKey);
        } else {
          groups.push({
            gradeLabels: [MAT_GRADE_LABELS[r.gradeKey] || r.gradeKey],
            duration: r.duration,
            count: r.count,
            internal: r.internal,
            external: r.external
          });
        }
      });

      var html = '<table style="width: 100%; border-collapse: collapse; font-size: 9.5pt; margin-bottom: 6px;">';
      html += '<tr>';
      ['学年', '時間', '回数', '内部生', '外部生'].forEach(function(h) {
        html += '<th style="border: 1px solid #555; padding: 4px 6px; background: #f0f0f0; text-align: center; font-weight: bold;">' + h + '</th>';
      });
      html += '</tr>';

      // グループ行を描画（同一設定は「中1・中2」のようにまとめて表示）
      groups.forEach(function(g) {
        var gradeLabel = g.gradeLabels.join('・');
        var mins = g.duration * 10;
        var intStr = fmtPrice_(g.internal);
        var extStr = fmtPrice_(g.external);
        html += '<tr>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center; font-weight: bold;">' + escapeHtmlMat_(gradeLabel) + '</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + mins + '分</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + g.count + '回</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + escapeHtmlMat_(intStr) + '</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + escapeHtmlMat_(extStr) + '</td>';
        html += '</tr>';
      });

      // custom 行（追加行）を続けて表示（externalNa: true の行は外部生欄を空欄）
      var customRows = rows.filter(function(r) { return r.type === 'custom'; });
      customRows.forEach(function(row) {
        var mins = (row.duration || 0) * 10;
        var cnt = row.count || 0;
        var intStr = fmtPrice_(row.internal || 0);
        var extStr = row.externalNa ? '' : fmtPrice_(row.external || 0);
        html += '<tr>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center; font-weight: bold;">' + escapeHtmlMat_(row.label || '') + '</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + mins + '分</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + cnt + '回</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + escapeHtmlMat_(intStr) + '</td>';
        html += '<td style="border: 1px solid #555; padding: 4px 6px; text-align: center;">' + escapeHtmlMat_(extStr) + '</td>';
        html += '</tr>';
      });

      html += '</table>';
      return html;
    }

    /**
     * gradeSettings から時間・回数のみのテーブルを生成する（料金表がない場合のフォールバック）
     * @param {Object} gradeSettings {gradeCode: {duration, count}}
     * @return {string} HTML文字列
     */
    function buildMatGradeSettingsTable(gradeSettings) {
      var GRADE_NAMES = { '07':'小1','08':'小2','09':'小3','10':'小4','11':'小5','12':'小6','13':'中1','14':'中2','15':'中3','16':'高1','17':'高2','18':'高3' };
      var html = '<table style="width: 100%; border-collapse: collapse; font-size: 9.5pt; margin-bottom: 6px;">';
      html += '<tr>';
      ['学年','時間','回数'].forEach(function(h) {
        html += '<th style="border: 1px solid #555; padding: 4px 8px; background: #f0f0f0; text-align: center;">' + h + '</th>';
      });
      html += '</tr>';

      Object.keys(gradeSettings || {}).sort().forEach(function(code) {
        var s = gradeSettings[code];
        if (!s || (!s.duration && !s.count)) return;
        html += '<tr>';
        html += '<td style="border:1px solid #555;padding:4px 8px;text-align:center;">' + (GRADE_NAMES[code] || code) + '</td>';
        html += '<td style="border:1px solid #555;padding:4px 8px;text-align:center;">' + (s.duration || '-') + '分</td>';
        html += '<td style="border:1px solid #555;padding:4px 8px;text-align:center;">' + (s.count || '-') + '回</td>';
        html += '</tr>';
      });

      html += '</table>';
      return html;
    }


    /**
     * YYYY-MM-DD 形式の日付を "M/D(曜)" 形式に変換する
     * @param {string} dateStr YYYY-MM-DD
     * @return {string} 例: "12/24(火)"
     */
    function matFormatDate_(dateStr) {
      if (!dateStr) return '';
      var parts = dateStr.split('-');
      if (parts.length < 3) return dateStr;
      var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      var dows = ['日','月','火','水','木','金','土'];
      return (d.getMonth() + 1) + '/' + d.getDate() + '(' + dows[d.getDay()] + ')';
    }

    /**
     * 開始時刻とスロット数から終了時刻を計算する（1スロット = 10分）
     * @param {string} startTime "HH:MM" 形式
     * @param {number} durationSlots スロット数
     * @return {string} "HH:MM" 形式の終了時刻
     */
    function matCalcEndTime_(startTime, durationSlots) {
      var parts = (startTime || '').split(':');
      if (parts.length < 2) return '';
      var h = parseInt(parts[0], 10);
      var m = parseInt(parts[1], 10);
      var totalMin = h * 60 + m + (durationSlots || 0) * 10;
      var eh = Math.floor(totalMin / 60);
      var em = totalMin % 60;
      return eh + ':' + (em < 10 ? '0' : '') + em;
    }

    /**
     * HTML特殊文字をエスケープする（配布物内部用）
     * @param {string} str 対象文字列
     * @return {string} エスケープ済み文字列
     */
    function escapeHtmlMat_(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ========== 配布物 Drive 保存・一覧 ==========

    /**
     * 現在のPDFをDriveに保存する
     * jsPDFでPDFを生成してbase64でバックエンドに送信し、Drive に保存する
     */
    function saveMatPDFToDrive() {
      var lectureId = currentLectureId;
      var campusCode = document.getElementById('mat-campus-select').value;

      if (!lectureId) { appAlert('上部で講習を選択してください。'); return; }
      if (!campusCode) { appAlert('校舎を選択してください。'); return; }

      var saveBtn = document.getElementById('matSaveToCloudBtn');
      var origText = saveBtn.textContent;
      saveBtn.textContent = '⏳ 保存中...';
      saveBtn.disabled = true;

      function restoreBtn() {
        saveBtn.textContent = origText;
        saveBtn.disabled = false;
      }

      var period = (lecturePeriods || []).find(function(lp) { return lp.id === lectureId; });
      var campusName = (campusData && campusData[campusCode]) ? campusData[campusCode] : campusCode;
      var fy = parseInt((lectureId || '').split('-')[0], 10);
      var lecName = period ? period.name : lectureId;
      var typeId = (lectureId || '').replace(/^\d{4}-/, '');
      var typeData = (matLecPricingData && matLecPricingData[typeId]) ? matLecPricingData[typeId] : null;
      var isSpring = lecName.indexOf('春') !== -1;

      function proceed(entries) {
        var gradePages = [];
        MAT_GRADE_GROUPS_.forEach(function(grp) {
          var grpEntries = (entries || []).filter(function(e) {
            var gc = String(e.grade || '').trim();
            if (/^\d+$/.test(gc) && gc.length < 2) gc = gc.padStart(2, '0');
            return grp.codes.indexOf(gc) !== -1;
          });
          if (grpEntries.length > 0) gradePages.push({ gradeGroup: grp, entries: grpEntries });
        });

        if (gradePages.length === 0) {
          restoreBtn();
          appAlert('選択した校舎にデータがありません。');
          return;
        }

        var canvases = [];
        var pageIdx = 0;

        function renderNextPage_() {
          if (pageIdx >= gradePages.length) {
            // 全ページ描画完了 → PDF生成
            var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            var pageW = pdf.internal.pageSize.getWidth();
            var pageH = pdf.internal.pageSize.getHeight();
            var margin = 7;
            var maxW = pageW - margin * 2;
            var maxH = pageH - margin * 2;
            canvases.forEach(function(c, idx) {
              if (idx > 0) pdf.addPage();
              var imgData = c.toDataURL('image/jpeg', 0.92);
              var ratio = c.width / c.height;
              var drawW = maxW;
              var drawH = drawW / ratio;
              if (drawH > maxH) { drawH = maxH; drawW = drawH * ratio; }
              pdf.addImage(imgData, 'JPEG', margin, margin, drawW, drawH);
            });
            var pdfBase64 = pdf.output('datauristring').split(',')[1];
            var fileName = fy + '年度_' + lecName + '_' + campusName + '.pdf';
            google.script.run
              .withSuccessHandler(function(result) {
                restoreBtn();
                if (result && result.success) {
                  showToast('Driveに保存しました', 'success');
                  loadDistributionFilesList();
                } else {
                  appAlert('保存に失敗しました。\n' + (result ? result.error : ''));
                }
              })
              .withFailureHandler(function(err) {
                restoreBtn();
                console.error('Drive保存失敗:', err);
                appAlert('保存に失敗しました。');
              })
              .saveDistributionFile(lectureId, campusCode, fy, lecName, campusName, fileName, pdfBase64);
            return;
          }

          var pg = gradePages[pageIdx];
          pageIdx++;
          var greeting = getMatGreeting_(pg.gradeGroup.key);
          var pageHtml = buildMatOnePage_(pg.gradeGroup, pg.entries, campusName, campusCode, lecName, greeting, typeData, isSpring);
          var container = document.createElement('div');
          container.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:white;font-family:"Meiryo","ヒラギノ角ゴ ProN W3","MS Gothic",sans-serif;font-size:10pt;';
          document.body.appendChild(container);
          container.innerHTML = pageHtml;
          applySchedulesInContainer_(container);
          html2canvas(container, { scale: 2, backgroundColor: '#ffffff', windowWidth: 840, useCORS: true }).then(function(canvas) {
            document.body.removeChild(container);
            canvases.push(canvas);
            renderNextPage_();
          }).catch(function(e) {
            document.body.removeChild(container);
            restoreBtn();
            console.error('Drive保存PDF生成エラー:', e);
            appAlert('PDF生成に失敗しました。');
          });
        }

        renderNextPage_();
      }

      var cacheKey = lectureId + '_' + campusCode;
      if (matEntriesCache[cacheKey]) {
        proceed(matEntriesCache[cacheKey]);
      } else {
        fbGetLectureScheduleEntries(lectureId, campusCode)
          .then(function(entries) {
            matEntriesCache[cacheKey] = entries || [];
            proceed(entries || []);
          })
          .catch(function(err) {
            restoreBtn();
            console.error('エントリ取得失敗:', err);
            appAlert('日程データの取得に失敗しました。');
          });
      }
    }

    /**

        html += '<div style="font-size:11px;color:#888;">' + dateLabel + (sizeKb ? '　' + sizeKb : '') + '</div>';
        html += '</div>';
        html += '<a href="https://drive.google.com/file/d/' + escapeHtmlMat_(f.id) + '/view" target="_blank" style="padding:4px 10px;background:#667eea;color:white;border-radius:4px;font-size:11px;text-decoration:none;white-space:nowrap;">開く</a>';
        html += '<button onclick="deleteDistributionFileUI(\'' + escapeHtmlMat_(f.id) + '\')" style="padding:4px 8px;background:#fff;border:1px solid #e57373;color:#e57373;border-radius:4px;font-size:11px;cursor:pointer;white-space:nowrap;">削除</button>';

    // ========================================
    // 【内部タブ切替】申込用紙 / メール送信用 / HP掲載用
    // ========================================

    var matWebEntriesCache = {};  // HP掲載用エントリキャッシュ: "lectureId_campusCode" → entries[]

    /**
     * 配布物内部タブを切り替える
     * @param {string} tabId 'mat-tab-entry' | 'mat-tab-email' | 'mat-tab-web'
     * @param {Element|null} btn クリックされたボタン要素
     */
    function switchMatSubTab(tabId, btn) {
      var tabs = ['mat-tab-entry', 'mat-tab-email', 'mat-tab-web'];
      tabs.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.style.display = (id === tabId) ? 'block' : 'none';
      });

      // タブボタンのアクティブスタイルを更新
      var nav = document.getElementById('matSubTabNav');
      if (nav) {
        var buttons = nav.querySelectorAll('.mat-sub-tab');
        buttons.forEach(function(b) {
          var isActive = b.getAttribute('data-tab') === tabId;
          b.style.color = isActive ? '#667eea' : '#999';
          b.style.fontWeight = isActive ? '600' : 'normal';
          b.style.borderBottom = isActive ? '2px solid #667eea' : '2px solid transparent';
        });
      }

      if (tabId === 'mat-tab-web') {
        initMatWebPublish();
      }
    }

    // ========================================
    // 【HP掲載用】
    // ========================================

    // 学年コード → 表示名マップ
    var MAT_WEB_GRADE_LABEL_ = {
      '07': '小6', '08': '小5', '09': '小4', '10': '小3', '11': '小2', '12': '小1',
      '13': '中1', '14': '中2', '15': '中3',
      '16': '高1', '17': '高2', '18': '高3'
    };

    // 学年グループ定義（HP掲載用日程表）
    // codes: 実データに存在しうる学年値をすべて列挙（手動UIのラベル + AIの2桁コード + 春期「新」接頭）
    var MAT_WEB_GRADE_DEF_ = [
      { label: '小学生', codes: ['小', '07', '08', '09', '10', '11', '12'],
        subjects: ['英語', '算数', '国語', '理科', '社会'] },
      { label: '中１', codes: ['中1', '新中1', '13'], subjects: ['英語', '数学', '国語', '理科', '社会'] },
      { label: '中２', codes: ['中2', '新中2', '14'], subjects: ['英語', '数学', '国語', '理科', '社会'] },
      { label: '中３', codes: ['中3', '新中3', '15'], subjects: ['英語', '数学', '国語', '理科', '社会'] },
      { label: '高１', codes: ['高1', '新高1', '16'], subjects: ['英語', '数学', '国語', '物理', '化学'] },
      { label: '高２', codes: ['高2', '新高2', '17'], subjects: ['英語', '数学', '国語', '物理', '化学'] },
      { label: '高３', codes: ['高3', '新高3', '18'], subjects: ['英語', '数学', '国語', '物理', '化学'] },
    ];

    /**
     * HP掲載用タブを初期化する（校舎セレクト構築）
     */
    function initMatWebPublish() {
      if (campusData && Object.keys(campusData).length > 0) {
        buildMatWebCampusSelect();
      } else {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.campuses) {
              result.campuses.forEach(function(c) { campusData[c.code] = c.name; });
            }
            buildMatWebCampusSelect();
          })
          .withFailureHandler(function(err) { console.error('HP掲載用 校舎取得失敗:', err); })
          .getGradesConfigForWeb();
      }

      if (!window._matWebResizeListenerAdded) {
        window.addEventListener('resize', resizeMatWebPreview);
        window._matWebResizeListenerAdded = true;
      }
    }

    /**
     * HP掲載用 校舎セレクトを構築する
     */
    function buildMatWebCampusSelect() {
      var campuses = Object.keys(campusData || {}).map(function(code) {
        return { code: code, name: campusData[code] };
      });
      document.getElementById('mat-web-campus-select').innerHTML = buildCampusOptions(campuses, '校舎');
    }

    /**
     * HP掲載用 校舎変更ハンドラ：エントリ取得→プレビュー更新
     */
    function onMatWebCampusChange() {
      var lectureId = currentLectureId;
      var campusCode = document.getElementById('mat-web-campus-select').value;

      if (!lectureId || !campusCode) {
        var inner = document.getElementById('mat-web-preview-inner');
        if (inner) inner.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#bbb;font-size:14px;">講習と校舎を選択すると日程が表示されます</div>';
        setMatWebBtnsEnabled(false);
        return;
      }

      var inner = document.getElementById('mat-web-preview-inner');
      if (inner) inner.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#bbb;font-size:14px;">⏳ 読み込み中...</div>';

      var cacheKey = lectureId + '_' + campusCode;
      if (matWebEntriesCache[cacheKey]) {
        updateMatWebPreview(matWebEntriesCache[cacheKey], campusCode);
        return;
      }

      fbGetLectureScheduleEntries(lectureId, campusCode)
        .then(function(entries) {
          matWebEntriesCache[cacheKey] = entries || [];
          updateMatWebPreview(matWebEntriesCache[cacheKey], campusCode);
        })
        .catch(function(err) {
          console.error('HP掲載用 エントリ取得失敗:', err);
          var inner2 = document.getElementById('mat-web-preview-inner');
          if (inner2) inner2.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#e57373;font-size:14px;">データの取得に失敗しました</div>';
        });
    }

    /**
     * HP掲載用プレビューを更新する
     * @param {Array} entries エントリ配列
     * @param {string} campusCode 校舎コード
     */
    function updateMatWebPreview(entries, campusCode) {
      var inner = document.getElementById('mat-web-preview-inner');
      if (!inner) return;

      if (!entries || entries.length === 0) {
        inner.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#bbb;font-size:14px;">日程データがありません</div>';
        setMatWebBtnsEnabled(false);
        return;
      }

      inner.innerHTML = buildWebPublishDocHTML(entries, campusCode);
      applySchedulesInContainer_(inner);
      resizeMatWebPreview();
      setMatWebBtnsEnabled(true);
    }

    /**
     * HP掲載用 日程表HTMLを生成する（プレビュー・PDF共用）
     * 学年ごとに独立した表を縦並びで出力。A4（794×1123px）1枚に収まる設計。
     * @param {Array} entries エントリ配列（校舎の全エントリ）
     * @param {string} campusCode 校舎コード
     * @return {string} HTML文字列
     */
    function buildWebPublishDocHTML(entries, campusCode) {
      var lectureId = currentLectureId;
      var period = (lecturePeriods || []).find(function(lp) { return lp.id === lectureId; });
      var campusName = (campusData && campusData[campusCode]) ? campusData[campusCode] : campusCode;
      var fy = parseInt((lectureId || '').split('-')[0], 10);
      var lecName = period ? period.name : lectureId;
      var allEntries = entries || [];

      // 時刻 HH:MM に durationSlots×10分を加算して終了時刻を返す
      function endTime_(start, slots) {
        var parts = (start || '00:00').split(':');
        var h = parseInt(parts[0], 10) || 0;
        var m = parseInt(parts[1], 10) || 0;
        var totalMin = h * 60 + m + (slots || 0) * 10;
        var eh = Math.floor(totalMin / 60);
        var em = totalMin % 60;
        return ('0' + eh).slice(-2) + ':' + ('0' + em).slice(-2);
      }

      // 日付配列（昇順ソート済み）を "7/28(金)・29(土)・8/1(火)" 形式に変換
      // prevMonth は関数スコープ内で初期化し、呼び出しごとに必ずリセット（バグ防止）
      function fmtDates_(sortedDates) {
        var DOW_ = ['日', '月', '火', '水', '木', '金', '土'];
        var prevMonth = -1;
        return sortedDates.map(function(d) {
          var dt = new Date(d + 'T00:00:00');
          var mo = dt.getMonth() + 1;
          var day = dt.getDate();
          var dow = DOW_[dt.getDay()];
          var str = (mo !== prevMonth ? mo + '/' : '') + day + '(' + dow + ')';
          prevMonth = mo;
          return str;
        }).join('・');
      }

      // 学年コードを正規化：1桁数字のみ 2桁にパディング、ラベル文字列（'小','中1'等）はそのまま
      function normGrade_(code) {
        var s = String(code || '').trim();
        if (/^\d+$/.test(s) && s.length < 2) s = s.padStart(2, '0');
        return s;
      }

      // 日付列の最大幅を事前計算：校舎内の全学年・全教科・全時刻グループで最長の日程文字列に合わせる
      var allDateStrsForMeasure_ = [];
      MAT_WEB_GRADE_DEF_.forEach(function(gradeDef) {
        var gradeEntries = allEntries.filter(function(e) {
          return gradeDef.codes.indexOf(normGrade_(e.grade)) !== -1;
        });
        if (gradeEntries.length === 0) return;
        gradeDef.subjects.forEach(function(subject) {
          var subEntries = gradeEntries.filter(function(e) { return (e.subject || '') === subject; });
          if (subEntries.length === 0) return;
          var tgMap = {};
          subEntries.forEach(function(e) {
            var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
            if (!tgMap[key]) tgMap[key] = [];
            if (tgMap[key].indexOf(e.date) === -1) tgMap[key].push(e.date);
          });
          Object.keys(tgMap).forEach(function(k) {
            allDateStrsForMeasure_.push(fmtDates_(tgMap[k].slice().sort()));
          });
        });
      });

      // DOM測定で最長日程文字列のピクセル幅を取得（font-size:8.5px・テーブルと同じフォントで測定）
      var dateColWidth_ = 0;
      if (allDateStrsForMeasure_.length > 0) {
        var measureSpan_ = document.createElement('span');
        measureSpan_.style.cssText = 'position:absolute;left:-9999px;top:-9999px;visibility:hidden;white-space:nowrap;font-size:8.5px;font-family:\'Hiragino Kaku Gothic ProN\',\'Meiryo\',sans-serif;';
        document.body.appendChild(measureSpan_);
        allDateStrsForMeasure_.forEach(function(s) {
          measureSpan_.textContent = s;
          if (measureSpan_.offsetWidth > dateColWidth_) dateColWidth_ = measureSpan_.offsetWidth;
        });
        document.body.removeChild(measureSpan_);
        dateColWidth_ += 14; // padding 6px*2 + border 1px*2 の分を加算
      }

      // 共通CSSスタイル
      var cellBase = 'border:1px solid black;padding:3px 6px;font-size:8.5px;vertical-align:middle;';
      var cellSubject = cellBase + 'width:56px;text-align:center;font-weight:bold;white-space:nowrap;';
      var cellDate = cellBase + 'white-space:nowrap;' + (dateColWidth_ > 0 ? 'width:' + dateColWidth_ + 'px;' : '');
      var cellTime = cellBase + 'width:104px;text-align:center;white-space:nowrap;';

      var html = '';
      html += '<div style="width:794px;height:1123px;padding:32px 36px;box-sizing:border-box;background:white;font-family:\'Hiragino Kaku Gothic ProN\',\'Meiryo\',sans-serif;overflow:hidden;">';

      // タイトル行
      html += '<div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid black;padding-bottom:5px;margin-bottom:8px;">';
      html += '<div style="font-size:13px;font-weight:bold;">' + escapeHtmlMat_(fy + '年度　' + lecName + '　日程表') + '</div>';
      html += '<div style="font-size:11px;font-weight:bold;">' + escapeHtmlMat_(campusName) + '</div>';
      html += '</div>';

      // 日程テーブル群を自動フィットゾーンで包む（A4残り高さ ≈ 1019px に内接）
      html += '<div class="mat-web-schedule-zone" style="width:100%;height:1019px;overflow:hidden;">';
      html += '<div class="mat-web-schedule-inner">';

      // 学年ごとの表を縦並びで出力
      MAT_WEB_GRADE_DEF_.forEach(function(gradeDef) {
        // この学年グループに対応するエントリを抽出
        var gradeEntries = allEntries.filter(function(e) {
          return gradeDef.codes.indexOf(normGrade_(e.grade)) !== -1;
        });
        if (gradeEntries.length === 0) return; // エントリなし → スキップ

        // width:auto（既定）で、日付列幅（事前計算済み）+ 教科列56px + 時間列104px に自動調整
        html += '<table style="border-collapse:collapse;border:2px solid black;margin-bottom:5px;">';

        // 学年ヘッダー行
        html += '<thead>';
        html += '<tr><th colspan="3" style="border:2px solid black;padding:4px 8px;font-size:9.5px;font-weight:bold;text-align:left;background:white;">';
        html += escapeHtmlMat_(gradeDef.label);
        html += '</th></tr>';

        // 列見出し行
        html += '<tr style="border-bottom:1px solid black;">';
        html += '<th style="' + cellSubject + 'border-bottom:1px solid black;">教科</th>';
        html += '<th style="' + cellDate + 'border-bottom:1px solid black;text-align:center;font-weight:bold;">日付</th>';
        html += '<th style="' + cellTime + 'border-bottom:1px solid black;">時間</th>';
        html += '</tr>';
        html += '</thead><tbody>';

        // 教科ループ（学年定義の順）
        gradeDef.subjects.forEach(function(subject) {
          var subEntries = gradeEntries.filter(function(e) { return (e.subject || '') === subject; });
          if (subEntries.length === 0) return; // この教科のエントリなし → スキップ

          // (startTime, durationSlots) でグループ化し、各グループに日付を集約
          var timeGroupMap = {};
          var timeGroupOrder = [];
          subEntries.forEach(function(e) {
            var key = (e.startTime || '') + '_' + (e.durationSlots || 0);
            if (!timeGroupMap[key]) {
              timeGroupMap[key] = { startTime: e.startTime || '', durationSlots: e.durationSlots || 0, dates: [] };
              timeGroupOrder.push(key);
            }
            if (timeGroupMap[key].dates.indexOf(e.date) === -1) {
              timeGroupMap[key].dates.push(e.date);
            }
          });

          // 各グループの日付を昇順ソート
          timeGroupOrder.forEach(function(key) {
            timeGroupMap[key].dates.sort();
          });

          var groups = timeGroupOrder.map(function(k) { return timeGroupMap[k]; });
          var rowCount = groups.length;

          groups.forEach(function(grp, idx) {
            var timeStr = (grp.startTime || '') + '～' + endTime_(grp.startTime, grp.durationSlots);
            var dateStr = fmtDates_(grp.dates);
            html += '<tr>';
            if (idx === 0) {
              // 教科名セル（rowspan で複数時刻グループを結合）
              html += '<td rowspan="' + rowCount + '" style="' + cellSubject + '">' + escapeHtmlMat_(subject) + '</td>';
            }
            html += '<td style="' + cellDate + '">' + escapeHtmlMat_(dateStr) + '</td>';
            html += '<td style="' + cellTime + '">' + escapeHtmlMat_(timeStr) + '</td>';
            html += '</tr>';
          });
        });

        html += '</tbody></table>';
      });

      // 自動フィットゾーンを閉じる
      html += '</div></div>';

      html += '</div>';
      return html;
    }

    /**
     * HP掲載用PDFを生成してダウンロードまたは印刷する
     * @param {string} mode 'download' または 'print'
     */
    function generateWebPublishPDF(mode) {
      var lectureId = currentLectureId;
      var campusCode = document.getElementById('mat-web-campus-select').value;

      if (!lectureId) { appAlert('上部で講習を選択してください。'); return; }
      if (!campusCode) { appAlert('校舎を選択してください。'); return; }

      var btn = document.getElementById('matWebPdfBtn');
      var arrowBtn = document.getElementById('matWebPdfArrowBtn');
      btn.textContent = '⏳ 生成中...';
      btn.disabled = true;
      arrowBtn.disabled = true;

      function restoreBtn() {
        btn.textContent = '📥 PDF';
        btn.disabled = false;
        arrowBtn.disabled = false;
      }

      var printWindow = null;
      if (mode === 'print') {
        printWindow = window.open('', '_blank');
        if (printWindow) {
          printWindow.document.write('<html><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:sans-serif;color:#555;font-size:16px;">⏳ 日程表を生成中...</body></html>');
        }
      }

      var period = (lecturePeriods || []).find(function(lp) { return lp.id === lectureId; });
      var campusName = (campusData && campusData[campusCode]) ? campusData[campusCode] : campusCode;
      var fy = parseInt((lectureId || '').split('-')[0], 10);
      var lecName = period ? period.name : lectureId;
      var docTitle = fy + '年度 ' + lecName + ' ' + campusName + ' 日程表';

      var cacheKey = lectureId + '_' + campusCode;
      var entries = matWebEntriesCache[cacheKey] || [];

      if (entries.length === 0) {
        restoreBtn();
        if (printWindow) printWindow.close();
        appAlert('日程データがありません。');
        return;
      }

      var pageHtml = buildWebPublishDocHTML(entries, campusCode);

      var container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:white;font-family:"Meiryo","ヒラギノ角ゴ ProN W3","MS Gothic",sans-serif;font-size:10pt;';
      document.body.appendChild(container);
      container.innerHTML = pageHtml;
      applySchedulesInContainer_(container);

      html2canvas(container, {
        scale: 2,
        backgroundColor: '#ffffff',
        windowWidth: 840,
        useCORS: true
      }).then(function(canvas) {
        document.body.removeChild(container);
        restoreBtn();
        finalizeMaterialsPdf_(mode, [canvas], printWindow, docTitle);
      }).catch(function(e) {
        document.body.removeChild(container);
        restoreBtn();
        if (printWindow) printWindow.close();
        console.error('HP掲載用PDF生成エラー:', e);
        appAlert('PDF生成に失敗しました。\nブラウザを更新して再度お試しください。');
      });
    }

    /**
     * HP掲載用PDFドロップダウンメニューの表示/非表示を切り替える
     */
    function toggleMatWebPdfMenu(event) {
      event.stopPropagation();
      var menu = document.getElementById('matWebPdfMenu');
      if (!menu) return;
      var isVisible = menu.style.display !== 'none';
      menu.style.display = isVisible ? 'none' : 'block';
      if (!isVisible) {
        setTimeout(function() {
          document.addEventListener('click', closeMatWebPdfMenu, { once: true });
        }, 0);
      }
    }

    /**
     * HP掲載用PDFドロップダウンメニューを閉じる
     */
    function closeMatWebPdfMenu() {
      var menu = document.getElementById('matWebPdfMenu');
      if (menu) menu.style.display = 'none';
    }

    function saveWebPublishPDFToDrive() {
      showToast('Drive保存機能は準備中です。');
    }

    /**
     * HP掲載用 PDFボタン・Driveボタンの有効/無効を切り替える
     * @param {boolean} enabled
     */
    function setMatWebBtnsEnabled(enabled) {
      var ids = ['matWebPdfBtn', 'matWebPdfArrowBtn', 'matWebSaveBtn'];
      ids.forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.disabled = !enabled;
        el.style.cursor = enabled ? 'pointer' : 'not-allowed';
        el.style.opacity = enabled ? '1' : '0.5';
      });
    }

    /**
     * HP掲載用プレビューをコンテナ幅に合わせてスケーリングする（794px基準）
     */
    function resizeMatWebPreview() {
      var container = document.getElementById('mat-web-preview-container');
      var inner = document.getElementById('mat-web-preview-inner');
      if (!container || !inner) return;
      var containerW = container.offsetWidth;
      if (containerW < 10) return;
      var scale = containerW / 794;
      inner.style.transform = 'scale(' + scale + ')';
      inner.style.transformOrigin = 'top left';
      container.style.height = Math.round(inner.scrollHeight * scale) + 'px';
    }
