<script>
// ===== Firebase スケジュール・講習データ クライアントサイド関数 =====
// firebase-init.html で初期化された fbDb を使用

/**
 * 全スケジュールデータを取得（Firebase SDK）
 * google.script.run.getScheduleData の代替
 * @return {Promise<Array>} スケジュールデータ配列
 */
function fbGetScheduleData() {
  // 現在の年度（4月始まり）を基準に、前年度〜翌年度の3年分のみ取得
  var now = new Date();
  var m   = now.getMonth() + 1; // 1〜12
  var y   = now.getFullYear();
  var currentFiscalYear = (m >= 4) ? y : y - 1;

  return fbDb.collection('schedules')
    .where('fiscalYear', '>=', currentFiscalYear - 1)
    .where('fiscalYear', '<=', currentFiscalYear + 1)
    .get()
    .then(function(snapshot) {
      var results = [];
      snapshot.forEach(function(docSnap) {
        var doc = docSnap.data();
        results.push({
          timestamp: doc.timestamp || new Date().toISOString(),
          school:    doc.schoolName || '',
          eventType: doc.eventType  || '',
          schedule:  doc.scheduleDisplay || '',
          details:   doc.details    || '',
          source:    doc.source     || ''
        });
      });
      return results;
    })
    .catch(function(err) {
      console.error('fbGetScheduleDataエラー:', err);
      return [];
    });
}

/**
 * 講習スケジュールエントリを取得（Firebase SDK）
 * google.script.run.getLectureScheduleEntries の代替
 * 新構造: lectureId_campusCode の1ドキュメントに entries 配列で格納
 * @param {string} lectureId 講習ID
 * @param {string} campusCode 校舎コード
 * @return {Promise<Array>} エントリ配列
 */
function fbGetLectureScheduleEntries(lectureId, campusCode) {
  var normalizedCampus = String(campusCode || '').padStart(2, '0');
  var docId = String(lectureId) + '_' + normalizedCampus;

  return fbDb.collection('lectureEntries').doc(docId).get()
    .then(function(docSnap) {
      if (!docSnap.exists) return [];
      var data = docSnap.data();
      var rawEntries = Array.isArray(data.entries) ? data.entries : [];
      return rawEntries.map(function(e) {
        return {
          id:            e.entryId        || '',
          lectureId:     String(lectureId),
          campusCode:    normalizedCampus,
          date:          e.date          || '',
          startTime:     e.startTime     || '',
          durationSlots: Number(e.durationSlots) || 9,
          subject:       e.subject       || '',
          grade:         e.grade         || '',
          teacherName:   e.teacherName   || '',
          teacherEmail:  e.teacherEmail  || '',
          classLabel:    e.classLabel    || null,
          teacherId:     e.teacherId     || ''
        };
      });
    })
    .catch(function(err) {
      console.error('fbGetLectureScheduleEntriesエラー:', err);
      return [];
    });
}

/**
 * 全校舎の講習スケジュールエントリを一括取得（重複チェック用）
 * 新構造: lectureId フィールドでクエリして全校舎の1ドキュメントを取得し entries 配列をフラット化
 * @param {string} lectureId 講習ID
 * @return {Promise<Array>} エントリ配列（全校舎分）
 */
function fbGetAllLectureEntries(lectureId) {
  return fbDb.collection('lectureEntries')
    .where('lectureId', '==', String(lectureId))
    .get()
    .then(function(snapshot) {
      var entries = [];
      snapshot.forEach(function(docSnap) {
        var data = docSnap.data();
        var campusCode = data.campusCode || '';
        var rawEntries = Array.isArray(data.entries) ? data.entries : [];
        rawEntries.forEach(function(e) {
          entries.push({
            id:            e.entryId        || '',
            lectureId:     data.lectureId   || '',
            campusCode:    campusCode,
            date:          e.date          || '',
            startTime:     e.startTime     || '',
            durationSlots: Number(e.durationSlots) || 9,
            subject:       e.subject       || '',
            grade:         e.grade         || '',
            teacherName:   e.teacherName   || '',
            teacherEmail:  e.teacherEmail  || '',
            classLabel:    e.classLabel    || null,
            teacherId:     e.teacherId     || ''
          });
        });
      });
      return entries;
    })
    .catch(function(err) {
      console.error('fbGetAllLectureEntriesエラー:', err);
      return [];
    });
}

/**
 * 講習スケジュールエントリを一括保存（Firebase SDK）
 * google.script.run.saveLectureScheduleEntries の代替
 * 新構造: lectureId_campusCode の1ドキュメントに entries 配列で全置換
 * 権限チェック: 非管理者は他のユーザーのエントリを削除・変更不可
 *   （myTeacherId / isAdminUser グローバル変数を使用）
 * @param {string} lectureId 講習ID
 * @param {string} campusCode 校舎コード
 * @param {Array} entries エントリ配列
 * @return {Promise<Object>} { success, message, entries, error }
 */
function fbSaveLectureScheduleEntries(lectureId, campusCode, entries) {
  var normalizedCampus = String(campusCode || '').padStart(2, '0');
  var docId = String(lectureId) + '_' + normalizedCampus;
  var ref = fbDb.collection('lectureEntries').doc(docId);

  return ref.get()
    .then(function(docSnap) {
      var myTid   = (typeof myTeacherId  !== 'undefined') ? myTeacherId  : '';
      var isAdmin = (typeof isAdminUser  !== 'undefined') ? isAdminUser  : false;

      var existingEntries = (docSnap.exists && Array.isArray(docSnap.data().entries))
        ? docSnap.data().entries : [];

      // 保存に使うエントリ（権限チェック内で他ユーザーのエントリをマージする場合に拡張される）
      var entriesToSave = entries.slice();

      // 権限チェック: Admin以外は他人のエントリを変更・削除不可
      if (!isAdmin && myTid) {
        var existingOtherEntries = {};
        existingEntries.forEach(function(e) {
          var tid = e.teacherId || '';
          if (tid && tid !== myTid) {
            existingOtherEntries[e.entryId || ''] = {
              date:          String(e.date      || ''),
              startTime:     String(e.startTime || ''),
              durationSlots: String(Number(e.durationSlots) || 9),
              subject:       String(e.subject   || ''),
              grade:         String(e.grade     || ''),
              teacherId:     tid
            };
          }
        });
        var incomingOtherIds = {};
        entries.forEach(function(e) {
          var eTid = e.teacherId || '';
          if (eTid && eTid !== myTid) {
            incomingOtherIds[e.id] = {
              date:          String(e.date      || ''),
              startTime:     String(e.startTime || ''),
              durationSlots: String(Number(e.durationSlots) || 9),
              subject:       String(e.subject   || ''),
              grade:         String(e.grade     || ''),
              teacherId:     eTid
            };
          }
        });
        var otherKeys = Object.keys(existingOtherEntries);
        for (var m = 0; m < otherKeys.length; m++) {
          var eid = otherKeys[m];
          if (!incomingOtherIds[eid]) {
            // ローカルキャッシュが古く他ユーザーのエントリが含まれていない場合は
            // Firestore の既存エントリをそのままマージして保持する（拒否しない）
            var missingEntry = existingEntries.find(function(e2) { return (e2.entryId || '') === eid; });
            if (missingEntry) {
              entriesToSave.push({
                id:            missingEntry.entryId || eid,
                date:          missingEntry.date          || '',
                startTime:     missingEntry.startTime     || '',
                durationSlots: Number(missingEntry.durationSlots) || 9,
                subject:       missingEntry.subject       || '',
                grade:         missingEntry.grade         || '',
                teacherName:   missingEntry.teacherName   || '',
                teacherEmail:  missingEntry.teacherEmail  || '',
                classLabel:    missingEntry.classLabel    || null,
                teacherId:     missingEntry.teacherId     || ''
              });
            }
            continue;
          }
          var orig = existingOtherEntries[eid];
          var inc  = incomingOtherIds[eid];
          if (orig.date !== inc.date || orig.startTime !== inc.startTime ||
              orig.durationSlots !== inc.durationSlots ||
              orig.subject !== inc.subject || orig.grade !== inc.grade) {
            return Promise.resolve({ success: false, error: '他のユーザーのエントリは変更できません' });
          }
        }
      }

      // エントリIDを確定して保存データを構築
      var savedEntries = [];
      var newEntries = entriesToSave.map(function(e) {
        var entryId = e.id || ('ent_' + new Date().getTime() + '_' + Math.floor(Math.random() * 10000));
        var eData = {
          entryId:       entryId,
          date:          String(e.date         || ''),
          startTime:     String(e.startTime    || ''),
          durationSlots: Number(e.durationSlots) || 9,
          subject:       String(e.subject      || ''),
          grade:         String(e.grade        || ''),
          teacherName:   String(e.teacherName  || ''),
          teacherEmail:  String(e.teacherEmail || ''),
          classLabel:    e.classLabel || null,
          teacherId:     String(e.teacherId    || '')
        };
        savedEntries.push({
          id: entryId, lectureId: String(lectureId), campusCode: normalizedCampus,
          date: eData.date, startTime: eData.startTime, durationSlots: eData.durationSlots,
          subject: eData.subject, grade: eData.grade, teacherName: eData.teacherName,
          teacherEmail: eData.teacherEmail, classLabel: eData.classLabel, teacherId: eData.teacherId
        });
        return eData;
      });

      // 1ドキュメントに entries 配列として保存
      return ref.set({
        lectureId:  String(lectureId),
        campusCode: normalizedCampus,
        entries:    newEntries,
        updatedAt:  new Date().toISOString()
      }).then(function() {
        return { success: true, message: entriesToSave.length + '件を保存しました', entries: savedEntries };
      });
    })
    .catch(function(err) {
      console.error('fbSaveLectureScheduleEntriesエラー:', err);
      return { success: false, error: err.message || String(err) };
    });
}
</script>
