    /**
     * ブラウザ標準 confirm() の代替。カスタムモーダルを表示し Promise<boolean> を返す
     * @param {string} message 表示メッセージ（改行対応）
     * @return {Promise<boolean>} OK なら true、キャンセルなら false
     */
    function appConfirm(message) {
      return new Promise(function(resolve) {
        var overlay = document.getElementById('appDialogOverlay');
        var modal   = document.getElementById('appDialogModal');
        var body    = document.getElementById('appDialogBody');
        var buttons = document.getElementById('appDialogButtons');

        body.textContent = '';
        message.split('\n').forEach(function(line, i) {
          if (i > 0) body.appendChild(document.createElement('br'));
          body.appendChild(document.createTextNode(line));
        });

        buttons.innerHTML =
          '<button class="dialog-btn dialog-cancel">キャンセル</button>' +
          '<button class="dialog-btn dialog-ok">OK</button>';

        overlay.style.display = 'block';
        modal.style.display   = 'block';

        function close(result) {
          overlay.style.display = 'none';
          modal.style.display   = 'none';
          resolve(result);
        }

        buttons.querySelector('.dialog-ok').onclick     = function() { close(true); };
        buttons.querySelector('.dialog-cancel').onclick  = function() { close(false); };
        overlay.onclick = function() { close(false); };
      });
    }

    /**
     * ブラウザ標準 alert() の代替。カスタムモーダルを表示し Promise<void> を返す
     * @param {string} message 表示メッセージ（改行対応）
     * @return {Promise<void>}
     */
    function appAlert(message) {
      return new Promise(function(resolve) {
        var overlay = document.getElementById('appDialogOverlay');
        var modal   = document.getElementById('appDialogModal');
        var body    = document.getElementById('appDialogBody');
        var buttons = document.getElementById('appDialogButtons');

        body.textContent = '';
        message.split('\n').forEach(function(line, i) {
          if (i > 0) body.appendChild(document.createElement('br'));
          body.appendChild(document.createTextNode(line));
        });

        buttons.innerHTML =
          '<button class="dialog-btn dialog-ok-only">OK</button>';

        overlay.style.display = 'block';
        modal.style.display   = 'block';

        function close() {
          overlay.style.display = 'none';
          modal.style.display   = 'none';
          resolve();
        }

        buttons.querySelector('.dialog-ok-only').onclick = function() { close(); };
        overlay.onclick = function() { close(); };
      });
    }

    /**
     * 画面下部にトースト通知を一時表示する（自動保存完了時など）
     * @param {string} msg 表示メッセージ
     * @param {string} type 'success' または 'error'
     */
    var _toastTimer = null;
    function showToast(msg, type) {
      var el = document.getElementById('toastNotification');
      if (!el) return;
      if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
      el.className = 'toast-notification';
      el.style.display = 'none';
      el.textContent = msg;
      void el.offsetWidth;
      var toastClass = type === 'error' ? 'toast-error' : type === 'info' ? 'toast-info' : 'toast-success';
      el.classList.add(toastClass);
      el.classList.add('toast-show');
      el.style.display = 'block';
      var duration = type === 'error' ? 4000 : 2500;
      _toastTimer = setTimeout(function() {
        el.classList.remove('toast-show');
        el.classList.add('toast-hide');
        setTimeout(function() {
          el.style.display = 'none';
          el.className = 'toast-notification';
        }, 300);
      }, duration);
    }

    /**
     * テーマカラーをアプリ全体に適用する
     * CSS変数 --theme-color / --theme-color-light を更新し、meta theme-colorも変更する
     * @param {string} color 16進数カラーコード（例: #43e97b）
     */
    function applyThemeColor(color) {
      if (!color || !/^#[0-9a-fA-F]{6}$/.test(color)) return;
      // メインカラーを適用
      document.documentElement.style.setProperty('--theme-color', color);
      // サブカラー（ライト）を自動計算：RGB各値を255に向けて30%明るくする
      var r = parseInt(color.slice(1, 3), 16);
      var g = parseInt(color.slice(3, 5), 16);
      var b = parseInt(color.slice(5, 7), 16);
      var lr = Math.min(255, Math.round(r + (255 - r) * 0.3));
      var lg = Math.min(255, Math.round(g + (255 - g) * 0.3));
      var lb = Math.min(255, Math.round(b + (255 - b) * 0.3));
      var light = '#' + lr.toString(16).padStart(2, '0') + lg.toString(16).padStart(2, '0') + lb.toString(16).padStart(2, '0');
      document.documentElement.style.setProperty('--theme-color-light', light);
      // meta theme-color（ブラウザのタブ・アドレスバー色）も更新
      var metaEl = document.getElementById('metaThemeColor');
      if (metaEl) metaEl.setAttribute('content', color);
    }

  /**
   * 校舎ドロップダウンの <option> HTML を生成する
   * 配属校舎（preferredCampuses）が先頭に来る。それ以外は元の順序で続く。
   * 【ルール】校舎選択欄を作る際は必ずこの関数を使うこと（CLAUDE.md参照）
   * @param {Array} campuses {code, name} の配列
   * @param {string} [placeholder] 先頭に表示するテキスト（デフォルト: "選択してください"）
   * @return {string} <option>タグのHTML文字列
   */
  function buildCampusOptions(campuses, placeholder) {
    var pref = preferredCampuses || [];
    var preferred = campuses.filter(function(c) { return pref.indexOf(c.code) !== -1; });
    var others    = campuses.filter(function(c) { return pref.indexOf(c.code) === -1; });
    var sorted    = preferred.concat(others);
    var html = '<option value="">' + (placeholder || '選択してください') + '</option>';
    sorted.forEach(function(c) {
      html += '<option value="' + c.code + '">' + c.name + '</option>';
    });
    return html;
  }

    var matEl = document.getElementById('mat-campus-select');

    var flyerEl = document.getElementById('flyerAiCampusSelect');
    if (inputEl) inputEl.innerHTML = opts;
    if (scoreEl) scoreEl.innerHTML = opts;
    if (reportEl) reportEl.innerHTML = opts;
    if (matEl) matEl.innerHTML = buildCampusOptions(arr, '校舎');
    if (matWebEl) matWebEl.innerHTML = buildCampusOptions(arr, '校舎');
    if (flyerEl) {
      var commonOpt = '<option value="">校舎を選択</option><option value="common">📋 共通</option>';
      flyerEl.innerHTML = commonOpt + buildCampusOptions(arr);

  /**
   * プロフィール欄の「配属校舎」チェックボックスを描画する
   * campusData が未ロードの場合は読み込み中を表示して早期リターン
   */
  function renderPreferredCampusCheckboxes() {
    var container = document.getElementById('preferredCampusContainer');
    if (!container) return;
    var codes = Object.keys(campusData);
    if (codes.length === 0) {
      container.innerHTML = '<small style="color:#999;">校舎データを読み込み中...</small>';
      return;
    }
    var html = '';
    codes.forEach(function(code) {
      var checked = preferredCampuses.indexOf(code) !== -1 ? ' checked' : '';
      html += '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0;">'
            + '<input type="checkbox" class="preferred-campus-cb" value="' + code + '"' + checked
            + ' onchange="onPreferredCampusChange()" style="width:16px;height:16px;cursor:pointer;">'
            + campusData[code] + '</label>';
    });
    container.innerHTML = html;
  }

  /**
   * 配属校舎チェックボックスの変更時に呼ばれる。即座に自動保存し、全校舎ドロップダウンを再描画する。
   */
  function onPreferredCampusChange() {
    var codes = [];
    document.querySelectorAll('.preferred-campus-cb:checked').forEach(function(cb) { codes.push(cb.value); });
    preferredCampuses = codes;
    var statusEl = document.getElementById('preferredCampusSaveStatus');
    if (statusEl) statusEl.textContent = '保存中...';
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.success) {
          showToast('✓ 配属校舎を保存しました', 'success');
        } else {
          showToast('❌ 配属校舎の保存に失敗しました', 'error');

        if (statusEl) statusEl.textContent = result.success ? '✓ 保存しました' : '❌ ' + result.error;

  // ===== 起動処理 =====

  document.addEventListener('DOMContentLoaded', function() {
    // Firebase Auth の認証状態確認後にアプリを起動する
    if (typeof onFbAuthReady === 'function') {
      onFbAuthReady(startAppAfterAuth_);
    } else {
      // Firebase 未設定の場合はそのまま起動（フォールバック）
      startAppAfterAuth_();
    }
  });

  /**
   * オーバーライド系データ7種（基礎学力テスト・休校日・講習期間・締切等）を一括取得する。
   * 起動の早い段階で発火させ、最初の renderCalendar() 時点で講習日程締切・理科社会日程締切が
   * 出るようにするため、startAppAfterAuth_ と initializeApp の両方から呼ばれる。
   * bundleLoadStarted_ フラグで二重呼び出しを防止。
   */
  function loadScheduleOverridesBundle_() {
    if (bundleLoadStarted_) return;
    bundleLoadStarted_ = true;
    google.script.run
      .withSuccessHandler(function(bundle) {
        basicTestDateOverrides = bundle.basicTestDates || {};
        basicTestDetailsOverrides = bundle.basicTestDetails || {};
        jukuEventOverrides = bundle.jukuEvents || {};
        closedDayOverrides = bundle.closedDays || { add: [], del: [] };
        pubHighExamDateOverrides = bundle.pubHighExamDates || {};
        scheduleLecturePeriods = Array.isArray(bundle.lecturePeriods) ? bundle.lecturePeriods : [];
        lectureDeadlineOverrides = bundle.lectureDeadlines || {};
        overridesLoadedCount = 7;
        renderCalendar();
      })
      .withFailureHandler(function() {
        overridesLoadedCount = 7;
        renderCalendar();
      })
      .getScheduleOverridesBundle();
  }

  /**
   * Firebase Auth でログイン確認後に実行するアプリ起動処理
   */
  function startAppAfterAuth_() {
    // getAppStartupData・getScheduleData・アニメーション の3つが揃ったらスプラッシュを閉じる

    // フェイルセーフ: 30秒経ってもスプラッシュが閉じない場合は強制起動
    setTimeout(function() {
      if (startupApplied_) return;
      var splash = document.getElementById('splashScreen');
      if (splash && !splash.classList.contains('splash-fade-out')) {
        console.warn('[startup] スプラッシュ画面タイムアウト（30秒） — 強制起動');
        startupApplied_ = true;
        if (splashStartupData_) {
          applyStartupData_(splashStartupData_);
        } else {
          hideSplashScreen();
          initializeApp();
          setupTabNavigation();
          checkAdminTabVisibility();
        }
      }
    }, 30000);

    // スケジュールデータを先行読み込み（バックグラウンド：起動をブロックしない）
    fbGetScheduleData()
      .then(function(schedules) {
        onScheduleDataLoaded(schedules); // カレンダーデータをセット（アプリ起動後でもOK）
      })
      .catch(function() {
        // スケジュール取得失敗 — カレンダーは空表示のまま
      });
    scheduleLoadStarted_ = true;

    // オーバーライド系データ（講習期間・休校日・基礎学力テスト等）を早期に並列取得
    // initializeApp() は applyStartupData_ 後に呼ばれ ~4.8 秒待つため、ここで先行発火させて
    // 最初の renderCalendar() 時点で講習日程締切・理科社会日程締切が表示されるようにする
    loadScheduleOverridesBundle_();

    // 起動データを取得
    google.script.run
      .withSuccessHandler(function(data) {
        if (data && data.success) {
          splashStartupData_ = data;
          checkStartupComplete_();
        } else {
          // フォールバック: 旧来の起動フロー
          initializeApp();
          setupTabNavigation();
          checkAdminTabVisibility();
        }
      })
      .withFailureHandler(function() {
        // 失敗時は旧来の起動フローで起動
        initializeApp();
        setupTabNavigation();
        checkAdminTabVisibility();
      })
      // Firebase Auth メール＋UIDを渡す（Session.getActiveUser() が空の場合のフォールバック用）
      .getAppStartupData(window.fbUserEmail || '', (window.fbCurrentUser && window.fbCurrentUser.uid) || '');
  }

  /**
   * getAppStartupData() の結果を受け取り、スプラッシュ画面を即座に閉じて
   * アプリを表示する。ロゴ・ファビコン・スケジュールはバックグラウンドで続けて読み込む。
   */
  function applyStartupData_(data) {
    // 初回セットアップチェック
    if (data.isFirstSetup) {
      showSetupWizard(data.currentUserEmail, data.appFolderId || '', data.accessFolderId || '');
      return;
    }

    // 講師ID入力が必要な場合（初回アクセス・未紐付けアカウント）
    if (data.needsIdInput) {
      showIdInputScreen_();
      return;
    }

    // テーマカラーを即座に適用
    if (data.themeColor) {
      applyThemeColor(data.themeColor);
    }

    // 配属校舎を早期セット（講習管理タブなど、設定タブより先に開いた場合も正しく動くように）
    if (Array.isArray(data.preferredCampuses)) {
      preferredCampuses = data.preferredCampuses;
    }

    // 講習担当学年を早期セット（設定タブより先に講習タブが開かれても正しく動くように）
    if (Array.isArray(data.lecGrades)) {
      lecGrades = data.lecGrades;
    }

    // 最後に生成したテスト分析のメタ情報をキャッシュ（全スタッフのAIウィジェットチップに反映）
    if (data.lastAnalysisMeta && data.lastAnalysisMeta.testName) {
      try { localStorage.setItem('s-quire-last-analysis', JSON.stringify(data.lastAnalysisMeta)); } catch (e) {}
    }

    // ヘッダーのユーザー情報を設定
    var userEl = document.getElementById('currentUser');
    if (userEl) userEl.textContent = '👤 ' + (data.displayName || '名前未設定');

    // Admin タブの表示制御（getUserRoleInfo API呼び出し不要）
    var adminTabBtn = document.getElementById('adminTabButton');
    if (adminTabBtn) {
      if (data.isAdmin) {
        adminTabBtn.style.display = 'block';
        isAdminUser = true;
        if (!adminTabPreloaded) { loadUsersList(); adminTabPreloaded = true; }
      } else {
        adminTabBtn.style.display = 'none';
      }
    }

    // currentSettings に基本データを事前設定（getSettings() が返るまでの間も機能するように）
    currentSettings = {
      themeColor: data.themeColor,
      displayName: data.displayName,
      currentUser: data.currentUserEmail,
      geminiApiKey: data.geminiApiKey,
      geminiApiKeyBackup: data.geminiApiKeyBackup,
      appFolderId: data.appFolderId,
      aiAssistantName: data.aiAssistantName,
      aiPersonality: data.aiPersonality
    };

    // タブナビゲーション設定
    setupTabNavigation();

    // 設定タブのデータを事前読み込み（二重呼び出し防止ガードあり）
    preloadTabData();

    // スプラッシュ画面を閉じる（ここがキーポイント：ロゴ・スケジュールを待たない）
    hideSplashScreen();

    // バックグラウンドでロゴ・ファビコン・スケジュールデータを読み込む
    initializeApp();
  }

  // アクセス拒否画面を表示（未登録・未許可のGoogleアカウントでアクセスした時）

  window.switchAccountAndReload_ = function() {
    var provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    fbAuth.signInWithPopup(provider).then(function() {
      var overlay = document.getElementById('idInputOverlay');
      if (overlay) overlay.remove();
    }).catch(function(error) {
      console.error('アカウント切り替えエラー:', error);
    });
  };

  function startHeaderClock() {
      var el = document.getElementById('headerClock');
      if (!el) return;
      function update() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        el.textContent = h + ':' + m;
      }
      update();
      setInterval(update, 60000);
    }

    function initializeApp() {
      startHeaderClock();

      // ユーザー情報と設定を取得
      google.script.run
        .withSuccessHandler(onSettingsLoaded)
        .withFailureHandler(onError)
        .getSettings();
      
      // スケジュールデータを取得（DOMContentLoaded で既に開始済みの場合はスキップ）
      if (!scheduleLoadStarted_) {
        fbGetScheduleData().then(onScheduleDataLoaded).catch(onError);
      }

      // オーバーライド系データの読み込み完了時にカレンダー再描画（スケジュールより後に到着した場合の補正）
      function onOverrideLoaded_() {
        overridesLoadedCount++;
        if (overridesLoadedCount >= 7 && allSchedules.length > 0) {
          renderCalendar();
        }
      }

      // オーバーライド系データ7種を一括取得（startAppAfterAuth_ で先行発火していなければここで取得）
      loadScheduleOverridesBundle_();

      // 祝日データをスクリプトプロパティのキャッシュから取得（時間トリガーで毎日更新済み）
      google.script.run
        .withSuccessHandler(function(holidays) {
          if (holidays && Object.keys(holidays).length > 0) {
            googleCalendarHolidays = holidays;
          }
          // キャッシュ未作成の場合は null のまま → isWeekendOrHoliday() がアルゴリズム計算にフォールバック
        })
        .withFailureHandler(function() {})
        .getCachedHolidays();

      // preloadTabData() が既に呼ばれている場合は重複GAS呼び出しをスキップ
      // （同時リクエスト過多でGASがHTML応答を返し通信エラーになるのを防ぐ）
      if (!tabDataPreloaded_) {
        // フォールバックパス（getAppStartupData失敗時等）では
        // preloadTabData() が呼ばれていないため、ここで取得する
        google.script.run
          .withSuccessHandler(function(result) {
            preloadedProfile = result;
          })
          .withFailureHandler(function() {})
          .getUserProfile();

        google.script.run
          .withSuccessHandler(function(result) {
            preloadedNotificationSettings = result;
          })
          .withFailureHandler(function() {})
          .getNotificationSettings();

        google.script.run
          .withSuccessHandler(function(result) {
            preloadedLineSchedulerNotifPrefs = result;
          })
          .withFailureHandler(function() {})
          .getLineSchedulerNotifPrefs();

        loadDropdownData();
      }
    }

    function openDrawer() {
      document.getElementById('drawerPanel').classList.add('open');
      document.getElementById('drawerOverlay').style.display = 'block';
    }

    function closeDrawer() {
      document.getElementById('drawerPanel').classList.remove('open');
      document.getElementById('drawerOverlay').style.display = 'none';
    }

    // スワイプでドロワーを開閉（document レベルで座標判定）
    (function() {
      var startX = 0, startY = 0, isInZone = false;
      document.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        // ヘッダー(56px)より下 かつ 画面左20%ならスワイプゾーン判定
        isInZone = (startX <= window.innerWidth * 0.2 && startY >= 56);
      }, { passive: true });
      document.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) < Math.abs(dy) * 1.5) return; // 縦スクロールは無視
        var panel = document.getElementById('drawerPanel');
        // 【開く】左端ゾーンからの右スワイプ
        if (isInZone && dx > 30) { openDrawer(); return; }
        // 【閉じる】ドロワーが開いているとき左スワイプ
        if (Math.abs(dx) >= 40 && dx < 0 && panel.classList.contains('open')) closeDrawer();
      }, { passive: true });
    })();

    /**
     * サブタブバーの無限ループスクロールを初期化する（汎用・モバイル専用）
     * 画面幅800px未満のときのみ有効。タブボタンを前後にクローンし、スクロール端に達したら本物の位置にジャンプする
     * @param {string} containerId タブバーコンテナのID
     */
    var _loopContainerIds = [];
    var _loopResizeTimer = null;

    function initSubTabLoop(containerId) {
      // リサイズ管理用の配列に登録（重複防止）
      if (_loopContainerIds.indexOf(containerId) === -1) {
        _loopContainerIds.push(containerId);
      }

      var container = document.getElementById(containerId);
      if (!container) return;

      // PC（800px以上）ではループを無効化
      if (window.innerWidth >= 800) {
        destroySubTabLoop(containerId);
        return;
      }

      // 既に初期化済みならスキップ
      if (container.dataset.loopInit) return;
      container.dataset.loopInit = '1';

      // オリジナルボタンを収集（コンテナ直下のbutton要素）
      var origBtns = Array.prototype.slice.call(container.querySelectorAll('button'));
      if (origBtns.length === 0) return;

      // 前後にクローンを追加（data-clone属性で識別）
      origBtns.forEach(function(btn) {
        var after = btn.cloneNode(true);
        after.classList.remove('active');
        after.setAttribute('data-clone', '1');
        container.appendChild(after);
      });
      var frag = document.createDocumentFragment();
      origBtns.forEach(function(btn) {
        var before = btn.cloneNode(true);
        before.classList.remove('active');
        before.setAttribute('data-clone', '1');
        frag.appendChild(before);
      });
      container.insertBefore(frag, container.firstChild);

      // 1セット分の幅とオリジナルセットの開始位置を計算
      var realStart = origBtns[0].offsetLeft;
      var setWidth = 0;
      origBtns.forEach(function(btn) { setWidth += btn.offsetWidth; });

      // 初期スクロール位置をオリジナルセットの先頭に
      container.scrollLeft = realStart;

      // レイアウト再計算用の関数を保存
      container._loopOrigBtns = origBtns;
      container._updateLoopLayout = function() {
        realStart = origBtns[0].offsetLeft;
        setWidth = 0;
        origBtns.forEach(function(btn) { setWidth += btn.offsetWidth; });
      };

      // スクロール終了時にクローン領域→本物領域へジャンプ（デバウンス100ms）
      var jumpTimer = null;
      container._loopScrollHandler = function() {
        clearTimeout(jumpTimer);
        jumpTimer = setTimeout(function() {
          var sl = container.scrollLeft;
          if (sl < realStart - 5) {
            container.style.scrollBehavior = 'auto';
            container.scrollLeft = sl + setWidth;
            container.style.scrollBehavior = '';
          } else if (sl > realStart + setWidth + 5) {
            container.style.scrollBehavior = 'auto';
            container.scrollLeft = sl - setWidth;
            container.style.scrollBehavior = '';
          }
        }, 100);
      };
      container.addEventListener('scroll', container._loopScrollHandler, { passive: true });
    }

    /**
     * サブタブバーの無限ループスクロールを解除する
     * クローンを削除し、イベントリスナーを解除して通常表示に戻す
     * @param {string} containerId タブバーコンテナのID
     */
    function destroySubTabLoop(containerId) {
      var container = document.getElementById(containerId);
      if (!container || !container.dataset.loopInit) return;

      // スクロールリスナーを解除
      if (container._loopScrollHandler) {
        container.removeEventListener('scroll', container._loopScrollHandler);
        container._loopScrollHandler = null;
      }

      // クローンボタンを削除（data-clone属性で識別）
      Array.prototype.slice.call(container.querySelectorAll('button[data-clone]'))
        .forEach(function(btn) { container.removeChild(btn); });

      // 状態をリセット（再初期化可能にする）
      delete container.dataset.loopInit;
      container._loopOrigBtns = null;
      container._updateLoopLayout = null;
      container.scrollLeft = 0;
    }

    // 集中リサイズハンドラ: モバイル↔PC切り替え時にループを有効/無効化
    window.addEventListener('resize', function() {
      clearTimeout(_loopResizeTimer);
      _loopResizeTimer = setTimeout(function() {
        var isMobile = window.innerWidth < 800;
        _loopContainerIds.forEach(function(id) {
          var container = document.getElementById(id);
          if (!container) return;
          if (isMobile) {
            if (!container.dataset.loopInit) {
              initSubTabLoop(id);
            } else if (container._updateLoopLayout) {
              container._updateLoopLayout();
            }
          } else {
            destroySubTabLoop(id);
          }
        });
      }, 200);
    });

    /**
     * 開始日の前日からcount日前を計算し、その日が日曜・休校日なら前の営業日に調整して返す（予定タブ締切日計算用）
     * 例: 開始日7/20 count=28 → 7/19 - 28日 = 6/21 → 日曜なら6/20、休校日なら前日...と調整
     * @param {Date} startDate 講習開始日
     * @param {number} count 遡る日数（カレンダー日数）
     * @param {Object} closedDays 休校日マップ（dateKey: YYYY-MM-DD → true）
     * @return {Date} 締切日
     */
    function countBackLecDeadline_(startDate, count, closedDays) {
      var current = new Date(startDate.getTime());
      current.setDate(current.getDate() - 1);   // 開始日の前日
      current.setDate(current.getDate() - count); // カレンダー上でcount日前
      // その日が日曜・休校日なら前の営業日にずらす
      for (var i = 0; i < 14; i++) {
        var dow = current.getDay();
        var mm = current.getMonth() + 1;
        var dd = current.getDate();
        var key = current.getFullYear() + '-' + (mm < 10 ? '0' : '') + mm + '-' + (dd < 10 ? '0' : '') + dd;
        if (dow !== 0 && !closedDays[key]) break;
        current.setDate(current.getDate() - 1);
      }
      return current;
    }

    /**
     * 指定月に含まれる講習日程締切の仮想イベント配列を返す
     * 締切日 = 手動上書きがあればその日付、なければ開始日から指定日数前（日曜・休校日なら前の営業日）
     * 春期・夏期・冬期講習: 14日前 / その他（基礎学力テスト対策・入試直前など）: 28日前
     * @param {number} calYear 表示年
     * @param {number} calMonth 表示月（1〜12）
     * @return {Array} 仮想イベント配列
     */
    function getLectureDeadlineEventsForMonth(calYear, calMonth) {
      var result = [];
      scheduleLecturePeriods.forEach(function(lp) {
        if (!lp.startDate) return;
        var deadline;
        // 手動上書き設定があればそれを使用
        if (lp.id && lectureDeadlineOverrides[lp.id]) {
          var op = lectureDeadlineOverrides[lp.id].split('-');
          if (op.length === 3) {
            deadline = new Date(parseInt(op[0]), parseInt(op[1]) - 1, parseInt(op[2]));
          }
        }
        if (!deadline) {
          // 自動計算
          var parts = lp.startDate.split('-');
          if (parts.length < 3) return;
          var startDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
          var sm = startDate.getMonth() + 1; // 1〜12
          var fy;
          if (lp.name && lp.name.indexOf('春期') !== -1 && sm < 4) {
            fy = startDate.getFullYear() - 1; // 春期3月 → FY前年
          } else {
            fy = sm >= 4 ? startDate.getFullYear() : startDate.getFullYear() - 1;
          }
          var closedDays = getClosedDays(fy);
          closedDayOverrides.del.forEach(function(d) { delete closedDays[d]; });
          closedDayOverrides.add.forEach(function(d) { closedDays[d] = true; });
          // 春期・夏期・冬期は42日前（28+14）、それ以外は28日前
          var name = lp.name || '';
          var daysBack = (name.indexOf('春期') !== -1 || name.indexOf('夏期') !== -1 || name.indexOf('冬期') !== -1) ? 42 : 28;
          deadline = countBackLecDeadline_(startDate, daysBack, closedDays);
        }
        if (deadline.getFullYear() === calYear && deadline.getMonth() + 1 === calMonth) {
          result.push({
            day: deadline.getDate(),
            school: '塾',
            eventType: '講習日程締切',
            details: lp.name,
            schedule: calYear + '年' + calMonth + '月' + deadline.getDate() + '日',
            _virtual: true
          });
        }
      });
      return result;
    }

    /**
     * 指定月に含まれる「理科・社会の日程締切」（T-7日、日曜・休校日なら前営業日へ繰り上げ）の仮想イベント配列を返す
     * 対象: 春期・夏期・冬期講習のみ
     * @param {number} calYear 表示年
     * @param {number} calMonth 表示月（1〜12）
     * @return {Array} 仮想イベント配列
     */
    function getLectureSubjectDeadlineEventsForMonth(calYear, calMonth) {
      var result = [];
      scheduleLecturePeriods.forEach(function(lp) {
        if (!lp.startDate) return;
        var name = lp.name || '';
        // 対象は春期・夏期・冬期のみ
        if (name.indexOf('春期') === -1 && name.indexOf('夏期') === -1 && name.indexOf('冬期') === -1) return;

        // T日（既存ロジックと同じ: 手動上書き優先、なければ自動計算）
        var tDate;
        if (lp.id && lectureDeadlineOverrides[lp.id]) {
          var op = lectureDeadlineOverrides[lp.id].split('-');
          if (op.length === 3) {
            tDate = new Date(parseInt(op[0]), parseInt(op[1]) - 1, parseInt(op[2]));
          }
        }
        var parts = lp.startDate.split('-');
        if (parts.length < 3) return;
        var startDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        var sm = startDate.getMonth() + 1;
        var fy;
        if (name.indexOf('春期') !== -1 && sm < 4) {
          fy = startDate.getFullYear() - 1;
        } else {
          fy = sm >= 4 ? startDate.getFullYear() : startDate.getFullYear() - 1;
        }
        var closedDays = getClosedDays(fy);
        closedDayOverrides.del.forEach(function(d) { delete closedDays[d]; });
        closedDayOverrides.add.forEach(function(d) { closedDays[d] = true; });
        if (!tDate) {
          // 春期・夏期・冬期は42日前
          tDate = countBackLecDeadline_(startDate, 42, closedDays);
        }

        // T日から7日戻し、日曜・休校日なら前営業日へ繰り上げ
        var subj = new Date(tDate.getTime());
        subj.setDate(subj.getDate() - 7);
        for (var i = 0; i < 14; i++) {
          var dow = subj.getDay();
          var mm = subj.getMonth() + 1;
          var dd = subj.getDate();
          var key = subj.getFullYear() + '-' + (mm < 10 ? '0' : '') + mm + '-' + (dd < 10 ? '0' : '') + dd;
          if (dow !== 0 && !closedDays[key]) break;
          subj.setDate(subj.getDate() - 1);
        }

        if (subj.getFullYear() === calYear && subj.getMonth() + 1 === calMonth) {
          result.push({
            day: subj.getDate(),
            school: '塾',
            eventType: '理科・社会 日程締切',
            details: name,
            schedule: calYear + '年' + calMonth + '月' + subj.getDate() + '日',
            _virtual: true,
            _subjectDeadline: true
          });
        }
      });
      return result;
    }

    /**
     * 指定月の全日カレンダーHTMLを4列テーブル（日付|塾|中学校|高校）で生成する
     * @param {number} year 年
     * @param {number} month 月（1〜12）
     * @return {string} カレンダーHTML
     */
    function buildMonthHTML(year, month) {
      var dayNames = ['日', '月', '火', '水', '木', '金', '土'];
      var reportMonthLabels = {4: '春期講習', 9: '夏期講習', 10: '第1回基礎学', 11: '第2回基礎学', 1: '冬期講習', 3: '直前講座'};
      var daysInMonth = new Date(year, month, 0).getDate();
      var todayDate = new Date();
      var fiscalYear = month >= 4 ? year : year - 1;

      // 塾の休校日を計算
      var cDays = getClosedDays(fiscalYear);
      closedDayOverrides.del.forEach(function(d) { delete cDays[d]; });
      closedDayOverrides.add.forEach(function(d) { cDays[d] = true; });

      // 塾の仮想イベント（○□★△）を日付キーで準備
      var jukuVirtualByDay = {};
      var resolveJukuEvent = function(type, computedDay) {
        var ovKey = type + '_' + year + '_' + month;
        var ov = jukuEventOverrides[ovKey];
        if (ov === false) return null;
        if (ov && ov.date) {
          var p = ov.date.split('/');
          return { day: parseInt(p[2]), details: ov.details || '' };
        }
        var defaultDetails = (type === 'meeting') ? '14:00' : '';
        return computedDay ? { day: computedDay, details: defaultDetails } : null;
      };
      var pushJukuVirtual = function(day, eventType, res) {
        if (!jukuVirtualByDay[day]) jukuVirtualByDay[day] = [];
        jukuVirtualByDay[day].push({ school: '塾', eventType: eventType, details: res.details, schedule: year + '年' + month + '月' + res.day + '日', _virtual: true });
      };
      var rRes = resolveJukuEvent('report', getReportDay(year, month));
      if (rRes) pushJukuVirtual(rRes.day, '○ 回数報告書提出日', rRes);
      var mRes = resolveJukuEvent('meeting', getMeetingDay(year, month));
      if (mRes) pushJukuVirtual(mRes.day, '□ 全体ミーティング', mRes);
      var dbt = getDebitDays(year, month);
      var dRes = resolveJukuEvent('debit', dbt.debit);
      if (dRes) pushJukuVirtual(dRes.day, '★ 引落データ送信日', dRes);
      var eRes = resolveJukuEvent('email', dbt.email);
      if (eRes) pushJukuVirtual(eRes.day, '△ メール送信日', eRes);

      // 基礎学力テスト仮想イベント
      var basicTestByDay = {};
      getBasicTestEventsForMonth(year, month).forEach(function(ev) {
        if (!basicTestByDay[ev.day]) basicTestByDay[ev.day] = [];
        basicTestByDay[ev.day].push(ev);
      });

      // 公立高校一般選抜仮想イベント
      var pubHighExamByDay = {};
      getPublicHighSchoolExamDaysForMonth(year, month).forEach(function(ev) {
        if (!pubHighExamByDay[ev.day]) pubHighExamByDay[ev.day] = [];
        pubHighExamByDay[ev.day].push(ev);
      });

      // 講習日程締切仮想イベント
      var lecDeadlineByDay = {};
      getLectureDeadlineEventsForMonth(year, month).forEach(function(ev) {
        if (!lecDeadlineByDay[ev.day]) lecDeadlineByDay[ev.day] = [];
        lecDeadlineByDay[ev.day].push(ev);
      });

      // 理科・社会 日程締切（T-7日）仮想イベント
      var subjectDeadlineByDay = {};
      getLectureSubjectDeadlineEventsForMonth(year, month).forEach(function(ev) {
        if (!subjectDeadlineByDay[ev.day]) subjectDeadlineByDay[ev.day] = [];
        subjectDeadlineByDay[ev.day].push(ev);
      });

      // イベント1件分のHTML生成ヘルパー
      var renderEvent = function(event, typeCls) {
        var displayDetails = event.details || '';
        if (event.eventType && event.eventType.indexOf('回数報告書') !== -1 && reportMonthLabels[month]) {
          displayDetails = reportMonthLabels[month] + (displayDetails ? '　' + displayDetails : '');
        }
        var showSchool = (typeCls !== 'juku');
        var itemExtraCls = event._closedDay ? ' event-closed-day' : (event._subjectDeadline ? ' event-juku-virtual event-subject-deadline' : (event._virtual ? ' event-juku-virtual' : ''));
        return '<div class="event-item ' + typeCls + itemExtraCls + '" onclick=\'addToGoogleCalendar(' +
          JSON.stringify(event).replace(/'/g, "\\'") + ')\'>' +
          (showSchool ? '<div class="event-school">' + event.school + '</div>' : '') +
          '<div class="event-name">' + event.eventType + '</div>' +
          (displayDetails ? '<div class="event-details">' + displayDetails + '</div>' : '') +
          '</div>';
      };

      // テーブル開始（theadは固定ヘッダーdivに分離済み。colgroupで列幅を明示）
      var html = '<table class="month-table"><colgroup>' +
        '<col style="width:36px">' +
        '<col style="width:calc((100% - 36px) / 3)">' +
        '<col style="width:calc((100% - 36px) / 3)">' +
        '<col style="width:calc((100% - 36px) / 3)">' +
        '</colgroup><tbody>';

      for (var day = 1; day <= daysInMonth; day++) {
        var date = new Date(year, month - 1, day);
        var dayOfWeek = date.getDay();
        var dayName = dayNames[dayOfWeek];

        // 休校日・祝日判定用のゼロパディング済みキー
        var mmP = month < 10 ? '0' + month : '' + month;
        var ddP = day < 10 ? '0' + day : '' + day;
        var dateKeyPadded = year + '-' + mmP + '-' + ddP;

        // 祝日判定（dateKeyPadded を使用 — googleCalendarHolidays のキーはゼロパディング済み）
        var isHolidayDate = false;
        if (dayOfWeek !== 0 && dayOfWeek !== 6) {
          if (googleCalendarHolidays !== null) {
            isHolidayDate = !!googleCalendarHolidays[dateKeyPadded];
          } else {
            isHolidayDate = !!getJapaneseHolidays(year)[dateKeyPadded];
          }
        }
        var isJukuClosed = !!cDays[dateKeyPadded];

        // 今日かどうか
        var isToday = (year === todayDate.getFullYear() && month === todayDate.getMonth() + 1 && day === todayDate.getDate());

        // 日付セルの色クラス
        var dateClass = 'month-date-cell';
        if (dayOfWeek === 0 || isHolidayDate) dateClass += ' sunday';
        else if (dayOfWeek === 6) dateClass += ' saturday';
        if (isToday) dateClass += ' today';

        // 行クラス・ID
        var rowAttrs = isJukuClosed ? ' class="month-row-closed"' : '';
        if (isToday) rowAttrs += ' id="today-row"';

        // この日の実イベントを取得
        var daySchedules = allSchedules.filter(function(schedule) {
          var match = schedule.schedule.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
          if (match) {
            return parseInt(match[1]) === year &&
                   parseInt(match[2]) === month &&
                   parseInt(match[3]) === day;
          }
          return false;
        });

        // 塾の仮想イベント（休校日 + ○□★△）
        var virtualJuku = jukuVirtualByDay[day] || [];
        if (isJukuClosed) {
          virtualJuku = [{ school: '塾', eventType: '休校日', details: '', schedule: year + '年' + month + '月' + day + '日', _closedDay: true, _virtual: true }].concat(virtualJuku);
        }

        // 基礎学力テスト仮想イベント（中学列に入る）
        var virtualBasic = basicTestByDay[day] || [];

        // 3列に分類
        var jukuEvents = [], juniorEvents = [], highEvents = [];
        daySchedules.forEach(function(ev) {
          var t = classifyEvent(ev);
          if (t === 'juku') jukuEvents.push(ev);
          else if (t === 'junior') juniorEvents.push(ev);
          else highEvents.push(ev);
        });
        // 仮想イベントを追加
        jukuEvents = virtualJuku.concat(lecDeadlineByDay[day] || []).concat(subjectDeadlineByDay[day] || []).concat(jukuEvents);
        juniorEvents = virtualBasic.concat(pubHighExamByDay[day] || []).concat(juniorEvents);

        // 行を生成
        html += '<tr' + rowAttrs + '>';
        html += '<td class="' + dateClass + '">' + day + '<br>' + dayName + '</td>';

        // 塾列
        html += '<td>';
        jukuEvents.forEach(function(ev) { html += renderEvent(ev, 'juku'); });
        html += '</td>';

        // 中学列
        html += '<td>';
        juniorEvents.forEach(function(ev) { html += renderEvent(ev, 'junior'); });
        html += '</td>';

        // 高校列
        html += '<td>';
        highEvents.forEach(function(ev) { html += renderEvent(ev, 'high'); });
        html += '</td>';

        html += '</tr>';
      }

      html += '</tbody></table>';
      return html;
    }

    /**
     * ドラムピッカー＋月カレンダーとして予定タブを描画する
     */
    function renderCalendar() {
      // ドラムの基準月を設定
      drumBaseYear = currentYear;
      drumBaseMonth = currentMonth;

      // ドラムをstickyナビに、カレンダーをcontentに出力
      var navSticky = document.getElementById('scheduleNavSticky');

      var tableHeader = document.getElementById('scheduleTableHeader');

        tableHeader.innerHTML = '<table class="month-table"><thead><tr>' +
          '<th></th>' +
          '<th class="col-juku">塾</th>' +
          '<th class="col-junior">中学校</th>' +
          '<th class="col-high">高校</th>' +
          '</tr></thead></table>';

      var todayRow = document.getElementById('today-row');

      }

    /**
     * 月ドラムピッカーのHTML文字列を生成して返す
     * 現在月を中心に前後18ヶ月のリストを生成する
     * @return {string} ドラムピッカーHTML
     */
    function buildMonthDrumHTML() {
      var HALF = 18;        // 前後18ヶ月（合計3年分）
      var ITEM_H = 34;      // 1アイテムの高さ（px）
      var PAD = ITEM_H * 2; // 上下パディング（2アイテム分 = 68px）

      var themeColor = (currentSettings && currentSettings.themeColor) ? currentSettings.themeColor : '#43e97b';
      var html = '<div class="week-drum-outer" style="--drum-sel-color:' + themeColor + ';">';
      // 左：前月ボタン
      html += '<button class="drum-month-btn" onclick="changeMonth(-1)"><span>前月</span>▲<span></span></button>';
      html += '<div class="week-drum-wrapper">';
      html += '<div id="monthDrumScroll" class="week-drum-scroll">';
      html += '<div style="height:' + PAD + 'px;"></div>';

      for (var i = -HALF; i <= HALF; i++) {
        var m = drumBaseMonth + i;
        var y = drumBaseYear;
        while (m > 12) { m -= 12; y++; }
        while (m < 1)  { m += 12; y--; }

        var label = y + '年' + m + '月';
        var cls = 'week-drum-item';
        if (i === 0) cls += ' drum-sel';
        else if (Math.abs(i) === 1) cls += ' drum-near1';
        else if (Math.abs(i) === 2) cls += ' drum-near2';

        html += '<div class="' + cls + '" data-year="' + y + '" data-month="' + m + '" style="height:' + ITEM_H + 'px;">' + label + '</div>';
      }

      html += '<div style="height:' + PAD + 'px;"></div>';
      html += '</div>';
      html += '<div class="week-drum-grad-top"></div>';
      html += '<div class="week-drum-grad-bot"></div>';
      html += '<div class="week-drum-line week-drum-line-t"></div>';
      html += '<div class="week-drum-line week-drum-line-b"></div>';
      html += '</div>'; // .week-drum-wrapper
      // 右：翌月ボタン
      html += '<button class="drum-month-btn" onclick="changeMonth(1)"><span></span>▼<span>翌月</span></button>';
      html += '</div>'; // .week-drum-outer

      return html;
    }

    /**
     * 月ドラムピッカーのスクロール動作を初期化する
     */
    function initMonthDrum() {
      var scroll = document.getElementById('monthDrumScroll');
      if (!scroll) return;

      var ITEM_H = 34;
      var HALF = 18;
      var items = scroll.querySelectorAll('.week-drum-item');

      // 初期位置（中央=HALF）
      drumScrollResetting = true;
      scroll.scrollTop = HALF * ITEM_H;
      setTimeout(function() { drumScrollResetting = false; }, 400);

      var prevIdx = HALF;

      function updateHighlight(idx) {
        items.forEach(function(item, i) {
          item.classList.remove('drum-sel', 'drum-near1', 'drum-near2');
          var diff = Math.abs(i - idx);
          if (diff === 0) item.classList.add('drum-sel');
          else if (diff === 1) item.classList.add('drum-near1');
          else if (diff === 2) item.classList.add('drum-near2');
        });
      }

      var timer = null;
      scroll.addEventListener('scroll', function() {
        if (drumScrollResetting) return;

        var pos = scroll.scrollTop;
        var idx = Math.round(pos / ITEM_H);
        idx = Math.max(0, Math.min(items.length - 1, idx));

        if (idx !== prevIdx) {
          prevIdx = idx;
          updateHighlight(idx);
        }

        clearTimeout(timer);
        timer = setTimeout(function() {
          var selItem = items[idx];
          if (selItem) {
            currentYear = parseInt(selItem.getAttribute('data-year'));
            currentMonth = parseInt(selItem.getAttribute('data-month'));

            // カレンダーコンテンツのみ更新（ドラムは再生成しない）
            var calContent = document.getElementById('monthCalContent');
            if (calContent) {
              calContent.innerHTML = buildMonthHTML(currentYear, currentMonth);
              // 月変更時は1日が最上部に来るようスクロール
              var scheduleContent = document.getElementById('scheduleContent');
              if (scheduleContent) scheduleContent.scrollTop = 0;
            }
          }
        }, 200);
      }, { passive: true });
    }

    /**
     * 月を前後に移動する
     * @param {number} delta 移動量（-1=前月、+1=翌月）
     */
    function changeMonth(delta) {
      var scroll = document.getElementById('monthDrumScroll');
      if (scroll) {
        scroll.scrollBy({ top: delta * 34, behavior: 'smooth' });
      } else {
        currentMonth += delta;
        if (currentMonth > 12) { currentYear++; currentMonth = 1; }
        if (currentMonth < 1)  { currentYear--; currentMonth = 12; }
        renderCalendar();
      }
    }

    function addToGoogleCalendar(schedule) {
      var dateObj = parseDateString(schedule.schedule);
      if (!dateObj) {
        appAlert('日付の解析に失敗しました');
        return;
      }
      
      var title = '[' + schedule.school + '] ' + schedule.eventType;
      var details = schedule.details || '';
      var startDate = formatDateForGoogle(dateObj);
      
      var url = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
                '&text=' + encodeURIComponent(title) +
                '&dates=' + startDate + '/' + startDate +
                '&details=' + encodeURIComponent(details);
      
      window.open(url, '_blank');
    }

    function exportAllToGoogleCalendar() {
      var y = currentYear, m = currentMonth;
      var monthSchedules = allSchedules.filter(function(schedule) {
        var match = schedule.schedule.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (match) {
          return parseInt(match[1]) === y && parseInt(match[2]) === m;
        }
        return false;
      });

      if (monthSchedules.length === 0) {
        appAlert('今月の予定がありません');
        return;
      }

      monthSchedules.forEach(function(schedule, index) {
        setTimeout(function() {
          addToGoogleCalendar(schedule);
        }, index * 500);
      });
    }

    function downloadAllAsICS() {
      var y = currentYear, m = currentMonth;
      var monthSchedules = allSchedules.filter(function(schedule) {
        var match = schedule.schedule.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (match) {
          return parseInt(match[1]) === y && parseInt(match[2]) === m;
        }
        return false;
      });

      if (monthSchedules.length === 0) {
        appAlert('今月の予定がありません');
        return;
      }

      var startLabel = y + '年' + m + '月';
      var icsContent = generateICS(monthSchedules);
      downloadFile(icsContent, '学校予定_' + startLabel + '.ics', 'text/calendar');
    }

    function generateICS(schedules) {
      var ics = 'BEGIN:VCALENDAR\n';
      ics += 'VERSION:2.0\n';
      ics += 'PRODID:-//教育機関ダッシュボード//JP\n';
      ics += 'CALSCALE:GREGORIAN\n';
      
      schedules.forEach(function(schedule) {
        var dateObj = parseDateString(schedule.schedule);
        if (!dateObj) return;
        
        var title = '[' + schedule.school + '] ' + schedule.eventType;
        var description = schedule.details || '';
        var dateStr = formatDateForICS(dateObj);
        
        ics += 'BEGIN:VEVENT\n';
        ics += 'DTSTART;VALUE=DATE:' + dateStr + '\n';
        ics += 'DTEND;VALUE=DATE:' + dateStr + '\n';
        ics += 'SUMMARY:' + title + '\n';
        if (description) {
          ics += 'DESCRIPTION:' + description + '\n';
        }
        ics += 'UID:' + Date.now() + '-' + Math.random() + '@schoolcalendar\n';
        ics += 'DTSTAMP:' + formatDateForICS(new Date()) + 'T000000Z\n';
        ics += 'END:VEVENT\n';
      });
      
      ics += 'END:VCALENDAR';
      return ics;
    }

    function downloadFile(content, filename, mimeType) {
      var blob = new Blob([content], { type: mimeType });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function manualUpdateSchedules() {
      appConfirm('スケジュールを更新します。しばらく時間がかかります。よろしいですか？').then(function(ok) {
        if (!ok) return;

        var button = event.target;
        button.disabled = true;
        button.textContent = '🔄 更新中...';

        google.script.run
          .withSuccessHandler(function(result) {
            button.disabled = false;
            button.textContent = '🔄 スケジュール更新';

            if (result.success) {
              showMessage('scheduleLoading', '✓ ' + result.count + '件のスケジュールを更新しました', 'success');
              // データを再取得
              fbGetScheduleData().then(onScheduleDataLoaded);
            } else {
              showMessage('scheduleLoading', '❌ 更新に失敗しました: ' + result.error, 'error');
            }
          })
        .withFailureHandler(function(error) {
          button.disabled = false;
          button.textContent = '🔄 スケジュール更新';
          showMessage('scheduleLoading', '❌ エラー: ' + error, 'error');
        })
        .updateSchedules();
      });
    }

        geminiApiKeyBackup: document.getElementById('geminiApiKeyBackup') ? document.getElementById('geminiApiKeyBackup').value : '',

            return;
          }
          showMessage('settingsMessage', '✓ 設定を保存しました', 'success');
          // APIキーが新たに設定された場合、ステータスを更新
          if (settingsData.geminiApiKey && settingsData.geminiApiKey !== '***設定済み***') {
            updateApiKeyStatus('***設定済み***');
            document.getElementById('geminiApiKey').value = '';
          }
          // 予備キーが新たに設定された場合、ステータスを更新
          if (settingsData.geminiApiKeyBackup && settingsData.geminiApiKeyBackup !== '***設定済み***') {
            updateBackupKeyStatus('***設定済み***');
            document.getElementById('geminiApiKeyBackup').value = '';
          }
        })
        .withFailureHandler(function(error) {
          showMessage('settingsMessage', '❌ 設定の保存に失敗しました: ' + error, 'error');
        })
        .updateSettings(settingsData);
    }

  // ===== 【6】プロフィール管理 =====
    function loadProfileInfo() {
      // 事前取得済みのキャッシュがあれば即時表示（通信なし）
      if (preloadedProfile !== null) {
        if (preloadedProfile.success) {
          displayProfileInfo(preloadedProfile);
        } else {
          showMessage('profileMessage', '❌ プロフィール読み込みエラー: ' + preloadedProfile.error, 'error');
        }
        return;
      }
      // キャッシュ未取得の場合はバックエンドから取得
      google.script.run
        .withSuccessHandler(function(result) {
          preloadedProfile = result;
          if (result.success) {
            displayProfileInfo(result);
          } else {
            showMessage('profileMessage', '❌ プロフィール読み込みエラー: ' + result.error, 'error');
          }
        })
        .getUserProfile();
    }

    function displayProfileInfo(profile) {
      // ヘッダー表示
      document.getElementById('profileDisplayName').textContent = profile.displayName;
      document.getElementById('profileRegisteredEmail').textContent = '📧 ' + profile.registeredEmail;
      document.getElementById('profileSubjects').textContent = profile.subjectsDisplay;

      // 講師ID表示
      var tidEl = document.getElementById('profileTeacherId');
      if (tidEl) tidEl.textContent = profile.teacherId || '未設定';

      // アカウント情報表示（要素が存在する場合のみ）
      var regEl = document.getElementById('registeredEmailDisplay');
      if (regEl) regEl.textContent = profile.registeredEmail;
      var curEl = document.getElementById('currentEmailDisplay');
      if (curEl) curEl.textContent = profile.currentEmail;

      // メールアドレス一覧を読み込む
      loadTeacherEmailList_();

      // フォーム入力欄に反映
      document.getElementById('displayNameInput').value = profile.displayName;
      var aiName = profile.aiAssistantName || 'イノイマン';
      document.getElementById('aiAssistantNameInput').value = aiName === 'イノイマン' ? '' : aiName;
      document.getElementById('aiWidgetTitle').textContent = '🤖 AI ' + aiName;
      document.getElementById('aiPersonalitySelect').value = profile.aiPersonality || 'polite';
      // テーマカラーを適用
      if (profile.themeColor) applyThemeColor(profile.themeColor);
      document.getElementById('userThemeColor').value = profile.themeColor || '#43e97b';

      // 担当教科をセット
      selectedSubjects = profile.subjects || [];
      myTeacherName  = profile.displayName || '';
      myTeacherEmail = profile.registeredEmail || '';
      myTeacherId    = profile.teacherId || '';
      loadSubjectCheckboxes();
      updateSelectedSubjectsDisplay();

      // 配属校舎をセット → 全校舎ドロップダウンに反映
      preferredCampuses = profile.preferredCampuses || [];
      renderPreferredCampusCheckboxes();
      rebuildCampusDropdowns(); // 配属校舎が先頭に来るようドロップダウンを再描画

      // 講習担当学年をセット → チェックボックスを描画
      lecGrades = profile.lecGrades || [];
      renderLecGradeCheckboxes();

      // 未設定項目の案内メッセージ
      var notSet = [];
      if (!profile.isDisplayNameSet) notSet.push('表示名');
      if (!profile.subjects || profile.subjects.length === 0) notSet.push('担当教科');
      var profileMsgEl = document.getElementById('profileMessage');
      if (notSet.length > 0) {
        profileMsgEl.innerHTML = '<div style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; color: #856404; margin-bottom: 8px; font-size: 14px;">⚠️ <strong>' + notSet.join('と') + '</strong> がまだ設定されていません。下のフォームから設定してください。</div>';
      } else {
        profileMsgEl.innerHTML = '';
      }
    }

    function loadSubjectCheckboxes() {
      google.script.run
        .withSuccessHandler(function(options) {
          var container = document.getElementById('subjectsContainer');
          container.innerHTML = '';
          
          options.forEach(function(subject) {
            var isChecked = selectedSubjects.includes(subject);
            var label = document.createElement('label');
            label.style.cssText = 'display: flex; align-items: center; padding: 8px 12px; background: ' + (isChecked ? '#4facfe' : '#f5f5f5') + '; border: 2px solid ' + (isChecked ? '#2196F3' : '#ddd') + '; border-radius: 20px; cursor: pointer; transition: all 0.2s; font-size: 13px; color: ' + (isChecked ? 'white' : '#333') + ';';
            
            var checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = subject;
            checkbox.checked = isChecked;
            checkbox.style.marginRight = '6px';
            checkbox.onchange = function() {
              toggleSubject(subject, this.checked);
            };
            
            var labelText = document.createElement('label');
            labelText.textContent = subject;
            labelText.style.cssText = 'cursor: pointer; margin: 0; font-weight: ' + (isChecked ? '600' : '400') + ';';
            
            label.appendChild(checkbox);
            label.appendChild(labelText);
            container.appendChild(label);
          });
        })
        .getSubjectOptions();
    }

    function toggleSubject(subject, isChecked) {
      if (isChecked) {
        if (!selectedSubjects.includes(subject)) {
          selectedSubjects.push(subject);
        }
      } else {
        selectedSubjects = selectedSubjects.filter(function(s) { return s !== subject; });
      }
      loadSubjectCheckboxes();
      updateSelectedSubjectsDisplay();
      autoSaveProfile();
    }

    function updateSelectedSubjectsDisplay() {
      var display = document.getElementById('selectedSubjectsDisplay');
      
      if (selectedSubjects.length === 0) {
        display.innerHTML = '<span style="color: #999; font-style: italic;">教科を選択してください</span>';
        return;
      }
      
      display.innerHTML = '';
      selectedSubjects.forEach(function(subject) {
        var tag = document.createElement('div');
        tag.style.cssText = 'background: #4facfe; color: white; padding: 4px 12px; border-radius: 15px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px;';
        tag.innerHTML = subject + ' <span style="cursor: pointer; font-weight: bold; opacity: 0.7;" onclick="removeSubjectTag(\'' + subject + '\')" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">✕</span>';
        display.appendChild(tag);
      });
    }

    function removeSubjectTag(subject) {
      selectedSubjects = selectedSubjects.filter(function(s) { return s !== subject; });
      loadSubjectCheckboxes();
      updateSelectedSubjectsDisplay();
      autoSaveProfile();
    }

    var _autoSaveTimer = null;
    var _autoSaving = false;

    /**
     * テーマカラーをデフォルト（システム設定）に戻す
     */
    function resetThemeColorToDefault() {
      var statusEl = document.getElementById('profileAutoSaveStatus');
      if (statusEl) statusEl.textContent = '戻し中...';
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            document.getElementById('userThemeColor').value = result.themeColor;
            applyThemeColor(result.themeColor);
            if (statusEl) {
              statusEl.textContent = '✓ デフォルトに戻しました';
              setTimeout(function() { statusEl.textContent = '変更は自動で保存されます'; }, 1800);
            }
          } else {
            if (statusEl) statusEl.textContent = '❌ 失敗しました';
          }
        })
        .withFailureHandler(function(err) {
          console.error('resetThemeColorToDefault エラー:', err);
          if (statusEl) statusEl.textContent = '❌ 失敗しました';
        })
        .resetUserThemeColor();
    }

    /**
     * プロフィールを自動保存する。短時間に複数回呼ばれた場合は最後の1回だけ実行する（デバウンス）。
     */
    function autoSaveProfile() {
      if (_autoSaveTimer) clearTimeout(_autoSaveTimer);
      _autoSaveTimer = setTimeout(function() {
        _autoSaveTimer = null;
        _doSaveProfile();
      }, 400);
    }

    function _doSaveProfile() {
      if (_autoSaving) return;
      _autoSaving = true;
      var statusEl = document.getElementById('profileAutoSaveStatus');
      if (statusEl) statusEl.textContent = '保存中...';

      var aiNameInput = document.getElementById('aiAssistantNameInput').value.trim();
      var profileData = {
        displayName: document.getElementById('displayNameInput').value,
        subjects: selectedSubjects,
        aiAssistantName: aiNameInput || 'イノイマン',
        aiPersonality: document.getElementById('aiPersonalitySelect').value,
        themeColor: document.getElementById('userThemeColor').value
      };

      google.script.run
        .withSuccessHandler(function(result) {
          _autoSaving = false;
          if (result.success) {
            showToast('✓ プロフィールを保存しました', 'success');
            if (statusEl) {
              statusEl.textContent = '✓ 保存しました';
              setTimeout(function() { statusEl.textContent = '変更は自動で保存されます'; }, 1800);
            }
            // チャットタイトルを即時更新
            var savedAiName = profileData.aiAssistantName || 'イノイマン';
            document.getElementById('aiWidgetTitle').textContent = '🤖 AI ' + savedAiName;
            // ウェルカムメッセージが表示中なら名前・しゃべり方を即時反映
            if (document.getElementById('aiWelcomeMessage')) {
              showAIWelcomeMessage();
            }
            // テーマカラーを即時適用
            applyThemeColor(profileData.themeColor);
            // プロフィール表示を更新（キャッシュをクリアしてサーバーから最新データを取得）
            preloadedProfile = null;
            setTimeout(function() { loadProfileInfo(); }, 500);
          } else {
            showToast('❌ プロフィールの保存に失敗しました', 'error');
            if (statusEl) {
              statusEl.textContent = '❌ 保存失敗';
              setTimeout(function() { statusEl.textContent = '変更は自動で保存されます'; }, 2500);
            }
          }
        })
        .withFailureHandler(function(err) {
          _autoSaving = false;
          console.error('プロフィール自動保存エラー:', err);
          showToast('❌ プロフィールの保存に失敗しました', 'error');
          if (statusEl) {
            statusEl.textContent = '❌ 保存失敗';
            setTimeout(function() { statusEl.textContent = '変更は自動で保存されます'; }, 2500);
          }
        })
        .updateUserProfile(profileData);
    }
    
    // ===== 講師ID・メールアドレス管理 =====

    function copyTeacherId_() {
      var tid = document.getElementById('profileTeacherId');
      var text = tid ? tid.textContent : '';
      if (!text || text === '未設定') return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() { showToast('✓ 講師IDをコピーしました', 'success'); });
      } else {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showToast('✓ 講師IDをコピーしました', 'success'); } catch(e) {}
        document.body.removeChild(ta);
      }
    }

    function loadTeacherEmailList_() {
      var listEl = document.getElementById('teacherEmailList');
      if (!listEl) return;
      listEl.innerHTML = '<p style="color:#999;font-size:13px;">読み込み中...</p>';
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.success) {
            listEl.innerHTML = '<p style="color:#e53935;font-size:13px;">読み込みエラー</p>';
            return;
          }
          renderTeacherEmailList_(result.emails, result.currentEmail);
        })
        .withFailureHandler(function() {
          listEl.innerHTML = '<p style="color:#e53935;font-size:13px;">読み込みに失敗しました</p>';
        })
        .getTeacherEmails();
    }

    function renderTeacherEmailList_(emails, currentEmail) {
      var listEl = document.getElementById('teacherEmailList');
      if (!listEl) return;
      if (!emails || emails.length === 0) {
        listEl.innerHTML = '<p style="color:#999;font-size:13px;">メールアドレスが登録されていません</p>';
        return;
      }
      var html = '<div style="display:flex;flex-direction:column;gap:8px;">';
      emails.forEach(function(em) {
        var isCurrent = em.toLowerCase() === (currentEmail || '').toLowerCase();
        html += '<div style="display:flex;align-items:center;justify-content:space-between;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;">' +
          '<span style="font-size:14px;font-family:monospace;">' + em + (isCurrent ? ' <span style="font-size:11px;background:#4caf50;color:white;border-radius:10px;padding:2px 7px;">現在</span>' : '') + '</span>' +
          (isCurrent ? '' : '<button onclick="removeTeacherEmail_(\'' + em + '\')" style="background:#fff0f0;border:1px solid #ffcdd2;color:#c62828;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;">削除</button>') +
          '</div>';
      });
      html += '</div>';
      listEl.innerHTML = html;
    }

    function addTeacherEmail_() {
      var input = document.getElementById('addEmailInput');
      var email = input ? input.value.trim() : '';
      if (!email) { showMessage('emailListMessage', '⚠ メールアドレスを入力してください', 'error'); return; }
      if (input) input.disabled = true;
      google.script.run
        .withSuccessHandler(function(result) {
          if (input) { input.disabled = false; input.value = ''; }
          if (result && result.success) {
            showMessage('emailListMessage', '✓ メールアドレスを追加しました', 'success');
            loadTeacherEmailList_();
          } else {
            showMessage('emailListMessage', '❌ ' + (result ? result.error : 'エラーが発生しました'), 'error');
          }
        })
        .withFailureHandler(function(err) {
          if (input) input.disabled = false;
          showMessage('emailListMessage', '❌ エラー: ' + err, 'error');
        })
        .addEmailToTeacher(email);
    }

    function removeTeacherEmail_(email) {
      appConfirm(email + ' を削除しますか？').then(function(ok) {
        if (!ok) return;
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success) {
              showMessage('emailListMessage', '✓ 削除しました', 'success');
              loadTeacherEmailList_();
            } else {
              showMessage('emailListMessage', '❌ ' + (result ? result.error : 'エラーが発生しました'), 'error');
            }
          })
          .withFailureHandler(function(err) {
            showMessage('emailListMessage', '❌ エラー: ' + err, 'error');
          })
          .removeEmailFromTeacher(email);
      });
    }

    // 設定タブを切り替える際にプロフィール情報を読み込み（キャッシュ済みなら即時表示）
    var originalSwitchTab = switchTab;
    switchTab = function(tabName) {
      originalSwitchTab(tabName);
      if (tabName === 'settings') {
        // 事前読み込み済みの場合は再読み込みしない
        if (!settingsTabPreloaded) {
          if (Object.keys(campusData).length === 0) {
            // 校舎データが未ロードの場合はコールバックで順番に読み込む
            loadDropdownData(function() {
              loadProfileInfo();
              loadNotificationSettings();
              loadLineSchedulerNotifPrefs();
              settingsTabPreloaded = true;
            });
          } else {
            loadProfileInfo();
            loadNotificationSettings();
            loadLineSchedulerNotifPrefs();
            settingsTabPreloaded = true;
          }
        }
      }
    };

</script>
