<script>
// ===== 講師配置表 =====
// フロントエンドロジック（表示・編集・PDF出力）
// データは1件のみ保存。年度はデータ内フィールド（編集可能）。

var placementData = null;         // 現在表示中のデータ
var placementCampusConfig = {};   // 校舎コード→名前マッピング
var placementCampusDetailsMap = {}; // 校舎コード→{tel,fax,principal} デフォルト値
var placementStaffList = [];      // スタッフ一覧 [{id, name}]
var placementViewMode = 'campus'; // 'campus' or 'teacher'
var placementIsAdmin = false;     // 管理者かどうか
var placementLoaded = false;      // 読み込み済みフラグ
var placementDisplayYear = null;  // 表示中の年度（サーバーの getCurrentFiscalYear に基づく）
var placementEditableYears = [];  // [{year, label, isNext}] 編集可能年度

var PLACEMENT_DAYS = ['月', '火', '水', '木', '金', '土'];

function _placementCacheKey(year) {
  return 's-quire-placement-' + (year || 'legacy');
}

/**
 * 講師配置データを読み込む（タブ切り替え時に呼ばれる）
 */
function loadStaffPlacement() {
  var root = document.getElementById('placement-root');
  if (!root) return;

  // 既にデータを持っていれば再読み込み不要
  if (placementLoaded) return;

  // 旧キャッシュ（年度なし）は破棄（年度自動切替時に古いデータを表示しないため）
  try { localStorage.removeItem('s-quire-placement'); } catch (e) {}

  // キャッシュがあれば即座に表示（年度別キーから探索）
  try {
    // 直近の表示年度が分かれば優先、なければ全 s-quire-placement-* を走査して最新を採用
    var cached = null;
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('s-quire-placement-') === 0) {
        cached = localStorage.getItem(k);
        break;
      }
    }
    if (cached) {
      var parsed = JSON.parse(cached);
      placementCampusConfig = parsed.campusConfig || {};
      placementData = parsed.data;
      placementDisplayYear = parsed.year || null;
      placementEditableYears = parsed.editableYears || [];
      placementIsAdmin = (typeof isAdminUser !== 'undefined') ? isAdminUser : false;
      placementLoaded = true;
      renderPlacement(root);
    }
  } catch (e) { /* キャッシュ破損時は無視 */ }

  // キャッシュがない場合のみローディング表示
  if (!placementLoaded) {
    root.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">読み込み中...</p>';
  }

  // 裏で最新データを取得
  google.script.run
    .withSuccessHandler(function(result) {
      if (!result || !result.success) {
        if (!placementLoaded) {
          root.innerHTML = '<p style="text-align:center;color:#e53935;padding:40px;">読み込みに失敗しました: ' + (result && result.error ? result.error : '不明なエラー') + '</p>';
        }
        return;
      }
      placementCampusConfig = result.campusConfig || {};
      placementCampusDetailsMap = result.campusDetailsMap || {};
      placementData = result.data;
      placementStaffList = result.staffList || [];
      placementDisplayYear = result.year || result.currentFiscalYear || null;
      placementEditableYears = result.editableYears || [];
      placementIsAdmin = (typeof isAdminUser !== 'undefined') ? isAdminUser : false;
      placementLoaded = true;
      // 現行年度のキャッシュのみ保存し、他の年度キャッシュは破棄（自動切替時に旧年度を表示しないため）
      try {
        for (var i = localStorage.length - 1; i >= 0; i--) {
          var k = localStorage.key(i);
          if (k && k.indexOf('s-quire-placement-') === 0) localStorage.removeItem(k);
        }
        localStorage.setItem(_placementCacheKey(placementDisplayYear), JSON.stringify({
          data: result.data,
          campusConfig: result.campusConfig,
          year: placementDisplayYear,
          editableYears: placementEditableYears
        }));
      } catch (e) {}
      renderPlacement(root);
    })
    .withFailureHandler(function(err) {
      if (!placementLoaded) {
        root.innerHTML = '<p style="text-align:center;color:#e53935;padding:40px;">エラー: ' + err + '</p>';
      }
    })
    .getStaffPlacementForWeb();
}

/**
 * 配置表のメインビューを描画する
 */
function renderPlacement(root) {
  var data = placementData;
  // 表示年度はサーバーの getCurrentFiscalYear に基づく（4月に自動切替）
  var year = placementDisplayYear || (data ? data.year : '') || '';

  var html = '<div class="placement-header-bar">';
  html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">';
  html += '<span style="font-weight:bold;font-size:15px;">👨‍🏫 講師配置表';
  if (year) html += '（' + escHtml(String(year)) + '年度）';
  html += '</span>';
  // 1〜3月の並行編集期間：来年度編集がアクティブであることを示すバッジ
  if (placementIsAdmin && placementEditableYears && placementEditableYears.length > 1) {
    var nextY = placementEditableYears[placementEditableYears.length - 1].year;
    html += '<span title="1〜3月は翌年度の配置表を並行して作成できます" style="background:#fff3cd;color:#856404;border:1px solid #ffeaa7;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:bold;">📝 ' + nextY + '年度の準備期間</span>';
  }
  if (placementIsAdmin) {
    html += '<button class="placement-action-btn" onclick="openPlacementEdit()" style="background:#667eea;">✏️ 編集</button>';
  }
  html += '</div>';
  html += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px;">';
  html += '<div class="placement-view-tabs">';
  html += '<button class="placement-view-tab' + (placementViewMode === 'campus' ? ' active' : '') + '" onclick="switchPlacementView(\'campus\')">🏫 校舎別</button>';
  html += '<button class="placement-view-tab' + (placementViewMode === 'teacher' ? ' active' : '') + '" onclick="switchPlacementView(\'teacher\')">👤 講師別</button>';
  html += '</div>';
  if (data) {
    html += '<button class="placement-action-btn" onclick="printPlacementPDF()" style="background:#43a047;">🖨️ PDF印刷</button>';
  }
  html += '</div>';
  html += '</div>';

  if (!data) {
    html += '<div style="background:#fff9e6;border:1px solid #ffc107;border-radius:8px;padding:20px;margin:12px 0;text-align:center;">';
    html += '<p style="color:#f57c00;font-weight:bold;margin:0 0 8px;">データが未登録です</p>';
    if (placementIsAdmin) {
      html += '<p style="color:#666;font-size:13px;margin:0 0 12px;">「編集」ボタンからデータを登録してください。</p>';
      html += '<button class="placement-action-btn" onclick="openPlacementEdit()" style="background:#667eea;">✏️ データを登録する</button>';
    } else {
      html += '<p style="color:#666;font-size:13px;margin:0;">管理者にデータの登録を依頼してください。</p>';
    }
    html += '</div>';
    root.innerHTML = html;
    return;
  }

  html += '<div id="placement-view-container">';
  html += placementViewMode === 'campus' ? buildCampusViewHtml(data) : buildTeacherViewHtml(data);
  html += '</div>';

  root.innerHTML = html;
}

/**
 * 表示モードを切り替える
 */
function switchPlacementView(mode) {
  placementViewMode = mode;
  var container = document.getElementById('placement-view-container');
  if (container && placementData) {
    container.innerHTML = mode === 'campus' ? buildCampusViewHtml(placementData) : buildTeacherViewHtml(placementData);
  }
  document.querySelectorAll('.placement-view-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent.indexOf(mode === 'campus' ? '校舎別' : '講師別') >= 0);
  });
}

/**
 * 校舎別ビューのHTMLを生成する
 */
function buildCampusViewHtml(data) {
  var campuses = data.campuses || {};
  var teachers = data.teachers || [];
  var supervisors = data.supervisors || {};

  var campusCodes = Object.keys(campuses).sort();
  if (campusCodes.length === 0) {
    return '<p style="color:#999;text-align:center;padding:20px;">校舎データがありません</p>';
  }

  var html = '';
  campusCodes.forEach(function(code) {
    var campus = campuses[code];
    var sup = supervisors[code] || {};

    var dayTeachers = {};
    PLACEMENT_DAYS.forEach(function(day) {
      var supName = sup[day] || '';
      dayTeachers[day] = teachers.filter(function(t) { return t[day] === code && t.name !== supName; }).map(function(t) { return t.name; });
    });

    html += '<div class="placement-campus-card">';
    html += '<div class="placement-campus-header">';
    html += '<span style="font-size:15px;font-weight:bold;">' + escHtml(campus.name || code) + '</span>';
    if (campus.principal) html += '<span style="font-size:12px;margin-left:8px;opacity:.9;">責任者: ' + escHtml(campus.principal) + '</span>';
    if (campus.tel) {
      if (campus.tel === campus.fax) {
        html += '<span style="font-size:12px;margin-left:10px;opacity:.9;">TEL&amp;FAX: ' + escHtml(campus.tel) + '</span>';
      } else {
        html += '<span style="font-size:12px;margin-left:10px;opacity:.9;">TEL: ' + escHtml(campus.tel) + '</span>';
        if (campus.fax) html += '<span style="font-size:12px;margin-left:6px;opacity:.9;">FAX: ' + escHtml(campus.fax) + '</span>';
      }
    }
    if (campus.mobile) html += '<span style="font-size:12px;margin-left:6px;opacity:.9;">携帯: ' + escHtml(campus.mobile) + '</span>';
    html += '</div>';

    html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">';
    html += '<table class="placement-day-table">';
    html += '<thead><tr><th style="min-width:44px;background:#f5f5f5;color:#555;">　</th>';
    PLACEMENT_DAYS.forEach(function(day) { html += '<th>' + day + '</th>'; });
    html += '</tr></thead>';
    html += '<tbody>';

    html += '<tr>';
    html += '<td class="placement-row-label">責任者</td>';
    PLACEMENT_DAYS.forEach(function(day) {
      var s = sup[day] || '';
      html += '<td class="placement-day-cell">';
      if (s) html += '<span class="placement-supervisor">' + escHtml(s) + '</span>';
      html += '</td>';
    });
    html += '</tr>';

    var maxRows = 0;
    PLACEMENT_DAYS.forEach(function(day) { if (dayTeachers[day].length > maxRows) maxRows = dayTeachers[day].length; });

    for (var i = 0; i < maxRows; i++) {
      html += '<tr>';
      html += '<td class="placement-row-label">' + (i === 0 ? '勤務' : '') + '</td>';
      PLACEMENT_DAYS.forEach(function(day) {
        var name = (dayTeachers[day][i] || '');
        html += '<td class="placement-day-cell" style="font-size:11px;">' + escHtml(name) + '</td>';
      });
      html += '</tr>';
    }

    if (maxRows === 0) {
      html += '<tr><td class="placement-row-label">勤務</td>';
      PLACEMENT_DAYS.forEach(function() { html += '<td class="placement-day-cell"></td>'; });
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    html += '</div>';
  });

  return html;
}

/**
 * 講師別ビューのHTMLを生成する（横スクロールテーブル）
 */
function buildTeacherViewHtml(data) {
  var campuses = data.campuses || {};
  var teachers = data.teachers || [];

  if (teachers.length === 0) {
    return '<p style="color:#999;text-align:center;padding:20px;">講師データがありません</p>';
  }

  var SUBJECT_ORDER = ['英語', '数学', '国語', '理科', '社会', 'その他'];
  var groups = {};
  teachers.forEach(function(t) {
    var subj = t.subject || 'その他';
    if (!groups[subj]) groups[subj] = [];
    groups[subj].push(t);
  });

  var html = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">';
  html += '<table class="placement-teacher-table">';
  html += '<thead><tr>';
  html += '<th style="min-width:36px;background:#e8eaf6;">科目</th>';
  html += '<th style="min-width:56px;background:#e8eaf6;">講師</th>';
  PLACEMENT_DAYS.forEach(function(day) { html += '<th style="background:#e8eaf6;">' + day + '</th>'; });
  html += '</tr></thead>';
  html += '<tbody>';

  var orderedSubjects = SUBJECT_ORDER.filter(function(s) { return groups[s]; });
  Object.keys(groups).forEach(function(s) { if (SUBJECT_ORDER.indexOf(s) < 0) orderedSubjects.push(s); });

  orderedSubjects.forEach(function(subj) {
    var list = groups[subj];
    list.forEach(function(teacher, idx) {
      html += '<tr>';
      if (idx === 0) {
        html += '<td class="name-cell" rowspan="' + list.length + '" style="background:#fafafa;font-size:11px;color:#555;writing-mode:vertical-lr;text-align:center;padding:4px 2px;">' + escHtml(subj) + '</td>';
      }
      html += '<td class="name-cell">' + escHtml(teacher.name || '') + '</td>';
      PLACEMENT_DAYS.forEach(function(day) {
        var code = teacher[day] || '';
        var campus = campuses[code];
        var abbr = campus ? (campus.abbr || campus.name.charAt(0)) : code;
        html += '<td style="text-align:center;">' + escHtml(abbr) + '</td>';
      });
      html += '</tr>';
    });
  });

  html += '</tbody></table></div>';
  return html;
}

// ===== 編集モーダル =====

var _placementEditData = null;
var _placementEditYear = null;              // 現在編集中の年度
var _placementEditCache = {};               // {year: data} 年度切替時に未保存データを保持

/**
 * 空の配置データを生成する
 */
function _placementEmptyData(year) {
  var d = {
    year: year,
    campuses: {},
    teachers: [],
    supervisors: {}
  };
  Object.keys(placementCampusConfig).forEach(function(code) {
    var def = placementCampusDetailsMap[code] || {};
    d.campuses[code] = { name: placementCampusConfig[code], abbr: '', tel: def.tel || '', fax: def.fax || '', principal: def.principal || '' };
    d.supervisors[code] = { '月': '', '火': '', '水': '', '木': '', '金': '', '土': '' };
  });
  return d;
}

/**
 * 編集モーダルを開く
 */
function openPlacementEdit() {
  // 既定は「表示中の年度」＝ 現行年度
  _placementEditYear = placementDisplayYear || (new Date().getMonth() + 1 >= 4 ? new Date().getFullYear() : new Date().getFullYear() - 1);
  _placementEditCache = {};

  if (placementData) {
    _placementEditData = JSON.parse(JSON.stringify(placementData));
    if (!_placementEditData.year) _placementEditData.year = _placementEditYear;
  } else {
    _placementEditData = _placementEmptyData(_placementEditYear);
  }

  var modal = document.getElementById('placement-edit-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'placement-edit-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;overflow-y:auto;padding:16px;box-sizing:border-box;';
    document.body.appendChild(modal);
  }
  modal.style.display = 'block';
  renderPlacementEditModal(modal);
}

/**
 * 編集モーダル内の年度を切り替える。
 * 現在の編集内容を年度キーでキャッシュし、別年度のデータをサーバーから取得して差し替える。
 */
function switchPlacementEditYear(newYear) {
  newYear = parseInt(newYear, 10);
  if (isNaN(newYear) || newYear === _placementEditYear) return;

  // 現在の編集内容をキャッシュ（未保存でも失わないように）
  if (_placementEditData) {
    _placementEditCache[_placementEditYear] = JSON.parse(JSON.stringify(_placementEditData));
  }

  var modal = document.getElementById('placement-edit-modal');

  // キャッシュヒット時はそれを採用
  if (_placementEditCache[newYear]) {
    _placementEditYear = newYear;
    _placementEditData = _placementEditCache[newYear];
    if (modal) renderPlacementEditModal(modal);
    return;
  }

  // サーバーから取得
  if (modal) {
    // 簡易ロード表示
    var body = modal.firstChild;
    if (body) body.style.opacity = '0.5';
  }
  google.script.run
    .withSuccessHandler(function(result) {
      _placementEditYear = newYear;
      if (result && result.success && result.data) {
        _placementEditData = result.data;
        if (!_placementEditData.year) _placementEditData.year = newYear;
      } else {
        // 該当年度のデータがなければ空データで新規作成
        _placementEditData = _placementEmptyData(newYear);
      }
      if (modal) renderPlacementEditModal(modal);
    })
    .withFailureHandler(function(err) {
      showToast('年度切替に失敗しました: ' + err, 'error');
      // 失敗時は空データで作成
      _placementEditYear = newYear;
      _placementEditData = _placementEmptyData(newYear);
      if (modal) renderPlacementEditModal(modal);
    })
    .getStaffPlacementForWeb(newYear);
}

/**
 * 編集モーダルの内容を描画する
 */
function renderPlacementEditModal(modal) {
  var d = _placementEditData;
  var campusCodes = Object.keys(d.campuses).sort();

  var html = '<div style="background:#fff;border-radius:10px;max-width:700px;margin:0 auto;padding:20px;box-sizing:border-box;">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  html += '<h2 style="margin:0;font-size:17px;">✏️ 講師配置表を編集</h2>';
  html += '<button onclick="closePlacementEdit()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#666;">✕</button>';
  html += '</div>';

  // 年度プルダウン（編集可能年度: 現行年度＋1〜3月のみ翌年度）
  html += '<div style="margin-bottom:16px;padding:12px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
  html += '<label style="font-size:13px;color:#555;white-space:nowrap;">編集対象年度：</label>';
  html += '<select id="pe-year" onchange="switchPlacementEditYear(this.value)" style="font-size:14px;padding:5px 10px;border-radius:4px;border:1px solid #ddd;">';
  var editable = placementEditableYears && placementEditableYears.length ? placementEditableYears : [{ year: _placementEditYear, label: _placementEditYear + '年度（現行）', isNext: false }];
  editable.forEach(function(y) {
    html += '<option value="' + y.year + '"' + (y.year === _placementEditYear ? ' selected' : '') + '>' + escHtml(y.label) + '</option>';
  });
  html += '</select>';
  if (editable.length > 1) {
    html += '<span style="font-size:12px;color:#856404;background:#fff3cd;border:1px solid #ffeaa7;border-radius:10px;padding:2px 8px;">1〜3月は来年度を並行編集できます</span>';
  } else {
    html += '<span style="font-size:12px;color:#888;">（年度切替は毎年1〜3月のみ）</span>';
  }
  html += '</div>';

  html += buildEditAccordion('pe-sec-campus', '🏫 校舎情報（TEL/FAX/略称）', buildEditCampusSection(d, campusCodes));
  html += buildEditAccordion('pe-sec-teacher', '👤 講師の曜日別配属', buildEditTeacherSection(d, campusCodes));
  html += buildEditAccordion('pe-sec-super', '⭕ 曜日別責任者', buildEditSupervisorSection(d, campusCodes));

  html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">';
  html += '<button onclick="closePlacementEdit()" style="padding:10px 20px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:14px;">キャンセル</button>';
  html += '<button onclick="savePlacementData()" id="pe-save-btn" style="padding:10px 24px;background:#43a047;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;">💾 保存</button>';
  html += '</div>';
  html += '</div>';

  modal.innerHTML = html;
}

function buildEditAccordion(id, title, content) {
  return '<div style="border:1px solid #e0e0e0;border-radius:8px;margin-bottom:12px;overflow:hidden;">'
    + '<button onclick="toggleEditAccordion(\'' + id + '\')" style="width:100%;text-align:left;padding:12px 14px;background:#f9f9f9;border:none;cursor:pointer;font-size:14px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;">'
    + escHtml(title) + '<span id="' + id + '-arrow">▼</span></button>'
    + '<div id="' + id + '-body" style="padding:12px 14px;">' + content + '</div>'
    + '</div>';
}

function toggleEditAccordion(id) {
  var body = document.getElementById(id + '-body');
  var arrow = document.getElementById(id + '-arrow');
  if (!body) return;
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
}

function buildEditCampusSection(d, campusCodes) {
  if (campusCodes.length === 0) {
    return '<p style="color:#999;font-size:13px;">校舎マスタが未設定です。管理タブ > 設定 から校舎を登録してください。</p>';
  }
  var html = '<div style="overflow-x:auto;">';
  html += '<table style="border-collapse:collapse;width:100%;font-size:13px;">';
  html += '<tr style="background:#f0f0f0;"><th style="padding:6px 8px;text-align:left;">校舎</th><th style="padding:6px 8px;">略称</th><th style="padding:6px 8px;">TEL</th><th style="padding:6px 8px;">FAX</th><th style="padding:6px 8px;">携帯</th><th style="padding:6px 8px;">校舎責任者</th></tr>';
  campusCodes.forEach(function(code) {
    var c = d.campuses[code] || {};
    html += '<tr>';
    html += '<td style="padding:6px 8px;font-weight:bold;">' + escHtml(c.name || code) + '</td>';
    html += '<td style="padding:4px;"><input type="text" value="' + escHtml(c.abbr || '') + '" onchange="updatePlacementCampus(\'' + code + '\',\'abbr\',this.value)" style="width:40px;padding:4px;border:1px solid #ddd;border-radius:4px;text-align:center;font-size:13px;" placeholder="藍"></td>';
    html += '<td style="padding:4px;"><input type="text" value="' + escHtml(c.tel || '') + '" onchange="updatePlacementCampus(\'' + code + '\',\'tel\',this.value)" style="width:110px;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;" placeholder="088-693-0225"></td>';
    html += '<td style="padding:4px;"><input type="text" value="' + escHtml(c.fax || '') + '" onchange="updatePlacementCampus(\'' + code + '\',\'fax\',this.value)" style="width:110px;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;" placeholder="088-693-0225"></td>';
    html += '<td style="padding:4px;"><input type="text" value="' + escHtml(c.mobile || '') + '" onchange="updatePlacementCampus(\'' + code + '\',\'mobile\',this.value)" style="width:110px;padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;" placeholder="080-XXXX-XXXX"></td>';
    var principalOpts = '<option value="">—</option>';
    var curPrincipal = c.principal || '';
    placementStaffList.forEach(function(s) { principalOpts += '<option value="' + escHtml(s.name) + '"' + (curPrincipal === s.name ? ' selected' : '') + '>' + escHtml(s.name) + '</option>'; });
    if (curPrincipal && !placementStaffList.some(function(s) { return s.name === curPrincipal; })) {
      principalOpts += '<option value="' + escHtml(curPrincipal) + '" selected>' + escHtml(curPrincipal) + '</option>';
    }
    html += '<td style="padding:4px;"><select onchange="updatePlacementCampus(\'' + code + '\',\'principal\',this.value)" style="padding:4px;border:1px solid #ddd;border-radius:4px;font-size:12px;max-width:90px;">' + principalOpts + '</select></td>';
    html += '</tr>';
  });
  html += '</table></div>';
  return html;
}

function buildEditTeacherSection(d, campusCodes) {
  var campusOptions = '<option value="">—</option>';
  campusCodes.forEach(function(code) {
    var c = d.campuses[code] || {};
    campusOptions += '<option value="' + code + '">' + escHtml(c.name || code) + '</option>';
  });

  // 既に配置済みの講師名セット
  var addedNames = {};
  d.teachers.forEach(function(t) { if (t.name) addedNames[t.name] = true; });

  // 配属設定あり・なし・追加済でグループ分け
  var withPref = placementStaffList.filter(function(s) { return s.preferredCampuses && s.preferredCampuses.length > 0 && !addedNames[s.name]; });
  var withoutPref = placementStaffList.filter(function(s) { return (!s.preferredCampuses || s.preferredCampuses.length === 0) && !addedNames[s.name]; });
  var alreadyAdded = placementStaffList.filter(function(s) { return addedNames[s.name]; });

  var staffOptions = '<option value="">— 講師を選択 —</option>';
  if (withPref.length > 0) {
    staffOptions += '<optgroup label="配属設定あり">';
    withPref.forEach(function(s) { staffOptions += '<option value="' + escHtml(s.name) + '">' + escHtml(s.name) + '</option>'; });
    staffOptions += '</optgroup>';
  }
  if (withoutPref.length > 0) {
    staffOptions += '<optgroup label="その他">';
    withoutPref.forEach(function(s) { staffOptions += '<option value="' + escHtml(s.name) + '">' + escHtml(s.name) + '</option>'; });
    staffOptions += '</optgroup>';
  }
  if (alreadyAdded.length > 0) {
    staffOptions += '<optgroup label="追加済">';
    alreadyAdded.forEach(function(s) { staffOptions += '<option value="' + escHtml(s.name) + '" disabled style="color:#aaa;">' + escHtml(s.name) + '</option>'; });
    staffOptions += '</optgroup>';
  }

  var subjectSelectHtml = '<select style="padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;">';
  ['英語','数学','国語','理科','社会','その他'].forEach(function(s) { subjectSelectHtml += '<option>' + s + '</option>'; });
  subjectSelectHtml += '</select>';

  var html = '';
  // 行1: スタッフから追加（設定の配属校舎を自動入力）
  html += '<div style="margin-bottom:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
  html += '<span style="font-size:11px;color:#888;white-space:nowrap;">スタッフ:</span>';
  html += '<select id="pe-new-teacher-select" style="flex:1;min-width:100px;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;">' + staffOptions + '</select>';
  html += '<select id="pe-new-teacher-subject" style="padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;">';
  ['英語','数学','国語','理科','社会','その他'].forEach(function(s) { html += '<option>' + s + '</option>'; });
  html += '</select>';
  html += '<button onclick="addPlacementTeacher()" style="padding:6px 12px;background:#667eea;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;white-space:nowrap;">+ 追加</button>';
  html += '</div>';
  // 行2: 手動で追加
  html += '<div style="margin-bottom:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
  html += '<span style="font-size:11px;color:#888;white-space:nowrap;">手動:</span>';
  html += '<input type="text" id="pe-new-teacher-manual-name" placeholder="講師名を入力" style="flex:1;min-width:80px;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;">';
  html += '<select id="pe-new-teacher-manual-subject" style="padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;">';
  ['英語','数学','国語','理科','社会','その他'].forEach(function(s) { html += '<option>' + s + '</option>'; });
  html += '</select>';
  html += '<button onclick="addPlacementTeacherManual()" style="padding:6px 12px;background:#43a047;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;white-space:nowrap;">+ 追加</button>';
  html += '</div>';

  if (d.teachers.length === 0) {
    html += '<p style="color:#999;font-size:13px;text-align:center;padding:10px;">講師を追加してください</p>';
    return html;
  }

  html += '<div style="overflow-x:auto;">';
  html += '<table style="border-collapse:collapse;font-size:12px;width:100%;">';
  html += '<tr style="background:#f0f0f0;"><th style="padding:5px 6px;">科目</th><th style="padding:5px 6px;min-width:60px;">名前</th>';
  PLACEMENT_DAYS.forEach(function(day) { html += '<th style="padding:5px 6px;">' + day + '</th>'; });
  html += '<th style="padding:5px 6px;"></th></tr>';

  d.teachers.forEach(function(teacher, idx) {
    html += '<tr style="border-bottom:1px solid #f0f0f0;">';
    html += '<td style="padding:3px 4px;"><select onchange="updatePlacementTeacher(' + idx + ',\'subject\',this.value)" style="padding:3px;border:1px solid #ddd;border-radius:3px;font-size:11px;">';
    ['英語','数学','国語','理科','社会','その他'].forEach(function(s) {
      html += '<option' + (teacher.subject === s ? ' selected' : '') + '>' + s + '</option>';
    });
    html += '</select></td>';
    html += '<td style="padding:3px 4px;"><input type="text" value="' + escHtml(teacher.name || '') + '" onchange="updatePlacementTeacher(' + idx + ',\'name\',this.value)" style="width:60px;padding:3px;border:1px solid #ddd;border-radius:3px;font-size:12px;"></td>';
    PLACEMENT_DAYS.forEach(function(day) {
      var selected = teacher[day] || '';
      var opts = campusOptions.replace('value="' + selected + '"', 'value="' + selected + '" selected');
      html += '<td style="padding:3px 2px;"><select onchange="updatePlacementTeacher(' + idx + ',\'' + day + '\',this.value)" style="padding:3px;border:1px solid #ddd;border-radius:3px;font-size:11px;max-width:70px;">' + opts + '</select></td>';
    });
    html += '<td style="padding:3px;"><button onclick="removePlacementTeacher(' + idx + ')" style="background:#e53935;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px;padding:2px 5px;">✕</button></td>';
    html += '</tr>';
  });
  html += '</table></div>';
  return html;
}

function buildEditSupervisorSection(d, campusCodes) {
  if (campusCodes.length === 0) return '<p style="color:#999;font-size:13px;">校舎データがありません</p>';

  var html = '<div style="overflow-x:auto;">';
  html += '<table style="border-collapse:collapse;font-size:13px;width:100%;">';
  html += '<tr style="background:#f0f0f0;"><th style="padding:6px 8px;text-align:left;">校舎</th>';
  PLACEMENT_DAYS.forEach(function(day) { html += '<th style="padding:6px 8px;">' + day + '</th>'; });
  html += '</tr>';

  campusCodes.forEach(function(code) {
    var c = d.campuses[code] || {};
    var sup = d.supervisors[code] || {};
    html += '<tr style="border-bottom:1px solid #f0f0f0;">';
    html += '<td style="padding:5px 8px;font-weight:bold;font-size:12px;white-space:nowrap;">' + escHtml(c.name || code) + '</td>';
    PLACEMENT_DAYS.forEach(function(day) {
      // その曜日・その校舎に配置されている講師のリスト
      var assigned = d.teachers.filter(function(t) { return t[day] === code; });
      var current = sup[day] || '';
      var opts = '<option value="">—</option>';
      assigned.forEach(function(t) {
        opts += '<option value="' + escHtml(t.name) + '"' + (current === t.name ? ' selected' : '') + '>' + escHtml(t.name) + '</option>';
      });
      // 現在の責任者が配置リストにない場合も選択肢に残す
      if (current && !assigned.some(function(t) { return t.name === current; })) {
        opts += '<option value="' + escHtml(current) + '" selected>' + escHtml(current) + '</option>';
      }
      html += '<td style="padding:3px;"><select onchange="updatePlacementSupervisor(\'' + code + '\',\'' + day + '\',this.value)" style="padding:3px;border:1px solid #ddd;border-radius:4px;font-size:11px;max-width:80px;">' + opts + '</select></td>';
    });
    html += '</tr>';
  });
  html += '</table></div>';
  if (!d.teachers.length) {
    return '<p style="color:#999;font-size:13px;padding:8px;">まず講師を追加してください</p>';
  }
  return html;
}

// 編集データ更新ヘルパー
function updatePlacementCampus(code, field, value) {
  if (!_placementEditData.campuses[code]) _placementEditData.campuses[code] = {};
  _placementEditData.campuses[code][field] = value;
}

function updatePlacementTeacher(idx, field, value) {
  if (!_placementEditData.teachers[idx]) return;
  _placementEditData.teachers[idx][field] = value;
  // 曜日の配属校舎が変わったら責任者セクションも更新
  if (PLACEMENT_DAYS.indexOf(field) !== -1) {
    var campusCodes = Object.keys(_placementEditData.campuses).sort();
    var supBody = document.getElementById('pe-sec-super-body');
    if (supBody) supBody.innerHTML = buildEditSupervisorSection(_placementEditData, campusCodes);
  }
}

function updatePlacementSupervisor(code, day, value) {
  if (!_placementEditData.supervisors[code]) _placementEditData.supervisors[code] = {};
  _placementEditData.supervisors[code][day] = value;
}

function addPlacementTeacher() {
  var selectEl = document.getElementById('pe-new-teacher-select');
  var subjEl = document.getElementById('pe-new-teacher-subject');
  if (!selectEl || !selectEl.value) { showToast('講師を選択してください', 'error'); return; }
  var selectedName = selectEl.value;
  // スタッフリストから設定情報を取得
  var staff = null;
  for (var i = 0; i < placementStaffList.length; i++) {
    if (placementStaffList[i].name === selectedName) { staff = placementStaffList[i]; break; }
  }
  var subject = (staff && staff.subjects && staff.subjects[0]) || (subjEl ? subjEl.value : '英語');
  var t = { name: selectedName, subject: subject };
  // preferred_campuses が1校舎のみなら全曜日に自動入力
  var pref = (staff && staff.preferredCampuses && staff.preferredCampuses.length === 1) ? staff.preferredCampuses[0] : '';
  PLACEMENT_DAYS.forEach(function(day) { t[day] = pref; });
  _placementEditData.teachers.push(t);
  _rebuildTeacherAndSupervisor();
}

function addPlacementTeacherManual() {
  var nameEl = document.getElementById('pe-new-teacher-manual-name');
  var subjEl = document.getElementById('pe-new-teacher-manual-subject');
  var name = nameEl ? nameEl.value.trim() : '';
  if (!name) { showToast('講師名を入力してください', 'error'); return; }
  var t = { name: name, subject: subjEl ? subjEl.value : '英語' };
  PLACEMENT_DAYS.forEach(function(day) { t[day] = ''; });
  _placementEditData.teachers.push(t);
  if (nameEl) nameEl.value = '';
  _rebuildTeacherAndSupervisor();
}

function removePlacementTeacher(idx) {
  _placementEditData.teachers.splice(idx, 1);
  _rebuildTeacherAndSupervisor();
}

function _rebuildTeacherAndSupervisor() {
  var campusCodes = Object.keys(_placementEditData.campuses).sort();
  var body = document.getElementById('pe-sec-teacher-body');
  if (body) body.innerHTML = buildEditTeacherSection(_placementEditData, campusCodes);
  var supBody = document.getElementById('pe-sec-super-body');
  if (supBody) supBody.innerHTML = buildEditSupervisorSection(_placementEditData, campusCodes);
}

function closePlacementEdit() {
  var modal = document.getElementById('placement-edit-modal');
  if (modal) modal.style.display = 'none';
  _placementEditData = null;
  _placementEditYear = null;
  _placementEditCache = {};
}

/**
 * 配置データを保存する
 */
function savePlacementData() {
  if (!_placementEditData) return;

  // 編集中の年度をデータに反映
  var targetYear = _placementEditYear || (_placementEditData.year ? parseInt(_placementEditData.year, 10) : null);
  if (targetYear) _placementEditData.year = targetYear;

  var btn = document.getElementById('pe-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

  var dataJson = JSON.stringify(_placementEditData);

  google.script.run
    .withSuccessHandler(function(result) {
      if (btn) { btn.disabled = false; btn.textContent = '💾 保存'; }
      if (result && result.success) {
        showToast('✓ 保存しました', 'success');
        // 表示中の年度と保存先年度が一致する場合のみビューに反映
        // （例: 2027年1月に来年度「2027年度」を保存した場合は、表示は2026年度のまま）
        if (result.year === placementDisplayYear) {
          placementData = _placementEditData;
          placementLoaded = true;
        } else {
          // 表示対象外の年度を保存した場合は、キャッシュだけ維持しビューはそのまま
          showToast((result.year) + '年度の配置表を保存しました（4月に自動で切り替わります）', 'success');
        }
        closePlacementEdit();
        var root = document.getElementById('placement-root');
        if (root) renderPlacement(root);
      } else {
        showToast('保存に失敗しました: ' + (result && result.error ? result.error : '不明'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.textContent = '💾 保存'; }
      showToast('エラー: ' + err, 'error');
    })
    .saveStaffPlacementForWeb(dataJson, targetYear);
}

// ===== PDF印刷 =====

/**
 * 印刷用の新ウィンドウを開いて印刷ダイアログを起動する
 */
function printPlacementPDF() {
  if (!placementData) { showToast('データがありません', 'error'); return; }
  var year = placementData.year || '';
  var html = buildPlacementPrintHtml(placementData, year);
  var win = window.open('', '_blank');
  if (!win) { showToast('ポップアップがブロックされました。許可してから再試行してください。', 'error'); return; }
  win.document.write(html);
  win.document.close();
  win.onload = function() {
    setTimeout(function() { win.print(); }, 300);
  };
}

/**
 * 横向きA4の印刷用HTMLを生成する
 */
function buildPlacementPrintHtml(data, year) {
  var campuses = data.campuses || {};
  var teachers = data.teachers || [];
  var supervisors = data.supervisors || {};
  var campusCodes = Object.keys(campuses).sort();

  var SUBJECT_ORDER = ['英語', '数学', '国語', '理科', '社会', 'その他'];
  var groups = {};
  teachers.forEach(function(t) {
    var subj = t.subject || 'その他';
    if (!groups[subj]) groups[subj] = [];
    groups[subj].push(t);
  });
  var orderedSubjects = SUBJECT_ORDER.filter(function(s) { return groups[s]; });
  Object.keys(groups).forEach(function(s) { if (SUBJECT_ORDER.indexOf(s) < 0) orderedSubjects.push(s); });

  var leftRows = '';
  orderedSubjects.forEach(function(subj) {
    var list = groups[subj];
    list.forEach(function(teacher, idx) {
      leftRows += '<tr>';
      if (idx === 0) {
        leftRows += '<td rowspan="' + list.length + '" class="subj-cell">' + escHtml(subj) + '</td>';
      }
      leftRows += '<td class="name-cell">' + escHtml(teacher.name || '') + '</td>';
      PLACEMENT_DAYS.forEach(function(day) {
        var code = teacher[day] || '';
        var campus = campuses[code];
        var abbr = campus ? (campus.abbr || campus.name.charAt(0)) : code;
        leftRows += '<td class="day-cell">' + escHtml(abbr) + '</td>';
      });
      leftRows += '</tr>';
    });
  });

  var rightRows = '';
  campusCodes.forEach(function(code) {
    var campus = campuses[code];
    var sup = supervisors[code] || {};

    var dayTeachers = {};
    PLACEMENT_DAYS.forEach(function(day) {
      dayTeachers[day] = teachers.filter(function(t) { return t[day] === code; }).map(function(t) { return t.name; });
    });

    var campusInfo = escHtml(campus.name || code);
    if (campus.tel) {
      if (campus.tel === campus.fax) {
        campusInfo += '<br><small>TEL&amp;FAX<br>' + escHtml(campus.tel) + '</small>';
      } else {
        campusInfo += '<br><small>TEL ' + escHtml(campus.tel);
        if (campus.fax) campusInfo += '<br>FAX ' + escHtml(campus.fax);
        campusInfo += '</small>';
      }
    }
    if (campus.mobile) {
      campusInfo += '<br><small>携帯 ' + escHtml(campus.mobile) + '</small>';
    }
    if (campus.principal) {
      campusInfo += '<br><small>責任者 ' + escHtml(campus.principal) + '</small>';
    }

    var dayCells = PLACEMENT_DAYS.map(function(day) {
      var cell = '';
      var s = sup[day] || '';
      if (s) cell += '<div class="supervisor-circle">' + escHtml(s) + '</div>';
      var others = dayTeachers[day].filter(function(n) { return n !== s; });
      others.forEach(function(n) { cell += '<div class="day-staff">' + escHtml(n) + '</div>'; });
      return '<td class="right-day-cell">' + cell + '</td>';
    }).join('');

    rightRows += '<tr><td class="campus-cell">' + campusInfo + '</td>' + dayCells + '</tr>';
  });

  var yearLabel = year ? (year + '年度') : '';

  return '<!DOCTYPE html><html><head><meta charset="utf-8">'
    + '<title>' + escHtml(yearLabel) + ' 講師配置表</title>'
    + '<style>'
    + '* { margin: 0; padding: 0; box-sizing: border-box; }'
    + '@page { size: A4 landscape; margin: 8mm; }'
    + 'body { font-family: "Meiryo", "Yu Gothic", sans-serif; font-size: 10pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }'
    + 'h1 { text-align: center; font-size: 16pt; letter-spacing: 4px; margin-bottom: 8px; }'
    + '.tables-wrap { display: flex; gap: 10px; align-items: flex-start; }'
    + 'table { border-collapse: collapse; }'
    + 'th, td { border: 1px solid #333; padding: 2px 4px; }'
    + 'th { background: #f0f0f0; text-align: center; }'
    + '.left-table { flex: 0 0 auto; }'
    + '.left-table .subj-cell { writing-mode: vertical-lr; text-align: center; font-size: 8pt; padding: 2px; background: #fafafa; }'
    + '.left-table .name-cell { text-align: left; min-width: 36px; font-size: 9pt; padding: 2px 4px; }'
    + '.left-table .day-cell { text-align: center; min-width: 20px; font-size: 9pt; }'
    + '.right-table { flex: 1 1 auto; }'
    + '.right-table .campus-cell { min-width: 64px; font-size: 8pt; vertical-align: top; text-align: center; line-height: 1.4; }'
    + '.right-table .right-day-cell { min-width: 52px; vertical-align: top; text-align: center; font-size: 8pt; }'
    + '.supervisor-circle { display: inline-block; border: 1.5px solid #000; border-radius: 50%; padding: 1px 5px; font-size: 8pt; margin-bottom: 2px; }'
    + '.day-staff { font-size: 7.5pt; color: #333; }'
    + 'small { font-size: 7pt; }'
    + '.print-footer { margin-top: 8px; display: flex; align-items: center; gap: 20px; font-size: 9pt; }'
    + '.legend-circle { display: inline-block; border: 1px solid #000; border-radius: 50%; width: 20px; height: 14px; vertical-align: middle; margin-right: 4px; }'
    + '</style>'
    + '</head><body>'
    + '<h1>' + escHtml(yearLabel) + (yearLabel ? '&nbsp;&nbsp;&nbsp;' : '') + '講師配置表及び曜日別責任者</h1>'
    + '<div class="tables-wrap">'
    + '<table class="left-table">'
    + '<thead><tr><th></th><th></th>'
    + PLACEMENT_DAYS.map(function(d) { return '<th>' + d + '</th>'; }).join('')
    + '</tr></thead>'
    + '<tbody>' + leftRows + '</tbody>'
    + '</table>'
    + '<table class="right-table">'
    + '<thead><tr><th></th>'
    + PLACEMENT_DAYS.map(function(d) { return '<th>' + d + '</th>'; }).join('')
    + '</tr></thead>'
    + '<tbody>' + rightRows + '</tbody>'
    + '</table>'
    + '</div>'
    + '<div class="print-footer">'
    + '<span><span class="legend-circle"></span> 各曜日の責任者</span>'
    + '</div>'
    + '</body></html>';
}

// ===== ユーティリティ =====

function escHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
